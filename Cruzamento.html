  .cruz-card.vermelho {

  .cruz-card.amarelo {

  .cruz-card.verde {
    border-left: 3px solid var(--green);
  }

  .cruz-col-empty {
    text-align: center;
    padding: 24px 12px;
    color: var(--muted);
    font-size: 11px;

    margin: 4px;

  @media (max-width: 1280px) {
    .cruz-summary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 980px) {
    .cruz-kanban {
      grid-template-columns: 1fr;
    }

</style>

<div id="pageCruzamento" class="page">
  <div class="cruz-toolbar">
    <h2>Cruzamento Vero</h2>
    <label class="cruz-upload-btn" for="cruzInputFile">Importar relatório XLS</label>
    <input type="file" id="cruzInputFile" accept=".xlsx,.xls" onchange="_cruzamentoImportar(this)">
    <span class="cruz-status" id="cruzStatus">Nenhum arquivo importado</span>
    <button class="btn btn-ghost btn-sm" onclick="_cruzamentoLimpar()" id="cruzBtnLimpar" style="display:none">Limpar</button>
  </div>

  <div class="cruz-tabs" id="cruzTabs" style="display:none">
    <div class="cruz-tab ativo" onclick="_cruzTab('vendas', this)">
      Venda Bruta <span class="cruz-tab-badge" id="cruzBadgeVendas">-</span>
    </div>
    <div class="cruz-tab" onclick="_cruzTab('instalacoes', this)">
      Instalações <span class="cruz-tab-badge" id="cruzBadgeInstalacoes">-</span>
    </div>
    <div class="cruz-tab" onclick="_cruzTab('cancelamentos', this)">
      Cancelamentos <span class="cruz-tab-badge" id="cruzBadgeCancelamentos">-</span>
    </div>
  </div>

  <div class="cruz-body" id="cruzBody">
    <div class="cruz-empty">
      <div class="cruz-empty-icon">+</div>
      <h3>Nenhum relatório importado</h3>
      <p>Importe o arquivo XLS enviado pela Vero para cruzar os contratos com a base atual do CRM.</p>
    </div>
  </div>
</div>

<script>
'use strict';

var _cruzDados = null;
var _cruzTabAtiva = 'vendas';
var _cruzDadosCRM = [];
var _cruzArquivoNome = '';

function _cruzSetStatus(texto, tipo) {
  var status = document.getElementById('cruzStatus');
  if (!status) return;
  status.className = 'cruz-status' + (tipo ? ' ' + tipo : '');
  status.textContent = texto;
}

function _cruzamentoImportar(inputEl) {
  var file = inputEl && inputEl.files ? inputEl.files[0] : null;
  if (!file) return;

  _cruzArquivoNome = file.name;
  _cruzSetStatus('Lendo arquivo...', '');

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      if (typeof XLSX === 'undefined') {
        _cruzSetStatus('Biblioteca XLSX não carregada. Recarregue a página.', 'err');
        return;
      }

      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: 'array' });

      var vendas = _cruzLerAba(wb, ['VENDAS']);
      var instalacoes = _cruzLerAba(wb, ['INSTALACOES', 'INSTALAÇÕES']);
      var cancelamento = _cruzLerAba(wb, ['CANCELAMENTO', 'CANCELAMENTOS']);
      var churn = _cruzLerAba(wb, ['CHURN']);
      var cancelamentos = _cruzCombinarAbas([cancelamento, churn]);

      if (!vendas.length && !instalacoes.length && !cancelamentos.length) {
        _cruzSetStatus('Nenhuma aba válida encontrada. Abas disponíveis: ' + wb.SheetNames.join(', '), 'err');
        return;
      }

      _cruzDados = {
        vendas: vendas,
        instalacoes: instalacoes,
        cancelamentos: cancelamentos
      };

      _cruzSetStatus('Carregando dados do CRM...', '');

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(res) {
            _cruzDadosCRM = res && res.dados ? res.dados : [];
            document.getElementById('cruzTabs').style.display = 'flex';
            document.getElementById('cruzBtnLimpar').style.display = '';
            _cruzSetStatus(file.name + ' importado com sucesso. CRM: ' + _cruzDadosCRM.length + ' contratos.', 'ok');
            _cruzRenderizar();
          })
          .withFailureHandler(function(err) {
            var msg = err && err.message ? err.message : 'tente novamente';
            _cruzSetStatus('Erro ao carregar contratos do CRM: ' + msg, 'err');
          })
          .getContratosParaCruzamento();
      } else {
        _cruzDadosCRM = [];
        document.getElementById('cruzTabs').style.display = 'flex';
        document.getElementById('cruzBtnLimpar').style.display = '';
        _cruzSetStatus(file.name + ' importado em modo teste. CRM indisponível neste ambiente.', 'ok');
        _cruzRenderizar();
      }
    } catch (err) {
      console.error('Erro ao processar arquivo do cruzamento:', err);
      _cruzSetStatus('Erro ao ler arquivo: ' + err.message, 'err');
    }
  };

  reader.onerror = function() {
    _cruzSetStatus('Erro ao ler arquivo.', 'err');
  };

  reader.readAsArrayBuffer(file);
  inputEl.value = '';
}

function _cruzLerAba(wb, aliases) {
  if (!wb || !wb.SheetNames || !aliases || !aliases.length) return [];

  var nomesMap = {};
  wb.SheetNames.forEach(function(nome) {
    nomesMap[_cruzNormalizarTexto(nome)] = nome;
  });

  for (var i = 0; i < aliases.length; i++) {
    var alias = aliases[i];
    var exato = nomesMap[_cruzNormalizarTexto(alias)];
    if (exato && wb.Sheets[exato]) {
      return XLSX.utils.sheet_to_json(wb.Sheets[exato], { defval: '', raw: false });
    }
  }

  var buscas = aliases.map(function(alias) {
    return _cruzNormalizarTexto(alias);
  });

  for (var j = 0; j < wb.SheetNames.length; j++) {
    var nomeAba = wb.SheetNames[j];
    var nomeNorm = _cruzNormalizarTexto(nomeAba);
    for (var k = 0; k < buscas.length; k++) {
      if (nomeNorm.indexOf(buscas[k]) > -1 || buscas[k].indexOf(nomeNorm) > -1) {
        return XLSX.utils.sheet_to_json(wb.Sheets[nomeAba], { defval: '', raw: false });
      }
    }
  }

  return [];
}

function _cruzCombinarAbas(listas) {
  var out = [];
  (listas || []).forEach(function(lista) {
    if (lista && lista.length) out = out.concat(lista);
  });
  return out;
}

function _cruzNormalizarTexto(texto) {
  return String(texto || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
    .toUpperCase();
}

function _cruzNormId(id) {
  if (id === null || id === undefined) return '';

  var bruto = String(id)
    .trim()
    .replace(/\.0$/, '')
    .replace(/['"]/g, '');

  var somenteDigitos = bruto.replace(/\D+/g, '');
  return somenteDigitos || bruto.toUpperCase();
}

function _cruzStatusKey(status) {
  return _cruzNormalizarTexto(status).replace(/\s*-\s*/g, ' - ');
}

function _cruzEhStatusVenda(status) {
  var key = _cruzStatusKey(status);
  return key.indexOf('AGUARDANDO INSTALACAO') > -1 || key.indexOf('FINALIZADA/INSTALADA') > -1 || key.indexOf('INSTALADA') > -1;
}

function _cruzEhInstalada(status) {
  var key = _cruzStatusKey(status);
  return key.indexOf('FINALIZADA/INSTALADA') > -1 || key.indexOf('INSTALADA') > -1;
}

function _cruzEhCancelado(status) {
  var key = _cruzStatusKey(status);
  return key.indexOf('CANCEL') > -1 || key.indexOf('CHURN') > -1 || key.indexOf('DEVOLVID') > -1;
}

function _cruzMesAno(dataStr) {
  if (!dataStr) return null;
  var s = String(dataStr).trim();
  if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) {
    var partesBr = s.split('/');
    return partesBr[1] + '/' + partesBr[2];
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    var partesIso = s.substring(0, 7).split('-');
    return partesIso[1] + '/' + partesIso[0];
  }
  return null;
}

function _cruzMesVigente(veroRows, campoData) {
  var meses = {};
  (veroRows || []).forEach(function(row) {
    var mesAno = _cruzMesAno(row[campoData]);
    if (mesAno) meses[mesAno] = (meses[mesAno] || 0) + 1;
  });

  var mesVigente = null;
  var maiorQtd = 0;
  Object.keys(meses).forEach(function(mesAno) {
    if (meses[mesAno] > maiorQtd) {
      maiorQtd = meses[mesAno];
      mesVigente = mesAno;
    }
  });

  return mesVigente;
}

function _cruzMesAnoCRM(dataStr) {
  if (!dataStr) return null;
  var s = String(dataStr).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(5, 7) + '/' + s.substring(0, 4);
  if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) {
    var partes = s.split('/');
    return partes[1] + '/' + partes[2];
  }
  return null;
}

function _cruzCRMdoMes(campo, mesVigente) {
  if (!mesVigente) return _cruzDadosCRM.slice();
  return _cruzDadosCRM.filter(function(item) {
    return _cruzMesAnoCRM(item[campo]) === mesVigente;
  });
}

function _cruzMapear(lista) {
  var mapa = {};
  (lista || []).forEach(function(item) {
    var id = _cruzNormId(item.contrato);
    if (id && !mapa[id]) mapa[id] = item;
  });
  return mapa;
}

function _cruzamentoLimpar() {
  _cruzDados = null;
  _cruzDadosCRM = [];
  _cruzArquivoNome = '';
  _cruzTabAtiva = 'vendas';
  _cruzRemoverIconesLista();
  _cruzSetStatus('Nenhum arquivo importado', '');
  document.getElementById('cruzTabs').style.display = 'none';
  document.getElementById('cruzBtnLimpar').style.display = 'none';
  document.getElementById('cruzBadgeVendas').textContent = '-';
  document.getElementById('cruzBadgeInstalacoes').textContent = '-';
  document.getElementById('cruzBadgeCancelamentos').textContent = '-';
  document.querySelectorAll('.cruz-tab').forEach(function(tab, idx) {
    tab.classList.toggle('ativo', idx === 0);
  });
  document.getElementById('cruzBody').innerHTML =
    '<div class="cruz-empty">' +
      '<div class="cruz-empty-icon">+</div>' +
      '<h3>Nenhum relatório importado</h3>' +
      '<p>Importe o arquivo XLS enviado pela Vero para cruzar os contratos com a base atual do CRM.</p>' +
    '</div>';
}

function _cruzTab(nome, el) {
  _cruzTabAtiva = nome;
  document.querySelectorAll('.cruz-tab').forEach(function(tab) {
    tab.classList.remove('ativo');
  });
  if (el) el.classList.add('ativo');
  _cruzRenderizar();
}

function _cruzRenderizar() {
  var body = document.getElementById('cruzBody');
  if (!body) return;

  if (!_cruzDados) {
    body.innerHTML =
      '<div class="cruz-empty">' +
        '<div class="cruz-empty-icon">+</div>' +
        '<h3>Nenhum relatório importado</h3>' +
      '</div>';
    return;
  }

  body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px;">Montando painel...</div>';

  setTimeout(function() {
    try {
      if (_cruzTabAtiva === 'vendas') {
        _cruzRenderVendas();
      } else if (_cruzTabAtiva === 'instalacoes') {
        _cruzRemoverIconesLista();
        _cruzRenderInstalacoes();
      } else {
        _cruzRemoverIconesLista();
        _cruzRenderCancelamentos();
      }
    } catch (err) {
      console.error('Erro ao renderizar cruzamento:', err);
      body.innerHTML = '<div class="cruz-empty" style="color:var(--accent);">Erro ao renderizar: ' + _escapeHtml(err.message) + '</div>';
    }
  }, 40);
}

function _cruzResumoPainel(cfg) {
  return (
    '<div class="cruz-summary">' +
      '<div class="cruz-summary-top">' +
        '<div>' +
          '<div class="cruz-summary-title">' + _escapeHtml(cfg.titulo) + '</div>' +
          '<div class="cruz-summary-subtitle">' + _escapeHtml(cfg.subtitulo || '') + '</div>' +
        '</div>' +
        '<div class="cruz-summary-file">' + _escapeHtml(_cruzArquivoNome || 'Arquivo local') + '</div>' +
      '</div>' +
      '<div class="cruz-summary-grid">' +
        _cruzResumoCard('Relatório Vero', cfg.totalRelatorio) +
        _cruzResumoCard('Contratos CRM', cfg.totalCRM) +
        _cruzResumoCard('Mês de referência', cfg.mes || 'Todos') +
        _cruzResumoCard('Observação', cfg.infoCurta || 'IDs normalizados') +
      '</div>' +
      '<div class="cruz-summary-note">' + _escapeHtml(cfg.nota || 'IDs com prefixos como NG são normalizados automaticamente antes da comparação.') + '</div>' +
    '</div>'
  );
}

function _cruzResumoCard(rotulo, valor) {
  return (
    '<div class="cruz-summary-card">' +
      '<div class="cruz-summary-label">' + _escapeHtml(rotulo) + '</div>' +
      '<div class="cruz-summary-value">' + _escapeHtml(String(valor === undefined || valor === null || valor === '' ? '-' : valor)) + '</div>' +
    '</div>'
  );
}

function _cruzKanban(col1, col2, col3) {
  return (
    '<div class="cruz-container-kanban">' +
      '<div class="cruz-kanban">' +
        _cruzColuna(col1) +
        _cruzColuna(col2) +
        _cruzColuna(col3) +
      '</div>' +
    '</div>'
  );
}

function _cruzColuna(cfg) {
  var cards = !cfg.items.length
    ? '<div class="cruz-col-empty">Nenhum registro</div>'
    : cfg.items.map(_cruzCard).join('');

  return (
    '<div class="cruz-col">' +
      '<div class="cruz-col-head">' +
        '<div class="cruz-col-stripe" style="background:' + cfg.cor + '"></div>' +
        '<div class="cruz-col-title">' + _escapeHtml(cfg.titulo) + '</div>' +
        '<div class="cruz-col-count">' + cfg.items.length + '</div>' +
      '</div>' +
      '<div class="cruz-col-cards">' + cards + '</div>' +
    '</div>'
  );
}

function _cruzCard(item) {
  var rows = (item._rows || []).map(function(row) {
    return '<div class="cruz-card-row">' + _escapeHtml(row) + '</div>';
  }).join('');

  return (
    '<div class="cruz-card ' + (item._cls || '') + '">' +
      '<div class="cruz-card-nome">' + _escapeHtml(item._nome || '') + '</div>' +
      rows +
    '</div>'
  );
}

function _escapeHtml(text) {
  if (text === null || text === undefined) return '';
  var div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function _fmtData(dataStr) {
  if (!dataStr) return '';
  var s = String(dataStr);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    return s.substring(8, 10) + '/' + s.substring(5, 7) + '/' + s.substring(0, 4);
  }
  return s;
}

function _cruzRenderVendas() {
  var rows = _cruzDados.vendas || [];
  var mesVigente = _cruzMesVigente(rows, 'DATA_CADASTRO');
  var crmMes = _cruzCRMdoMes('dataAtiv', mesVigente);
  var mapaCRM = _cruzMapear(crmMes);

  document.getElementById('cruzBadgeVendas').textContent = rows.length;

  var idsVero = {};
  var soVero = [];
  var bateu = [];
  var soCRM = [];

  rows.forEach(function(row) {
    var id = _cruzNormId(row.ID_CONTRATO || row.CONTRATO || row.Contrato);
    if (!id) return;
    idsVero[id] = true;
    if (mapaCRM[id]) {
      bateu.push({ vero: row, crm: mapaCRM[id] });
    } else {
      soVero.push(row);
    }
  });

  crmMes.forEach(function(item) {
    var id = _cruzNormId(item.contrato);
    if (!id || !_cruzEhStatusVenda(item.status) || idsVero[id]) return;
    soCRM.push(item);

  var html =

      titulo: 'Venda Bruta',
      subtitulo: 'Comparação por ID Contrato entre a aba de vendas da Vero e os contratos ativos do CRM.',
      totalRelatorio: rows.length,
      totalCRM: crmMes.length,
      mes: mesVigente || 'Todos',
      infoCurta: 'NG ignorado',
      nota: 'A comparação usa apenas o ID Contrato normalizado. Prefixos como NG, aspas e sufixos .0 são removidos antes do match.'
    }) +
    _cruzKanban(
      {
        titulo: 'Match',
        cor: 'var(--green)',
        items: bateu.map(function(item) {
          var idVero = item.vero.ID_CONTRATO || item.vero.CONTRATO || item.vero.Contrato;
          return {
            _nome: item.crm.cliente || idVero,
            _cls: 'verde',
            _rows: [
              'ID: ' + _cruzNormId(idVero),
              item.crm.status || 'Sem status',
              'Ativação CRM: ' + _fmtData(item.crm.dataAtiv)
            ]
          };
        })
      },
      {
        titulo: 'Apenas no Relatório Vero',
        cor: 'var(--yellow)',
        items: soVero.map(function(row) {
          var idVero = row.ID_CONTRATO || row.CONTRATO || row.Contrato || 'Sem ID';
          return {
            _nome: _cruzNormId(idVero) || idVero,
            _cls: 'amarelo',
            _rows: [
              row.NOME_PLANO_ATUAL || 'Plano não informado',
              row.CIDADE_HIERARQUIA || 'Cidade não informada',
              'Cadastro Vero: ' + (row.DATA_CADASTRO || '')
            ]
          };
        })
      },
      {
        titulo: 'Apenas no CRM',
        cor: 'var(--accent)',
        items: soCRM.map(function(item) {
          return {
            _nome: item.cliente || item.contrato,
            _cls: 'vermelho',
            _rows: [
              'ID: ' + _cruzNormId(item.contrato),
              item.status || 'Sem status',
              'Ativação CRM: ' + _fmtData(item.dataAtiv)
            ]
          };
        })
      }
    );

  document.getElementById('cruzBody').innerHTML = html;
}

function _cruzAtualizarIconesLista(bateu, soVero, soCRM) {
  if (typeof _paginaAtual === 'undefined' || !_paginaAtual || !_paginaAtual.length) return;

  var setBateu = {};
  (bateu || []).forEach(function(item) {
    setBateu[_cruzNormId(item.crm.contrato || item.vero.ID_CONTRATO || '')] = true;
  });

  var setSoCRM = {};
  (soCRM || []).forEach(function(item) {
    setSoCRM[_cruzNormId(item.contrato || '')] = true;
  });

  _paginaAtual.forEach(function(item, idx) {
    var id = _cruzNormId(item.contrato || '');
    var el = document.getElementById('item_' + idx);
    if (!el || !id) return;

    var antigo = el.querySelector('.cruz-icone');
    if (antigo) antigo.remove();

    var icone = document.createElement('span');
    icone.className = 'cruz-icone';
    icone.style.cssText = 'font-size:11px;margin-left:6px;';

    if (setBateu[id]) {
      icone.textContent = 'OK';
      icone.title = 'Encontrado no relatório da Vero';
    } else if (setSoCRM[id]) {
      icone.textContent = 'Vero?';
      icone.title = 'Contrato do CRM não encontrado no relatório da Vero';
    } else {
      return;
    }

    var nomeEl = el.querySelector('.venda-nome-linha h4');
    if (nomeEl && nomeEl.parentNode) nomeEl.parentNode.insertBefore(icone, nomeEl.nextSibling);
  });
}

function _cruzRemoverIconesLista() {
  document.querySelectorAll('.cruz-icone').forEach(function(el) {
    el.remove();
  });
}
