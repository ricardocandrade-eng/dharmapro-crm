<div id="pageCruzamento" class="page">
  <div class="cruz-toolbar">
    <h2>Cruzamento Vero</h2>
    <label class="cruz-upload-btn" for="cruzInputFile">Importar relatorio XLS</label>
    <input type="file" id="cruzInputFile" accept=".xlsx,.xls" onchange="_cruzamentoImportar(this)">
    <button class="btn btn-ghost btn-sm" onclick="_cruzamentoBuscarGmail()" id="cruzBtnGmail">📧 Buscar último da Vero</button>
    <span class="cruz-status" id="cruzStatus">Nenhum arquivo importado</span>
    <button class="btn btn-ghost btn-sm" onclick="_cruzamentoLimpar()" id="cruzBtnLimpar" style="display:none">Limpar</button>
    <span class="cruz-lastsync" id="cruzLastSync"></span>
  </div>

  <div class="cruz-tabs" id="cruzTabs" style="display:none">
    <div class="cruz-tab ativo" onclick="_cruzTab('vendas', this)">
      Venda Bruta <span class="cruz-tab-badge" id="cruzBadgeVendas">-</span>
    </div>
    <div class="cruz-tab" onclick="_cruzTab('instalacoes', this)">
      Instalacoes <span class="cruz-tab-badge" id="cruzBadgeInstalacoes">-</span>
    </div>
    <div class="cruz-tab" onclick="_cruzTab('cancelamentos', this)">
      Cancelamentos <span class="cruz-tab-badge" id="cruzBadgeCancelamentos">-</span>
    </div>
    <div class="cruz-tab" onclick="_cruzTab('movel', this)">
      Movel <span class="cruz-tab-badge" id="cruzBadgeMovel">-</span>
    </div>
  </div>

  <div class="cruz-body" id="cruzBody">
    <div class="cruz-empty">
      <div class="cruz-empty-icon">+</div>
      <h3>Nenhum relatorio importado</h3>
      <p>Importe o arquivo XLS enviado pela Vero para cruzar os contratos com a base atual do CRM.</p>
    </div>
  </div>
</div>

<script>
'use strict';

var _cruzDados = null;
var _cruzTabAtiva = 'vendas';
var _cruzDadosCRM = [];
var _cruzArquivoNome = '';

// Sobrescrita de dados (planilha = fonte da verdade) + persistencia do resultado.
var _cruzCorrecoes = [];            // [{linha, contrato, cliente, campos, diffs}]
var _cruzCorrecoesAplicadas = false;
var _cruzOrigemAtual = '';          // 'manual' | 'auto'
var _cruzQuando = 0;                // timestamp ms do ultimo import
var _CRUZ_LS_KEY = 'dharmapro_cruzamento_v1';
var _cruzCodigosMap = {};           // { "4624": {nome, conf} } — codigo Vero -> nome_crm (sobrescrita de plano)

function _cruzSetStatus(texto, tipo) {
  var status = document.getElementById('cruzStatus');
  if (!status) return;
  status.className = 'cruz-status' + (tipo ? ' ' + tipo : '');
  status.textContent = texto;
}

function _cruzamentoImportar(inputEl) {
  var file = inputEl && inputEl.files ? inputEl.files[0] : null;
  if (!file) return;

  _cruzArquivoNome = file.name;
  _cruzSetStatus('Lendo arquivo...', '');

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      if (typeof XLSX === 'undefined') {
        _cruzSetStatus('Biblioteca XLSX nao carregada. Recarregue a pagina.', 'err');
        return;
      }

      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, { type: 'array' });

      var vendas = _cruzLerAba(wb, ['VENDAS']);
      var instalacoes = _cruzLerAba(wb, ['INSTALACOES', 'INSTALACOES', 'INSTALACOES']);
      var cancelamento = _cruzLerAba(wb, ['CANCELAMENTO', 'CANCELAMENTOS']);
      var churn = _cruzLerAba(wb, ['CHURN']);
      var movel = _cruzLerAba(wb, ['MOVEL', 'MOVEL']);
      var cancelamentos = _cruzCombinarAbas([cancelamento, churn]);

      if (!vendas.length && !instalacoes.length && !cancelamentos.length && !movel.length) {
        _cruzSetStatus('Nenhuma aba valida encontrada. Abas disponiveis: ' + wb.SheetNames.join(', '), 'err');
        return;
      }

      _cruzDados = {
        vendas: vendas,
        instalacoes: instalacoes,
        cancelamentos: cancelamentos,
        movel: movel
      };

      _cruzSetStatus('Carregando dados do CRM...', '');

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(res) {
            _cruzDadosCRM = res && res.dados ? res.dados : [];
            _cruzCodigosMap = (res && res.codigosVero) ? res.codigosVero : {};
            document.getElementById('cruzTabs').style.display = 'flex';
            document.getElementById('cruzBtnLimpar').style.display = '';
            _cruzCorrecoes = _cruzComputarCorrecoes();
            _cruzCorrecoesAplicadas = false;
            _cruzSetStatus(file.name + ' importado. CRM: ' + _cruzDadosCRM.length + ' contratos · ' + _cruzCorrecoes.length + ' com correção sugerida.', 'ok');
            _cruzConsolidarESalvar();
            _cruzSetBadges();
            _cruzPersistir('manual');
            _cruzRenderizar();
          })
          .withFailureHandler(function(err) {
            var msg = err && err.message ? err.message : 'tente novamente';
            _cruzSetStatus('Erro ao carregar contratos do CRM: ' + msg, 'err');
          })
          .getContratosParaCruzamento();
      } else {
        _cruzDadosCRM = [];
        document.getElementById('cruzTabs').style.display = 'flex';
        document.getElementById('cruzBtnLimpar').style.display = '';
        _cruzCorrecoes = [];
        _cruzCorrecoesAplicadas = false;
        _cruzSetStatus(file.name + ' importado em modo teste. CRM indisponivel neste ambiente.', 'ok');
        _cruzSetBadges();
        _cruzPersistir('manual');
        _cruzRenderizar();
      }
    } catch (err) {
      console.error('Erro ao processar arquivo do cruzamento:', err);
      _cruzSetStatus('Erro ao ler arquivo: ' + err.message, 'err');
    }
  };

  reader.onerror = function() {
    _cruzSetStatus('Erro ao ler arquivo.', 'err');
  };

  reader.readAsArrayBuffer(file);
  inputEl.value = '';
}

function _cruzLerAba(wb, aliases) {
  if (!wb || !wb.SheetNames || !aliases || !aliases.length) return [];

  var nomesMap = {};
  wb.SheetNames.forEach(function(nome) {
    nomesMap[_cruzNormalizarTexto(nome)] = nome;
  });

  for (var i = 0; i < aliases.length; i++) {
    var alias = aliases[i];
    var exato = nomesMap[_cruzNormalizarTexto(alias)];
    if (exato && wb.Sheets[exato]) {
      return XLSX.utils.sheet_to_json(wb.Sheets[exato], { defval: '', raw: false });
    }
  }

  var buscas = aliases.map(function(alias) {
    return _cruzNormalizarTexto(alias);
  });

  for (var j = 0; j < wb.SheetNames.length; j++) {
    var nomeAba = wb.SheetNames[j];
    var nomeNorm = _cruzNormalizarTexto(nomeAba);
    for (var k = 0; k < buscas.length; k++) {
      if (nomeNorm.indexOf(buscas[k]) > -1 || buscas[k].indexOf(nomeNorm) > -1) {
        return XLSX.utils.sheet_to_json(wb.Sheets[nomeAba], { defval: '', raw: false });
      }
    }
  }

  return [];
}

function _cruzCombinarAbas(listas) {
  var out = [];
  (listas || []).forEach(function(lista) {
    if (lista && lista.length) out = out.concat(lista);
  });
  return out;
}

function _cruzNormalizarTexto(texto) {
  return String(texto || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
    .toUpperCase();
}

function _cruzNormId(id) {
  if (id === null || id === undefined) return '';

  var bruto = String(id)
    .trim()
    .replace(/\.0$/, '')
    .replace(/['"]/g, '');

  var somenteDigitos = bruto.replace(/\D+/g, '');
  return somenteDigitos || bruto.toUpperCase();
}

function _cruzStatusKey(status) {
  return _cruzNormalizarTexto(status).replace(/\s*-\s*/g, ' - ');
}

function _cruzEhStatusVenda(status) {
  var key = _cruzStatusKey(status);
  return key.indexOf('AGUARDANDO INSTALACAO') > -1 || key.indexOf('FINALIZADA/INSTALADA') > -1 || key.indexOf('INSTALADA') > -1;
}

function _cruzEhInstalada(status) {
  var key = _cruzStatusKey(status);
  return key.indexOf('FINALIZADA/INSTALADA') > -1 || key.indexOf('INSTALADA') > -1;
}

function _cruzEhCancelado(status) {
  var key = _cruzStatusKey(status);
  return key.indexOf('CANCEL') > -1 || key.indexOf('CHURN') > -1 || key.indexOf('DEVOLVID') > -1;
}

function _cruzEhMovelAtivo(status) {
  var key = _cruzStatusKey(status);
  return key.indexOf('ATIVO') > -1 || key.indexOf('ATIVACAO') > -1;
}

function _cruzMesAno(dataStr) {
  if (!dataStr) return null;
  var s = String(dataStr).trim();
  if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) {
    var partesBr = s.split('/');
    return partesBr[1] + '/' + partesBr[2];
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    var partesIso = s.substring(0, 7).split('-');
    return partesIso[1] + '/' + partesIso[0];
  }
  return null;
}

function _cruzMesVigente(veroRows, campoData) {
  var meses = {};
  (veroRows || []).forEach(function(row) {
    var mesAno = _cruzMesAno(row[campoData]);
    if (mesAno) meses[mesAno] = (meses[mesAno] || 0) + 1;
  });

  var mesVigente = null;
  var maiorQtd = 0;
  Object.keys(meses).forEach(function(mesAno) {
    if (meses[mesAno] > maiorQtd) {
      maiorQtd = meses[mesAno];
      mesVigente = mesAno;
    }
  });

  return mesVigente;
}

function _cruzMesAnoCRM(dataStr) {
  if (!dataStr) return null;
  var s = String(dataStr).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(5, 7) + '/' + s.substring(0, 4);
  if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) {
    var partes = s.split('/');
    return partes[1] + '/' + partes[2];
  }
  return null;
}

function _cruzCRMdoMes(campo, mesVigente) {
  if (!mesVigente) return _cruzDadosCRM.slice();
  return _cruzDadosCRM.filter(function(item) {
    return _cruzMesAnoCRM(item[campo]) === mesVigente;
  });
}

function _cruzMapear(lista) {
  var mapa = {};
  (lista || []).forEach(function(item) {
    var id = _cruzNormId(item.contrato);
    if (id && !mapa[id]) mapa[id] = item;
  });
  return mapa;
}

function _cruzRenderizar() {
  var body = document.getElementById('cruzBody');
  if (!body) return;

  if (!_cruzDados) {
    body.innerHTML =
      '<div class="cruz-empty">' +
        '<div class="cruz-empty-icon">+</div>' +
        '<h3>Nenhum relatorio importado</h3>' +
      '</div>';
    return;
  }

  body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px;">Montando painel...</div>';

  setTimeout(function() {
    try {
      if (_cruzTabAtiva === 'vendas') {
        _cruzRenderVendas();
      } else if (_cruzTabAtiva === 'instalacoes') {
        _cruzRemoverIconesLista();
        _cruzRenderInstalacoes();
      } else if (_cruzTabAtiva === 'movel') {
        _cruzRemoverIconesLista();
        _cruzRenderMovel();
      } else {
        _cruzRemoverIconesLista();
        _cruzRenderCancelamentos();
      }
      _cruzInjetarPainelCorrecoes();
    } catch (err) {
      console.error('Erro ao renderizar cruzamento:', err);
      body.innerHTML = '<div class="cruz-empty" style="color:var(--accent);">Erro ao renderizar: ' + _escapeHtml(err.message) + '</div>';
    }

}

function _escapeHtml(text) {
  if (text === null || text === undefined) return '';
  var div = document.createElement('div');

function _fmtData(dataStr) {

function _cruzAtualizarIconesLista(bateu, soVero, soCRM) {
  if (typeof _paginaAtual === 'undefined' || !_paginaAtual || !_paginaAtual.length) return;

  var setBateu = {};
  (bateu || []).forEach(function(item) {
    setBateu[_cruzNormId(item.crm.contrato || item.vero.ID_CONTRATO || '')] = true;
  });

  var setSoCRM = {};
  (soCRM || []).forEach(function(item) {
    setSoCRM[_cruzNormId(item.contrato || '')] = true;
  });

  _paginaAtual.forEach(function(item, idx) {
    var id = _cruzNormId(item.contrato || '');
    var el = document.getElementById('item_' + idx);
    if (!el || !id) return;

    var antigo = el.querySelector('.cruz-icone');
    if (antigo) antigo.remove();

    var icone = document.createElement('span');
    icone.className = 'cruz-icone';
    icone.style.cssText = 'font-size:11px;margin-left:6px;';

    if (setBateu[id]) {
      icone.textContent = 'OK';
      icone.title = 'Encontrado no relatorio da Vero';
    } else if (setSoCRM[id]) {
      icone.textContent = 'Vero?';
      icone.title = 'Contrato do CRM nao encontrado no relatorio da Vero';
    } else {
      return;
    }

    var nomeEl = el.querySelector('.venda-nome-linha h4');
    if (nomeEl && nomeEl.parentNode) nomeEl.parentNode.insertBefore(icone, nomeEl.nextSibling);
  });
}

  });
  (soCRM || []).forEach(function(item) {
    if (item.linha) resultados.push({ linha: item.linha, veroStatus: '🟡' });
  });
  if (!resultados.length) return;
  google.script.run
    .withSuccessHandler(function() {})
    .withFailureHandler(function() {})
    .salvarResultadoCruzamento(resultados);
}

function _cruzCarregarUltimaSync() {
  var el = document.getElementById('cruzLastSync');

  google.script.run
    .withSuccessHandler(function(reg) {

        el.textContent = '🔄 Nenhuma sincronização automática registrada ainda.';

      el.className = cls;
      el.textContent = txt;

function _cruzamentoBuscarGmail() {

        };

        document.getElementById('cruzTabs').style.display = 'flex';
        document.getElementById('cruzBtnLimpar').style.display = '';
        _cruzSetBadges();

      var c = res.contagem || {};

                ' · Cancel:' + (c.cancelamentos || 0) + ' · Movel:' + (c.movel || 0) +

function _cruzConsolidarESalvar() {
  if (typeof google === 'undefined' || !google.script || !google.script.run) return;
  if (!_cruzDados || !_cruzDadosCRM || !_cruzDadosCRM.length) return;

  var idsVendas = {};
  (_cruzDados.vendas || []).forEach(function(row) {
    var id = _cruzNormId(row.ID_CONTRATO || row.CONTRATO || row.Contrato);
    if (id) idsVendas[id] = true;
  });

  var idsInstal = {};
  (_cruzDados.instalacoes || []).forEach(function(row) {
    var id = _cruzNormId(row.ID_CONTRATO || row.CONTRATO || row.Contrato);
    if (id) idsInstal[id] = true;
  });

  // 🟡 escopado ao mes vigente do relatorio Vero VENDAS (DATA_CADASTRO).
  // Sem esse filtro, relatorios diarios marcam todo o historico do CRM
  // como "falta no Vero" — ruido inutil. Mesmo criterio do _cruzRenderVendas.
  var mesVigente = _cruzMesVigente(_cruzDados.vendas || [], 'DATA_CADASTRO');

  var resultados = [];
  _cruzDadosCRM.forEach(function(item) {
    if (!item || !item.linha) return;
    var id = _cruzNormId(item.contrato);
    if (!id) return;
    if (idsInstal[id]) {
      resultados.push({ linha: item.linha, veroStatus: '🟢 Instalações' });
    } else if (idsVendas[id]) {
      resultados.push({ linha: item.linha, veroStatus: '🟢 Vendas' });
    } else if (_cruzEhStatusVenda(item.status)) {
      if (mesVigente && _cruzMesAnoCRM(item.dataAtiv) !== mesVigente) return;
      resultados.push({ linha: item.linha, veroStatus: '🟡' });
    }
  });

  // Modo wipe-and-replace: escreve a coluna inteira em uma operacao,
  // limpando residuos de imports anteriores.
  google.script.run
    .withSuccessHandler(function() {})
    .withFailureHandler(function() {})
    .aplicarVeroStatusCompleto(resultados);
}

// ══════════════════════════════════════════════════════════════════════════
//  SOBRESCRITA DE DADOS (planilha = fonte da verdade) + PERSISTENCIA
//
//  Match so por contrato; status preservado; nao cria linha.
//  Campos: COD_CLI, INSTAL, VALOR, CIDADE, DATA_ATIV, OBSERVACAO (append).
//  Espelha _cruzComputarCorrecoesServer_ de CruzamentoAutoAPI.js.
// ══════════════════════════════════════════════════════════════════════════

function _cruzNormValor(v) {
  if (v === null || v === undefined || v === '') return '';
  if (typeof v === 'number') return (isFinite(v) && v >= 0) ? v : '';
  var s = String(v).replace(/R\$\s*/i, '').replace(/\s/g, '').trim();
  if (!s) return '';
  if (s.indexOf(',') !== -1) s = s.replace(/\./g, '').replace(',', '.');
  var n = parseFloat(s);
  return (isFinite(n) && n >= 0) ? n : '';
}

function _cruzToBR(s) {
  if (!s) return '';
  s = String(s).trim();
  if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) return s.substring(0, 10);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    var p = s.substring(0, 10).split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }
  return s;
}

function _cruzValorBR(n) {
  var num = Number(n);
  if (!isFinite(num)) return String(n);
  return num.toFixed(2).replace('.', ',');
}

function _cruzExtrairCodigoPlano(s) {
  if (!s) return '';
  var m = String(s).match(/(\d{3,5})\s*-\s/);
  return m ? m[1] : '';
}

function _cruzPlanoCore(s) {
  if (!s) return '';
  return String(s).replace(/\s*\|\s*R?\$?\s*[\d.,]+\s*$/i, '').trim();
}

function _cruzMontarObsCancelamentoCli(row) {
  var data = row.DATA_CANCELAMENTO || '';
  var tipo = row.TIPO_CANCELAMENTO || '';
  var motivo = row.MOTIVO_CANCELAMENTO || '';
  var base = '[Vero] CANCELADO' + (data ? ' ' + data : '');
  var extra = [tipo, motivo].filter(function(x) { return x && String(x).trim() !== ''; }).join(' · ');
  return extra ? (base + ' · ' + extra) : base;
}

function _cruzConsolidarCamposVeroCli() {
  var d = _cruzDados || {};
  var mapa = {};
  function ensure(id) { if (!mapa[id]) mapa[id] = {}; return mapa[id]; }
  // Grava valor + fonte na primeira aba que trouxer o campo (first-wins),
  // pra o painel mostrar de qual relatorio veio cada correcao.
  function setF(o, key, val, fonte) {
    if (val === undefined || val === null || val === '') return;
    if (o[key] !== undefined && o[key] !== '') return;
    o[key] = val;
    o[key + '_fonte'] = fonte;
  }

  (d.instalacoes || []).forEach(function(row) {
    var id = _cruzNormId(row.ID_CONTRATO || row.CONTRATO || row.Contrato);
    if (!id) return;
    var o = ensure(id);
    var hab = row.DATA_HABILITACAO || row['DATA_HABILITAÇÃO'] || row['DATA_HABILITAÇAO'] || '';
    setF(o, 'instal', hab, 'Instalações');
    if (row.VALOR_CONTRATO || row.VALOR_CONTRATO === 0) setF(o, 'valor', row.VALOR_CONTRATO, 'Instalações');
    setF(o, 'codCli', row.COD_CLIENTE, 'Instalações');
    setF(o, 'cidade', row.CIDADE_HIERARQUIA, 'Instalações');
    setF(o, 'dataAtiv', row.DATA_CADASTRO, 'Instalações');
    if (row.NOME_PLANO_ATUAL) setF(o, 'planoCodigo', _cruzExtrairCodigoPlano(row.NOME_PLANO_ATUAL), 'Instalações');
  });

  (d.vendas || []).forEach(function(row) {
    var id = _cruzNormId(row.ID_CONTRATO || row.CONTRATO || row.Contrato);
    if (!id) return;
    var o = ensure(id);
    setF(o, 'codCli', row.COD_CLIENTE, 'Vendas');
    setF(o, 'cidade', row.CIDADE_HIERARQUIA, 'Vendas');
    setF(o, 'dataAtiv', row.DATA_CADASTRO, 'Vendas');
    if (row.NOME_PLANO_ATUAL) setF(o, 'planoCodigo', _cruzExtrairCodigoPlano(row.NOME_PLANO_ATUAL), 'Vendas');
  });

  (d.movel || []).forEach(function(row) {
    var id = _cruzNormId(row.IDCONTRATO || row.ID_CONTRATO || row.CONTRATO || row.Contrato);
    if (!id) return;
    var o = ensure(id);
    setF(o, 'codCli', row.IDCLIENTE, 'Móvel');
    var vm = row.VALOR_CONTRATO_MOVEL || row.VALOR_CONTRATO;
    if (vm || vm === 0) setF(o, 'valor', vm, 'Móvel');
    setF(o, 'dataAtiv', row.DATA_VENDA, 'Móvel');
    setF(o, 'instal', row.DATAHABILITACAO, 'Móvel');
    setF(o, 'cidade', row.CIDADE, 'Móvel');
    if (row.PLANO) setF(o, 'planoCodigo', _cruzExtrairCodigoPlano(row.PLANO), 'Móvel');
  });

  (d.cancelamentos || []).forEach(function(row) {
    var id = _cruzNormId(row.ID_CONTRATO || row.CONTRATO || row.Contrato);
    if (!id) return;
    var o = ensure(id);
    setF(o, 'obsAppend', _cruzMontarObsCancelamentoCli(row), 'Cancelamento');
  });

  return mapa;
}

function _cruzComputarCorrecoes() {
  var mapaVero = _cruzConsolidarCamposVeroCli();
  var out = [];
  (_cruzDadosCRM || []).forEach(function(item) {
    if (!item || !item.linha) return;
    var id = _cruzNormId(item.contrato);
    if (!id) return;
    var v = mapaVero[id];
    if (!v) return;

    var campos = {}, diffs = [];

    if (v.codCli && String(v.codCli).trim() !== '' &&
        String(v.codCli).trim() !== String(item.codCli || '').trim()) {
      campos.COD_CLI = String(v.codCli).trim();
      diffs.push({ campo: 'COD_CLI', label: 'Cód. cliente', atual: item.codCli || '', novo: campos.COD_CLI, fonte: v.codCli_fonte || 'Relatório' });
    }
    if (v.instal) {
      var ni = _cruzToBR(v.instal), ai = _cruzToBR(item.instal);
      if (ni && ni !== ai) { campos.INSTAL = ni; diffs.push({ campo: 'INSTAL', label: 'Data instalação', atual: ai, novo: ni, fonte: v.instal_fonte || 'Relatório' }); }
    }
    if (v.dataAtiv) {
      var na = _cruzToBR(v.dataAtiv), aa = _cruzToBR(item.dataAtiv);
      if (na && na !== aa) { campos.DATA_ATIV = na; diffs.push({ campo: 'DATA_ATIV', label: 'Data ativação', atual: aa, novo: na, fonte: v.dataAtiv_fonte || 'Relatório' }); }
    }
    if (v.valor !== undefined && v.valor !== null && v.valor !== '') {
      var nv = _cruzNormValor(v.valor);
      var av = (item.valor === '' || item.valor === undefined || item.valor === null) ? '' : _cruzNormValor(item.valor);
      if (nv !== '' && nv !== av) {
        campos.VALOR = nv;
        diffs.push({ campo: 'VALOR', label: 'Valor', atual: (av === '' ? '' : 'R$ ' + _cruzValorBR(av)), novo: 'R$ ' + _cruzValorBR(nv), fonte: v.valor_fonte || 'Relatório' });
      }
    }
    if (v.cidade && String(v.cidade).trim() !== '') {
      var nc = String(v.cidade).trim();
      if (_cruzNormalizarTexto(nc) !== _cruzNormalizarTexto(item.cidade || '')) {
        campos.CIDADE = nc;
        diffs.push({ campo: 'CIDADE', label: 'Cidade', atual: item.cidade || '', novo: nc, fonte: v.cidade_fonte || 'Relatório' });
      }
    }
    if (v.obsAppend && String(v.obsAppend).trim() !== '') {
      var lo = String(v.obsAppend).trim();
      if (String(item.observacao || '').indexOf(lo) === -1) {
        campos.OBSERVACAO_APPEND = lo;
        diffs.push({ campo: 'OBSERVACAO_APPEND', label: 'Observação (+)', atual: item.observacao || '', novo: lo, fonte: v.obsAppend_fonte || 'Cancelamento' });
      }
    }
    if (v.planoCodigo && _cruzCodigosMap[v.planoCodigo]) {
      var alvoPl = _cruzCodigosMap[v.planoCodigo];
      if (alvoPl.nome && (alvoPl.conf === 'alta' || alvoPl.conf === 'media')) {
        var atualCore = _cruzPlanoCore(item.plano);
        var novoCore  = _cruzPlanoCore(alvoPl.nome);
        if (novoCore && _cruzNormalizarTexto(novoCore) !== _cruzNormalizarTexto(atualCore)) {
          campos.PLANO = alvoPl.nome;
          diffs.push({ campo: 'PLANO', label: 'Plano' + (alvoPl.conf === 'media' ? ' (conf. média)' : ''), atual: item.plano || '', novo: alvoPl.nome, fonte: 'Dicionário · cód. ' + v.planoCodigo });
        }
      }
    }

    if (diffs.length) out.push({ linha: item.linha, contrato: item.contrato, cliente: item.cliente || '', campos: campos, diffs: diffs });
  });
  return out;
}

// ── Painel de diff (revisao caso a caso) ───────────────────────────────────
function _cruzPainelCorrecoesHtml() {
  if (_cruzCorrecoesAplicadas) {
    return '<div class="cruz-corr cruz-corr-ok">' +
      '<span class="cruz-corr-ico">✓</span> Correções aplicadas no CRM a partir do relatório Vero.' +
      '</div>';
  }
  if (!_cruzCorrecoes || !_cruzCorrecoes.length) return '';

  var nLinhas = _cruzCorrecoes.length;
  var nCampos = 0;
  _cruzCorrecoes.forEach(function(c) { nCampos += (c.diffs || []).length; });

  var cards = _cruzCorrecoes.map(function(c) {
    var temValor = false, temPlano = false;
    var fields = (c.diffs || []).map(function(d) {
      if (d.campo === 'VALOR') temValor = true;
      if (d.campo === 'PLANO') temPlano = true;
      return '<label class="cruz-corr-field">' +
          '<input type="checkbox" checked ' +
            'data-linha="' + c.linha + '" data-campo="' + _escapeHtml(d.campo) + '" ' +
            'onchange="_cruzOnToggleCampo(this)">' +
          '<span class="cruz-corr-fname">' + _escapeHtml(d.label) + '</span>' +
          '<span class="cruz-corr-vals">' +
            '<span class="cruz-corr-de">' + _escapeHtml(d.atual || '—') + '</span>' +
            '<span class="cruz-corr-seta">→</span>' +
            '<span class="cruz-corr-para">' + _escapeHtml(d.novo) + '</span>' +
          '</span>' +
          '<span class="cruz-corr-fonte">' + _escapeHtml(d.fonte || 'Relatório') + '</span>' +
        '</label>';
    }).join('');

    var warn = (temValor && temPlano)
      ? '<div class="cruz-corr-warn">⚠ Valor e Plano vêm de fontes diferentes — confirme se são compatíveis antes de aplicar.</div>'
      : '';

    return '<div class="cruz-corr-card" id="cruzCard_' + c.linha + '" data-linha="' + c.linha + '">' +
        '<div class="cruz-corr-card-head">' +
          '<div class="cruz-corr-card-id">' +
            '<strong>' + _escapeHtml(c.cliente || ('Contrato ' + c.contrato)) + '</strong>' +
            '<span class="cruz-corr-meta">contrato ' + _escapeHtml(c.contrato) + ' · linha ' + c.linha + '</span>' +
          '</div>' +
          '<button type="button" class="cruz-corr-skip" onclick="_cruzPularContrato(' + c.linha + ')">Pular este contrato</button>' +
        '</div>' +
        warn + fields +
      '</div>';
  }).join('');

  return '<div class="cruz-corr">' +
      '<div class="cruz-corr-top">' +
        '<div class="cruz-corr-titulo">📝 Correções detectadas pelo relatório Vero ' +
          '<span class="cruz-corr-sub">(' + nLinhas + ' contrato(s) · ' + nCampos + ' campo(s) · marque o que aplicar · status preservado)</span></div>' +
      '</div>' +
      '<div class="cruz-corr-lista">' + cards + '</div>' +
      '<div class="cruz-corr-footer">' +
        '<button class="cruz-corr-aplicar" id="cruzCorrAplicar" onclick="_cruzAplicarCorrecoes()">Aplicar campos selecionados (' + nCampos + ' campos em ' + nLinhas + ' contratos)</button>' +
      '</div>' +
    '</div>';
}

function _cruzAplicarEstadoCampo(ch) {
  var field = ch.closest ? ch.closest('.cruz-corr-field') : null;
  if (field) field.classList.toggle('off', !ch.checked);
}

function _cruzOnToggleCampo(ch) {
  _cruzAplicarEstadoCampo(ch);
  // Se voltou a marcar algo num card "pulado", tira o estado de pulado.
  var card = ch.closest ? ch.closest('.cruz-corr-card') : null;
  if (card && ch.checked) {
    card.classList.remove('pulado');
    var b = card.querySelector('.cruz-corr-skip');
    if (b) b.textContent = 'Pular este contrato';
  }
  _cruzAtualizarContadorCorrecoes();
}

function _cruzPularContrato(linha) {
  var card = document.getElementById('cruzCard_' + linha);
  if (!card) return;
  var btn = card.querySelector('.cruz-corr-skip');
  var checks = card.querySelectorAll('input[type=checkbox]');
  var algumMarcado = false;
  checks.forEach(function(ch) { if (ch.checked) algumMarcado = true; });
  var novoEstado = !algumMarcado; // algo marcado -> desmarca tudo; nada marcado -> remarca tudo
  checks.forEach(function(ch) { ch.checked = novoEstado; _cruzAplicarEstadoCampo(ch); });
  card.classList.toggle('pulado', !novoEstado);
  if (btn) btn.textContent = novoEstado ? 'Pular este contrato' : 'Reativar contrato';
  _cruzAtualizarContadorCorrecoes();
}

function _cruzAtualizarContadorCorrecoes() {
  var btn = document.getElementById('cruzCorrAplicar');
  if (!btn) return;
  var checks = document.querySelectorAll('.cruz-corr-lista input[type=checkbox]:checked');
  var nCampos = checks.length;
  var linhasSet = {};
  checks.forEach(function(ch) { linhasSet[ch.getAttribute('data-linha')] = true; });
  var nLinhas = Object.keys(linhasSet).length;
  btn.disabled = nCampos === 0;
  btn.textContent = nCampos === 0
    ? 'Nenhum campo selecionado'
    : 'Aplicar campos selecionados (' + nCampos + ' campos em ' + nLinhas + ' contratos)';
}

function _cruzInjetarPainelCorrecoes() {
  var body = document.getElementById('cruzBody');
  if (!body) return;
  var html = _cruzPainelCorrecoesHtml();
  if (html) body.insertAdjacentHTML('afterbegin', html);
}

// Remove do estado local apenas os campos efetivamente aplicados (porLinha = {linha:{campo:true}}).
// Campos pulados continuam pendentes no painel; contratos zerados saem da lista.
function _cruzRemoverCorrecoesAplicadas(porLinha) {
  var novas = [];
  (_cruzCorrecoes || []).forEach(function(c) {
    var aplicados = porLinha[c.linha];
    if (!aplicados) { novas.push(c); return; }
    var campos = {}, diffs = [];
    (c.diffs || []).forEach(function(d) {
      if (aplicados[d.campo]) return; // foi aplicado
      diffs.push(d);
      if (c.campos.hasOwnProperty(d.campo)) campos[d.campo] = c.campos[d.campo];
    });
    if (diffs.length) novas.push({ linha: c.linha, contrato: c.contrato, cliente: c.cliente, campos: campos, diffs: diffs });
  });
  _cruzCorrecoes = novas;
}

function _cruzAplicarCorrecoes() {
  if (!_cruzCorrecoes || !_cruzCorrecoes.length) return;
  var btn = document.getElementById('cruzCorrAplicar');

  // Monta o payload só com os campos marcados.
  var porLinha = {};
  document.querySelectorAll('.cruz-corr-lista input[type=checkbox]:checked').forEach(function(ch) {
    var linha = parseInt(ch.getAttribute('data-linha'), 10);
    var campo = ch.getAttribute('data-campo');
    if (!linha || !campo) return;
    if (!porLinha[linha]) porLinha[linha] = {};
    porLinha[linha][campo] = true;
  });

  var mapaCorr = {};
  _cruzCorrecoes.forEach(function(c) { mapaCorr[c.linha] = c; });

  var payload = [];
  Object.keys(porLinha).forEach(function(linhaStr) {
    var linha = parseInt(linhaStr, 10);
    var corr = mapaCorr[linha];
    if (!corr) return;
    var campos = {};
    Object.keys(corr.campos).forEach(function(k) {
      if (porLinha[linha][k]) campos[k] = corr.campos[k];
    });
    if (Object.keys(campos).length) payload.push({ linha: linha, campos: campos });
  });

  if (!payload.length) {
    _cruzSetStatus('Nenhum campo selecionado para aplicar.', 'err');
    return;
  }

  if (btn) { btn.disabled = true; btn.textContent = 'Aplicando...'; }

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    _cruzSetStatus('Ambiente sem backend — correções não aplicadas.', 'err');
    if (btn) { btn.disabled = false; _cruzAtualizarContadorCorrecoes(); }
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.sucesso) {
        _cruzSetStatus('Erro ao aplicar correções: ' + ((res && res.mensagem) || 'falha'), 'err');
        if (btn) { btn.disabled = false; _cruzAtualizarContadorCorrecoes(); }
        return;
      }
      _cruzRemoverCorrecoesAplicadas(porLinha);
      var aplicouTudo = !_cruzCorrecoes.length;
      _cruzCorrecoesAplicadas = aplicouTudo;
      _cruzSetStatus('Correções aplicadas: ' + (res.atualizados || 0) + ' venda(s), ' + (res.celulas || 0) + ' campo(s).' +
        (aplicouTudo ? '' : ' ' + _cruzCorrecoes.length + ' contrato(s) ainda pendente(s) no painel.'), 'ok');
      _cruzPersistir(_cruzOrigemAtual);
      _cruzRenderizar();
    })
    .withFailureHandler(function(err) {
      _cruzSetStatus('Falha ao aplicar correções: ' + ((err && err.message) || 'tente novamente'), 'err');
      if (btn) { btn.disabled = false; _cruzAtualizarContadorCorrecoes(); }
    })
    .aplicarCorrecaoVero(payload);
}

// ── Persistencia (localStorage) ───────────────────────────────────────────
function _cruzCrmRowsSlim(rows) {
  return (rows || []).map(function(it) {
    return {
      linha: it.linha, contrato: it.contrato, status: it.status,
      cliente: it.cliente, dataAtiv: it.dataAtiv, instal: it.instal
    };
  });
}

function _cruzSetBadges() {
  if (!_cruzDados) return;
  var set = function(id, n) { var el = document.getElementById(id); if (el) el.textContent = (n == null ? '-' : n); };
  set('cruzBadgeVendas', (_cruzDados.vendas || []).length);
  set('cruzBadgeInstalacoes', (_cruzDados.instalacoes || []).length);
  set('cruzBadgeCancelamentos', (_cruzDados.cancelamentos || []).length);
  set('cruzBadgeMovel', (_cruzDados.movel || []).length);
}

function _cruzFmtQuando(ms) {
  if (!ms) return '';
  var d = new Date(ms);
  var p = function(n) { return n < 10 ? '0' + n : '' + n; };
  return p(d.getDate()) + '/' + p(d.getMonth() + 1) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

function _cruzLabelOrigem(o) { return o === 'auto' ? 'Gmail' : 'manual'; }

function _cruzPersistir(origem) {
  _cruzOrigemAtual = origem || _cruzOrigemAtual || 'manual';
  _cruzQuando = Date.now();
  var base = {
    versao: 1,
    arquivo: _cruzArquivoNome || '',
    origem: _cruzOrigemAtual,
    quando: _cruzQuando,
    dados: _cruzDados,
    correcoes: _cruzCorrecoes || [],
    aplicadas: !!_cruzCorrecoesAplicadas
  };
  try {
    base.crmRows = _cruzCrmRowsSlim(_cruzDadosCRM);
    localStorage.setItem(_CRUZ_LS_KEY, JSON.stringify(base));
  } catch (e) {
    // Quota estourou — grava sem crmRows (kanban "só CRM" fica vazio ao reabrir,
    // mas as correções continuam aplicáveis).
    try {
      base.crmRows = [];
      localStorage.setItem(_CRUZ_LS_KEY, JSON.stringify(base));
    } catch (e2) {
      console.warn('Cruzamento: não foi possível persistir no localStorage:', e2);
    }
  }
}

function _cruzLimparStorage() {
  try { localStorage.removeItem(_CRUZ_LS_KEY); } catch (e) {}
}

function _cruzHidratarDoStorage() {
  if (_cruzDados) return; // já há resultado nesta sessão — não sobrescreve
  var raw;
  try { raw = localStorage.getItem(_CRUZ_LS_KEY); } catch (e) { return; }
  if (!raw) return;
  var saved;
  try { saved = JSON.parse(raw); } catch (e) { return; }
  if (!saved || !saved.dados) return;

  _cruzDados = {
    vendas: saved.dados.vendas || [],
    instalacoes: saved.dados.instalacoes || [],
    cancelamentos: saved.dados.cancelamentos || [],
    movel: saved.dados.movel || []
  };
  _cruzDadosCRM = saved.crmRows || [];
  _cruzArquivoNome = saved.arquivo || '';
  _cruzCorrecoes = saved.correcoes || [];
  _cruzCorrecoesAplicadas = !!saved.aplicadas;
  _cruzOrigemAtual = saved.origem || '';
  _cruzQuando = saved.quando || 0;

  document.getElementById('cruzTabs').style.display = 'flex';
  document.getElementById('cruzBtnLimpar').style.display = '';
  _cruzSetBadges();
  _cruzSetStatus('Resultado de ' + _cruzFmtQuando(_cruzQuando) + ' (' + _cruzLabelOrigem(_cruzOrigemAtual) + ') — reaberto do navegador.', 'ok');
  _cruzRenderizar();
}
</script>
