var _tktDados     = [];
var _tktFiltrado  = [];
var _tktDragId    = null;
var _tktDetalheId = null;

// ── INICIALIZAÇÃO ──────────────────────────────────────────────
function carregarTickets() {
  if (typeof google !== 'undefined' && google.script) {
    google.script.run
      .withSuccessHandler(function(json) {
        try { _tktDados = JSON.parse(json) || []; } catch(e) { _tktDados = []; }
        tktAplicarFiltros();
        tktAtualizarBadge();
        _tktIniciarShakePeriodico(); // ← shake a cada 2h
      })
      .withFailureHandler(function() {
        if (!_tktDados.length && typeof TICKETS !== 'undefined') _tktDados = TICKETS.slice();
        tktAplicarFiltros();
        tktAtualizarBadge();
        _tktIniciarShakePeriodico();
      })
      .getTickets();
  } else {
    if (typeof TICKETS !== 'undefined') _tktDados = TICKETS.slice();
    tktAplicarFiltros();
    tktAtualizarBadge();
    _tktIniciarShakePeriodico();
  }
}

// ── FILTROS ────────────────────────────────────────────────────
function tktAplicarFiltros() {
  var criador   = document.getElementById('tktFiltroCriador')   ? document.getElementById('tktFiltroCriador').value   : '';
  var atribuido = document.getElementById('tktFiltroAtribuido') ? document.getElementById('tktFiltroAtribuido').value : '';
  var pri       = document.getElementById('tktFiltroPri')       ? document.getElementById('tktFiltroPri').value       : '';
  _tktFiltrado = _tktDados.filter(function(t) {
    if (criador   && t.criador    !== criador)   return false;
    if (atribuido && t.atribuido  !== atribuido) return false;
    if (pri       && t.prioridade !== pri)        return false;
    return true;
  });
  tktRenderizar();
}

// ── RENDER ─────────────────────────────────────────────────────
function tktRenderizar() {
  var cols = ['Aberto','Progresso','Concluído','Arquivado'];
  var totalEl = document.getElementById('tktTotalCount');
  if (totalEl) totalEl.textContent = _tktFiltrado.length + ' ticket' + (_tktFiltrado.length !== 1 ? 's' : '');

  cols.forEach(function(status) {
    var cards  = _tktFiltrado.filter(function(t) { return t.status === status; });
    var suffix = status === 'Concluído' ? 'Concluido' : status;
    var cont   = document.getElementById('tktCards' + suffix);
    var count  = document.getElementById('tktCount' + suffix);
    if (!cont) return;
    if (count) count.textContent = cards.length;
    if (!cards.length) {
      var icons = { 'Aberto':'📋','Progresso':'⚙️','Concluído':'✅','Arquivado':'🗄️' };
      cont.innerHTML = '<div class="tkt-empty"><div class="tkt-empty-icon">' + icons[status] + '</div><div class="tkt-empty-txt">Nenhum ticket</div></div>';
      return;
    }
    cont.innerHTML = cards.map(function(t) { return tktCardHTML(t); }).join('');
    cont.querySelectorAll('.tkt-card').forEach(function(el) {
      el.addEventListener('dragstart', function(e) { tktDragStart(e, el.dataset.id); });
      el.addEventListener('dragend',   function()  { el.classList.remove('dragging'); });
      el.addEventListener('click',     function()  { tktAbrirDetalhe(el.dataset.id); });
    });
  });
}

function tktCardHTML(t) {
  var priClass = t.prioridade === 'Alta' ? 'alta' : t.prioridade === 'Média' ? 'media' : 'baixa';
  var iniciais = _tktIniciais(t.atribuido || '');
  var assigneeHtml = t.atribuido
    ? '<div class="tkt-card-assignee" title="' + esc(t.atribuido) + '">' + esc(iniciais) + '</div>'
    : '<div class="tkt-card-assignee" title="Sem responsável" style="opacity:.4;">—</div>';
  return '<div class="tkt-card" draggable="true" data-id="' + esc(t.id) + '">' +
    '<div class="tkt-card-top"><span class="tkt-card-id">#' + esc(t.id) + '</span><span class="tkt-card-pri ' + priClass + '">' + esc(t.prioridade) + '</span></div>' +
    '<div class="tkt-card-title">' + esc(t.titulo) + '</div>' +
    (t.descricao ? '<div class="tkt-card-desc">' + esc(t.descricao) + '</div>' : '') +
    '<div class="tkt-card-foot"><div class="tkt-card-foot-left">' + assigneeHtml +
    '<span class="tkt-card-creator">' + esc(_tktPrimeiroNome(t.criador)) + '</span></div>' +
    (t.prints && t.prints.length ? '<span style="font-size:10px;opacity:.6;" title="' + t.prints.length + ' print(s)">📷 ' + t.prints.length + '</span>' : '') +
    '<span class="tkt-card-date">' + esc(t.dataCriacao || '') + '</span></div></div>';
}

// ── DRAG & DROP ────────────────────────────────────────────────
function tktDragStart(e, id) {
  _tktDragId = id;
  setTimeout(function() { var el = document.querySelector('.tkt-card[data-id="' + id + '"]'); if (el) el.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
}
function tktDragOver(e, status) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  var col = document.getElementById('tktCol' + (status === 'Concluído' ? 'Concluido' : status));
  if (col) col.classList.add('drag-over');
}
function tktDragLeave(e, status) {
  var col = document.getElementById('tktCol' + (status === 'Concluído' ? 'Concluido' : status));
  if (col) col.classList.remove('drag-over');
}
function tktDrop(e, novoStatus) {
  e.preventDefault();
  var col = document.getElementById('tktCol' + (novoStatus === 'Concluído' ? 'Concluido' : novoStatus));
  if (col) col.classList.remove('drag-over');
  if (!_tktDragId) return;
  var ticket = _tktDados.find(function(t) { return t.id === _tktDragId; });
  if (!ticket || ticket.status === novoStatus) { _tktDragId = null; return; }
  ticket.status = novoStatus;
  _tktDragId = null;
  tktAplicarFiltros();
  tktSalvarNaBase();
  if (novoStatus === 'Concluído') tktNotificarConclusao(ticket);
  mostrarToast('✅ Ticket movido para ' + novoStatus, 'success');
}

// ── MODAL NOVO / EDITAR ────────────────────────────────────────
function tktAbrirModalNovo() {
  document.getElementById('tktModalTitulo').textContent = '✦ Novo Ticket';
  document.getElementById('tktF_id').value        = '';
  document.getElementById('tktF_titulo').value    = '';
  document.getElementById('tktF_desc').value      = '';
  document.getElementById('tktF_pri').value       = 'Média';
  document.getElementById('tktF_status').value    = 'Aberto';
  document.getElementById('tktF_atribuido').value = '';
  var nomeLogado = document.getElementById('nomeUsuario') ? document.getElementById('nomeUsuario').textContent : '';
  var sel = document.getElementById('tktF_criador');
  if (sel && nomeLogado) for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === nomeLogado) { sel.value = nomeLogado; break; } }
  // Novo ticket: botão excluir oculto
  var btnDel = document.getElementById('tktBtnDeletar');
  btnDel.style.display = 'none';
  btnDel.disabled = true;
  _tktPrintsTemp = [];
  tktRenderPrints();
  document.getElementById('tktModalForm').classList.add('aberto');
  setTimeout(function() { var el = document.getElementById('tktF_titulo'); if (el) el.focus(); }, 100);
}

function tktAbrirModalEditar(id) {
  var ticket = _tktDados.find(function(t) { return t.id === id; });
  if (!ticket) return;
  document.getElementById('tktModalTitulo').textContent  = '✏️ Editar Ticket';
  document.getElementById('tktF_id').value               = ticket.id;
  document.getElementById('tktF_titulo').value           = ticket.titulo || '';
  document.getElementById('tktF_desc').value             = ticket.descricao || '';
  document.getElementById('tktF_pri').value              = ticket.prioridade || 'Média';
  document.getElementById('tktF_status').value           = ticket.status || 'Aberto';
  document.getElementById('tktF_criador').value          = ticket.criador || '';
  document.getElementById('tktF_atribuido').value        = ticket.atribuido || '';

  // Carrega prints existentes
  _tktPrintsTemp = (ticket.prints || []).slice();
  tktRenderPrints();

  // ✅ REGRA: botão excluir só habilitado se ticket for Arquivado
  var btnDel = document.getElementById('tktBtnDeletar');
  btnDel.style.display = '';
  if (ticket.status === 'Arquivado') {
    btnDel.disabled = false;
    btnDel.title    = 'Excluir este ticket arquivado';
  } else {
    btnDel.disabled = true;
    btnDel.title    = 'Só é possível excluir tickets arquivados';
  }

  document.getElementById('tktModalForm').classList.add('aberto');
}

function tktFecharModal() {
  document.getElementById('tktModalForm').classList.remove('aberto');
}

function tktSalvar() {
  var titulo = document.getElementById('tktF_titulo').value.trim();
  if (!titulo) { mostrarToast('⚠️ O título é obrigatório.', 'error'); document.getElementById('tktF_titulo').focus(); return; }
  var id = document.getElementById('tktF_id').value;
  var agora = _tktDataHoje();
  if (id) {
    var ticket = _tktDados.find(function(t) { return t.id === id; });
    if (ticket) {
      var statusAnterior = ticket.status; var atribuidoAnterior = ticket.atribuido;
      ticket.titulo     = titulo;
      ticket.descricao  = document.getElementById('tktF_desc').value.trim();
      ticket.prioridade = document.getElementById('tktF_pri').value;
      ticket.status     = document.getElementById('tktF_status').value;
      ticket.criador    = document.getElementById('tktF_criador').value;
      ticket.atribuido  = document.getElementById('tktF_atribuido').value;
      ticket.dataUpdate = agora;
      ticket.prints = _tktPrintsTemp.slice();
      if (ticket.atribuido && ticket.atribuido !== atribuidoAnterior)
        _tktAdicionarNotif('atribuido', 'Ticket atribuído a ' + _tktPrimeiroNome(ticket.atribuido), '#' + ticket.id + ' · ' + ticket.titulo.slice(0,40));
      if (ticket.status === 'Concluído' && statusAnterior !== 'Concluído') tktNotificarConclusao(ticket);
    }
    mostrarToast('✅ Ticket atualizado!', 'success');
  } else {
    var novoId = 'TKT-' + String(Date.now()).slice(-5);
    var novoTicket = { id: novoId, titulo: titulo, descricao: document.getElementById('tktF_desc').value.trim(),
      prioridade: document.getElementById('tktF_pri').value, status: document.getElementById('tktF_status').value,
      criador: document.getElementById('tktF_criador').value, atribuido: document.getElementById('tktF_atribuido').value,
      dataCriacao: agora, dataUpdate: agora, prints: _tktPrintsTemp.slice() };
    _tktDados.unshift(novoTicket);
    _tktAdicionarNotif('novo', 'Novo ticket: ' + titulo, 'Criado por ' + _tktPrimeiroNome(novoTicket.criador));
    if (novoTicket.atribuido) _tktAdicionarNotif('atribuido', 'Atribuído a ' + _tktPrimeiroNome(novoTicket.atribuido), '#' + novoId + ' · ' + novoTicket.prioridade);
    mostrarToast('✦ Ticket criado: ' + novoId, 'success');
  }
  tktFecharModal(); tktAplicarFiltros(); tktSalvarNaBase();
}

// ✅ EXCLUIR — só permite se status === Arquivado
function tktDeletar() {
  var id     = document.getElementById('tktF_id').value;
  if (!id) return;
  var ticket = _tktDados.find(function(t) { return t.id === id; });
  if (!ticket) return;
  if (ticket.status !== 'Arquivado') {
    mostrarToast('⚠️ Só é possível excluir tickets arquivados.', 'warning');
    return;
  }
  if (!confirm('Excluir permanentemente o ticket #' + id + '?\nEsta ação não pode ser desfeita.')) return;
  _tktDados = _tktDados.filter(function(t) { return t.id !== id; });
  tktFecharModal(); tktAplicarFiltros(); tktSalvarNaBase();
  mostrarToast('🗑️ Ticket #' + id + ' excluído.', 'success');
}

// ── MODAL DETALHE ──────────────────────────────────────────────
function tktAbrirDetalhe(id) {
  var t = _tktDados.find(function(x) { return x.id === id; });
  if (!t) return;
  _tktDetalheId = id;
  document.getElementById('tktDetId').textContent = '#' + t.id;
  var priClass = t.prioridade === 'Alta' ? 'pri-alta' : t.prioridade === 'Média' ? 'pri-media' : 'pri-baixa';
  var statusEmoji = { 'Aberto':'📋','Progresso':'⚙️','Concluído':'✅','Arquivado':'🗄️' };
  document.getElementById('tktDetMeta').innerHTML =
    '<span class="tkt-detail-tag ' + priClass + '">' + esc(t.prioridade) + '</span>' +
    '<span class="tkt-detail-tag">' + (statusEmoji[t.status]||'') + ' ' + esc(t.status) + '</span>';
  document.getElementById('tktDetTitulo').textContent = t.titulo || '';
  document.getElementById('tktDetDesc').textContent   = t.descricao || '(sem descrição)';
  document.getElementById('tktDetInfo').innerHTML =
    '<div class="tkt-detail-info-item"><label>Criado por</label><span>' + esc(t.criador||'—') + '</span></div>' +
    '<div class="tkt-detail-info-item"><label>Atribuído a</label><span>' + esc(t.atribuido||'—') + '</span></div>' +
    '<div class="tkt-detail-info-item"><label>Criado em</label><span>' + esc(t.dataCriacao||'—') + '</span></div>' +
    '<div class="tkt-detail-info-item"><label>Atualizado</label><span>' + esc(t.dataUpdate||'—') + '</span></div>';
  tktRenderDetailPrints(t.prints || []);
  document.getElementById('tktModalDetalhe').classList.add('aberto');
}
function tktFecharDetalhe() { document.getElementById('tktModalDetalhe').classList.remove('aberto'); _tktDetalheId = null; }
function tktMoverDeDetalhe(novoStatus) {
  if (!_tktDetalheId) return;
  var ticket = _tktDados.find(function(t) { return t.id === _tktDetalheId; });
  if (!ticket) return;
  var statusAnterior = ticket.status;
  ticket.status = novoStatus; ticket.dataUpdate = _tktDataHoje();
  if (novoStatus === 'Concluído' && statusAnterior !== 'Concluído') tktNotificarConclusao(ticket);
  tktFecharDetalhe(); tktAplicarFiltros(); tktSalvarNaBase();
  mostrarToast('✅ Ticket movido para ' + novoStatus, 'success');
}
function tktEditarDeDetalhe() { var id = _tktDetalheId; tktFecharDetalhe(); tktAbrirModalEditar(id); }

// ── NOTIFICAÇÕES ───────────────────────────────────────────────
function tktNotificarConclusao(ticket) {
  _tktAdicionarNotif('concluido', 'Ticket concluído! 🎉',
    '#' + ticket.id + ' · ' + (ticket.atribuido ? _tktPrimeiroNome(ticket.atribuido) : ticket.criador));
  mostrarToast('🎉 Ticket #' + ticket.id + ' concluído!', 'success');
  tktAtualizarBadge();
}

// ✅ Badge persistente: mantém enquanto houver tickets Aberto ou Progresso
function tktAtualizarBadge() {
  // Badge na topbar (sino)
  var abertos = _tktDados.filter(function(t) { return t.status === 'Aberto' || t.status === 'Progresso'; }).length;
  var badge   = document.getElementById('notifBadge');
  var btn     = document.getElementById('notifBellBtn');
  if (badge) {
    if (abertos > 0) {
      badge.textContent    = abertos > 9 ? '9+' : String(abertos);
      badge.style.display  = 'flex';
    } else {
      badge.style.display  = 'none';
    }
  }
  if (btn) btn.classList.toggle('tem-alerta', abertos > 0);

  // Badge no item de menu
  var menuEl = document.getElementById('menuTickets');
  if (!menuEl) return;
  var mbadge = menuEl.querySelector('.tkt-notif-badge');
  if (abertos > 0) {
    if (!mbadge) { mbadge = document.createElement('span'); mbadge.className = 'tkt-notif-badge'; menuEl.appendChild(mbadge); }
    mbadge.textContent = abertos;
  } else {
    if (mbadge) mbadge.remove();
  }
}

// ✅ Shake periódico no sino a cada 2 horas se houver tickets em aberto
var _tktShakeTimer = null;
function _tktIniciarShakePeriodico() {
  clearInterval(_tktShakeTimer);
  _tktShakeTimer = setInterval(function() {
    var abertos = _tktDados.filter(function(t) { return t.status === 'Aberto' || t.status === 'Progresso'; }).length;
    if (abertos > 0) _tktAnimarSino();
  }, 2 * 60 * 60 * 1000); // 2 horas
}

// ── PERSISTÊNCIA ───────────────────────────────────────────────
function tktSalvarNaBase() {
  tktAtualizarBadge();
  if (typeof google !== 'undefined' && google.script) {
    google.script.run.withFailureHandler(function() {}).salvarTickets(JSON.stringify(_tktDados));
  }
}

// ── UTILITÁRIOS ────────────────────────────────────────────────
function _tktDataHoje() {
  var d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
}
function _tktIniciais(nome) {
  var p = String(nome||'').trim().split(/[\s.]+/).filter(Boolean);
  if (p.length >= 2) return (p[0][0]+p[1][0]).toUpperCase();
  return p[0] ? p[0].slice(0,2).toUpperCase() : '??';
}
function _tktPrimeiroNome(nome) { return String(nome||'').split(' ')[0]; }

// Fechar modais ao clicar fora
document.addEventListener('click', function(e) {
  var mf = document.getElementById('tktModalForm');
  var md = document.getElementById('tktModalDetalhe');
  if (mf && e.target === mf) tktFecharModal();
  if (md && e.target === md) tktFecharDetalhe();
  var wrap = document.getElementById('notifBellWrap');
  var drop = document.getElementById('notifDropdown');
  if (drop && drop.classList.contains('aberto') && wrap && !wrap.contains(e.target)) drop.classList.remove('aberto');
});

// ══════════════════════════════════════════════════════════════
//  SISTEMA DE NOTIFICAÇÕES — Sino no topbar
// ══════════════════════════════════════════════════════════════
var _notifLista = [];

function tktToggleNotifDropdown() {
  var drop = document.getElementById('notifDropdown');
  if (!drop) return;
  drop.classList.toggle('aberto');
  if (drop.classList.contains('aberto')) _tktMarcarTodasLidas();
}

function _tktAdicionarNotif(tipo, titulo, sub) {
  _notifLista.unshift({ id: 'N-'+Date.now(), tipo: tipo, titulo: titulo, sub: sub, lida: false, ts: _tktDataHoje() });
  if (_notifLista.length > 20) _notifLista = _notifLista.slice(0,20);
  _tktRenderNotifs();
  _tktAnimarSino();
}

function _tktRenderNotifs() {
  var badge    = document.getElementById('notifBadge');
  var list     = document.getElementById('notifList');
  var btn      = document.getElementById('notifBellBtn');
  var naoLidas = _notifLista.filter(function(n) { return !n.lida; }).length;

  // O badge do sino é controlado por tktAtualizarBadge() (tickets abertos)
  // mas as notificações novas também acendem
  if (badge && naoLidas > 0) { badge.textContent = naoLidas > 9 ? '9+' : naoLidas; badge.style.display = 'flex'; }
  if (btn)   btn.classList.toggle('tem-alerta', naoLidas > 0);

  if (!list) return;
  if (!_notifLista.length) { list.innerHTML = '<div class="notif-empty">Nenhuma notificação</div>'; return; }
  var icons = { 'novo':'🎫','atribuido':'👤','concluido':'✅' };
  list.innerHTML = _notifLista.map(function(n) {
    return '<div class="notif-item' + (n.lida ? '' : ' nova') + '" onclick="tktNotifClicar(\'' + esc(n.id) + '\')">' +
      '<div class="notif-item-icon">' + (icons[n.tipo]||'🔔') + '</div>' +
      '<div class="notif-item-body"><div class="notif-item-title">' + esc(n.titulo) + '</div>' +
      '<div class="notif-item-sub">' + esc(n.sub) + ' · ' + esc(n.ts) + '</div></div></div>';
  }).join('');
}

function tktNotifClicar(id) {
  var n = _notifLista.find(function(x) { return x.id === id; });
  if (n) n.lida = true;
  _tktRenderNotifs();
  document.getElementById('notifDropdown').classList.remove('aberto');
  if (typeof navegar === 'function') navegar('tickets');
}
function tktLimparNotifs() { _notifLista = []; _tktRenderNotifs(); document.getElementById('notifDropdown').classList.remove('aberto'); }
function _tktMarcarTodasLidas() { _notifLista.forEach(function(n) { n.lida = true; }); _tktRenderNotifs(); }

function _tktAnimarSino() {
  var btn = document.getElementById('notifBellBtn');
  if (!btn) return;
  btn.classList.remove('tem-alerta');
  void btn.offsetWidth;
  btn.classList.add('tem-alerta');
}

// ── PRINTS / ANEXOS ───────────────────────────────────────────
var _tktPrintsTemp = []; // prints do ticket em edição

function tktRenderPrints() {
  var container = document.getElementById('tktF_prints');
  if (!container) return;
  if (!_tktPrintsTemp.length) { container.innerHTML = ''; return; }
  container.innerHTML = _tktPrintsTemp.map(function(p, i) {
    return '<div class="tkt-print-thumb" onclick="window.open(\'' + esc(p.viewUrl) + '\',\'_blank\')">' +
      '<img src="' + esc(p.url) + '" alt="' + esc(p.nome) + '">' +
      '<button class="tkt-print-del" onclick="event.stopPropagation();tktRemoverPrint(' + i + ')" title="Remover">✕</button>' +
    '</div>';
  }).join('');
}

function tktUploadPrints(files) {
  if (!files || !files.length) return;
  var ticketId = document.getElementById('tktF_id').value || 'TKT-NOVO';
  var label = document.getElementById('tktUploadLabel');
  var total = files.length;
  var done = 0;
  if (label) { label.classList.add('uploading'); label.childNodes[1].textContent = ' Enviando...'; }

  Array.from(files).forEach(function(file) {
    if (!file.type.startsWith('image/')) {
      mostrarToast('⚠️ Apenas imagens são permitidas.', 'warning');
      done++;
      if (done >= total && label) { label.classList.remove('uploading'); label.childNodes[1].textContent = ' Adicionar print'; }
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      mostrarToast('⚠️ Imagem muito grande (máx 5MB).', 'warning');
      done++;
      if (done >= total && label) { label.classList.remove('uploading'); label.childNodes[1].textContent = ' Adicionar print'; }
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64 = e.target.result.split(',')[1];
      google.script.run
        .withSuccessHandler(function(res) {
          done++;
          if (res && res.sucesso) {
            _tktPrintsTemp.push(res.print);
            tktRenderPrints();
            mostrarToast('✅ Print adicionado!', 'success');
          } else {
            mostrarToast('❌ Erro: ' + (res ? res.mensagem : 'desconhecido'), 'error');
          }
          if (done >= total && label) { label.classList.remove('uploading'); label.childNodes[1].textContent = ' Adicionar print'; }
        })
        .withFailureHandler(function(err) {
          done++;
          mostrarToast('❌ Erro: ' + (err && err.message ? err.message : 'desconhecido'), 'error');
          if (done >= total && label) { label.classList.remove('uploading'); label.childNodes[1].textContent = ' Adicionar print'; }
        })
        .uploadPrintTicket(ticketId, base64, file.name, file.type);
    };
    reader.readAsDataURL(file);
  });
}

function tktRemoverPrint(index) {
  var print = _tktPrintsTemp[index];
  if (!print) return;
  _tktPrintsTemp.splice(index, 1);
  tktRenderPrints();
  // Remove do Drive em background
  google.script.run.withFailureHandler(function(){}).deletePrintTicket(print.id);
  mostrarToast('🗑️ Print removido.', 'success');
}

function tktRenderDetailPrints(prints) {
  var container = document.getElementById('tktDetPrints');
  if (!container) return;
  if (!prints || !prints.length) { container.innerHTML = ''; return; }
  container.innerHTML = prints.map(function(p) {
    return '<div class="tkt-detail-print-thumb" onclick="window.open(\'' + esc(p.viewUrl) + '\',\'_blank\')" title="' + esc(p.nome) + '">' +
      '<img src="' + esc(p.url) + '" alt="' + esc(p.nome) + '">' +
    '</div>';
  }).join('');
}
</script>
