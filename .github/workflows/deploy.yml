name: Deploy para GAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar clasp
        # Pin em 3.3.0 — versao validada localmente em 29/06/2026. Action quebrou
        # em 25/06 (commit e205010) porque `npm install -g @google/clasp` sem pin
        # subiu uma versao com regressao no `clasp push --force`. Mudar a versao
        # exige confirmar localmente que ainda funciona antes de mexer.
        run: npm install -g @google/clasp@3.3.0

      - name: Configurar credenciais do clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Atualizar data de deploy no Config.js
        run: |
          export DEPLOY_DATE=$(TZ="America/Sao_Paulo" date +"%d/%m/%Y %H:%M")
          python3 << 'EOF'
          import re, os
          d = os.environ['DEPLOY_DATE']
          content = open('Config.js', encoding='utf-8').read()
          updated = re.sub(r"var DEPLOY_DATE = '[^']*'", f"var DEPLOY_DATE = '{d}'", content)
          open('Config.js', 'w', encoding='utf-8').write(updated)
          print(f'[OK] DEPLOY_DATE atualizado para: {d}')
          EOF

      - name: Enviar código para o GAS
        run: clasp push --force

      - name: Verificar limite de versões (200 = teto rígido do GAS)
        run: |
          # O endpoint `DELETE /v1/projects/{id}/versions/{v}` da Apps Script
          # API NÃO EXISTE — a versão original deste step ficou meses chamando
          # esse endpoint fantasma com `|| true` engolindo o 404, dando a
          # falsa impressão de cleanup. Limite só pode ser administrado
          # MANUALMENTE via UI do editor.
          #
          # Estratégia atual: detectar e alertar. Se >195, FAIL LOUD pra deploy
          # NÃO ir silenciosamente quebrado (o que aconteceu em 27-29/05).
          TOTAL=$(clasp versions 2>/dev/null | grep -oP '^\d+' | wc -l)
          echo "Versões atuais: $TOTAL/200"
          if [ "$TOTAL" -gt 195 ]; then
            echo "::error::Limite de 200 versões PRÓXIMO ($TOTAL/200). clasp deploy vai quebrar — abortando o deploy."
            echo "::error::Pra liberar:"
            echo "::error::  1. Abrir https://script.google.com/d/12PwAZi4xAjS2h_l9f_QFJK_zNdtADy6c5J3qMa9co3VNt5qxUE5PANEI/edit"
            echo "::error::  2. Menu ☰ → Implantações → Gerenciar implantações → arquivar versões antigas"
            echo "::error::  3. Re-rodar esta Action: Actions → último run falho → Re-run all jobs"
            exit 1
          elif [ "$TOTAL" -gt 150 ]; then
            echo "::warning::$TOTAL/200 versões. Planeje limpar via UI nas próximas semanas pra não bater o teto."
          fi

      - name: Publicar nova versão
        run: clasp deploy --deploymentId AKfycbyOB1HP_wIn0Haxw14npDgY7imWJL7wCEDvrnrVvU8WiXyDwXWa36PAo7Kd06sxEoMTKw -d "Deploy ${{ github.sha }}"
