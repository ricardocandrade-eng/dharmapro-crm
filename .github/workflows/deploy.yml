name: Deploy para GAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar clasp
        run: npm install -g @google/clasp

      - name: Configurar credenciais do clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Atualizar data de deploy no Config.js
        run: |
          export DEPLOY_DATE=$(TZ="America/Sao_Paulo" date +"%d/%m/%Y %H:%M")
          python3 << 'EOF'
          import re, os
          d = os.environ['DEPLOY_DATE']
          content = open('Config.js', encoding='utf-8').read()
          updated = re.sub(r"var DEPLOY_DATE = '[^']*'", f"var DEPLOY_DATE = '{d}'", content)
          open('Config.js', 'w', encoding='utf-8').write(updated)
          print(f'[OK] DEPLOY_DATE atualizado para: {d}')
          EOF

      - name: Enviar código para o GAS
        run: clasp push --force

      - name: Limpar versões antigas (manter últimas 10)
        run: |
          VERSIONS=$(clasp versions 2>/dev/null | grep -oP '^\d+' | sort -n)
          TOTAL=$(echo "$VERSIONS" | wc -l)
          if [ "$TOTAL" -gt 190 ]; then
            DELETE_COUNT=$((TOTAL - 10))
            TO_DELETE=$(echo "$VERSIONS" | head -n $DELETE_COUNT)
            for v in $TO_DELETE; do
              curl -s -X DELETE \
                -H "Authorization: Bearer $(cat ~/.clasprc.json | python3 -c "import sys,json;print(json.load(sys.stdin)['token']['access_token'])")" \
                "https://script.googleapis.com/v1/projects/12PwAZi4xAjS2h_l9f_QFJK_zNdtADy6c5J3qMa9co3VNt5qxUE5PANEI/versions/$v" || true
            done
            echo "[OK] Versões antigas removidas"
          else
            echo "[OK] Dentro do limite ($TOTAL versões)"
          fi

      - name: Publicar nova versão
        run: clasp deploy --deploymentId AKfycbyOB1HP_wIn0Haxw14npDgY7imWJL7wCEDvrnrVvU8WiXyDwXWa36PAo7Kd06sxEoMTKw -d "Deploy ${{ github.sha }}"
