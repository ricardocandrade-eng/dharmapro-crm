name: Deploy para GAS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar clasp
        run: npm install -g @google/clasp

      - name: Configurar credenciais do clasp
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Atualizar data de deploy no Config.js
        run: |
          export DEPLOY_DATE=$(TZ="America/Sao_Paulo" date +"%d/%m/%Y %H:%M")
          python3 << 'EOF'
          import re, os
          d = os.environ['DEPLOY_DATE']
          content = open('Config.js', encoding='utf-8').read()
          updated = re.sub(r"var DEPLOY_DATE = '[^']*'", f"var DEPLOY_DATE = '{d}'", content)
          open('Config.js', 'w', encoding='utf-8').write(updated)
          print(f'[OK] DEPLOY_DATE atualizado para: {d}')
          EOF

      - name: Enviar código para o GAS
        run: clasp push --force

      - name: Publicar nova versão
        run: clasp deploy --deploymentId AKfycbyOB1HP_wIn0Haxw14npDgY7imWJL7wCEDvrnrVvU8WiXyDwXWa36PAo7Kd06sxEoMTKw -d "Deploy ${{ github.sha }}"
