  <div style="display:flex;align-items:center;justify-content:center;height:55vh">

<script>
(function(){
'use strict';
var _m=new Date().getMonth()+1, _y=new Date().getFullYear();
var MO=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
var _force=false;

function d_navMes(d){_m+=d;if(_m>12){_m=1;_y++;}if(_m<1){_m=12;_y--;}_force=true;d_load();}
window.d_navMes=d_navMes;

function _updLbl(){var el=document.getElementById('d_mesLbl');if(el)el.textContent=MO[_m-1]+'  '+_y;}

function d_load(){
  _updLbl();
  var sl=document.getElementById('d_syncLbl');if(sl)sl.style.display='inline';
  if(window.__DASH_DATA__&&!_force){
    var c=window.__DASH_DATA__;window.__DASH_DATA__=null;
    _m=c.mes||_m;_y=c.ano||_y;_updLbl();
    if(sl)sl.style.display='none';
    _render(c);return;
  }
  _force=true;
  google.script.run
    .withSuccessHandler(function(r){if(sl)sl.style.display='none';if(!r||r.erro){_err(r?r.mensagem:'Erro');return;}_render(r);})
    .withFailureHandler(function(e){if(sl)sl.style.display='none';_err(e.message);})
    .getDashboard(_m,_y);
}
window.d_load=d_load;

var e=function(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
function n(v,d){return parseFloat(v||0).toFixed(d||0).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function nR(v){return 'R$\u202f'+n(v,2);}
function nP(v){return n(v,1)+'%';}
function bc(p){return p>=100?'var(--g1)':p>=70?'var(--g4)':'var(--g3)';}

function cu(el,val){var s=0,dur=1000,tick=14,inc=val/(dur/tick);var t=setInterval(function(){s+=inc;if(s>=val){s=val;clearInterval(t);}el.textContent=n(s,0);},tick);}

function donut(id,data,colors){
  setTimeout(function(){
    var c=document.getElementById(id);if(!c)return;
    var ctx=c.getContext('2d'),W=c.width,H=c.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-3,ri=R*.58;
    var tot=data.reduce(function(s,d){return s+d;},0);
    ctx.clearRect(0,0,W,H);
    if(!tot){ctx.beginPath();ctx.arc(cx,cy,(R+ri)/2,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=R-ri;ctx.stroke();return;}
    var a=-Math.PI/2;
    data.forEach(function(v,i){var s=(v/tot)*Math.PI*2;ctx.beginPath();ctx.arc(cx,cy,R,a,a+s);ctx.arc(cx,cy,ri,a+s,a,true);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();a+=s;});
  },60);
}

function _err(msg){var el=document.getElementById('d_root');if(el)el.innerHTML='<div style="padding:80px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--g3);letter-spacing:.1em;">⚠ '+e(msg)+'</div>';}

function _render(d){
  var cfg=d.config||{};var MV=cfg.metaVero||60;
  var iP=MV>0?(d.instalacoesMes/MV)*100:0;
  var rP=d.metaReceita>0?(d.receitaAtual/d.metaReceita)*100:0;
  var apP=d.aproveitamento||0;
  var COLORS=['#c8ff5e','#00d4ff','#ff4570','#ffaa00','#a78bfa','#ff8c42'];
  var h='';

  var heroItems=[
    {lbl:'Fibra Hoje',val:d.fibraHoje,color:'var(--g1)',ac:'#c8ff5e',id:'dcu0'},
    {lbl:'Instalações',val:d.instalacoesMes,color:'var(--em)',ac:null,id:'dcu1'},
    {lbl:'Ticket Médio',val:n(d.ticketMedio,2),color:'var(--g2)',ac:'#00d4ff',id:null,raw:true},
    {lbl:'Venda Bruta',val:d.vendaBrutaMes,color:'var(--g3)',ac:'#ff4570',id:'dcu3'},
  ];
  h+='<div class="hero-strip">';
  heroItems.forEach(function(kp,i){
    h+='<div class="hero-kpi" style="--accent-color:'+(kp.ac||'transparent')+'">';
    h+='<div class="kpi-label">'+kp.lbl+'</div>';
    h+='<div class="kpi-num" style="color:'+kp.color+'"'+(kp.id?' id="'+kp.id+'"':'')+'>'+kp.val+'</div>';
    if(i===0)h+='<div class="kpi-sub">📱 <b>'+d.movelHoje+'</b> móvel · <span style="color:var(--g3)">🔥 '+d.fibraEmConferencia+' conf.</span></div>';
    if(i===1){h+='<div class="kpi-sub">Backlog <b>'+d.backlog+'</b></div>';
      h+='<div class="prog-row"><div class="prog-track"><div class="prog-fill" style="width:'+Math.min(100,iP)+'%;background:'+bc(iP)+'"></div></div><span class="prog-pct" style="color:'+bc(iP)+'">'+nP(iP)+'</span></div>';}
    if(i===2){h+='<div class="kpi-sub">Receita atual <b>'+nR(d.receitaAtual)+'</b></div>';
      h+='<div class="kpi-proj">📈 Projeção <b style="color:var(--g2)">'+nR(d.tendenciaReceita)+'</b></div>';}
    if(i===1&&d.tendenciaInstal){h+='<div class="kpi-proj">📈 Projeção <b style="color:var(--g1)">'+d.tendenciaInstal+'</b></div>';}
    if(i===3)h+='<div class="kpi-sub">Tendência <span style="color:var(--g1)">'+d.tendenciaVendas+'</span></div>';
    h+='</div>';
    if(i<heroItems.length-1)h+='<div class="hero-sep"></div>';
  });
  h+='</div>';

  var chips=[
    {lbl:'Agendados Hoje',val:d.agendadosHoje,c:'var(--g2)'},
    {lbl:'Instalados Hoje',val:d.instaladosHoje,c:'var(--g1)'},
    {lbl:'Em Campo',val:d.emCampo,c:'var(--g4)'},
    {lbl:'Pendenciado',val:d.pendenciadoHoje,c:'var(--g3)'},
    {lbl:'Pend. Vero',val:d.pendenciaVero,c:'var(--g5)'},
  ];
  h+='<div class="chips-strip">';
  chips.forEach(function(c){h+='<div class="chip-box"><div class="chip-num" style="color:'+c.c+'">'+c.val+'</div><div class="chip-lbl">'+c.lbl+'</div></div>';});
  h+='</div>';

  // Ranking mensal por venda bruta (col M agrupado por col D no mês)
  var rankMes = {};
  // usa canalVenda como proxy — melhor: campo rankingMes do backend
  // Por ora calcula a partir de d.rankingMes se existir, senão mostra vazio
  var rkMes = d.rankingMes || [];
  var rkMesMax = rkMes.length > 0 ? rkMes[0].qtd : 1;

  h+='<div class="main-grid">';
  h+='<div class="side-grid">';

  // Funil
  h+='<div class="card" style="animation-delay:.1s">';
  h+='<div class="card-head"><span class="card-title">Funil de Leads</span><span class="card-badge badge-lime">'+d.fibraEmConferencia+' leads</span></div>';
  h+='<div class="funil-visual">';
  var FI=[{k:'AG ACEITE',cls:'fv-heat-0'},{k:'AG AUDITORIA',cls:'fv-heat-0'},{k:'AG COMPROVANTE',cls:'fv-heat-1'},{k:'AG DOC',cls:'fv-heat-1'},{k:'EM NEGOCIACAO',cls:'fv-heat-2'},{k:'AG QUALIDADE',cls:'fv-heat-3'},{k:'CRUZAMENTO DE CA',cls:'fv-heat-3'}];
  var fMax=Math.max(1,Math.max.apply(null,FI.map(function(x){return d.funil[x.k]||0;})));
  FI.forEach(function(fi){var v=d.funil[fi.k]||0;h+='<div class="fv-row"><div class="fv-name">'+fi.k+'</div><div class="fv-bar-track"><div class="fv-bar-fill '+fi.cls+'" style="width:'+(v/fMax*100)+'%"></div></div><div class="fv-val">'+v+'</div></div>';});
  h+='</div></div>';

  // Ranking Mensal movido para o final do dashboard

  h+='</div>'; // fecha side-grid esquerdo

  h+='<div class="side-grid">';
  h+='<div class="card" style="animation-delay:.15s">';
  h+='<div class="card-head"><span class="card-title">Ranking · Hoje</span></div>';
  h+='<div class="rank-list">';
  var rk=d.rankingHoje||[];var rkMax=rk.length>0?rk[0].qtd:1;
  var poss=['①','②','③','④','⑤'];
  if(!rk.length)h+='<div style="color:var(--dim);font-family:var(--mono);font-size:10px;padding:8px 0">— sem vendas hoje —</div>';
  rk.slice(0,5).forEach(function(r,i){h+='<div class="rank-item '+(i===0?'r1':'')+'">'+'<span class="ri-pos" style="color:'+(i===0?'var(--g4)':i===1?'var(--dim2)':'var(--dim)')+'">'+poss[i]+'</span>'+'<span class="ri-name">'+e(r.nome)+'</span>'+'<div class="ri-bar-track"><div class="ri-bar-fill" style="width:'+(r.qtd/rkMax*100)+'%"></div></div>'+'<span class="ri-count">'+r.qtd+'</span></div>';});
  h+='</div></div>';
  h+='<div class="card" style="animation-delay:.2s">';
  h+='<div class="card-head"><span class="card-title">Agenda · Hoje</span></div>';
  h+='<div class="agenda-2x2">';
  [{val:d.agendadosHoje,lbl:'Agendados',c:'var(--g2)'},{val:d.instaladosHoje,lbl:'Instalados',c:'var(--g1)'},{val:d.emCampo,lbl:'Em Campo',c:'var(--g4)'},{val:d.pendenciadoHoje,lbl:'Pendênc.',c:'var(--g3)'}].forEach(function(x){h+='<div class="ag-box"><div class="ag-num" style="color:'+x.c+'">'+x.val+'</div><div class="ag-lbl">'+x.lbl+'</div></div>';});
  h+='</div></div>';
  h+='</div>';

  h+='<div class="side-grid">';
  h+='<div class="card" style="animation-delay:.25s">';
  h+='<div class="card-head"><span class="card-title">Meta Vero</span>'+(d.bonusVero>0?'<span class="card-badge badge-lime">🎉 Bônus</span>':'')+'</div>';
  h+='<div style="text-align:center;padding:8px 0"><canvas id="d_metaDonut" width="100" height="100"></canvas></div>';
  h+='<div style="text-align:center"><div style="font-family:var(--serif);font-size:38px;font-style:italic;color:var(--em);line-height:1">'+d.instalacoesMes+' <span style="font-size:18px;color:var(--dim)">/ '+MV+'</span></div>';
  h+='<div style="font-family:var(--mono);font-size:10px;color:'+bc(iP)+';margin-top:6px">'+nP(iP)+' da meta</div>';
  if(d.bonusVero>0)h+='<div style="font-size:11px;color:var(--g1);margin-top:4px;font-weight:600">+'+nR(d.bonusVero)+' bônus</div>';
  h+='</div></div>';
  h+='<div class="card" style="animation-delay:.3s">';
  h+='<div class="card-head"><span class="card-title">Tendências</span></div>';
  h+='<div style="display:flex;flex-direction:column;gap:14px">';
  [{lbl:'Instalação',val:d.tendenciaInstal,pct:iP,color:'var(--g1)'},{lbl:'Receita',val:nR(d.tendenciaReceita),pct:rP,color:'var(--g2)',raw:true},{lbl:'Aproveit.',val:nP(apP),pct:apP,color:bc(apP),raw:true}].forEach(function(t){
    h+='<div><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)">'+t.lbl+'</span><span style="font-family:var(--mono);font-size:12px;font-weight:600;color:'+t.color+'">'+t.val+'</span></div><div class="prog-track"><div class="prog-fill" style="width:'+Math.min(100,t.pct)+'%;background:'+t.color+'"></div></div></div>';
  });
  h+='</div></div>';
  h+='</div>';
  h+='</div>';

  h+='<div class="section-row"><span>Canais & Rankings</span></div>';
  h+='<div class="bottom-grid">';
  h+='<div class="card" style="animation-delay:.3s"><div class="card-head"><span class="card-title">Venda por Canal</span></div><div class="donut-wrap"><canvas id="d_donutVenda" width="96" height="96"></canvas><div class="donut-legend">';
  (d.canalVenda||[]).forEach(function(c,i){h+='<div class="dl-row"><div class="dl-swatch" style="background:'+COLORS[i%COLORS.length]+'"></div><span class="dl-lbl">'+e(c.canal)+'</span><span class="dl-val" style="color:'+COLORS[i%COLORS.length]+'">'+c.qtd+'</span></div>';});
  h+='</div></div></div>';

  h+='<div class="card" style="animation-delay:.35s"><div class="card-head"><span class="card-title">Instalação por Canal</span><span class="card-badge badge-cyan">ant. '+d.instalacoesMesAnt+'</span></div><div style="display:flex;flex-direction:column;gap:8px">';
  var ciMax=Math.max(1,Math.max.apply(null,(d.canalInstal||[]).map(function(c){return c.qtd;})));
  (d.canalInstal||[]).forEach(function(c,i){h+='<div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;font-weight:500">'+e(c.canal)+'</span><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:'+COLORS[i%COLORS.length]+'">'+c.qtd+'</span></div><div class="prog-track"><div class="prog-fill" style="width:'+(c.qtd/ciMax*100)+'%;background:'+COLORS[i%COLORS.length]+'"></div></div></div>';});
  h+='</div></div>';

  h+='<div class="card" style="animation-delay:.4s"><div class="card-head"><span class="card-title">Plano Mais Vendido</span></div><div class="hl-name">'+e(d.planoTop||'—')+'</div><div class="hl-big">'+nP(d.planoTopPct)+'</div><div style="font-size:10px;color:var(--dim)">das instalações do mês</div><div class="hl-track"><div class="hl-fill" style="width:'+d.planoTopPct+'%;background:var(--g4)"></div></div>';
  h+='<div style="margin-top:14px;display:flex;flex-direction:column;gap:5px">';
  [{lbl:'Finalizado',v:d.finalizadoMes,c:'var(--g1)'},{lbl:'Entregue',v:d.entregueMes,c:'var(--g2)'},{lbl:'Ag. Entrega',v:d.aguardandoEntregaMes,c:'var(--g4)'}].forEach(function(x){h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--s2);border-radius:7px"><span style="font-size:10px;color:var(--dim2)">'+x.lbl+'</span><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:'+x.c+'">'+x.v+'</span></div>';});
  h+='</div></div>';

  h+='<div class="card" style="animation-delay:.45s"><div class="card-head"><span class="card-title">Cidade Top & KPIs</span></div><div class="hl-name">'+e(d.cidadeTop||'—')+'</div><div class="hl-big" style="color:var(--g5)">'+nP(d.cidadeTopPct)+'</div><div style="font-size:10px;color:var(--dim)">das instalações do mês</div>';
  h+='<div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">';
  h+='<div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--dim2);font-family:var(--mono);letter-spacing:.1em">CANCELAMENTO</span><span style="font-family:var(--mono);font-weight:700;color:'+(d.cancelPct>5?'var(--g3)':'var(--g1)')+'">'+nP(d.cancelPct)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--dim2);font-family:var(--mono);letter-spacing:.1em">APROVEITAMENTO</span><span style="font-family:var(--mono);font-weight:700;color:'+bc(apP)+'">'+nP(apP)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--dim2);font-family:var(--mono);letter-spacing:.1em">DIAS ÚTEIS</span><span style="font-family:var(--mono);font-weight:700">'+d.duPassados+' / '+d.duMes+'</span></div>';
  h+='</div></div>';
  h+='</div>';

  // ── RANKING FULL-WIDTH no final ──────────────────────────────────────
  var INTERNOS = ['joysse coelho','vanessa andrade','tuany rodrigues'];
  function _isInterno(nome){ 
    var n = String(nome||'').toLowerCase().trim();
    return INTERNOS.some(function(i){ return n.indexOf(i) > -1; });
  }
  var rkMesFiltrado    = (d.rankingMes    || []).filter(function(r){ return !_isInterno(r.nome); });
  var rkMesAntFiltrado = (d.rankingMesAnt || []).filter(function(r){ return !_isInterno(r.nome); });

  // Mapa M-1 por nome para lookup rápido
  var mapAnt = {};
  rkMesAntFiltrado.forEach(function(r){ mapAnt[r.nome] = r.qtd; });

  var rkMax2   = rkMesFiltrado.length > 0 ? rkMesFiltrado[0].qtd : 1;
  var medalhas = ['🥇','🥈','🥉'];
  var MO_PREV  = MO[d.mes === 1 ? 11 : d.mes - 2];

  h+='<div class="section-row" style="margin-top:32px"><span>Ranking de Vendedores · '+MO[d.mes-1]+'</span></div>';
  h+='<div class="rank-full-wrap">';
  if(!rkMesFiltrado.length){
    h+='<div style="color:var(--dim);font-family:var(--mono);font-size:11px;padding:20px">— sem dados para o período —</div>';
  } else {
    rkMesFiltrado.forEach(function(r,i){
      var ant    = mapAnt[r.nome] || 0;
      var delta  = r.qtd - ant;
      var deltaTxt = delta > 0 ? '<span style="color:var(--g1)">▲'+delta+'</span>'
                   : delta < 0 ? '<span style="color:var(--g3)">▼'+Math.abs(delta)+'</span>'
                   : '<span style="color:var(--dim)">—</span>';
      var pct    = Math.round(r.qtd / rkMax2 * 100);
      var cor    = i===0 ? 'var(--g4)' : i===1 ? 'var(--g2)' : i===2 ? 'var(--g1)' : 'var(--dim2)';
      var medal  = medalhas[i] || '<span style="font-family:var(--mono);color:var(--dim)">'+('0'+(i+1)).slice(-2)+'</span>';
      h+='<div class="rank-full-item">';
      h+='<div class="rfi-medal">'+medal+'</div>';
      h+='<div class="rfi-nome">'+e(r.nome)+'</div>';
      h+='<div class="rfi-bar-wrap"><div class="rfi-bar" style="width:'+pct+'%;background:'+cor+'"></div></div>';
      h+='<div class="rfi-qtd" style="color:'+cor+'">'+r.qtd+'</div>';
      h+='<div class="rfi-delta" title="vs '+MO_PREV+'">'+deltaTxt+'<span class="rfi-delta-lbl">vs '+MO_PREV+'</span></div>';
      h+='</div>';
    });
  }
  h+='</div>';

  var root=document.getElementById('d_root');
  if(root)root.innerHTML=h;

  donut('d_donutVenda',(d.canalVenda||[]).map(function(c){return c.qtd;}),COLORS);
  donut('d_metaDonut',[d.instalacoesMes,Math.max(0,MV-d.instalacoesMes)],[iP>=100?'#c8ff5e':iP>=70?'#ffaa00':'#ff4570','rgba(255,255,255,.05)']);

  [{id:'dcu0',v:d.fibraHoje},{id:'dcu1',v:d.instalacoesMes},{id:'dcu3',v:d.vendaBrutaMes}].forEach(function(x){var el=document.getElementById(x.id);if(el&&x.v>0)cu(el,x.v);});
}

d_load();
})();
</script>
