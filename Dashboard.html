<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Martian+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
#dashContainer{all:initial;display:block;width:100%;height:100%;overflow-y:auto;background:#08090e;color:#dde2f0;font-family:'DM Sans',sans-serif;position:relative}
#dashContainer *,#dashContainer *::before,#dashContainer *::after{box-sizing:border-box;margin:0;padding:0}
#dashContainer{--bg:#08090e;--s1:#0e1018;--s2:#131620;--s3:#191d2c;--rim:rgba(255,255,255,0.06);--rim2:rgba(255,255,255,0.12);--txt:#dde2f0;--dim:#5a6080;--dim2:#8490b8;--em:#f0f4ff;--g1:#c8ff5e;--g2:#00d4ff;--g3:#ff4570;--g4:#ffaa00;--g5:#a78bfa;--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',sans-serif;--mono:'Martian Mono',monospace;--r:14px}
#dashContainer .glow-tl{position:fixed;top:-200px;left:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(200,255,94,.04) 0%,transparent 65%);pointer-events:none;z-index:0}
#dashContainer .glow-br{position:fixed;bottom:-300px;right:-200px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.035) 0%,transparent 65%);pointer-events:none;z-index:0}
#dashContainer .top{position:sticky;top:0;z-index:100;height:52px;padding:0 32px;display:flex;align-items:center;gap:20px;background:rgba(8,9,14,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--rim)}
#dashContainer .top-brand{display:flex;align-items:center;gap:10px}
#dashContainer .top-pulse{width:7px;height:7px;border-radius:50%;background:var(--g1);box-shadow:0 0 12px var(--g1);animation:d-pulse 2.4s ease-in-out infinite}
@keyframes d-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
#dashContainer .top-name{font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:.2em;color:var(--dim2);text-transform:uppercase}
#dashContainer .top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#dashContainer .nav-month{display:flex;align-items:center;gap:8px}
#dashContainer .nav-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--rim);background:var(--s2);color:var(--dim2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
#dashContainer .nav-btn:hover{background:var(--s3);color:var(--em);border-color:var(--rim2)}
#dashContainer .month-label{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--g4);letter-spacing:.1em;min-width:88px;text-align:center}
#dashContainer .sync-tag{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.15em}
#dashContainer .refresh{padding:7px 18px;border-radius:8px;background:rgba(200,255,94,.07);border:1px solid rgba(200,255,94,.18);color:var(--g1);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);letter-spacing:.05em;transition:all .15s}
#dashContainer .refresh:hover{background:rgba(200,255,94,.14);border-color:rgba(200,255,94,.35)}
/* ── TABS ── */
#dashContainer .rn-tab-bar{position:sticky;top:52px;z-index:99;background:rgba(8,9,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--rim);padding:0 32px;display:flex;gap:0}
#dashContainer .rn-tab{background:none;border:none;border-bottom:2px solid transparent;padding:12px 20px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .15s}
#dashContainer .rn-tab:hover{color:var(--dim2)}
#dashContainer .rn-tab.active{color:var(--g2);border-bottom-color:var(--g2)}
/* ── BARRA DIAS ÚTEIS ── */
#dashContainer .du-bar-wrap{position:sticky;top:94px;z-index:98;background:rgba(8,9,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--rim);padding:7px 32px;display:flex;align-items:center;gap:14px}
#dashContainer .du-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);white-space:nowrap;flex-shrink:0}
#dashContainer .du-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;position:relative}
#dashContainer .du-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.34,1.56,.64,1)}
#dashContainer .du-ticks{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;pointer-events:none}
#dashContainer .du-tick{flex:1;border-right:1px solid rgba(8,9,14,.5)}
#dashContainer .du-tick:last-child{border-right:none}
#dashContainer .du-info{font-family:var(--mono);font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
/* ── CANVAS ── */
#dashContainer .canvas{position:relative;z-index:1;padding:24px 28px 48px}
/* ── SECTION ROW ── */
#dashContainer .section-row{display:flex;align-items:center;gap:14px;margin:0 0 14px}
#dashContainer .section-row span{font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);white-space:nowrap}
#dashContainer .section-row::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rim) 0%,transparent 100%)}
/* ── GRIDS ── */
#dashContainer .grid-hoje{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
#dashContainer .grid-mes{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:14px;margin-bottom:14px}
#dashContainer .grid-canais{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:14px}
#dashContainer .grid-rank{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* ── CARDS ── */
#dashContainer .card{background:var(--s1);border:1px solid var(--rim);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden;animation:d-fadeUp .5s ease both}
#dashContainer .card:hover{border-color:var(--rim2);transition:border-color .2s}
#dashContainer .card.hoje-card{border-color:rgba(0,212,255,.18);background:linear-gradient(135deg,var(--s1) 0%,rgba(0,212,255,.03) 100%)}
#dashContainer .card.mes-card{border-color:rgba(200,255,94,.15);background:linear-gradient(135deg,var(--s1) 0%,rgba(200,255,94,.025) 100%)}
@keyframes d-fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
#dashContainer .card-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
#dashContainer .card-title{font-family:var(--mono);font-size:9px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
#dashContainer .card-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px}
#dashContainer .badge-lime{background:rgba(200,255,94,.1);color:var(--g1);border:1px solid rgba(200,255,94,.2)}
#dashContainer .badge-cyan{background:rgba(0,212,255,.1);color:var(--g2);border:1px solid rgba(0,212,255,.2)}
#dashContainer .badge-amber{background:rgba(255,170,0,.1);color:var(--g4);border:1px solid rgba(255,170,0,.2)}
#dashContainer .badge-red{background:rgba(255,69,112,.1);color:var(--g3);border:1px solid rgba(255,69,112,.2)}
/* ── KPI ── */
#dashContainer .kpi-big{font-family:var(--serif);font-size:52px;line-height:1;font-style:italic;letter-spacing:-.02em}
#dashContainer .kpi-big.md{font-size:36px}
#dashContainer .kpi-sub{font-size:12px;color:var(--dim2);margin-top:4px}
#dashContainer .kpi-sub b{color:var(--txt);font-size:13px}
#dashContainer .kpi-proj{font-size:12px;color:var(--dim2);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
#dashContainer .kpi-proj b{font-weight:700;font-size:13px}
/* ── PROG ── */
#dashContainer .prog-track{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
#dashContainer .prog-fill{height:100%;border-radius:3px;transition:width 1.1s cubic-bezier(.34,1.56,.64,1)}
#dashContainer .prog-pct{font-family:var(--mono);font-size:10px;font-weight:600;white-space:nowrap}
/* ── FUNIL ── */
#dashContainer .funil-visual{display:flex;flex-direction:column;gap:7px}
#dashContainer .fv-row{display:flex;align-items:center;gap:10px}
#dashContainer .fv-name{width:130px;flex-shrink:0;font-size:10px;color:var(--dim2);font-family:var(--mono);letter-spacing:.04em}
#dashContainer .fv-bar-track{flex:1;height:7px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden}
#dashContainer .fv-bar-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.34,1.56,.64,1)}
#dashContainer .fv-val{width:24px;text-align:right;font-family:var(--mono);font-size:11px;font-weight:600}
#dashContainer .fv-heat-0{background:linear-gradient(90deg,#c8ff5e,#a0d400)}
#dashContainer .fv-heat-1{background:linear-gradient(90deg,#ffaa00,#e08800)}
#dashContainer .fv-heat-2{background:linear-gradient(90deg,#00d4ff,#0099bb)}
#dashContainer .fv-heat-3{background:linear-gradient(90deg,#a78bfa,#7c5ce8)}
/* ── RANKING HOJE ── */
#dashContainer .rank-list{display:flex;flex-direction:column;gap:6px}
#dashContainer .rank-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;background:var(--s2);border:1px solid transparent;transition:all .15s;cursor:default}
#dashContainer .rank-item:hover{border-color:var(--rim);transform:translateX(2px)}
#dashContainer .rank-item.r1{border-color:rgba(255,170,0,.2);background:rgba(255,170,0,.05)}
#dashContainer .ri-pos{font-family:var(--serif);font-size:20px;font-style:italic;width:24px;flex-shrink:0;text-align:center}
#dashContainer .ri-name{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#dashContainer .ri-bar-track{width:50px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
#dashContainer .ri-bar-fill{height:100%;border-radius:2px;background:var(--g1);transition:width 1s ease}
#dashContainer .ri-count{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--g1);width:20px;text-align:right}
/* ── AGENDA 2x2 ── */
#dashContainer .agenda-2x2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#dashContainer .ag-box{background:var(--s2);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:4px;border:1px solid var(--rim);transition:border-color .15s}
#dashContainer .ag-box:hover{border-color:var(--rim2)}
#dashContainer .ag-num{font-family:var(--serif);font-size:40px;line-height:1;font-style:italic}
#dashContainer .ag-lbl{font-size:9px;font-family:var(--mono);letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
/* ── VEROBHUB ── */
#dashContainer .vero-wrap{display:flex;gap:12px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--rim)}
#dashContainer .vero-legend{display:flex;flex-direction:column;gap:6px;flex:1}
#dashContainer .vero-lbl-head{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
#dashContainer .vero-row{display:flex;align-items:center;gap:7px;font-size:10px}
#dashContainer .vero-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0}
#dashContainer .vero-lbl{color:var(--dim2);flex:1;font-family:var(--mono);letter-spacing:.04em}
#dashContainer .vero-val{font-family:var(--mono);font-weight:700;font-size:11px}
/* ── META / TEND ── */
#dashContainer .meta-big{font-family:var(--serif);font-size:42px;font-style:italic;color:var(--em);line-height:1}
#dashContainer .meta-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--s2);border-radius:8px}
#dashContainer .meta-row-lbl{font-size:10px;color:var(--dim2);font-family:var(--mono);letter-spacing:.08em}
#dashContainer .meta-row-val{font-family:var(--mono);font-size:12px;font-weight:700}
#dashContainer .tend-head{display:flex;justify-content:space-between;margin-bottom:5px}
#dashContainer .tend-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim)}
#dashContainer .tend-val{font-family:var(--mono);font-size:12px;font-weight:600}
/* ── DONUT / CANAL ── */
#dashContainer .donut-wrap{display:flex;gap:14px;align-items:center;margin-top:4px}
#dashContainer .donut-legend{display:flex;flex-direction:column;gap:7px;flex:1}
#dashContainer .dl-row{display:flex;align-items:center;gap:7px;font-size:11px}
#dashContainer .dl-swatch{width:9px;height:9px;border-radius:3px;flex-shrink:0}
#dashContainer .dl-lbl{color:var(--dim2);flex:1;font-size:10px}
#dashContainer .dl-val{font-family:var(--mono);font-weight:600;font-size:11px}
#dashContainer .hl-big{font-family:var(--serif);font-style:italic;font-size:40px;line-height:1;color:var(--em);margin:6px 0 4px}
#dashContainer .hl-name{font-size:12px;font-weight:500;color:var(--txt);line-height:1.3;margin-bottom:4px}
#dashContainer .hl-track{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-top:8px}
#dashContainer .hl-fill{height:100%;border-radius:2px;transition:width 1s ease}
/* ── RANKING DU ── */
#dashContainer .rank-du-wrap{display:flex;flex-direction:column;gap:8px;padding:4px 0}
#dashContainer .rank-du-item{display:grid;grid-template-columns:36px 1fr 3fr 70px 72px;align-items:center;gap:12px;padding:10px 18px;background:var(--s2);border-radius:10px;border:1px solid var(--rim);transition:background .15s}
#dashContainer .rank-du-item:hover{background:var(--s3)}
#dashContainer .rfi-medal{font-size:20px;text-align:center}
#dashContainer .rfi-nome{font-size:13px;font-weight:600;color:var(--txt)}
#dashContainer .rdu-track{display:flex;height:8px;border-radius:3px;overflow:hidden;gap:1px;background:rgba(255,255,255,.03)}
#dashContainer .rfi-qtd{font-family:var(--mono);font-size:15px;font-weight:700;text-align:right;white-space:nowrap}
#dashContainer .rfi-delta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-family:var(--mono);font-size:12px;font-weight:600}
#dashContainer .rfi-delta-lbl{font-size:9px;color:var(--dim);letter-spacing:.1em;font-weight:400}
/* ── AGENTE IA KPI GRID ── */
#dashContainer .rn-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
/* ── WABA MONITOR ── */
#dashContainer .wb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
#dashContainer .wb-card{background:var(--s1);border:1px solid var(--rim);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden;animation:d-fadeUp .5s ease both}
#dashContainer .wb-card.green{border-color:rgba(200,255,94,.22);background:linear-gradient(135deg,var(--s1) 0%,rgba(200,255,94,.03) 100%)}
#dashContainer .wb-card.yellow{border-color:rgba(255,170,0,.22);background:linear-gradient(135deg,var(--s1) 0%,rgba(255,170,0,.03) 100%)}
#dashContainer .wb-card.red{border-color:rgba(255,69,112,.22);background:linear-gradient(135deg,var(--s1) 0%,rgba(255,69,112,.03) 100%)}
#dashContainer .wb-card.gray{border-color:var(--rim)}
#dashContainer .wb-value{font-family:var(--serif);font-size:34px;line-height:1;font-style:italic;color:var(--em)}
#dashContainer .wb-sub{font-size:12px;color:var(--dim2);margin-top:8px;line-height:1.45}
#dashContainer .wb-badge{display:inline-block;padding:4px 10px;border-radius:999px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
#dashContainer .wb-badge.green{background:rgba(200,255,94,.1);color:var(--g1);border:1px solid rgba(200,255,94,.22)}
#dashContainer .wb-badge.yellow{background:rgba(255,170,0,.1);color:var(--g4);border:1px solid rgba(255,170,0,.22)}
#dashContainer .wb-badge.red{background:rgba(255,69,112,.1);color:var(--g3);border:1px solid rgba(255,69,112,.22)}
#dashContainer .wb-badge.gray{background:rgba(255,255,255,.05);color:var(--dim2);border:1px solid var(--rim)}
#dashContainer .wb-table{width:100%;border-collapse:collapse}
#dashContainer .wb-table th{padding:10px 12px;border-bottom:1px solid var(--rim);text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
#dashContainer .wb-table td{padding:12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--txt);vertical-align:middle}
#dashContainer .wb-table tr:last-child td{border-bottom:none}
#dashContainer .wb-table small{color:var(--dim);font-family:var(--mono);font-size:10px}
#dashContainer .wb-chart-wrap{position:relative;height:220px}
#dashContainer .wb-chart{width:100%;height:100%;display:block}
#dashContainer .wb-chart-legend{display:flex;justify-content:space-between;gap:10px;margin-top:10px;font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dim)}
#dashContainer .wb-empty{color:var(--dim);font-family:var(--mono);font-size:10px;padding:18px 0;text-transform:uppercase;letter-spacing:.12em}
/* ── MEDIA ── */
@media(max-width:1100px){#dashContainer .grid-hoje{grid-template-columns:1fr 1fr}#dashContainer .grid-mes{grid-template-columns:1fr 1fr}#dashContainer .grid-canais{grid-template-columns:1fr 1fr}#dashContainer .grid-rank{grid-template-columns:1fr}#dashContainer .rn-kpi-grid,#dashContainer .wb-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){#dashContainer .grid-hoje,#dashContainer .grid-mes,#dashContainer .grid-canais,#dashContainer .grid-rank,#dashContainer .rn-kpi-grid,#dashContainer .wb-grid{grid-template-columns:1fr}#dashContainer .canvas{padding:14px 12px 32px}#dashContainer .du-bar-wrap{padding:6px 14px;gap:8px}}
</style>

<div class="glow-tl"></div>

      <span style="font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase">carregando...</span>
    </div>
  </div>

<!-- ── PAINEL WABA MONITOR ── -->
<div id="tab-waba" style="display:none">
  <div class="canvas" id="wb-root">
    <div style="display:flex;align-items:center;justify-content:center;height:55vh">

function cu(el,val){var s=0,dur=1000,tick=14,inc=val/(dur/tick);var t=setInterval(function(){s+=inc;if(s>=val){s=val;clearInterval(t);}el.textContent=n(s,0);},tick);}

function donut(id,data,colors){
  setTimeout(function(){
    var c=document.getElementById(id);if(!c)return;
    var ctx=c.getContext('2d'),W=c.width,H=c.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-3,ri=R*.58;

    var a=-Math.PI/2;

  },60);
}

async function sbFetch(resource,params){
  var qs=Object.keys(params||{}).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  var r=await fetch(SB_REST+'/'+resource+(qs?'?'+qs:''),{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok)throw new Error(resource+': HTTP '+r.status);
  return r.json();
}

function wbClassQuality(val){
  if(val==='GREEN')return 'green';
  if(val==='YELLOW')return 'yellow';
  if(val==='RED')return 'red';
  return 'gray';
}

function wbClassStatus(val){
  if(val==='CONNECTED')return 'green';
  if(val==='FLAGGED'||val==='RESTRICTED')return 'red';
  return 'gray';
}

function wbClassRisk(val){
  var n=parseFloat(val);
  if(isNaN(n))return 'gray';
  if(n<0.40)return 'green';
  if(n<0.70)return 'yellow';
  return 'red';
}

function wbFmtDate(iso){
  if(!iso)return '—';
  try{
    return new Date(iso).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',dateStyle:'short',timeStyle:'short'});
  }catch(err){
    return String(iso||'—');
  }
}

function wbStatusEmoji(status){
  var map={running:'>',paused:'||',draft:'[]',completed:'OK',blocked:'X'};
  return map[status]||'';
}

function wbResolveTier(health){
  var raw=health.current_tier||health.messaging_limit_tier||health.current_messaging_tier||health.messaging_tier||'';
  raw=String(raw||'').trim();
  if(!raw)return 'UNKNOWN';
  return raw
    .replace(/^TIER_/i,'TIER ')
    .replace(/_/g,' ')
    .toUpperCase();
}

  h+='<div class="card" style="margin-bottom:14px">';
  h+='<table class="wb-table"><thead><tr><th>Nome</th><th>Categoria</th><th>Qualidade</th><th>Status</th><th>Campanhas</th></tr></thead><tbody>';
  if(!templates.length){
    h+='<tr><td colspan="5" class="wb-empty">Nenhum template cadastrado</td></tr>';
  }else{
    templates.forEach(function(t){
      var q=String(t.quality||'UNKNOWN').toUpperCase();
      var cls=wbClassQuality(q);
      var statusTpl=t.is_paused?'<span class="wb-badge red">Pausado</span>':(t.is_paced?'<span class="wb-badge yellow">Cadenciado</span>':'<span class="wb-badge green">Ativo</span>');
      h+='<tr><td>'+e(t.meta_template_name||'—')+'</td><td>'+e(t.category||'—')+'</td><td><span class="wb-badge '+cls+'">'+e(q)+'</span></td><td>'+statusTpl+'</td><td>'+parseInt(t.active_campaigns||0,10)+'</td></tr>';
    });
  }
  h+='</tbody></table></div>';

  h+='<div class="section-row"><span>Campanhas</span></div>';
  h+='<div class="card">';
  h+='<table class="wb-table"><thead><tr><th>Nome</th><th>Status</th><th>Enviados</th><th>Entregues</th><th>Lidos</th><th>Falhas</th><th>Opt-outs</th><th>Risk</th></tr></thead><tbody>';
  if(!campaigns.length){
    h+='<tr><td colspan="8" class="wb-empty">Nenhuma campanha encontrada</td></tr>';
  }else{
    campaigns.forEach(function(c){
      var riskClass=wbClassRisk(c.risk_score);
      var riskText=(c.risk_score==null||c.risk_score==='')?'—':parseFloat(c.risk_score).toFixed(2);
      h+='<tr>';
      h+='<td>'+e(c.name||'—')+'</td>';
      h+='<td>'+e(wbStatusEmoji(c.status))+' '+e(String(c.status||'—').toUpperCase())+'</td>';
      h+='<td>'+parseInt(c.sent_count||0,10)+'</td>';
      h+='<td>'+parseInt(c.delivered_count||0,10)+' <small>('+(c.delivery_rate_pct!=null?e(c.delivery_rate_pct):0)+'%)</small></td>';
      h+='<td>'+parseInt(c.read_count||0,10)+' <small>('+(c.read_rate_pct!=null?e(c.read_rate_pct):0)+'%)</small></td>';
      h+='<td>'+parseInt(c.failed_count||0,10)+' <small>('+(c.fail_rate_pct!=null?e(c.fail_rate_pct):0)+'%)</small></td>';
      h+='<td>'+parseInt(c.optout_count||0,10)+' <small>('+(c.optout_rate_pct!=null?e(c.optout_rate_pct):0)+'%)</small></td>';
      h+='<td><span class="wb-badge '+riskClass+'">'+e(riskText)+'</span></td>';
      h+='</tr>';
    });
  }
  h+='</tbody></table></div>';

  root.innerHTML=h;
  wbDrawQualityChart(history||[]);
}

function wbDrawQualityChart(rows){
  var canvas=document.getElementById('wb-quality-chart');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height,pad={l:64,r:18,t:18,b:36};
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,.08)';
  ctx.lineWidth=1;
  var levels=[{y:3,label:'GREEN'},{y:2,label:'YELLOW'},{y:1,label:'RED'},{y:0,label:'—'}];
  function yPos(v){return pad.t+((3-v)/3)*(H-pad.t-pad.b);}
  levels.forEach(function(level){
    var y=yPos(level.y);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#8490b8';
    ctx.font='11px Martian Mono, monospace';
    ctx.fillText(level.label,8,y+4);
  });
  if(!rows.length){
    ctx.fillStyle='#5a6080';
    ctx.font='12px Martian Mono, monospace';
    ctx.fillText('Sem histórico recente',pad.l,Math.round(H/2));
    return;
  }
  var points=rows.map(function(r,idx){
    var score=String(r.quality_score||'UNKNOWN').toUpperCase();
    var value=score==='GREEN'?3:score==='YELLOW'?2:score==='RED'?1:0;
    var x=pad.l+(idx/Math.max(rows.length-1,1))*(W-pad.l-pad.r);
    return {x:x,y:yPos(value),label:wbFmtDate(r.created_at),score:score};
  });
  ctx.strokeStyle='#00d4ff';
  ctx.lineWidth=2;
  ctx.beginPath();
  points.forEach(function(p,i){ if(i===0)ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.stroke();
  points.forEach(function(p,i){
    ctx.fillStyle=p.score==='GREEN'?'#c8ff5e':p.score==='YELLOW'?'#ffaa00':p.score==='RED'?'#ff4570':'#8490b8';
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
    if(i===0||i===points.length-1||i===Math.floor(points.length/2)){
      ctx.fillStyle='#8490b8';
      ctx.font='10px Martian Mono, monospace';
      ctx.fillText(p.label,p.x-26,H-12);
    }
  });
}
