<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700&family=Martian+Mono:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ── BASE ──────────────────────────────────────────────────────────────────── */
#painelAdsContainer { all:initial; display:block; width:100%; min-height:100%; height:auto; overflow:visible; overflow-x:hidden; background:#08090e; color:#dde2f0; font-family:'DM Sans',sans-serif; position:relative; }
#painelAdsContainer *, #painelAdsContainer *::before, #painelAdsContainer *::after { box-sizing:border-box; margin:0; padding:0; }
#painelAdsContainer {
  --bg:#08090e; --s1:#0e1018; --s2:#131620; --s3:#191d2c;
  --rim:rgba(255,255,255,.06); --rim2:rgba(255,255,255,.12);
  --txt:#dde2f0; --dim:#5a6080; --dim2:#8490b8; --em:#f0f4ff;
  --g1:#c8ff5e; --g2:#00d4ff; --g3:#ff4570; --g4:#ffaa00; --g5:#a78bfa;
  --g6:#45e0a1; --g7:#ff8f45;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',sans-serif;
  --mono:'Martian Mono',monospace;
  --r:14px;
}

/* ── GLOW DE FUNDO ─────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-glow-tl { position:fixed; top:-200px; left:-200px; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,rgba(200,255,94,.04) 0%,transparent 65%); pointer-events:none; z-index:0; }
#painelAdsContainer .pa-glow-br { position:fixed; bottom:-300px; right:-200px; width:700px; height:700px; border-radius:50%; background:radial-gradient(circle,rgba(0,212,255,.03) 0%,transparent 65%); pointer-events:none; z-index:0; }

/* ── TOOLBAR ────────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-toolbar {
  position:sticky; top:0; z-index:100;
  min-height:52px; height:auto; padding:10px 18px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px 16px; flex-wrap:wrap;
  background:
    linear-gradient(90deg, rgba(167,139,250,.08) 0%, rgba(0,212,255,.05) 24%, rgba(8,9,14,.94) 56%, rgba(200,255,94,.05) 100%),
    rgba(8,9,14,.92);
  backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 10px 30px rgba(0,0,0,.22);
  flex-shrink:0;
}
#painelAdsContainer .pa-toolbar-left { display:flex; align-items:center; gap:10px 12px; flex-wrap:wrap; min-width:0; }
#painelAdsContainer .pa-toolbar-right { display:flex; align-items:center; justify-content:flex-end; gap:8px 10px; flex-wrap:wrap; flex:1 1 420px; min-width:280px; }
#painelAdsContainer .pa-brand { display:flex; align-items:flex-start; gap:9px; }
#painelAdsContainer .pa-brand .pa-pulse { margin-top:3px; }
#painelAdsContainer .pa-pulse { width:7px; height:7px; border-radius:50%; background:var(--g1); box-shadow:0 0 12px var(--g1); animation:pa-pulse 2.4s ease-in-out infinite; flex-shrink:0; }
@keyframes pa-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.85)} }
#painelAdsContainer .pa-brand-name { font-family:var(--mono); font-size:11px; font-weight:400; letter-spacing:.22em; color:var(--dim2); text-transform:uppercase; }
#painelAdsContainer .pa-brand-sub { font-family:var(--sans); font-size:10px; color:var(--dim); line-height:1.2; margin-top:2px; }

/* channel tabs */
#painelAdsContainer .pa-tabs { display:flex; align-items:center; gap:6px; margin-left:2px; flex-wrap:wrap; }
#painelAdsContainer .pa-tab {
  padding:6px 12px; border-radius:9px; font-family:var(--mono);
  font-size:10px; font-weight:600; letter-spacing:.08em;
  cursor:pointer; border:1px solid transparent; transition:all .15s;
  color:var(--dim2);
}
#painelAdsContainer .pa-tab:hover { background:var(--s2); color:var(--txt); }
#painelAdsContainer .pa-tab.ativo { background:rgba(200,255,94,.1); border-color:rgba(200,255,94,.25); color:var(--g1); }
#painelAdsContainer .pa-tab.inativo { opacity:.45; cursor:default; }
#painelAdsContainer .pa-tab .soon-badge { font-size:8px; background:rgba(255,170,0,.12); color:var(--g4); border:1px solid rgba(255,170,0,.2); padding:1px 5px; border-radius:4px; margin-left:5px; vertical-align:middle; }

/* period buttons */
#painelAdsContainer .pa-periodo { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
#painelAdsContainer .pa-per-btn {
  padding:5px 12px; border-radius:7px; font-family:var(--mono);
  font-size:10px; font-weight:600; letter-spacing:.06em;
  cursor:pointer; border:1px solid var(--rim);
  background:var(--s2); color:var(--dim2); transition:all .15s;
}
#painelAdsContainer .pa-per-btn:hover { background:var(--s3); color:var(--em); border-color:var(--rim2); }
#painelAdsContainer .pa-per-btn.ativo { background:rgba(0,212,255,.1); border-color:rgba(0,212,255,.3); color:var(--g2); }

/* refresh */
#painelAdsContainer .pa-refresh { padding:6px 16px; border-radius:10px; background:linear-gradient(135deg,rgba(200,255,94,.16) 0%,rgba(69,224,161,.14) 100%); border:1px solid rgba(200,255,94,.24); color:var(--g1); font-size:11px; font-weight:600; cursor:pointer; font-family:var(--sans); letter-spacing:.04em; transition:all .15s; flex-shrink:0; box-shadow:0 0 0 1px rgba(200,255,94,.06) inset; }
#painelAdsContainer .pa-refresh:hover { background:linear-gradient(135deg,rgba(200,255,94,.24) 0%,rgba(69,224,161,.2) 100%); border-color:rgba(200,255,94,.4); transform:translateY(-1px); }
#painelAdsContainer .pa-refresh:disabled { opacity:.4; cursor:default; }
#painelAdsContainer .pa-help-btn { padding:6px 14px; border-radius:10px; background:linear-gradient(135deg,rgba(167,139,250,.16) 0%,rgba(0,212,255,.1) 100%); border:1px solid rgba(167,139,250,.28); color:var(--g5); font-size:11px; font-weight:600; cursor:pointer; font-family:var(--sans); letter-spacing:.04em; transition:all .15s; flex-shrink:0; }
#painelAdsContainer .pa-help-btn:hover { background:linear-gradient(135deg,rgba(167,139,250,.24) 0%,rgba(0,212,255,.18) 100%); border-color:rgba(167,139,250,.4); transform:translateY(-1px); }
#painelAdsContainer .pa-sync { flex:0 1 auto; min-width:0; font-family:var(--mono); font-size:10px; color:rgba(221,226,240,.72); letter-spacing:.02em; white-space:nowrap; line-height:1.3; text-shadow:0 0 20px rgba(167,139,250,.15); padding:4px 0; }
@media(max-width:920px) {
  #painelAdsContainer .pa-toolbar-right { justify-content:flex-start; min-width:100%; }
  #painelAdsContainer .pa-sync { white-space:normal; }
}

/* ── CANVAS ─────────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-canvas { position:relative; z-index:1; padding:22px 26px 48px; }

/* section row */
#painelAdsContainer .pa-section { display:flex; align-items:center; gap:12px; margin:0 0 12px; }
#painelAdsContainer .pa-section span { font-family:var(--mono); font-size:9px; letter-spacing:.25em; text-transform:uppercase; color:var(--em); white-space:nowrap; padding:5px 9px; border-radius:999px; background:linear-gradient(90deg,rgba(167,139,250,.14) 0%,rgba(0,212,255,.08) 100%); border:1px solid rgba(255,255,255,.08); box-shadow:0 0 0 1px rgba(255,255,255,.02) inset; }
#painelAdsContainer .pa-section::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(167,139,250,.3) 0%,rgba(0,212,255,.16) 34%,transparent 100%); }

/* ── KPI GRID ───────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:12px; }
@media(max-width:1100px) { #painelAdsContainer .pa-kpi-grid { grid-template-columns:repeat(4,1fr); } }

/* ── CAMPAIGN GRID ──────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-camp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px; }

/* ── BOTTOM GRID ────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* ── CARDS ──────────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-card {
  background:var(--s1); border:1px solid var(--rim); border-radius:var(--r);
  padding:18px 20px; position:relative; overflow:hidden;
  animation:pa-fadeUp .4s ease both;
  box-shadow:0 14px 34px rgba(0,0,0,.18);
}
#painelAdsContainer .pa-card::before {
  content:''; position:absolute; inset:-30% auto auto -20%;
  width:180px; height:180px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 68%);
  pointer-events:none; opacity:.65;
}
#painelAdsContainer .pa-card::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 18%,transparent 100%);
}
#painelAdsContainer .pa-card:hover { border-color:var(--rim2); transition:border-color .2s, transform .2s, box-shadow .2s; transform:translateY(-2px); box-shadow:0 18px 38px rgba(0,0,0,.24); }
@keyframes pa-fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
#painelAdsContainer .pa-card.c-lime  { border-color:rgba(200,255,94,.3);  background:linear-gradient(135deg,rgba(200,255,94,.12) 0%,var(--s1) 28%,rgba(69,224,161,.08) 100%); box-shadow:0 14px 34px rgba(79,113,24,.16); }
#painelAdsContainer .pa-card.c-cyan  { border-color:rgba(0,212,255,.3);   background:linear-gradient(135deg,rgba(0,212,255,.14) 0%,var(--s1) 30%,rgba(167,139,250,.06) 100%); box-shadow:0 14px 34px rgba(0,119,150,.16); }
#painelAdsContainer .pa-card.c-amber { border-color:rgba(255,170,0,.3);   background:linear-gradient(135deg,rgba(255,170,0,.14) 0%,var(--s1) 28%,rgba(255,143,69,.08) 100%); box-shadow:0 14px 34px rgba(144,88,0,.16); }
#painelAdsContainer .pa-card.c-red   { border-color:rgba(255,69,112,.3);  background:linear-gradient(135deg,rgba(255,69,112,.14) 0%,var(--s1) 30%,rgba(167,139,250,.05) 100%); box-shadow:0 14px 34px rgba(130,30,55,.18); }
#painelAdsContainer .pa-card.c-purple{ border-color:rgba(167,139,250,.32); background:linear-gradient(135deg,rgba(167,139,250,.16) 0%,var(--s1) 28%,rgba(0,212,255,.06) 100%); box-shadow:0 14px 34px rgba(81,61,140,.18); }
#painelAdsContainer .pa-card.c-dim   { border-color:var(--rim); background:var(--s1); box-shadow:none; opacity:.62; }
#painelAdsContainer .pa-pausadas { margin-top:6px; }
#painelAdsContainer .pa-pausadas > summary { cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:var(--dim2); padding:8px 0; user-select:none; }
#painelAdsContainer .pa-pausadas > summary:hover { color:var(--g2); }

/* card head */
#painelAdsContainer .pa-card-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
#painelAdsContainer .pa-card-title { font-family:var(--mono); font-size:9px; font-weight:400; letter-spacing:.22em; text-transform:uppercase; color:rgba(221,226,240,.64); }

/* badge */
#painelAdsContainer .pa-badge { font-family:var(--mono); font-size:9px; font-weight:600; padding:4px 9px; border-radius:999px; box-shadow:0 0 0 1px rgba(255,255,255,.03) inset; }
#painelAdsContainer .pa-badge.lime   { background:linear-gradient(90deg,rgba(200,255,94,.22) 0%,rgba(69,224,161,.14) 100%);  color:var(--g1); border:1px solid rgba(200,255,94,.28); }
#painelAdsContainer .pa-badge.cyan   { background:linear-gradient(90deg,rgba(0,212,255,.22) 0%,rgba(167,139,250,.12) 100%);   color:var(--g2); border:1px solid rgba(0,212,255,.24); }
#painelAdsContainer .pa-badge.amber  { background:linear-gradient(90deg,rgba(255,170,0,.22) 0%,rgba(255,143,69,.16) 100%);   color:var(--g4); border:1px solid rgba(255,170,0,.24); }
#painelAdsContainer .pa-badge.red    { background:linear-gradient(90deg,rgba(255,69,112,.22) 0%,rgba(167,139,250,.12) 100%);  color:var(--g3); border:1px solid rgba(255,69,112,.24); }
#painelAdsContainer .pa-badge.purple { background:linear-gradient(90deg,rgba(167,139,250,.22) 0%,rgba(0,212,255,.12) 100%); color:var(--g5); border:1px solid rgba(167,139,250,.24); }
#painelAdsContainer .pa-badge.dim    { background:rgba(255,255,255,.07);color:var(--dim2);border:1px solid var(--rim); }

/* ── KPI NUMEROS ────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-kpi      { font-family:var(--serif); font-size:48px; line-height:1; font-style:italic; letter-spacing:-.02em; }
#painelAdsContainer .pa-kpi.md   { font-size:34px; }
#painelAdsContainer .pa-kpi.sm   { font-size:26px; }
#painelAdsContainer .pa-kpi-sub  { font-size:11px; color:var(--dim2); margin-top:5px; }
#painelAdsContainer .pa-kpi-sub b{ color:var(--txt); font-size:12px; }
#painelAdsContainer .pa-kpi-benchmark { font-size:10px; color:var(--dim); margin-top:6px; padding-top:6px; border-top:1px solid var(--rim); font-family:var(--mono); letter-spacing:.04em; }
#painelAdsContainer .pa-kpi-benchmark b { font-weight:600; }

/* ── CAMP CARD CONTENT ──────────────────────────────────────────────────────── */
#painelAdsContainer .pa-camp-name { font-size:13px; font-weight:700; color:var(--em); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#painelAdsContainer .pa-camp-budget { font-size:11px; color:var(--dim2); margin-bottom:14px; font-family:var(--mono); }

#painelAdsContainer .pa-mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
#painelAdsContainer .pa-mini-stat { background:linear-gradient(180deg,rgba(255,255,255,.035) 0%,rgba(255,255,255,.015) 100%); border:1px solid rgba(255,255,255,.04); border-radius:11px; padding:8px 10px; box-shadow:0 0 0 1px rgba(255,255,255,.015) inset; }
#painelAdsContainer .pa-mini-lbl  { font-family:var(--mono); font-size:8px; letter-spacing:.18em; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
#painelAdsContainer .pa-mini-val  { font-family:var(--serif); font-size:22px; font-style:italic; line-height:1; }
#painelAdsContainer .pa-mini-val.ok    { color:var(--g1); }
#painelAdsContainer .pa-mini-val.aviso { color:var(--g4); }
#painelAdsContainer .pa-mini-val.erro  { color:var(--g3); }
#painelAdsContainer .pa-mini-val.dim   { color:var(--dim2); }

/* camp bar */
#painelAdsContainer .pa-camp-bar-row { display:flex; align-items:center; gap:8px; }
#painelAdsContainer .pa-camp-bar-track { flex:1; height:6px; background:rgba(255,255,255,.06); border-radius:999px; overflow:hidden; box-shadow:0 0 0 1px rgba(255,255,255,.02) inset; }
#painelAdsContainer .pa-camp-bar-fill  { height:100%; border-radius:2px; transition:width 1.1s cubic-bezier(.34,1.56,.64,1); }
#painelAdsContainer .pa-camp-bar-pct   { font-family:var(--mono); font-size:10px; font-weight:600; white-space:nowrap; color:var(--dim2); }

/* ── FUNIL ──────────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-funil-rows { display:flex; flex-direction:column; gap:10px; }
#painelAdsContainer .pa-fv-row     { display:flex; align-items:center; gap:10px; }
#painelAdsContainer .pa-fv-name    { width:110px; flex-shrink:0; font-size:10px; color:var(--dim2); font-family:var(--mono); letter-spacing:.04em; }
#painelAdsContainer .pa-fv-track   { flex:1; height:8px; background:rgba(255,255,255,.04); border-radius:4px; overflow:hidden; }
#painelAdsContainer .pa-fv-fill    { height:100%; border-radius:4px; transition:width 1.2s cubic-bezier(.34,1.56,.64,1); }
#painelAdsContainer .pa-fv-val     { width:54px; text-align:right; font-family:var(--mono); font-size:12px; font-weight:600; }
#painelAdsContainer .pa-fv-rate    { width:36px; text-align:right; font-family:var(--mono); font-size:9px; color:var(--dim); }
#painelAdsContainer .pa-fv-impr  { background:linear-gradient(90deg,#c8ff5e,#a0d400); }
#painelAdsContainer .pa-fv-click { background:linear-gradient(90deg,#ffaa00,#e08800); }
#painelAdsContainer .pa-fv-lead  { background:linear-gradient(90deg,#00d4ff,#0099bb); }
#painelAdsContainer .pa-fv-venda { background:linear-gradient(90deg,#a78bfa,#7c5ce8); }

/* ── ALERTAS ────────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-alert-list { display:flex; flex-direction:column; gap:7px; }
#painelAdsContainer .pa-alert-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 14px; border-radius:10px;
  font-size:12px; font-family:var(--mono); letter-spacing:.03em; line-height:1.4;
}
#painelAdsContainer .pa-alert-item.erro  { background:linear-gradient(90deg,rgba(255,69,112,.14) 0%,rgba(255,69,112,.05) 100%);  border:1px solid rgba(255,69,112,.22);  color:#ff9caf; }
#painelAdsContainer .pa-alert-item.aviso { background:linear-gradient(90deg,rgba(255,170,0,.14) 0%,rgba(255,143,69,.06) 100%);   border:1px solid rgba(255,170,0,.22);   color:#ffbf59; }
#painelAdsContainer .pa-alert-item.ok    { background:linear-gradient(90deg,rgba(200,255,94,.12) 0%,rgba(69,224,161,.06) 100%);  border:1px solid rgba(200,255,94,.18);  color:#c8ff5e; }
#painelAdsContainer .pa-alert-icon { font-size:14px; flex-shrink:0; margin-top:1px; }

/* ── GOOGLE ADS PLACEHOLDER ──────────────────────────────────────────────────── */
#painelAdsContainer .pa-gads-placeholder {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; padding:40px 20px; text-align:center; min-height:160px;
  border:1px dashed rgba(255,255,255,.1); border-radius:var(--r);
  background:rgba(255,255,255,.015);
}
#painelAdsContainer .pa-gads-icon  { font-size:32px; opacity:.3; }
#painelAdsContainer .pa-gads-title { font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--dim2); }
#painelAdsContainer .pa-gads-sub   { font-size:12px; color:var(--dim); line-height:1.5; max-width:220px; }

/* ── LOADING SKELETON ────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-skel {
  border-radius:8px;
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:200% 100%;
  animation:pa-shimmer 1.6s infinite;
}
@keyframes pa-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
#painelAdsContainer .pa-loading-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:12px; }
#painelAdsContainer .pa-loading-grid .pa-skel { height:116px; border-radius:var(--r); }
#painelAdsContainer .pa-loading-camps { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px; }
#painelAdsContainer .pa-loading-camps .pa-skel { height:180px; border-radius:var(--r); }
#painelAdsContainer .pa-loading-bottom { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
#painelAdsContainer .pa-loading-bottom .pa-skel { height:200px; border-radius:var(--r); }

/* ── ZERO STATE ──────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-empty {
  text-align:center; padding:60px 20px; color:var(--dim2);
  font-family:var(--mono); font-size:12px; letter-spacing:.1em;
}
#painelAdsContainer .pa-empty-ico { font-size:36px; margin-bottom:12px; opacity:.4; }

/* ── ERRO ────────────────────────────────────────────────────────────────────── */
#painelAdsContainer .pa-erro { padding:40px 28px; }
#painelAdsContainer .pa-erro-box { background:rgba(255,69,112,.06); border:1px solid rgba(255,69,112,.2); border-radius:var(--r); padding:20px 24px; color:var(--g3); font-family:var(--mono); font-size:12px; line-height:1.7; }
#painelAdsContainer .pa-erro-box strong { display:block; font-size:13px; margin-bottom:6px; }

/* modal ajuda */
#painelAdsContainer .pa-modal-backdrop { position:fixed; inset:0; background:rgba(4,6,12,.78); backdrop-filter:blur(6px); z-index:999; display:none; align-items:center; justify-content:center; padding:24px; }
#painelAdsContainer .pa-modal-backdrop.aberto { display:flex; }
#painelAdsContainer .pa-modal { width:min(920px,100%); max-height:85vh; overflow:auto; background:linear-gradient(180deg,rgba(167,139,250,.08) 0%,var(--s1) 18%,var(--bg) 100%); border:1px solid var(--rim2); border-radius:18px; box-shadow:0 20px 70px rgba(0,0,0,.45); padding:22px 22px 18px; }
#painelAdsContainer .pa-modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:14px; }
#painelAdsContainer .pa-modal-title { font-family:var(--serif); font-size:34px; line-height:1; font-style:italic; color:var(--em); }
#painelAdsContainer .pa-modal-close { border:1px solid var(--rim); background:var(--s2); color:var(--txt); border-radius:10px; font-family:var(--mono); font-size:10px; padding:8px 10px; cursor:pointer; }
#painelAdsContainer .pa-modal-close:hover { border-color:var(--rim2); background:var(--s3); }

<script>
(function() {
  'use strict';

  var paAtualPeriodo = '7d';
  var paCache = {};
  var paCarregando = false;
  var paLastFetched = {};

  // ── INICIALIZAÇÃO ───────────────────────────────────────────────────────────
  window.paInit = function() {
    paCarregar('7d');
  };

  // ── Feedback do operador (anotação pro Claude) ─────────────────────────
  window.paAbrirFeedback = function() {
    var m = document.getElementById('paFbModal');
    if (!m) return;
    m.style.display = 'flex';
    document.getElementById('paFbObs').value = '';
    document.getElementById('paFbStatus').textContent = '';
    document.getElementById('paFbSalvar').disabled = false;
    // Lista os últimos 5 feedbacks
    var rec = document.getElementById('paFbRecentes');
    rec.innerHTML = '<div style="opacity:.6">Carregando últimas anotações…</div>';
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(resp) {
          if (!resp || !resp.ok || !resp.feedbacks || resp.feedbacks.length === 0) {
            rec.innerHTML = '<div style="opacity:.6">Nenhuma anotação anterior.</div>';
            return;
          }
          var h = '<div style="font-weight:600;margin-bottom:6px;color:#cdd5e0">Últimas anotações:</div>';
          resp.feedbacks.forEach(function(f) {
            h += '<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:11px;line-height:1.5;">' +
                 '<span style="color:#6b7280;font-family:monospace;font-size:10px">' + (f.timestamp_br || '') + '</span> · ' +
                 '<span style="color:#e8ecf3">' + (f.observacao || '').replace(/</g,'&lt;').slice(0, 200) + '</span>' +
                 '</div>';
          });
          rec.innerHTML = h;
        })
        .withFailureHandler(function() {
          rec.innerHTML = '<div style="color:#ff6b6b">Erro ao carregar histórico.</div>';
        })
        .listarFeedbacksPainelAds(5);
    }
    setTimeout(function() { document.getElementById('paFbObs').focus(); }, 80);
  };

  window.paFecharFeedback = function() {
    var m = document.getElementById('paFbModal');
    if (m) m.style.display = 'none';
  };

  window.paSalvarFeedback = function() {
    var obs = (document.getElementById('paFbObs').value || '').trim();
    var status = document.getElementById('paFbStatus');
    var btn = document.getElementById('paFbSalvar');
    if (!obs) { status.textContent = 'Digite a observação primeiro.'; status.style.color = '#ff6b6b'; return; }
    btn.disabled = true;
    status.style.color = '#9aa3b2';
    status.textContent = 'Salvando…';
    // Snapshot do contexto atual (último cache renderizado)
    var ctx = {};
    try {
      var d = paCache[paAtualPeriodo];
      if (d) {
        ctx = {
          periodo:    d.periodo,
          resumo:     d.resumo,
          financeiro: d.financeiro,
          alertas:    (d.alertas || []).map(function(a){ return a.texto; }).slice(0, 10),
          contas:     d.contas
        };
      }
    } catch (eCtx) { ctx = { erro_snapshot: String(eCtx) }; }
    var usuario = (window.AppState && AppState.get && AppState.get('usuario')) || 'anônimo';
    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp && resp.ok) {
          status.style.color = '#94d82d';
          status.textContent = '✓ Salvo. O Claude lerá na próxima sessão.';
          setTimeout(window.paFecharFeedback, 1500);
        } else {
          status.style.color = '#ff6b6b';
          status.textContent = 'Erro: ' + ((resp && resp.erro) || 'desconhecido');
          btn.disabled = false;
        }
      })
      .withFailureHandler(function(e) {
        status.style.color = '#ff6b6b';

  // ── CARREGAR DADOS ─────────────────────────────────────────────────────────
  window.paCarregar = function(periodo, forcar) {
    if (paCarregando) return;
    periodo = periodo || '7d';
    paAtualPeriodo = periodo;
    _paAtivarPeriodo(periodo);

    if (!forcar && paCache[periodo]) {
      try { _paRenderizar(paCache[periodo]); } catch(ex) { _paRenderizarErro('Erro ao renderizar cache: ' + ex.message); }
      return;
    }

    paCarregando = true;
    var btn = document.getElementById('paBtnRefresh');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Carregando...'; }
    var elLoad = document.getElementById('paLoading');
    var elCont = document.getElementById('paConteudo');
    if (elLoad) elLoad.style.display = 'block';
    if (elCont) elCont.style.display = 'none';

    // Timeout de segurança: se o backend não responder em 35s, mostra erro
    var _paTimerGuard = setTimeout(function() {
      if (!paCarregando) return;
      paCarregando = false;
      if (btn) { btn.disabled = false; btn.textContent = '↻ Atualizar'; }
      _paRenderizarErro('Tempo limite excedido (35s). Verifique META_ACCESS_TOKEN ou Claude Ads Bridge nas Propriedades do Script GAS.');
    }, 35000);

    google.script.run
      .withSuccessHandler(function(dados) {
        clearTimeout(_paTimerGuard);
        paCarregando = false;
        if (btn) { btn.disabled = false; btn.textContent = '↻ Atualizar'; }
        try {
          if (!dados) { _paRenderizarErro('Resposta vazia do servidor. Verifique os logs do Apps Script.'); return; }
          if (dados.erro) { _paRenderizarErro(dados.erro); return; }
          window.paDadosAtual = dados;
          paCache[periodo] = dados;
          paLastFetched[periodo] = Date.now();
          _paRenderizar(dados);
        } catch(ex) {
          _paRenderizarErro('Erro ao processar resposta: ' + ex.message);
        }
      })
      .withFailureHandler(function(e) {
        clearTimeout(_paTimerGuard);
        paCarregando = false;
        if (btn) { btn.disabled = false; btn.textContent = '↻ Atualizar'; }
        _paRenderizarErro('Falha de comunicação com o servidor: ' + (e && e.message ? e.message : String(e)));
      })
      .getPainelAdsData(periodo);
  };

  window.paRegistrarDecisaoAcao = function(actionId, status) {
    var cockpit = window.paDadosAtual && window.paDadosAtual.cockpit ? window.paDadosAtual.cockpit : null;
    var queue = cockpit && cockpit.automacao && cockpit.automacao.fila_prioritaria ? cockpit.automacao.fila_prioritaria : [];
    var target = null;
    for (var i = 0; i < queue.length; i++) {
      if (queue[i] && queue[i].action_id === actionId) {
        target = queue[i];
        break;
      }
    }

    if (!target) {
      if (typeof mostrarToast === 'function') mostrarToast('Acao nao encontrada na fila atual.', 'error');
      return;
    }

    var actor = '';
    try { actor = sessionStorage.getItem('crm_usuario') || sessionStorage.getItem('crm_nome') || ''; } catch (e) { actor = ''; }

    google.script.run
      .withSuccessHandler(function() {
        if (typeof mostrarToast === 'function') {
          mostrarToast(status === 'approved' ? 'Acao aprovada com sucesso.' : 'Acao rejeitada com sucesso.', 'success');
        }
        paCarregar(paAtualPeriodo, true);
      })
      .withFailureHandler(function(error) {
        if (typeof mostrarToast === 'function') {
          mostrarToast('Falha ao registrar decisao: ' + (error && error.message ? error.message : error), 'error');
        }
      })
      .registrarClaudeAdsActionDecision(actor, {
        action_id: target.action_id,
        status: status,
        action_type: target.action_type || '',
        campaign_key: target.campaign_key || '',
        meta_campaign_id: target.meta_campaign_id || '',
        meta_adset_id: target.meta_adset_id || ''
      });
  };

  // ── EXECUTAR APROVADAS ──────────────────────────────────────────────────────
  window.paExecutarAprovadas = function() {
    var btn = document.getElementById('paBtnExecutar');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Executando...'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; }
        var n = res && res.executadas != null ? res.executadas : 0;
        var erros = res && res.erros ? res.erros : [];
        if (erros.length > 0) {
          var msgs = erros.map(function(e) { return e.action_id + ': ' + e.erro; }).join('\n');
          if (typeof mostrarToast === 'function') {
            mostrarToast(n + ' executada(s). ' + erros.length + ' erro(s) — veja a fila.', 'error');
          } else {
            alert(n + ' executada(s).\nErros:\n' + msgs);
          }
        } else {
          if (typeof mostrarToast === 'function') {
            mostrarToast(n + ' acao(oes) executada(s) com sucesso.', 'success');
          }
        }
        paCarregar(paAtualPeriodo, true);
      })
      .withFailureHandler(function(e) {
        if (btn) { btn.disabled = false; btn.textContent = '▶ Executar Aprovadas'; }
        if (typeof mostrarToast === 'function') {
          mostrarToast('Falha ao executar: ' + (e && e.message ? e.message : e), 'error');
        } else {
          alert('Erro: ' + (e && e.message ? e.message : e));
        }
      })
      .executarAcoesAprovadas();
  };

  function _paStatusLabel(c) {
    var mapa = { ok:'OK', aviso:'ATENÇÃO', erro:'ALERTA', lime:'OK', amber:'ATENÇÃO', red:'ALERTA', cyan:'—', purple:'—', dim:'—' };
    return mapa[c] || c;

  function _paCampCard(camp, maxGasto) {

    var pausada = camp.status === 'pausada';
    var statusClasse = pausada ? 'dim' : camp.status === 'erro' ? 'red' : camp.status === 'aviso' ? 'amber' : 'lime';
    var statusLabel  = pausada ? 'PAUSADA' : camp.status === 'erro' ? 'Alerta' : camp.status === 'aviso' ? 'Atenção' : 'Normal';
    var cplClasse = !camp.cpl ? 'dim' : (camp.cpl <= 15 ? 'ok' : camp.cpl <= 30 ? 'aviso' : 'erro');
    var ctrClasse = !camp.ctr ? 'dim' : (camp.ctr >= 1.5 ? 'ok' : camp.ctr >= 0.5 ? 'aviso' : 'erro');
    var cardTone = pausada ? 'c-dim' : camp.status === 'erro' ? 'c-red' : camp.status === 'aviso' ? 'c-amber' : 'c-cyan';

    var html = '<div class="pa-card ' + cardTone + '">';
    html += '<div class="pa-card-head"><span class="pa-badge ' + statusClasse + '">' + statusLabel + '</span><span class="pa-badge dim">◈ ' + _paEsc(camp.conta || 'Meta') + '</span></div>';
    html += '<div class="pa-camp-name">' + _paEsc(camp.nome) + '</div>';
    html += '<div class="pa-camp-budget">' + _paMoeda(camp.gasto) + ' gasto</div>';

    html += '<div class="pa-mini-grid">';
    html += '<div class="pa-mini-stat"><div class="pa-mini-lbl">Leads</div><div class="pa-mini-val lime">' + (camp.leads || 0) + '</div></div>';
    html += '<div class="pa-mini-stat"><div class="pa-mini-lbl">CPL</div><div class="pa-mini-val ' + cplClasse + '">' + cplStr + '</div></div>';
    html += '<div class="pa-mini-stat"><div class="pa-mini-lbl">CTR</div><div class="pa-mini-val ' + ctrClasse + '">' + ctrStr + '</div></div>';
    html += '<div class="pa-mini-stat"><div class="pa-mini-lbl">Frequência</div><div class="pa-mini-val ' + (parseFloat(camp.frequencia)>4?'erro':parseFloat(camp.frequencia)>3?'aviso':'dim') + '">' + freqStr + '</div></div>';
    html += '</div>';

    html += '<div class="pa-camp-bar-row">';
    html += '<div class="pa-camp-bar-track"><div class="pa-camp-bar-fill" data-fill="' + pct + '" style="background:var(--g2);width:0%"></div></div>';
    html += '<span class="pa-camp-bar-pct">' + pct + '%</span>';
    html += '</div>';
    var interp = camp.leads && camp.cpl
      ? 'Cada lead custou R$' + parseFloat(camp.cpl).toFixed(2) + '. ' + (camp.leads || 0) + ' pessoa' + ((camp.leads || 0) !== 1 ? 's' : '') + ' entraram em contato neste período.'
      : 'Sem dados de leads neste período — campanha pode estar pausada.';
    html += '<div style="font-size:11px;color:var(--dim2);margin-top:10px;line-height:1.4;border-top:1px solid var(--rim);padding-top:8px;">' + interp + '</div>';
    html += '</div>';
    return html;
  }

  function _paFunilRow(nome, val, max, cls, valStr, taxa) {
    var pct = max > 0 ? Math.round((val / max) * 100) : 0;
    return '<div class="pa-fv-row">' +
      '<span class="pa-fv-name">' + nome + '</span>' +
      '<div class="pa-fv-track"><div class="pa-fv-fill ' + cls + '" data-fill="' + pct + '" style="width:0%"></div></div>' +
      '<span class="pa-fv-val">' + valStr + '</span>' +
      '<span class="pa-fv-rate">' + taxa + '</span>' +
    '</div>';
  }

  function _paThreshRow(label, valor, acao) {
    return '<div style="background:var(--s2);border-radius:8px;padding:7px 10px;">' +
      '<div style="font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;">' + label + '</div>' +
      '<div style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--dim2);">' + valor + '</div>' +
      '<div style="font-size:10px;color:var(--dim);margin-top:2px;">' + acao + '</div>' +
    '</div>';
  }

  // ── WORKFLOW BAR ──────────────────────────────────────────────────────────────
  function _paWorkflowBar(pendentesDecisao, pendentesExecucao, executadas) {
    var steps = [
      { num: '①', label: 'Diagnosticar',
        cls: 'done',
        status: '✅ IA analisou' },
      { num: '②', label: 'Decidir',
        cls: pendentesDecisao > 0 ? 'warn' : 'done',
        status: pendentesDecisao > 0 ? ('⚠ ' + pendentesDecisao + ' pendente' + (pendentesDecisao > 1 ? 's' : '')) : '✅ concluído' },
      { num: '③', label: 'Executar',
        cls: pendentesExecucao > 0 ? 'ready' : executadas > 0 ? 'done' : 'locked',
        status: pendentesExecucao > 0 ? ('🚀 ' + pendentesExecucao + ' pronta' + (pendentesExecucao > 1 ? 's' : '')) : executadas > 0 ? '✅ concluído' : '🔒 aguardando' }
    ];
    var html = '<div class="pa-workflow-bar"><div class="pa-workflow-steps">';
    for (var i = 0; i < steps.length; i++) {
      var s = steps[i];
      html += '<div class="pa-workflow-step ' + s.cls + '">';
      html += '<div class="pa-workflow-step-num">' + s.num + ' ' + _paEsc(s.label) + '</div>';
      html += '<div class="pa-workflow-step-status">' + _paEsc(s.status) + '</div>';
      html += '</div>';
      if (i < steps.length - 1) {
        html += '<div class="pa-workflow-connector' + (s.cls === 'done' ? ' done' : '') + '"></div>';
      }
    }
    html += '</div></div>';
    return html;
  }

  // ── CALLOUT ───────────────────────────────────────────────────────────────────
  function _paCallout(type, icon, title, sub) {
    return '<div class="pa-callout ' + type + '">' +
      '<div class="pa-callout-icon">' + icon + '</div>' +
      '<div><div class="pa-callout-title">' + _paEsc(title) + '</div>' +
      (sub ? '<div class="pa-callout-sub">' + _paEsc(sub) + '</div>' : '') +
      '</div></div>';
  }

  // ── DECISION CARD ─────────────────────────────────────────────────────────────
  function _paDecisionCard(item) {
    var actionType = item && item.action_type ? item.action_type : 'acao';
    var campaign   = item && item.campaign_key ? item.campaign_key : 'sem campanha';
    var rationale  = item && item.rationale    ? item.rationale    : 'Sem racional.';
    var humanCheck = item && item.human_check  ? item.human_check  : '';
    var actionId   = item && item.action_id    ? item.action_id    : '';
    var approval   = item && item.approval_state ? item.approval_state : { status: 'pending' };
    var approvalStatus   = approval.status          || 'pending';
    var executedAt       = approval.executed_at     || '';
    var revertedAt       = approval.reverted_at     || '';
    var executionResult  = approval.execution_result || '';
    var execErro = executionResult.indexOf('erro:') === 0;
    var canRevert = executedAt && !revertedAt && !execErro &&
                    (actionType === 'pause_campaign' || actionType === 'pause' ||
                     actionType === 'scale_budget_guardrailed' || actionType === 'scale');

    var actionLabel = actionType === 'pause_campaign'            ? 'Pausar campanha' :
                      actionType === 'scale_budget_guardrailed'  ? 'Escalar budget (+20%)' : actionType;
    var approveConsequence = actionType === 'pause_campaign'           ? 'campanha será pausada no Meta Ads' :
                             actionType === 'scale_budget_guardrailed' ? 'budget sobe +20% via API' :
                             'ação será executada';

    var html = '<div class="pa-decision-card ' + approvalStatus + '">';
    html += '<div class="pa-decision-header">';
    html += '<div><div class="pa-decision-title">' + _paEsc(campaign) + '</div>';
    html += '<div class="pa-decision-type">' + _paEsc(actionLabel) + '</div></div>';
    html += '<span class="pa-badge ' + _paApprovalStatusBadge(approvalStatus) + '">' + _paEsc(_paApprovalStatusLabel(approvalStatus)) + '</span>';
    html += '</div>';
    html += '<div class="pa-decision-rationale">' + _paEsc(rationale) + '</div>';
    if (humanCheck) {
      html += '<div class="pa-decision-check">⚠️ Verifique antes de decidir: ' + _paEsc(humanCheck) + '</div>';
    }
    if (approvalStatus === 'pending') {
      var oQueAprova = (actionType === 'pause_campaign' || actionType === 'pause')
        ? 'O anúncio para de veicular agora. O gasto para imediatamente. Você pode reativar quando quiser.'
        : (actionType === 'scale_budget_guardrailed' || actionType === 'scale')
        ? 'O orçamento diário sobe +20% automaticamente via API da Meta.'
        : 'A ação será aplicada na sua conta do Meta Ads.';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">';
      html += '<div style="background:rgba(200,255,94,.06);border:1px solid rgba(200,255,94,.15);border-radius:8px;padding:10px 12px;">';
      html += '<div style="font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--g1);margin-bottom:5px;">Se aprovar:</div>';
      html += '<div style="font-size:11px;color:var(--txt);line-height:1.5;">' + oQueAprova + '</div>';
      html += '</div>';
      html += '<div style="background:rgba(255,255,255,.03);border:1px solid var(--rim);border-radius:8px;padding:10px 12px;">';
      html += '<div style="font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim2);margin-bottom:5px;">Se rejeitar:</div>';
      html += '<div style="font-size:11px;color:var(--txt);line-height:1.5;">Nada muda. A campanha continua exatamente como está.</div>';
      html += '</div>';
      html += '</div>';
      html += '<div class="pa-decision-actions">';
      html += '<button class="pa-btn-approve" onclick="paRegistrarDecisaoAcao(\'' + _paEsc(actionId) + '\',\'approved\')">✅ Aprovar</button>';
      html += '<button class="pa-btn-reject"  onclick="paRegistrarDecisaoAcao(\'' + _paEsc(actionId) + '\',\'rejected\')">🚫 Rejeitar</button>';
      html += '</div>';
    } else {
      html += '<div class="pa-decision-decided">';
      html += '<span class="pa-badge ' + _paApprovalStatusBadge(approvalStatus) + '">' + _paEsc(_paApprovalStatusLabel(approvalStatus)) + '</span>';
      if (approval.decided_by) html += '<span style="font-size:11px;color:var(--dim2);">por ' + _paEsc(approval.decided_by) + '</span>';
      if (approval.decided_at) html += '<span style="font-size:11px;color:var(--dim);">em ' + _paEsc(new Date(approval.decided_at).toLocaleString('pt-BR')) + '</span>';
      html += '</div>';
      if (executedAt) {
        html += '<div class="pa-decision-executed">';
        if (revertedAt) {
          html += '<span class="pa-badge dim">↩ Revertido em ' + _paEsc(new Date(revertedAt).toLocaleString('pt-BR')) + '</span>';
        } else if (execErro) {
          html += '<span class="pa-badge red">❌ Erro: ' + _paEsc(executionResult.replace('erro: ', '')) + '</span>';
        } else {
          html += '<span class="pa-badge lime">🚀 Executado em ' + _paEsc(new Date(executedAt).toLocaleString('pt-BR')) + '</span>';
          if (canRevert) {
            html += '<button class="pa-btn-reject pa-btn-sm" onclick="paReverterAcao(\'' + _paEsc(actionId) + '\')">↩ Reverter</button>';
          }
        }
        html += '</div>';
      }
    }
    html += '</div>';
    return html;
  }

  // ── EXECUTE CTA ───────────────────────────────────────────────────────────────
  function _paExecuteCTA(queue) {
    var prontas = (queue || []).filter(function(it) {
      var as = it && it.approval_state ? it.approval_state : {};
      return as.status === 'approved' && !as.executed_at;
    });
    if (!prontas.length) return '';
    var listHtml = prontas.map(function(it) {
      var lbl = it.action_type === 'pause_campaign'           ? '→ pausar' :
                it.action_type === 'scale_budget_guardrailed' ? '→ escalar +20%' :
                '→ ' + (it.action_type || 'acao');
      return '<div>• <b>' + _paEsc(it.campaign_key || 'campanha') + '</b> ' + _paEsc(lbl) + '</div>';
    }).join('');
    return '<div class="pa-section"><span>③ Executar</span></div>' +
      '<div class="pa-exec-cta">' +
        '<div class="pa-exec-cta-info">' +
          '<div class="pa-exec-cta-title">🚀 ' + prontas.length + ' ação' + (prontas.length > 1 ? 'ões aprovadas prontas' : ' aprovada pronta') + ' para execução</div>' +
          '<div class="pa-exec-cta-sub">As alterações serão aplicadas imediatamente na sua conta do Meta Ads. Você poderá reverter depois se necessário.</div>' +
          '<div class="pa-exec-cta-list">' + listHtml + '</div>' +
        '</div>' +
        '<button id="paBtnExecutar" class="pa-exec-btn" onclick="paExecutarAprovadas()">▶ Executar Agora</button>' +
      '</div>';
  }

  function _paMoeda(val, semPrefix) {
    var n = parseFloat(val) || 0;
    if (semPrefix) return 'R$' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return 'R$' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function _paFormatNum(n) {
    n = parseInt(n) || 0;
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  function _paEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function _paFindQueueAction(queue, campaignKey, actionType) {
    queue = Array.isArray(queue) ? queue : [];
    for (var i = 0; i < queue.length; i++) {
      var q = queue[i];
      if (!q) continue;
      if (campaignKey && q.campaign_key !== campaignKey) continue;
      if (actionType && q.action_type !== actionType) continue;
      return q;
    }
    return null;
  }

  function _paActionFocusCard(titulo, item, badgeClasse, rodape, queueAction) {
    var campaign = item && item.campaign_key ? item.campaign_key : 'Sem campanha';
    var reason = item && item.reason ? item.reason : 'Sem motivo detalhado.';
    var nextStep = item && item.next_step ? item.next_step : 'Sem proximo passo definido.';
    var cardTone = badgeClasse === 'red' ? 'c-red' : badgeClasse === 'amber' ? 'c-amber' : badgeClasse === 'lime' ? 'c-lime' : 'c-purple';
    var approval = queueAction && queueAction.approval_state ? queueAction.approval_state : { status: 'pending' };
    var approvalStatus = approval.status || 'pending';
    var html = '<div class="pa-card ' + cardTone + '">';
    html += '<div class="pa-card-head"><span class="pa-card-title">' + _paEsc(titulo) + '</span><span class="pa-badge ' + badgeClasse + '">' + _paStatusLabel(badgeClasse) + '</span></div>';
    html += '<div class="pa-camp-name">' + _paEsc(campaign) + '</div>';
    html += '<div style="font-size:11px;color:var(--dim2);line-height:1.5;margin-bottom:12px;">' + _paEsc(reason) + '</div>';
    html += '<div style="background:var(--s2);border-radius:10px;padding:10px;margin-bottom:10px;">';
    html += '<div style="font-family:var(--mono);font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;">Proximo passo</div>';
    html += '<div style="font-size:11px;color:var(--em);line-height:1.5;">' + _paEsc(nextStep) + '</div>';
    html += '</div>';
    if (queueAction) {
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;">';
      html += '<span class="pa-badge ' + _paApprovalStatusBadge(approvalStatus) + '">' + _paEsc(_paApprovalStatusLabel(approvalStatus)) + '</span>';
      if (approval && approval.decided_by) {
        html += '<span style="font-size:10px;color:var(--dim2);">por ' + _paEsc(approval.decided_by) + '</span>';
      }
      html += '</div>';
      if (_paRequiresHumanDecision(queueAction) && approvalStatus === 'pending') {
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">';
        html += '<button class="pa-help-btn" onclick="paRegistrarDecisaoAcao(\'' + _paEsc(queueAction.action_id || '') + '\',\'approved\')">Aprovar</button>';
        html += '<button class="pa-modal-close" onclick="paRegistrarDecisaoAcao(\'' + _paEsc(queueAction.action_id || '') + '\',\'rejected\')">Rejeitar</button>';
        html += '</div>';
      }
    }
    html += '<div class="pa-kpi-benchmark">' + _paEsc(rodape) + '</div>';
    html += '</div>';
    return html;
  }

  function _paApprovalPromptCard(item) {
    if (!item) return '';
    var approval = item.approval_state || { status: 'pending' };
    var approvalStatus = approval.status || 'pending';
    var html = '<div class="pa-card c-amber">';
    html += '<div class="pa-card-head"><span class="pa-card-title">' + _paEsc(item.campaign_key || item.action_type || 'Acao') + '</span><span class="pa-badge ' + _paApprovalStatusBadge(approvalStatus) + '">' + _paEsc(_paApprovalStatusLabel(approvalStatus)) + '</span></div>';
    html += '<div style="font-size:11px;color:var(--dim2);line-height:1.5;margin-bottom:8px;">' + _paEsc(item.action_type || 'acao') + ' - ' + _paEsc(item.rationale || 'Sem racional.') + '</div>';
    html += '<div style="font-size:10px;color:var(--dim);line-height:1.5;margin-bottom:10px;">' + _paEsc(item.human_check || 'Sem cheque humano.') + '</div>';
    if (approvalStatus === 'pending') {
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
      html += '<button class="pa-help-btn" onclick="paRegistrarDecisaoAcao(\'' + _paEsc(item.action_id || '') + '\',\'approved\')">Aprovar</button>';
      html += '<button class="pa-modal-close" onclick="paRegistrarDecisaoAcao(\'' + _paEsc(item.action_id || '') + '\',\'rejected\')">Rejeitar</button>';
      html += '</div>';
    } else {
      html += '<div class="pa-kpi-benchmark">Decidido por ' + _paEsc((approval.decided_by || 'operador')) + (approval.decided_at ? ' em ' + _paEsc(new Date(approval.decided_at).toLocaleString('pt-BR')) : '') + '</div>';
    }
    html += '</div>';
    return html;
  }

  function _paExperimentRow(exp) {
    var prioridade = exp && exp.priority ? String(exp.priority).toUpperCase() : 'MEDIUM';
    var badge = prioridade === 'HIGH' ? 'red' : prioridade === 'LOW' ? 'dim' : 'amber';
    return '<div style="background:var(--s2);border-radius:10px;padding:12px;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;">' +
        '<div style="font-size:12px;color:var(--em);font-weight:700;">' + _paEsc(exp.target || exp.experiment_id || 'Experimento') + '</div>' +
        '<span class="pa-badge ' + badge + '">' + _paEsc(prioridade) + '</span>' +
      '</div>' +
      '<div style="font-size:11px;color:var(--dim2);line-height:1.5;margin-bottom:6px;">' + _paEsc(exp.hypothesis || 'Sem hipotese.') + '</div>' +
      '<div style="font-size:10px;color:var(--dim);line-height:1.5;">Proximo passo: ' + _paEsc(exp.next_step || 'Sem passo sugerido.') + '</div>' +
    '</div>';
  }

  function _paAutonomyModeLabel(mode) {
    if (mode === 'autonomous') return 'Autonomo';
    if (mode === 'approval_required') return 'Aprovar';
    if (mode === 'assistive_only') return 'Assistivo';
    return 'Indefinido';
  }

  function _paAutonomyModeBadge(mode) {
    if (mode === 'autonomous') return 'lime';
    if (mode === 'approval_required') return 'amber';
    if (mode === 'assistive_only') return 'purple';
    return 'dim';
  }

  function _paApprovalStatusLabel(status) {
    if (status === 'approved') return 'Aprovado';
    if (status === 'rejected') return 'Rejeitado';
    return 'Pendente';
  }

  function _paApprovalStatusBadge(status) {
    if (status === 'approved') return 'lime';
    if (status === 'rejected') return 'red';
    return 'amber';
  }

  function _paRequiresHumanDecision(item) {
    if (!item || !item.action_type) return false;
    return item.action_type === 'pause_campaign' || item.action_type === 'scale_budget_guardrailed';
  }

  function _paAutomationRow(item) {
    var actionType = item && item.action_type ? item.action_type : 'acao';
    var campaign = item && item.campaign_key ? item.campaign_key : 'sem alvo';
    var executionMode = item && item.autonomy && item.autonomy.execution_mode ? item.autonomy.execution_mode : (item && item.approval_required ? 'approval_required' : 'assistive_only');
    var badge = _paAutonomyModeBadge(executionMode);
    var label = _paAutonomyModeLabel(executionMode);
    var approval = item && item.approval_state ? item.approval_state : { status: 'pending' };
    var approvalStatus = approval.status || 'pending';
    var decisionBadge = _paApprovalStatusBadge(approvalStatus);
    var decisionLabel = _paApprovalStatusLabel(approvalStatus);
    var actionId = item && item.action_id ? item.action_id : '';
    var actor = approval && approval.decided_by ? approval.decided_by : '';
    var decidedAt = approval && approval.decided_at ? approval.decided_at : '';

    // Campos de execução (presentes após executarAcoesAprovadas)
    var executedAt      = approval.executed_at || '';
    var executionResult = approval.execution_result || '';
    var revertedAt      = approval.reverted_at || '';
    var execErro        = executionResult.indexOf('erro:') === 0;
    var canRevert       = executedAt && !revertedAt && !execErro &&
                          (actionType === 'pause_campaign' || actionType === 'pause' ||
                           actionType === 'scale_budget_guardrailed' || actionType === 'scale');

    var html = '<div style="background:var(--s2);border-radius:10px;padding:12px;">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;">';
    html += '<div style="font-size:12px;color:var(--em);font-weight:700;">' + _paEsc(campaign) + '</div>';
    html += '<span class="pa-badge ' + badge + '">' + _paEsc(label) + '</span>';
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--dim2);line-height:1.5;margin-bottom:4px;">' + _paEsc(actionType) + ' - ' + _paEsc(item && item.rationale ? item.rationale : 'Sem racional.') + '</div>';
    html += '<div style="font-size:10px;color:var(--dim);line-height:1.5;margin-bottom:8px;">Cheque humano: ' + _paEsc(item && item.human_check ? item.human_check : 'Sem observacao.') + '</div>';

    // Linha de decisão
    html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">';
    html += '<span class="pa-badge ' + decisionBadge + '">' + _paEsc(decisionLabel) + '</span>';
    if (actor) html += '<span style="font-size:10px;color:var(--dim2);">por ' + _paEsc(actor) + '</span>';
    html += '</div>';

    // Linha de execução (aparece só após executarAcoesAprovadas ter rodado)
    if (executedAt) {
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">';
      if (revertedAt) {
        html += '<span class="pa-badge dim">↩ Revertido</span>';
        html += '<span style="font-size:10px;color:var(--dim2);">em ' + _paEsc(new Date(revertedAt).toLocaleString('pt-BR')) + '</span>';
      } else if (execErro) {
        html += '<span class="pa-badge red">❌ Erro execucao</span>';
        html += '<span style="font-size:10px;color:var(--dim2);">' + _paEsc(executionResult.replace('erro: ', '')) + '</span>';
      } else {
        html += '<span class="pa-badge lime">🚀 Executado</span>';
        html += '<span style="font-size:10px;color:var(--dim2);">em ' + _paEsc(new Date(executedAt).toLocaleString('pt-BR')) + '</span>';
      }
      html += '</div>';
    }

    // Botões de ação
    var btns = '';
    if (_paRequiresHumanDecision(item) && approvalStatus === 'pending') {
      btns += '<button class="pa-help-btn" onclick="paRegistrarDecisaoAcao(\'' + _paEsc(actionId) + '\',\'approved\')">Aprovar</button>';
      btns += '<button class="pa-modal-close" onclick="paRegistrarDecisaoAcao(\'' + _paEsc(actionId) + '\',\'rejected\')">Rejeitar</button>';
    }
    if (canRevert) {
      btns += '<button class="pa-modal-close" onclick="paReverterAcao(\'' + _paEsc(actionId) + '\')">↩ Reverter</button>';
    }
    if (btns) html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">' + btns + '</div>';

  function _paFormatSyncLabel(periodo) {
    if (!periodo) return '';
    function fmtD(s) {
      if (!s) return '';
      var p = String(s).split('-');
      return p.length === 3 ? p[2] + '/' + p[1] : s;
    }
    var labelMap = { hoje: 'Hoje', '3d': '3 dias', '7d': '7 dias', '30d': '30 dias' };
    var label = labelMap[paAtualPeriodo] || periodo.label || '';
    var sinceFmt = fmtD(periodo.since);
    var untilFmt = fmtD(periodo.until);
    var range = (sinceFmt && sinceFmt !== untilFmt) ? sinceFmt + ' – ' + untilFmt : untilFmt;
    return label + (range ? ' · ' + range : '');
  }

  function _paUpdateSyncLabel(periodo) {
    var syncEl = document.getElementById('paSyncLabel');
    if (!syncEl) return;
    var rangeText = _paFormatSyncLabel(periodo);
    var lastFetch = paLastFetched[paAtualPeriodo];
    var isStale = lastFetch && (Date.now() - lastFetch) > 12 * 3600 * 1000;
    if (isStale) {
      var fd = new Date(lastFetch);
      var fetchStr = fd.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) +
                     ' às ' + fd.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      syncEl.innerHTML = '⚠️ Dados de ' + fetchStr + ' — clique em Atualizar';
      syncEl.style.color = 'var(--g4)';
    } else {
      syncEl.textContent = rangeText;
      syncEl.style.color = '';
    }
  }

    if (d.modo === 'cockpit_bridge' && alertas.length > 0) {
      html += '<div style="font-size:11px;color:var(--dim2);line-height:1.6;padding:10px 13px;background:rgba(255,170,0,.05);border:1px solid rgba(255,170,0,.18);border-radius:8px;">';
      html += '⚠️ ' + alertas.length + ' alerta' + (alertas.length > 1 ? 's detectados' : ' detectado') + ' — as campanhas que precisam de atenção já aparecem na <b>② Fila de Decisão</b> acima.';
      html += '</div>';
    } else if (alertas.length === 0) {
      html += '<div style="text-align:center;padding:16px 0;color:var(--dim2);font-family:var(--mono);font-size:11px;letter-spacing:.1em;">✅ Metricas dentro dos limites</div>';
    } else {
      html += '<div class="pa-alert-list">';
      for (var ai = 0; ai < alertas.length; ai++) {
        var al = alertas[ai];
        var aIco = al.tipo === 'erro' ? '🔴' : '🟡';
        html += '<div class="pa-alert-item ' + al.tipo + '"><span class="pa-alert-icon">' + aIco + '</span><span>' + _paEsc(al.texto) + '</span></div>';
      }
      html += '</div>';
    }

    html += '<div class="pa-divider-num"><span>Thresholds (calibrados pela operação)</span></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
    html += _paThreshRow('CPL', '≤ R$12 verde · R$18 teto', 'por conversa');
    html += _paThreshRow('CTR', '≥ 1,0% verde · 0,6% min', 'click-through');
    html += _paThreshRow('Frequência', '≤ 2,5× verde · 3,5× max', 'saturação');
    html += _paThreshRow('CPA', '≤ R$100 verde · R$150 teto', 'por instalada');
    html += '</div>';
    html += '</div>';

    {
      // Espaço pro card Google Ads abaixo (placeholder mantido).
      html += '<div class="pa-card" style="border-style:dashed;border-color:rgba(255,255,255,.08);">';
      html += '<div class="pa-card-head"><span class="pa-card-title">Google Ads</span><span class="pa-badge dim">em breve</span></div>';
      html += '<div class="pa-gads-placeholder">';
      html += '<div class="pa-gads-icon">▲</div>';
      html += '<div class="pa-gads-title">Google Ads Analytics</div>';
      html += '<div class="pa-gads-sub">Integracao com Google Ads API em desenvolvimento. O layout ja esta preparado - basta conectar os dados.</div>';
      html += '</div>';
      html += '</div>';
    }

    html += '</div>';
    html += '</div>';

    c.innerHTML = html;
    requestAnimationFrame(function() {
      c.querySelectorAll('[data-fill]').forEach(function(el) {
        el.style.width = el.getAttribute('data-fill') + '%';
      });
    });
  }

  // ── DIAGNÓSTICO AO VIVO ──────────────────────────────────────────────────
  window.paDiagnosticar = function() {
    var btn   = document.getElementById('paBtnDiag');
    var modal = document.getElementById('paDiagModal');
    if (!modal) return;

    if (btn) { btn.disabled = true; btn.textContent = '⏳ Analisando…'; }

    document.getElementById('paDiagBody').innerHTML =
      '<div class="pa-diag-loading">' +
        '<div class="pa-diag-spinner"></div>' +
        '<div class="pa-diag-loading-txt">Consultando Meta Ads + CRM + Claude IA…<br>Isso pode levar até 30 segundos.</div>' +
      '</div>';
    modal.classList.add('aberto');

    google.script.run
      .withSuccessHandler(window.paDiagRenderizar)
      .withFailureHandler(window.paDiagErro)
      .diagnosticarAgora();
  };

  window.paDiagRenderizar = function(dados) {
    var btn = document.getElementById('paBtnDiag');
    if (btn) { btn.disabled = false; btn.textContent = '✦ Diagnosticar'; }

    if (!dados || !dados.ok) {
      window.paDiagErro({ message: (dados && dados.erro) ? dados.erro : 'Resposta inválida do servidor.' });
      return;
    }

    var camps      = (dados.metricas_raw && dados.metricas_raw.campanhas) || [];
    var totalGasto = 0, totalLeads = 0, totalImpr = 0;
    for (var i = 0; i < camps.length; i++) {
      totalGasto += camps[i].gasto      || 0;
      totalLeads += camps[i].leads      || 0;
      totalImpr  += camps[i].impressoes || 0;
    }
    var cplMedio = totalLeads > 0 ? (totalGasto / totalLeads) : null;

    var ts = '';
    if (dados.gerado_em) {
      try {
        var dObj = new Date(dados.gerado_em);
        ts = dObj.toLocaleDateString('pt-BR') + ' ' + dObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      } catch(ex) { ts = dados.gerado_em; }
    }
    var tsEl = document.getElementById('paDiagTs');
    if (tsEl) tsEl.textContent = ts;

    var html = '';
    html += '<div class="pa-diag-resumo">';
    html += '<div class="pa-diag-kpi"><div class="pa-diag-kpi-lbl">Gasto 7d</div><div class="pa-diag-kpi-val">' + _paMoeda(totalGasto) + '</div></div>';
    html += '<div class="pa-diag-kpi"><div class="pa-diag-kpi-lbl">Leads Meta</div><div class="pa-diag-kpi-val">' + totalLeads + '</div></div>';
    html += '<div class="pa-diag-kpi"><div class="pa-diag-kpi-lbl">CPL Médio</div><div class="pa-diag-kpi-val">' + (cplMedio !== null ? _paMoeda(cplMedio) : '—') + '</div></div>';
    html += '<div class="pa-diag-kpi"><div class="pa-diag-kpi-lbl">Impressões</div><div class="pa-diag-kpi-val">' + (totalImpr >= 1000 ? (totalImpr / 1000).toFixed(1) + 'k' : totalImpr) + '</div></div>';
    html += '</div>';
    html += '<div class="pa-diag-texto">' + _paEsc(dados.diagnostico_texto || '') + '</div>';

    document.getElementById('paDiagBody').innerHTML = html;
  };

  window.paDiagErro = function(e) {
    var btn = document.getElementById('paBtnDiag');
    if (btn) { btn.disabled = false; btn.textContent = '✦ Diagnosticar'; }
    var msg = e && e.message ? e.message : String(e || 'Erro desconhecido');
    document.getElementById('paDiagBody').innerHTML =
      '<div class="pa-diag-erro-txt">⚠ Erro ao gerar diagnóstico:\n\n' + msg +
      '\n\nVerifique se CLAUDE_API_KEY e META_ACCESS_TOKEN estão em\nExtensões → Apps Script → Propriedades do projeto.</div>';
  };

  // ── AUTO-INIT ──────────────────────────────────────────────────────────────
  var _paInitOriginal = window.paInit;

  function _paMontarGuia() {
    var painelRoot = document.getElementById('painelAdsContainer') || document.body;
    if (!document.getElementById('paGuiaModal')) {
      painelRoot.insertAdjacentHTML('beforeend',
        '<div class="pa-modal-backdrop" id="paGuiaModal" onclick="paFecharGuia(event)">' +
          '<div class="pa-modal" onclick="event.stopPropagation()">' +
            '<div class="pa-modal-head">' +
              '<div>' +
                '<div class="pa-brand-name" style="margin-bottom:8px;">Claude Ads Playbook</div>' +
                '<div class="pa-modal-title">Como Operar</div>' +
              '</div>' +
              '<button class="pa-modal-close" onclick="paFecharGuia()">Fechar</button>' +
            '</div>' +
            '<div class="pa-modal-grid">' +
              '<div class="pa-modal-card"><h4>Todo Dia</h4><p>1. Atualize o painel.</p><p>2. Veja primeiro: Pausar / Revisar, Escalar com cuidado e Observar.</p><p>3. Cheque os alertas operacionais (leads parados) antes de abrir o Meta Ads.</p></div>' +
              '<div class="pa-modal-card"><h4>Pausar / Revisar</h4><p>Use esse bloco para cortar desperdicio. Nao pause por impulso: confirme se nao houve contexto comercial especial.</p><p>Se nao houve, revise publico, cobertura, oferta e criativo.</p></div>' +
              '<div class="pa-modal-card"><h4>Escalar com Cuidado</h4><p>Escalar nao e dobrar budget. A ideia e subir em degrau pequeno e verificar se a qualidade do lead continua boa.</p><p>Se o comercial confirmar qualidade, mantenha a escala gradual.</p></div>' +
              '<div class="pa-modal-card"><h4>Observar</h4><p>Quando a campanha cai em observar, o sistema esta dizendo para nao agir por ansiedade.</p><p>Coletar mais dados costuma ser melhor do que mexer cedo demais.</p></div>' +
              '<div class="pa-modal-card"><h4>Automacao da IA</h4><p>Sim, e possivel automatizar bastante. O melhor modelo e autonomia assistida: a IA prepara, monitora e sugere; a execucao sensivel continua com aprovacao humana.</p><p>O caminho seguro e automatizar alertas, relatorios, fila de acoes e testes pequenos antes de liberar pausas e escalas sem revisao.</p></div>' +
              '<div class="pa-modal-card"><h4>Status de Autonomia</h4><p><b>Assistivo</b>: a IA organiza e recomenda.</p><p><b>Aprovar</b>: a IA sugere a acao, mas espera voce confirmar.</p><p><b>Autonomo</b>: a IA ja esta autorizada a agir dentro dos guardrails definidos.</p></div>' +
              '<div class="pa-modal-card"><h4>Simulacao vs Execucao</h4><p>Quando o painel mostrar simulacao protegida, a IA ainda nao mexeu no Meta Ads; ela so registrou o que faria.</p><p>Quando aparecer execucao live, a IA ja pode aplicar pausas e escalas pequenas que passaram por todas as travas.</p></div>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
    }

    if (!document.getElementById('paBtnHelp')) {
      var refreshButton = document.getElementById('paBtnRefresh');
      if (refreshButton && refreshButton.parentNode) {
        var helpButton = document.createElement('button');
        helpButton.id = 'paBtnHelp';
        helpButton.className = 'pa-help-btn';
        helpButton.textContent = 'Guia';
        helpButton.onclick = function() { window.paAbrirGuia(); };
        refreshButton.parentNode.insertBefore(helpButton, refreshButton);
      }
    }

    // Injetar modal de diagnóstico
    if (!document.getElementById('paDiagModal')) {
      painelRoot.insertAdjacentHTML('beforeend',
        '<div class="pa-diag-overlay" id="paDiagModal" onclick="if(event.target===this){this.classList.remove(\'aberto\')}">' +
          '<div class="pa-diag-box" onclick="event.stopPropagation()">' +
            '<div class="pa-diag-header">' +
              '<div class="pa-diag-title-wrap">' +
                '<div class="pa-diag-title">✦ Diagnóstico ao Vivo</div>' +
                '<div class="pa-diag-ts" id="paDiagTs"></div>' +
              '</div>' +
              '<button class="pa-diag-close" onclick="document.getElementById(\'paDiagModal\').classList.remove(\'aberto\')">Fechar ✕</button>' +
            '</div>' +
            '<div class="pa-diag-body" id="paDiagBody"></div>' +
          '</div>' +
        '</div>'
      );
    }

  }

  window.paAbrirGuia = function() {
    var modal = document.getElementById('paGuiaModal');
    if (modal) modal.classList.add('aberto');
  };

  window.paFecharGuia = function(event) {
    if (event && event.stopPropagation) event.stopPropagation();
    var modal = document.getElementById('paGuiaModal');
    if (modal) modal.classList.remove('aberto');
  };

  window.paInit = function() {
    _paMontarGuia();
    if (typeof _paInitOriginal === 'function') _paInitOriginal();
  };

  if (typeof google !== 'undefined' && google.script && google.script.run) {
    paInit();
  }
})();
</script>
