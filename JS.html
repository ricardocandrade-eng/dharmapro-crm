  document.getElementById('mng-resultado').style.display = 'none';
  document.getElementById('mng-erro').style.display = 'none';
  document.getElementById('mng-foot').style.display = 'none';
  modal.classList.add('ativo');

  // Listener para resultado da extensão via postMessage
  var _handler = function(e) {
    if (!e.data || e.data.type !== 'dhp_ng_result') return;
    window.removeEventListener('message', _handler);
    clearTimeout(_timeout);

    document.getElementById('mng-loading').style.display = 'none';

    if (e.data.erro) {
      document.getElementById('mng-erro').style.display = 'block';
      document.getElementById('mng-erro-msg').textContent = e.data.erro;
      return;
    }

    var r = e.data;
    _ngDadosTemp.resultado = r;

    // Badge de status
    var badge = document.getElementById('mng-status-badge');
    if (r.instalada) {
      badge.style.background = 'rgba(40,167,69,.12)';
      badge.style.border = '1px solid rgba(40,167,69,.3)';
      badge.innerHTML = '<span style="font-size:15px;font-weight:700;color:#28a745;">\u2714 ' + esc(r.resumo) + '</span>';
    } else if (r.dataAgendamento) {
      badge.style.background = 'rgba(255,193,7,.12)';
      badge.style.border = '1px solid rgba(255,193,7,.3)';
      badge.innerHTML = '<span style="font-size:15px;font-weight:700;color:#ffc107;">\u23F3 ' + esc(r.resumo) + '</span>';
    } else {
      badge.style.background = 'rgba(220,53,69,.12)';
      badge.style.border = '1px solid rgba(220,53,69,.3)';
      badge.innerHTML = '<span style="font-size:15px;font-weight:700;color:#dc3545;">\u26A0 ' + esc(r.resumo) + '</span>';
    }

    // Detalhes (nome + debug)
    var html = '';
    if (r.nome) html += '<strong>Cliente:</strong> ' + esc(r.nome) + '<br>';
    if (r.dataInstalacao) html += '<strong>Instalação:</strong> ' + esc(r.dataInstalacao) + '<br>';
    if (r.dataAgendamento) html += '<strong>Agendamento:</strong> ' + esc(r.dataAgendamento) + '<br>';
    if (r.debug && Object.keys(r.debug).length) {
      html += '<br><strong>Dados capturados:</strong><br>';
      for (var dk in r.debug) {
        html += '<span style="opacity:.6;">' + esc(dk) + ':</span> ' + esc(r.debug[dk]) + '<br>';
      }
    }
    document.getElementById('mng-detalhes').innerHTML = html;
    document.getElementById('mng-resultado').style.display = 'block';

    // Botão de confirmar
    var statusAtual = (_paginaAtual[_ngDadosTemp.index] || {}).status || '';
    var jaInstalada = statusAtual.indexOf('Instalada') > -1 || statusAtual.indexOf('Finalizada') > -1;

    if (r.instalada && jaInstalada) {
      // Já marcada — só informativo
    } else if (r.instalada || r.dataAgendamento) {
      document.getElementById('mng-foot').style.display = 'flex';
      var btnTxt = r.instalada ? 'Marcar como Instalada' : 'Atualizar Agendamento';
      document.getElementById('mng-btn-confirmar').textContent = btnTxt;
    }
  };

  window.addEventListener('message', _handler);

  var _timeout = setTimeout(function() {
    window.removeEventListener('message', _handler);
    document.getElementById('mng-loading').style.display = 'none';
    document.getElementById('mng-erro').style.display = 'block';
    document.getElementById('mng-erro-msg').textContent = 'Tempo esgotado. Verifique se:\n1. A extensão DharmaPro Connector está instalada\n2. A VPN está ativada';
  }, 75000);

  // Buscar credenciais NG do backend
  google.script.run
    .withSuccessHandler(function(creds) {
      if (!creds.sucesso) {
        document.getElementById('mng-loading').style.display = 'none';
        document.getElementById('mng-erro').style.display = 'block';
        document.getElementById('mng-erro-msg').textContent = 'Credenciais do NG não configuradas. Vá em Config e salve usuário/senha do NG.';
        return;
      }

      // Abrir popup no domínio NG com CPF + credenciais no hash
      var cpfLimpo = v.cpf.replace(/\D/g, '');
      var _hash = '#dhp?cpf=' + encodeURIComponent(cpfLimpo) +
                  '&user='    + encodeURIComponent(creds.user) +
                  '&pass='    + encodeURIComponent(creds.pass);
      window.open('https://ng.vero.objective.com.br/' + _hash, 'dhp_ng', 'width=400,height=300,left=0,top=0');
    })
    .withFailureHandler(function(err) {
      document.getElementById('mng-loading').style.display = 'none';
      document.getElementById('mng-erro').style.display = 'block';
      document.getElementById('mng-erro-msg').textContent = 'Erro ao buscar credenciais NG: ' + (err.message || String(err));
    })
    .getCredenciaisNG();
}

          badge.innerHTML = '<span style="font-size:15px;font-weight:700;color:#dc3545;">\u26A0 ' + r.resumo + '</span>';
        }

        // Contratos
        var html = '<strong>Contratos:</strong><br>';
        if (r.contratos && r.contratos.length) {
          for (var i = 0; i < r.contratos.length; i++) {
            var c = r.contratos[i];
            html += c.id + ' \u2014 ' + c.plano + ' <span style="opacity:.7;">(' + c.status + ')</span><br>';
          }
        } else {
          html += '<span style="opacity:.5;">Nenhum contrato encontrado</span>';
        }
        document.getElementById('madp-contratos').innerHTML = html;

        document.getElementById('madp-resultado').style.display = 'block';

        // Mostrar botao se ha algo para atualizar (ocultar se ja instalada no DharmaPro)
        var statusAtual = (_paginaAtual[_adapterDadosTemp.index] || {}).status || '';
        var jaInstalada = statusAtual.indexOf('Instalada') > -1 || statusAtual.indexOf('Finalizada') > -1;

        if (r.instalada && jaInstalada) {
          // Ja marcada como instalada — so informativo
        } else if (r.instalada || r.dataAgendamento) {
          document.getElementById('madp-foot').style.display = 'flex';
          var btnTxt = r.instalada ? 'Marcar como Instalada' : 'Atualizar Agendamento';
          document.getElementById('madp-btn-confirmar').textContent = btnTxt;
        }
      };

      window.addEventListener('message', _handler);

      var _timeout = setTimeout(function() {
        window.removeEventListener('message', _handler);
        document.getElementById('madp-loading').style.display = 'none';
        document.getElementById('madp-erro').style.display = 'block';
        document.getElementById('madp-erro-msg').textContent = 'Tempo esgotado. Verifique se a extensao DharmaPro Connector esta instalada e a VPN esta ativada.';
      }, 30000);

      // Abrir popup no Adapter com dados no hash (servidor nao recebe o hash)
      var _hash = '#dhp?cpf=' + encodeURIComponent(v.cpf.replace(/\D/g, '')) +
                  '&user='    + encodeURIComponent(creds.user) +
                  '&pass='    + encodeURIComponent(creds.pass);
      window.open('https://adapter.veronet.com.br/adapter/' + _hash, 'dhp_adapter', 'width=1,height=1,left=-100,top=-100');
    })
    .withFailureHandler(function(err) {
      document.getElementById('madp-loading').style.display = 'none';
      document.getElementById('madp-erro').style.display = 'block';
      document.getElementById('madp-erro-msg').textContent = 'Erro ao buscar credenciais: ' + (err.message || String(err));
    })
    .getCredenciaisAdapter();
}

function _confirmarAdapter() {
  if (!_adapterDadosTemp || !_adapterDadosTemp.resultado) return;
  var r = _adapterDadosTemp.resultado;

  var btn = document.getElementById('madp-btn-confirmar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled = false;
      if (res.sucesso) {
        mostrarToast(r.instalada ? 'Venda marcada como Instalada.' : 'Agendamento atualizado.', 'success');

        var idx = _adapterDadosTemp.index;
        if (_paginaAtual[idx]) {
          if (r.instalada) {
            _paginaAtual[idx].status = '3 - Finalizada/Instalada';
            if (r.dataInstalacao) _paginaAtual[idx].instal = r.dataInstalacao;
          }
          if (r.dataAgendamento) _paginaAtual[idx].agenda = r.dataAgendamento;
        }

        _fecharModalAdapter();
        _renderizarPagina();
      } else {
        mostrarToast('Erro: ' + res.mensagem, 'error');
        btn.textContent = 'Tentar novamente';
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = 'Tentar novamente';
      mostrarToast('Erro ao salvar: ' + (err.message || err), 'error');
    })
    .atualizarVendaComAdapter({
      linha: _adapterDadosTemp.linha,
      instalada: r.instalada,
      dataInstalacao: r.dataInstalacao,
      dataAgendamento: r.dataAgendamento
    });
}

function _fecharModalAdapter() {
  document.getElementById('modalAdapter').classList.remove('ativo');

}

function _salvarCredenciaisAdapter() {
  var user = document.getElementById('cfg-adapter-user').value.trim();
  var pass = document.getElementById('cfg-adapter-pass').value.trim();
  if (!user || !pass) { mostrarToast('Preencha usuario e senha.', 'error'); return; }

  google.script.run
    .withSuccessHandler(function(r) {
      if (r.sucesso) {
        mostrarToast('Credenciais do Adapter salvas.', 'success');
        document.getElementById('cfg-adapter-status').innerHTML = '<span style="color:#28a745;">Conectado</span>';
        document.getElementById('cfg-adapter-pass').value = '';

      }

function _verificarAdapterConfig() {

// Backoffice solicita desbloqueio ao supervisor
function _solicitarDesbloqueio() {
  var btn = document.getElementById('dhp-trava-btn');
  var msg = document.getElementById('dhp-trava-msg');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Solicitando...'; }
  var nome = AppState.get('nomeUsuario') || AppState.get('usuario') || 'Backoffice';
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.sucesso) {
        if (btn) { btn.disabled = false; btn.textContent = 'Solicitar Desbloqueio'; }
        mostrarToast('❌ Erro ao solicitar desbloqueio.', 'error');
        return;
      }
      if (btn) btn.style.display = 'none';
      if (msg) msg.style.display = 'block';
      // Polling: verifica aprovação a cada 5s
      var _poll = setInterval(function() {
        google.script.run
          .withSuccessHandler(function(st) {
            if (st && st.status === 'aprovado') {
              clearInterval(_poll);
              _desbloqueadoPeloSupervisor();
            }
          })
          .withFailureHandler(function() {})
          .getStatusDesbloqueio();
      }, 5000);
    })
    .withFailureHandler(function() {
      if (btn) { btn.disabled = false; btn.textContent = 'Solicitar Desbloqueio'; }
      mostrarToast('❌ Falha na conexão.', 'error');
    })
    .solicitarDesbloqueioBo(nome);
}

// Remove o overlay após aprovação do supervisor
function _desbloqueadoPeloSupervisor() {
  var overlay = document.getElementById('dhp-trava-overlay');
  if (overlay) overlay.remove();
  google.script.run.withSuccessHandler(function() {}).limparPedidoDesbloqueio();
  mostrarToast('✅ Desbloqueio aprovado! Acesso liberado.', 'success');
  if (_vhTravaTimer) clearInterval(_vhTravaTimer);
}

function _aprovarDesbloqueio() {

function _secaoPainel(titulo, linhas) {
  var rows = '';
  for (var i = 0; i < linhas.length; i++) {
    var lbl = linhas[i][0];
    var val = linhas[i][1];
    if (!val || String(val).trim() === '') continue;
    rows += '<div class="painel-linha">' +
      '<span class="painel-lbl">' + esc(lbl) + '</span>' +
      '<span class="painel-val">' + esc(val) + '</span>' +
    '</div>';
  }
  if (!rows) return '';
  return '<div class="painel-secao">' +
    '<div class="painel-secao-titulo">' + titulo + '</div>' +
    rows +
  '</div>';
}

function _linhaPainelHtml(lbl, htmlVal) {
  return '<div class="painel-linha">' +
    '<span class="painel-lbl">' + esc(lbl) + '</span>' +
    '<span class="painel-val">' + htmlVal + '</span>' +
  '</div>';
}

function fecharPainel() {

  document.getElementById('painelVazio').style.display = 'flex';

function _copiarTextoVenda(v) {
  var texto =
    '📄 Contrato: '     + (v.contrato  || '-') + '\n' +
    '🙍 Cliente: '      + (v.cliente   || '-') + '\n' +
    '📱 WhatsApp: '     + (v.whats     || '-') + '\n' +

    '📌 Status: '       + (v.status    || '-') + '\n' +
    '👨‍💼 Responsável: ' + (v.resp      || '-') + '   |   🏷️ Canal: ' + (v.canal || '-') + '\n' +
    '🏙️ Cidade: '       + (v.cidade    || '-') + (v.uf ? ' / ' + v.uf : '') + '\n' +
    '⚡ Ativação: '     + (_fmtData(v.dataAtiv)  || '-') + '\n' +
    '📅 Agendamento: '  + (_fmtData(v.agenda)    || '-') + '\n' +
    '✅ Instalação: '   + (_fmtData(v.instal)    || '-') + '\n' +
    '📦 Produto: '      + (v.produto   || '-') + '\n' +
    '🗂 Plano: '        + (v.plano     || '-') + '\n' +
    '💰 Valor: '        + (v.valor     || '-');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto)
      .then(function () { mostrarToast('✅ Resumo copiado!', 'success'); })
      .catch(function () { _copiarFallback(texto); });
  } else {
    _copiarFallback(texto);
  }
}

function _copiarFallback(texto) {
  var ta = document.createElement('textarea');
  ta.value = texto;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    mostrarToast('✅ Resumo copiado!', 'success');
  } catch (e) {
    mostrarToast('Não foi possível copiar.', 'error');
  }
  document.body.removeChild(ta);
}

// ─── CEP ───────────────────────────────────────────────────────────────────
function _atualizarLinkMaps() {
  var rua    = (document.getElementById('f_rua')    || {}).value || '';
  var num    = (document.getElementById('f_num')    || {}).value || '';
  var cidade = (document.getElementById('f_cidade') || {}).value || '';
  var uf     = (document.getElementById('f_uf')     || {}).value || '';
  var wrap   = document.getElementById('mapsLinkWrap');
  var anchor = document.getElementById('mapsLinkAnchor');
  var texto  = document.getElementById('mapsLinkTexto');
  if (!wrap) return;
  if (!rua || !cidade) { wrap.style.display = 'none'; return; }
  var endereco = [rua.trim(), num.trim(), cidade.trim(), uf.trim()].filter(Boolean).join(', ');
  var url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(endereco);
  anchor.href = url;
  texto.textContent = endereco;
  wrap.style.display = 'block';
}

function buscarCEP(cep) {
  var limpo = cep.replace(/\D/g, '');
  if (limpo.length !== 8) return;

  var hint = document.getElementById('cepHint');
  hint.textContent = '⏳ Buscando endereço...';
  hint.style.color = 'var(--muted)';

  // CEP via browser (fetch direto — não depende de autorização do backend)
  fetch('https://brasilapi.com.br/api/cep/v1/' + limpo)
    .then(function(r) {
      if (!r.ok) throw new Error('BrasilAPI HTTP ' + r.status);
      return r.json();
    })
    .then(function(j) {
      if (!j.city) throw new Error('CEP sem cidade na BrasilAPI');
      _preencherEndereco({
        logradouro: (j.street        || '').toUpperCase(),
        bairro:     (j.neighborhood  || '').toUpperCase(),
        cidade:     (j.city          || '').toUpperCase(),
        uf:         (j.state         || '').toUpperCase()
      });
      _aoEnderecoPreenchido(hint);
    })
    .catch(function() {
      // Fallback: ViaCEP
      fetch('https://viacep.com.br/ws/' + limpo + '/json/')
        .then(function(r) { return r.json(); })
        .then(function(j) {
          if (j.erro) throw new Error('CEP inválido');
          _preencherEndereco({
            logradouro: (j.logradouro || '').toUpperCase(),
            bairro:     (j.bairro     || '').toUpperCase(),
            cidade:     (j.localidade || '').toUpperCase(),
            uf:         (j.uf         || '').toUpperCase()
          });
          _aoEnderecoPreenchido(hint);
        })
        .catch(function() {
          hint.textContent = '❌ CEP não encontrado.';
          hint.style.color = 'var(--accent)';
        });
    });
}

// Chamado após endereço preenchido com sucesso
function _aoEnderecoPreenchido(hint) {
  hint.textContent = '✅ Endereço preenchido · Selecione o Produto para ver os planos';
  hint.style.color = 'var(--green)';
  document.getElementById('f_num').focus();
  // Se produto já estava selecionado (ex: edição), carrega planos imediatamente
  var produto = document.getElementById('f_produto').value;
  if (produto) onProdutoChange();
}

// Disparado ao selecionar/trocar o Produto
// Usa a cidade já preenchida pelo CEP — não precisa mais de UrlFetchApp
function onProdutoChange() {
  var cidade  = (document.getElementById('f_cidade').value || '').trim();
  var produto = document.getElementById('f_produto').value;
  var hint    = document.getElementById('produtoHint');

  // Limpa planos anteriores
  _preencherPlanos([]);

  if (!produto) return;

  if (!cidade) {
    hint.textContent   = '⚠️ Preencha o CEP primeiro para ver os planos.';
    hint.style.color   = 'var(--yellow)';
    hint.style.display = 'block';
    setTimeout(function() { hint.style.display = 'none'; }, 3000);
    return;
  }

  hint.textContent   = '⏳ Carregando planos para ' + produto + '...';
  hint.style.color   = 'var(--muted)';
  hint.style.display = 'block';

  var selPlano = document.getElementById('f_plano');
  selPlano.disabled  = true;
  selPlano.innerHTML = '<option>⏳ Carregando...</option>';

  // Passa cidade (já preenchida pelo browser) + produto — sem UrlFetchApp
  google.script.run
    .withSuccessHandler(function(d) {
      selPlano.disabled = false;
      if (d.erro) {
        hint.textContent = '⚠️ ' + d.mensagem;
        hint.style.color = 'var(--yellow)';
        _preencherPlanos([]);
        return;
      }
      if (d.planos && d.planos.length > 0) {
        _preencherPlanos(d.planos);
        var qtd = _contarPlanos(d.planos);
        hint.textContent = '✅ ' + qtd + ' plano' + (qtd !== 1 ? 's' : '') + ' disponível' + (qtd !== 1 ? 'is' : '') + ' em ' + d.cidade;
        hint.style.color = 'var(--green)';
        mostrarToast('📦 ' + qtd + ' planos carregados para ' + d.cidade, 'info');
      } else {
        _preencherPlanos([]);
        hint.textContent = '⚠️ Nenhum plano encontrado para ' + produto + ' em ' + cidade + (d.mensagem ? ' (' + d.mensagem + ')' : '');
        hint.style.color = 'var(--yellow)';
      }
    })
    .withFailureHandler(function(err) {
      selPlano.disabled = false;
      _preencherPlanos([]);
      hint.textContent = '❌ Erro: ' + (err && err.message ? err.message : 'tente novamente');
      hint.style.color = 'var(--accent)';
    })
    .getPlanosPorCidadeProduto(cidade, produto);
}

// ─── Helpers CEP/Planos ────────────────────────────────────────────────────

function _preencherEndereco(d) {
  document.getElementById('f_rua').value    = d.logradouro || '';
  document.getElementById('f_bairro').value = d.bairro     || '';
  document.getElementById('f_cidade').value = d.cidade     || '';
  document.getElementById('f_uf').value     = d.uf         || '';
  _atualizarLinkMaps();
  if (d.sistema) {
    document.getElementById('f_sistema').value = d.sistema;
  } else if (d.cidade) {
    // Busca sistema na aba CIDADES via backend (leitura leve, sem UrlFetchApp)
    google.script.run
      .withSuccessHandler(function(s) {
        if (s) document.getElementById('f_sistema').value = s;
      })
      .getSistemaPorCidade(d.cidade);
  }
}

function _preencherPlanos(planos, produto) {
  var sel = document.getElementById('f_plano');
  sel.innerHTML = '';

  if (!planos || planos.length === 0) {
    sel.innerHTML = '<option value="">— Nenhum plano encontrado para esta cidade —</option>';
    return;
  }

  // Primeiro option vazio de instrução
  var optDefault = document.createElement('option');
  optDefault.value = '';
  optDefault.textContent = '— Selecione o plano —';
  sel.appendChild(optDefault);

  planos.forEach(function (item) {
    var opt = document.createElement('option');
    if (item.indexOf('▶️') === 0) {
      // Linha de cabeçalho de categoria — desabilitada, estilizada
      opt.value    = '';
      opt.disabled = true;
      opt.textContent = item;
      opt.style.fontWeight = '700';
      opt.style.color      = '#a78bfa';
    } else {
      opt.value       = item;
      opt.textContent = item;
    }
    sel.appendChild(opt);
  });

  // Se só há 1 plano real, seleciona automaticamente e extrai o valor
  var reais = planos.filter(function (p) { return p.indexOf('▶️') !== 0; });
  if (reais.length === 1) {
    sel.value = reais[0];
    _extrairValorPlano(reais[0]);
  }
}

// Quando o usuário escolhe um plano, extrai e preenche o campo Valor
function _extrairValorPlano(texto) {
  if (!texto) return;
  var partes = texto.split('|');
  if (partes.length >= 2) {
    var val = partes[partes.length - 1].trim().replace(',', '.');
    var num = parseFloat(val);
    if (!isNaN(num)) {
      document.getElementById('f_valor').value = 'R$ ' + num.toFixed(2).replace('.', ',');
      document.getElementById('f_plano').setAttribute('data-valor', num.toFixed(2));
    }
  }
}

function _contarPlanos(planos) {
  if (!planos) return 0;
  return planos.filter(function (p) { return p.indexOf('▶️') !== 0; }).length;
}

// Listener: ao escolher plano, extrai o valor automaticamente
document.addEventListener('DOMContentLoaded', function () {
  var selPlano = document.getElementById('f_plano');
  if (selPlano) {
    selPlano.addEventListener('change', function () {
      _extrairValorPlano(this.value);
    });
  }
});

// ── CARREGAR DADOS ────────────────────────────────────────────
function carregarFunil() {
  // Reseta colunas com loading
  FUNIL_COLUNAS.forEach(function(col) {
    var el = document.getElementById(col.id);
    if (el) el.innerHTML = '<div class="funil-empty">⏳ Carregando...</div>';
    var cnt = document.getElementById(col.countId);
    if (cnt) cnt.textContent = '—';
  });
  document.getElementById('funilCount').textContent = '⏳ Carregando...';

  // Usa função dedicada que filtra só os 3 status do funil
  google.script.run
    .withSuccessHandler(function(res) {
      try {
        // Trata erro retornado pelo backend
        if (!res) {
          throw new Error('Servidor retornou resposta vazia.');
        }
        if (res.erro) {
          throw new Error(res.erro);
        }
        _funilDados = res.dados || [];
        if (_funilDados.length === 0) {
          FUNIL_COLUNAS.forEach(function(col) {
            var el = document.getElementById(col.id);
            if (el) el.innerHTML = '<div class="funil-empty">Nenhuma venda encontrada.</div>';
            var cnt = document.getElementById(col.countId);
            if (cnt) cnt.textContent = '0';
          });
          document.getElementById('funilCount').textContent = '0 vendas no funil';
          return;
        }
        _renderizarFunil();
      } catch(jsErr) {
        FUNIL_COLUNAS.forEach(function(col) {
          var el = document.getElementById(col.id);
          if (el) el.innerHTML = '<div class="funil-empty" style="color:var(--accent);">❌ ' + esc(jsErr.message) + '</div>';
          var cnt = document.getElementById(col.countId);
          if (cnt) cnt.textContent = '!';
        });
        document.getElementById('funilCount').textContent = 'Erro';
        mostrarToast('❌ ' + jsErr.message, 'error');
      }
    })
    .withFailureHandler(function(err) {
      var msg = (err && err.message) ? err.message : 'Erro desconhecido. Verifique o Apps Script.';
      FUNIL_COLUNAS.forEach(function(col) {
        var el = document.getElementById(col.id);
        if (el) el.innerHTML = '<div class="funil-empty" style="color:var(--accent);">❌ ' + esc(msg) + '</div>';
        var cnt = document.getElementById(col.countId);
        if (cnt) cnt.textContent = '!';
      });
      document.getElementById('funilCount').textContent = 'Erro ao carregar';
      mostrarToast('❌ Funil: ' + msg, 'error');
    })
    .getVendasFunil();
}

// ── RENDERIZAR FUNIL ──────────────────────────────────────────
function _renderizarFunil() {
  var totalFunil = 0;

  // Verifica filtro Hoje na coluna Aguardando Instalação
  var filtroHoje = document.getElementById('funilFiltroHoje');
  var apenasHoje = filtroHoje && filtroHoje.checked;
  var labelHoje  = document.getElementById('funilHojeLabel');
  if (labelHoje) labelHoje.classList.toggle('ativo', apenasHoje);

  // Data de hoje nos dois formatos usados pelo sistema
  var agora = new Date();
  var dd  = String(agora.getDate()).padStart(2,'0');
  var mm  = String(agora.getMonth()+1).padStart(2,'0');
  var aaaa = agora.getFullYear();
  var hojeISO = aaaa + '-' + mm + '-' + dd;       // yyyy-MM-dd
  var hojeBR  = dd + '/' + mm + '/' + aaaa;       // dd/MM/yyyy

  FUNIL_COLUNAS.forEach(function(col) {
    var cards = _funilDados.filter(function(v) {
      if (v.status !== col.status) return false;
      // Aplica filtro Hoje apenas na coluna Aguardando Instalação
      if (apenasHoje && col.status === '2- Aguardando Instalação') {
        var ag = v.agenda || '';
        return ag === hojeBR || ag === hojeISO || ag.indexOf(hojeISO) === 0;
      }
      return true;
    });
    totalFunil += cards.length;

    var container = document.getElementById(col.id);
    var contador  = document.getElementById(col.countId);
    if (contador) contador.textContent = cards.length;

    if (cards.length === 0) {
      container.innerHTML = '<div class="funil-empty">Nenhuma venda aqui.<br>Arraste um card para cá.</div>';
    } else if (col.status === '3 - Finalizada/Instalada') {
      // Paginação: exibe 10 por vez, botão "Carregar mais"
      _finalizadaOffset = 0;
      var pagina = cards.slice(0, _finalizadaPageSize);
      var restam = cards.length - _finalizadaPageSize;
      container.innerHTML =
        pagina.map(function(v) { return _criarFunilCard(v, col); }).join('') +
        (restam > 0
          ? '<button id="btnCarregarMaisFinaliz" onclick="_carregarMaisFinaliz()" ' +
            'style="width:100%;margin-top:8px;padding:8px;background:rgba(255,255,255,0.05);' +
            'border:1px solid var(--border);border-radius:8px;color:var(--muted);' +
            'font-size:11px;cursor:pointer;font-family:\'DM Mono\',monospace;">'+
            '⬇ Carregar mais (' + restam + ' restantes)</button>'
          : '');
      // Guarda referência para o botão poder paginar
      container._cardsFinaliz = cards;
    } else {
      container.innerHTML = cards.map(function(v) { return _criarFunilCard(v, col); }).join('');
    }
  });

  document.getElementById('funilCount').textContent =
    totalFunil + ' venda' + (totalFunil !== 1 ? 's' : '') + ' no funil';

  _iniciarDragFunil();
}

// ── CRIAR CARD DO FUNIL ───────────────────────────────────────
function _criarFunilCard(v, col) {
  var hoje       = new Date(); hoje.setHours(0,0,0,0);
  var agendaStr  = _fmtData(v.agenda) || '';
  var agendaBadge = '';

  if (agendaStr) {
    var partes = agendaStr.split('/');
    var agendaDate = partes.length === 3
      ? new Date(partes[2], partes[1]-1, partes[0])
      : new Date(agendaStr);
    var vencido = !isNaN(agendaDate) && agendaDate < hoje;
    agendaBadge =
      '<div class="funil-badge-agenda' + (vencido ? ' vencido' : '') + '">' +
        (vencido ? '⚠️' : '📅') + ' ' + esc(agendaStr) +
        (v.turno ? ' · ' + esc(v.turno.split(' ')[0]) : '') +
      '</div>';
  }

  return (
    '<div class="funil-card" draggable="true"' +
        ' data-linha="' + esc(String(v.linha)) + '"' +
        ' data-status="' + esc(v.status) + '">' +
      '<div class="funil-card-nome">' + esc(v.cliente || 'Sem nome') + '</div>' +
      (v.produto || v.plano
        ? '<div class="funil-card-row">📦 ' + esc((v.produto||'') + (v.plano?' · '+v.plano:'')) + '</div>'
        : '') +
      (v.resp
        ? '<div class="funil-card-row">👤 ' + esc(v.resp) + '</div>'
        : '') +
      (v.dataAtiv
        ? '<div class="funil-card-row">⚡ Ativação: ' + esc(_fmtData(v.dataAtiv)) + '</div>'
        : '') +
      (v.contrato
        ? '<div class="funil-card-row" style="font-size:10px;color:var(--muted)">ID Contrato: ' + esc(v.contrato) + '</div>'
        : '') +
      (v.whats
        ? '<div class="funil-card-row">📱 ' + esc(v.whats) + '</div>'
        : '') +
      agendaBadge +
      '<div style="text-align:right;margin-top:6px"><button onclick="event.stopPropagation();event.preventDefault();_abrirVendaNoLista(' + v.linha + ')" title="Ver na Lista de Vendas" style="background:rgba(230,62,109,.12);border:1px solid rgba(230,62,109,.3);color:var(--accent);border-radius:6px;padding:3px 8px;font-size:10px;font-family:\'DM Mono\',monospace;cursor:pointer;letter-spacing:.5px;">↗ Lista</button></div>' +
    '</div>'
  );
}

// ── PAGINAÇÃO COLUNA FINALIZADA ───────────────────────────────
function _carregarMaisFinaliz() {
  var col = FUNIL_COLUNAS.filter(function(c) { return c.status === '3 - Finalizada/Instalada'; })[0];
  if (!col) return;
  var container = document.getElementById(col.id);
  if (!container || !container._cardsFinaliz) return;
  var cards = container._cardsFinaliz;
  _finalizadaOffset += _finalizadaPageSize;
  var proxima = cards.slice(_finalizadaOffset, _finalizadaOffset + _finalizadaPageSize);
  var restam  = cards.length - (_finalizadaOffset + _finalizadaPageSize);
  // Remove botão antigo
  var btnAntigo = document.getElementById('btnCarregarMaisFinaliz');
  if (btnAntigo) btnAntigo.remove();
  // Adiciona novos cards
  var temp = document.createElement('div');
  temp.innerHTML = proxima.map(function(v) { return _criarFunilCard(v, col); }).join('');
  while (temp.firstChild) container.appendChild(temp.firstChild);
  // Adiciona novo botão se ainda houver mais
  if (restam > 0) {
    var btn = document.createElement('button');
    btn.id = 'btnCarregarMaisFinaliz';
    btn.onclick = _carregarMaisFinaliz;
    btn.style.cssText = 'width:100%;margin-top:8px;padding:8px;background:rgba(255,255,255,0.05);' +
      'border:1px solid var(--border);border-radius:8px;color:var(--muted);' +
      'font-size:11px;cursor:pointer;font-family:\'DM Mono\',monospace;';
    btn.textContent = '⬇ Carregar mais (' + restam + ' restantes)';
    container.appendChild(btn);
  }
  _iniciarDragFunil();
}

// ── DRAG & DROP DO FUNIL ──────────────────────────────────────
function _iniciarDragFunil() {
  document.querySelectorAll('.funil-card').forEach(function(card) {
    card.addEventListener('dragstart', _funilDragStart);
    card.addEventListener('dragend',   _funilDragEnd);
  });
  // Impede que botão ↗ Lista dispare o drag
  document.querySelectorAll('.funil-card button').forEach(function(btn) {
    btn.addEventListener('mousedown', function(e) { e.stopPropagation(); });
  });
  document.querySelectorAll('.funil-col-cards').forEach(function(zone) {
    zone.addEventListener('dragover',  _funilDragOver);
    zone.addEventListener('dragleave', _funilDragLeave);
    zone.addEventListener('drop',      _funilDrop);
  });
}

function _funilDragStart(e) {
  _funilDragCard   = this;
  _funilDragLinha  = this.dataset.linha;
  _funilDragOrigem = this.dataset.status;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _funilDragLinha);
}

function _funilDragEnd() {
  this.classList.remove('dragging');
  document.querySelectorAll('.funil-col').forEach(function(c) { c.classList.remove('drag-over'); });
  document.querySelectorAll('.funil-placeholder').forEach(function(p) { p.remove(); });
  _funilDragCard = null;
}

function _funilDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var col = this.closest('.funil-col');
  if (!col.classList.contains('drag-over')) {
    col.classList.add('drag-over');
    var ph = document.createElement('div');
    ph.className = 'funil-placeholder';
    this.appendChild(ph);
  }
}

function _funilDragLeave(e) {
  if (!this.contains(e.relatedTarget)) {
    this.closest('.funil-col').classList.remove('drag-over');
    this.querySelectorAll('.funil-placeholder').forEach(function(p) { p.remove(); });
  }
}

function _funilDrop(e) {
  e.preventDefault();
  var col        = this.closest('.funil-col');
  var destStatus = col.dataset.status;
  col.classList.remove('drag-over');
  this.querySelectorAll('.funil-placeholder').forEach(function(p) { p.remove(); });

  if (!_funilDragLinha) return;
  if (destStatus === _funilDragOrigem) return; // mesma coluna — ignora

  // Encontra config da coluna de destino
  var colCfg = FUNIL_COLUNAS.find(function(c) { return c.status === destStatus; });
  var venda  = _funilDados.find(function(v) { return String(v.linha) === String(_funilDragLinha); });
  if (!venda) return;

  // Abre modal de confirmação com campo extra se necessário
  _abrirModalMoveFunil(venda, colCfg);
}

// ── MODAL DE CONFIRMAÇÃO ──────────────────────────────────────
function _abrirModalMoveFunil(venda, colCfg) {
  _funilMovePendente = { venda: venda, colCfg: colCfg };

  document.getElementById('modalFunilTitulo').textContent =
    'Mover para "' + colCfg.status + '"';
  document.getElementById('modalFunilStripe').style.background = colCfg.cor;
  document.getElementById('modalFunilDestino').textContent = colCfg.status;
  document.getElementById('modalFunilCliente').textContent = venda.cliente || 'Sem nome';

  // Monta campo extra
  var campoCont = document.getElementById('modalFunilCampo');
  campoCont.innerHTML = '';

  if (colCfg.campo) {
    var c = colCfg.campo;
    var inputHTML = c.tipo === 'textarea'
      ? '<textarea id="funilCampoValor" placeholder="' + esc(c.placeholder) + '"></textarea>'
      : '<input type="' + c.tipo + '" id="funilCampoValor">';

    campoCont.innerHTML =
      '<label>' + esc(c.label) + '</label>' +
      inputHTML +
      '<div class="hint-campo">' + esc(c.hint) + '</div>';
  }

  document.getElementById('modalFunilMove').classList.add('ativo');
  // Foca no campo extra
  setTimeout(function() {
    var inp = document.getElementById('funilCampoValor');
    if (inp) inp.focus();
  }, 120);
}

function _cancelarMoveFunil() {
  document.getElementById('modalFunilMove').classList.remove('ativo');
  _funilMovePendente = null;
}

function _confirmarMoveFunil() {
  if (!_funilMovePendente) return;

  var venda  = _funilMovePendente.venda;
  var colCfg = _funilMovePendente.colCfg;
  var campoVal = '';

  if (colCfg.campo) {
    var inp = document.getElementById('funilCampoValor');
    campoVal = inp ? inp.value.trim() : '';
    if (colCfg.campo.obrigatorio && !campoVal) {
      inp.style.borderColor = 'var(--accent)';
      inp.focus();
      mostrarToast('⚠️ ' + colCfg.campo.label.replace(' *','') + ' é obrigatório.', 'warning');
      return;
    }
  }

  document.getElementById('modalFunilMove').classList.remove('ativo');

  // Monta payload para o backend
  var payload = {
    linha:      venda.linha,
    novoStatus: colCfg.status,
    campoExtra: colCfg.campo ? colCfg.campo.chave : null,
    valorExtra: campoVal
  };

  // Move o card visualmente já (otimista)
  _moverCardFunilVisual(venda, colCfg);

  // Persiste na planilha
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.sucesso) {
        mostrarToast('✅ Movido para "' + colCfg.status + '"', 'success');
        if (colCfg.status === '3 - Finalizada/Instalada') dispararChovaDinheiro();
        // Atualiza dado em memória
        venda.status = colCfg.status;
        if (payload.campoExtra) venda[payload.campoExtra] = payload.valorExtra;
        _atualizarContadoresFunil();
      } else {
        mostrarToast('⚠️ Erro: ' + (res ? res.mensagem : 'tente novamente'), 'error');
        _renderizarFunil(); // reverte
      }
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ Falha: ' + err.message, 'error');
      _renderizarFunil(); // reverte
    })
    .moverVendaFunil(payload);

  _funilMovePendente = null;
}

// Move visualmente sem re-renderizar tudo
function _moverCardFunilVisual(venda, colCfg) {
  // Remove o card da coluna de origem
  var cardEl = document.querySelector('.funil-card[data-linha="' + venda.linha + '"]');
  if (cardEl) cardEl.remove();

  // Adiciona na coluna de destino
  var destContainer = document.getElementById(colCfg.id);
  // Remove empty state se existir
  var empty = destContainer.querySelector('.funil-empty');
  if (empty) empty.remove();

  var novoCardHTML = _criarFunilCard(Object.assign({}, venda, { status: colCfg.status }), colCfg);
  var tmp = document.createElement('div');
  tmp.innerHTML = novoCardHTML;
  var novoCard = tmp.firstChild;
  novoCard.addEventListener('dragstart', _funilDragStart);
  novoCard.addEventListener('dragend',   _funilDragEnd);
  destContainer.appendChild(novoCard);

  // Verifica se coluna de origem ficou vazia
  var origemCfg = FUNIL_COLUNAS.find(function(c) { return c.status === venda.status; });
  if (origemCfg) {
    var origemContainer = document.getElementById(origemCfg.id);
    if (origemContainer && origemContainer.querySelectorAll('.funil-card').length === 0) {
      origemContainer.innerHTML = '<div class="funil-empty">Nenhuma venda aqui.<br>Arraste um card para cá.</div>';
    }
  }

  _atualizarContadoresFunil();
}

function _atualizarContadoresFunil() {
  FUNIL_COLUNAS.forEach(function(col) {
    var container = document.getElementById(col.id);
    var cnt       = document.getElementById(col.countId);
    if (container && cnt) {
      cnt.textContent = container.querySelectorAll('.funil-card').length;
    }
  });
  var total = document.querySelectorAll('.funil-card').length;
  document.getElementById('funilCount').textContent =
    total + ' venda' + (total !== 1 ? 's' : '') + ' no funil';
}

var CAT_ICONS = {
  'VERO MAIS':       '🚀',
  'MUNDO FIBRA':     '⭐',
  'GAMER':           '🎮',
  'ENTRETENIMENTO':  '🎬',

function _catIcon(cat) {
  var upper = cat.toUpperCase();
  for (var key in CAT_ICONS) {
    if (upper.indexOf(key) > -1) return CAT_ICONS[key];
  }
  return '🔹';
}

// ── FAB MENU ──────────────────────────────────────────────────
var _fabHoverTimer = null;

function _fabAbrir() {
  document.getElementById('fabContainer').classList.add('open');
  var ov = document.getElementById('fabOverlay');
  if (ov) ov.classList.add('ativo');
}

function _fabFechar() {
  document.getElementById('fabContainer').classList.remove('open');
  var ov = document.getElementById('fabOverlay');
  if (ov) ov.classList.remove('ativo');
}

function toggleFabMenu(e) {
  if (e) e.stopPropagation();
  var isOpen = document.getElementById('fabContainer').classList.contains('open');
  isOpen ? _fabFechar() : _fabAbrir();
}

function fecharFabMenu() {
  _fabFechar();
}

// Fecha ao clicar fora
document.addEventListener('click', function(e) {
  var fab  = document.getElementById('fabContainer');
  var main = document.getElementById('fabMain');
  if (fab && !fab.contains(e.target) && e.target !== main) {
    _fabFechar();
  }
});

// Abre ao passar o mouse no botão principal
document.addEventListener('DOMContentLoaded', function() {
  var fab  = document.getElementById('fabContainer');
  var main = document.getElementById('fabMain');
  if (!fab || !main) return;

  // Abre no hover do botão principal
  main.addEventListener('mouseenter', function() {
    clearTimeout(_fabHoverTimer);
    _fabAbrir();
  });

  // Fecha quando o mouse sair do container inteiro (com delay pequeno)
  fab.addEventListener('mouseleave', function() {
    _fabHoverTimer = setTimeout(function() {
      _fabFechar();
    }, 200);
  });

  // Cancela o fechar se voltar para o container
  fab.addEventListener('mouseenter', function() {
    clearTimeout(_fabHoverTimer);
  });
});

// ── STEP 1: LISTA DE CIDADES ──────────────────────────────────
function _renderizarSelecaoCidade(cidades) {
  var titulo = document.getElementById('modalOfertasTitulo');
  var foot   = document.getElementById('modalOfertasFoot');
  titulo.textContent = '🔍 Consultar Ofertas';
  foot.style.display = 'none';

  var html =
    '<input class="ofertas-search" type="text" id="ofertasBusca"' +
    ' placeholder="🔎 Buscar cidade..." oninput="_filtrarCidades(this.value)">' +
    '<div class="ofertas-cidade-list" id="ofertasCidadeList">' +
    cidades.map(function(c) {
      return '<div class="ofertas-cidade-item" onclick="_selecionarCidade(\'' +
        c.replace(/'/g, "\\'") + '\')">📍 ' + esc(c) + '</div>';
    }).join('') +
    '</div>';

  document.getElementById('modalOfertasBody').innerHTML = html;
  setTimeout(function() {
    var inp = document.getElementById('ofertasBusca');
    if (inp) inp.focus();
  }, 80);
}

function _filtrarCidades(q) {
  var list  = document.getElementById('ofertasCidadeList');
  var items = list.querySelectorAll('.ofertas-cidade-item');
  var norm  = q.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  items.forEach(function(item) {
    var txt = item.textContent.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    item.style.display = txt.indexOf(norm) > -1 ? '' : 'none';
  });
}

// ── STEP 2: OFERTAS DA CIDADE ─────────────────────────────────
function _selecionarCidade(cidade) {
  var body   = document.getElementById('modalOfertasBody');
  var titulo = document.getElementById('modalOfertasTitulo');
  body.innerHTML = '<div class="ofertas-loading">⏳ Buscando ofertas de ' + esc(cidade) + '...</div>';
  titulo.textContent = '📍 ' + cidade;

  google.script.run
    .withSuccessHandler(function(res) {
      if (res.erro) {
        body.innerHTML = '<div class="ofertas-loading" style="color:var(--accent);">❌ ' + esc(res.mensagem) + '</div>';
        return;
      }
      _renderizarOfertas(res);
    })
    .withFailureHandler(function(err) {
      body.innerHTML = '<div class="ofertas-loading" style="color:var(--accent);">❌ ' + esc(err.message) + '</div>';
    })
    .getOfertasCidade(cidade);
}

function _renderizarOfertas(res) {
  var foot = document.getElementById('modalOfertasFoot');
  foot.style.display = 'flex';

  // Monta texto WhatsApp para o botão copiar
  _ofertasWhatsText = '*📍 OFERTAS: ' + res.cidade + '*\n';
  _ofertasWhatsText += '📱 Móvel: ' + res.telMovel + '\n';
  _ofertasWhatsText += '🌐 Mesh: '  + res.comboMesh + '\n';
  _ofertasWhatsText += '🎬 Roku: '  + res.roku + '\n';
  _ofertasWhatsText += '_Sistema: ' + res.sistema + '_\n\n';

  // Header
  var html =
    '<div class="ofertas-header">' +
      '<div class="ofertas-header-cidade">📍 ' + esc(res.cidade) + '</div>' +
      '<div class="ofertas-header-info">' +
        '<span class="ofertas-header-tag">📱 Móvel: ' + esc(res.telMovel) + '</span>' +
        '<span class="ofertas-header-tag">🌐 Mesh: '  + esc(res.comboMesh) + '</span>' +
        '<span class="ofertas-header-tag">🎬 Roku: '  + esc(res.roku) + '</span>' +
      '</div>' +
      '<div class="ofertas-header-meta">SISTEMA: ' + esc(res.sistema) + ' · SEGMENTO: ' + esc(res.segmentacao) + '</div>' +
    '</div>';

  // Grupos de planos
  res.grupos.forEach(function(grupo) {
    if (!grupo.planos || grupo.planos.length === 0) return;

    var icon = _catIcon(grupo.categoria);
    html +=
      '<div class="ofertas-grupo">' +
        '<div class="ofertas-grupo-titulo">' +
          '<span class="cat-icon">' + icon + '</span>' +
          esc(grupo.categoria.toUpperCase()) +
        '</div>';

    // Whats
    _ofertasWhatsText += icon + ' *' + grupo.categoria.toUpperCase() + '*\n';

    grupo.planos.forEach(function(p) {
      html +=
        '<div class="ofertas-plano-row">' +
          '<span class="ofertas-plano-nome">' + esc(p.nome) + '</span>' +
          '<span class="ofertas-plano-valor">R$ ' + esc(p.valor) + '</span>' +
        '</div>';
      _ofertasWhatsText += '• ' + p.nome + ' — *R$ ' + p.valor + '*\n';
    });

    html += '</div>';
    _ofertasWhatsText += '\n';
  });

  _ofertasWhatsText += '_*Valores para cartão, pix automático e débito em conta. Boleto +R$10,00.*_\n';
  _ofertasWhatsText += '_Sujeito a viabilidade técnica e análise de crédito._';

  html += '<div style="font-size:10px;color:var(--muted);margin-top:8px;font-family:\'DM Mono\',monospace;line-height:1.5;">' +
    '* Valores para cartão, pix automático e débito em conta. Boleto bancário +R$10,00.' +
    '</div>';

  document.getElementById('modalOfertasBody').innerHTML = html;
}

function _ofertasVoltar() {
  // Volta para seleção de cidade
  var body   = document.getElementById('modalOfertasBody');
  var foot   = document.getElementById('modalOfertasFoot');
  var titulo = document.getElementById('modalOfertasTitulo');
  titulo.textContent = '🔍 Consultar Ofertas';
  foot.style.display = 'none';
  body.innerHTML = '<div class="ofertas-loading">⏳ Carregando cidades...</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.erro) _renderizarSelecaoCidade(res.cidades);
    })
    .withFailureHandler(function() {})
    .getCidadesOfertas();
}

function _copiarOfertasWhats() {
  if (!_ofertasWhatsText) return;
  var btn = document.getElementById('btnOfertasWhats');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(_ofertasWhatsText).then(function() {
      btn.innerHTML = '✅ Copiado!';
      setTimeout(function() { btn.innerHTML = '🟢 Copiar WhatsApp'; }, 2000);
    });
  } else {
    // Fallback para browsers sem clipboard API
    var ta = document.createElement('textarea');
    ta.value = _ofertasWhatsText;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    btn.innerHTML = '✅ Copiado!';
    setTimeout(function() { btn.innerHTML = '🟢 Copiar WhatsApp'; }, 2000);
  }
}



'use strict';
// ══════════════════════════════════════════════════════════════
//  KANBAN TRATAMENTO DE LEADS
// ══════════════════════════════════════════════════════════════

var _leadsDados       = [];
var _leadsDragCard    = null;
var _leadsDragLinha   = null;
var _leadsDragOrigem  = null;
var _leadsMovePendente= null;

// Configuração das 4 colunas
var LEADS_COLUNAS = [
  { temp: 'quente',     cardsId: 'leadsCards0', countId: 'leadsCount0', cor: '#e63e6d' },
  { temp: 'morno',      cardsId: 'leadsCards1', countId: 'leadsCount1', cor: '#f7a23b' },
  { temp: 'frio',       cardsId: 'leadsCards2', countId: 'leadsCount2', cor: '#4f9eff' },
  { temp: 'aguardando', cardsId: 'leadsCards3', countId: 'leadsCount3', cor: '#22d98a' }
];

var LEADS_TEMP_LABEL = {
  quente:     { emoji: '🔥', label: 'Quente' },
  morno:      { emoji: '🕑', label: 'Morno' },
  frio:       { emoji: '❄️', label: 'Frio' },
  aguardando: { emoji: '✅', label: 'Ag. Instalação' }
};

// ── CARREGAR ──────────────────────────────────────────────────
function carregarLeads() {
  LEADS_COLUNAS.forEach(function(col) {
    var el = document.getElementById(col.cardsId);
    if (el) el.innerHTML = '<div class="leads-empty">⏳ Carregando...</div>';
    var cnt = document.getElementById(col.countId);
    if (cnt) cnt.textContent = '—';
  });
  document.getElementById('leadsCount').textContent = '⏳';

  google.script.run
    .withSuccessHandler(function(res) {
      try {
        if (!res || res.erro) throw new Error(res ? res.erro : 'Resposta vazia');
        _leadsDados = res.dados || [];
        _renderizarLeads();
      } catch(e) {
        _leadsErro(e.message);
      }
    })
    .withFailureHandler(function(err) {
      _leadsErro(err && err.message ? err.message : 'Erro desconhecido');
    })
    .getVendasLeads();
}

function _leadsErro(msg) {
  LEADS_COLUNAS.forEach(function(col) {
    var el = document.getElementById(col.cardsId);
    if (el) el.innerHTML = '<div class="leads-empty" style="color:var(--accent);">❌ ' + esc(msg) + '</div>';
    var cnt = document.getElementById(col.countId);
    if (cnt) cnt.textContent = '!';
  });
  document.getElementById('leadsCount').textContent = 'Erro';
  mostrarToast('❌ Leads: ' + msg, 'error');
}

// ── RENDERIZAR ────────────────────────────────────────────────
function _renderizarLeads() {
  var total = 0;
  LEADS_COLUNAS.forEach(function(col) {
    var cards = _leadsDados.filter(function(v) { return v.temperatura === col.temp; });
    total += cards.length;
    var container = document.getElementById(col.cardsId);
    var contador  = document.getElementById(col.countId);
    if (contador) contador.textContent = cards.length;
    if (cards.length === 0) {
      container.innerHTML = '<div class="leads-empty">Nenhum lead aqui.</div>';
    } else {
      container.innerHTML = cards.map(function(v) { return _criarLeadCard(v); }).join('');
    }
  });
  document.getElementById('leadsCount').textContent =
    total + ' lead' + (total !== 1 ? 's' : '');
  _iniciarDragLeads();
}

// ── CARD ──────────────────────────────────────────────────────
function _criarLeadCard(v) {
  var t = LEADS_TEMP_LABEL[v.temperatura] || { emoji: '', label: v.temperatura };
  return (
    '<div class="leads-card" draggable="true"' +
        ' data-linha="' + esc(String(v.linha)) + '"' +
        ' data-temp="'  + esc(v.temperatura)   + '">' +
      '<div class="leads-card-nome">' + esc(v.cliente || 'Sem nome') + '</div>' +
      (v.produto ? '<div class="leads-card-row"><span class="leads-produto-badge">' + esc(v.produto) + '</span>' +
        (v.plano ? ' <span style="font-size:10px;color:var(--muted);">' + esc(v.plano) + '</span>' : '') + '</div>' : '') +
      (v.resp     ? '<div class="leads-card-row">👤 ' + esc(v.resp) + '</div>' : '') +
      (v.whats    ? '<div class="leads-card-row">📱 ' + esc(v.whats) + '</div>' : '') +
      (v.agenda   ? '<div class="leads-card-row">📅 ' + esc(v.agenda) + (v.turno ? ' · ' + esc(v.turno.split(' ')[0]) : '') + '</div>' : '') +
      (v.preStatus && v.temperatura !== 'aguardando'
        ? '<div class="leads-temp-badge ' + esc(v.temperatura) + '">' + t.emoji + ' ' + esc(v.preStatus) + '</div>'
        : '') +
      (v.contrato
        ? '<div class="leads-card-row" style="font-size:10px;color:var(--muted)">ID Contrato: ' + esc(v.contrato) + '</div>'
        : '') +
      '<div style="text-align:right;margin-top:6px"><button onclick="event.stopPropagation();event.preventDefault();_abrirVendaNoLista(' + v.linha + ')" title="Ver na Lista de Vendas" style="background:rgba(230,62,109,.12);border:1px solid rgba(230,62,109,.3);color:var(--accent);border-radius:6px;padding:3px 8px;font-size:10px;font-family:\'DM Mono\',monospace;cursor:pointer;letter-spacing:.5px;">↗ Lista</button></div>' +
    '</div>'
  );
}

// ── DRAG & DROP ──��────────────────────────────────────────────
function _iniciarDragLeads() {
  document.querySelectorAll('.leads-card').forEach(function(card) {
    card.addEventListener('dragstart', _leadsDragStart);
    card.addEventListener('dragend',   _leadsDragEnd);
  });
  document.querySelectorAll('.leads-card button').forEach(function(btn) {
    btn.addEventListener('mousedown', function(e) { e.stopPropagation(); });
  });
  document.querySelectorAll('#pageLeads .leads-col-cards').forEach(function(zone) {
    zone.addEventListener('dragover',  _leadsDragOver);
    zone.addEventListener('dragleave', _leadsDragLeave);
    zone.addEventListener('drop',      _leadsDrop);
  });
}

function _leadsDragStart(e) {
  _leadsDragCard  = this;
  _leadsDragLinha = this.dataset.linha;
  _leadsDragOrigem= this.dataset.temp;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _leadsDragLinha);
}

function _leadsDragEnd() {
  this.classList.remove('dragging');
  document.querySelectorAll('#pageLeads .leads-col').forEach(function(c) { c.classList.remove('drag-over'); });
  document.querySelectorAll('.leads-placeholder').forEach(function(p) { p.remove(); });
  _leadsDragCard = null;
}

function _leadsDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var col = this.closest('.leads-col');
  if (!col.classList.contains('drag-over')) {
    col.classList.add('drag-over');
    var ph = document.createElement('div');
    ph.className = 'leads-placeholder';
    this.appendChild(ph);
  }
}

function _leadsDragLeave(e) {
  if (!this.contains(e.relatedTarget)) {
    this.closest('.leads-col').classList.remove('drag-over');
    this.querySelectorAll('.leads-placeholder').forEach(function(p) { p.remove(); });
  }
}

function _leadsDrop(e) {
  e.preventDefault();
  var col      = this.closest('.leads-col');
  var destTemp = col.dataset.temp;
  col.classList.remove('drag-over');
  this.querySelectorAll('.leads-placeholder').forEach(function(p) { p.remove(); });

  if (!_leadsDragLinha) return;
  if (destTemp === _leadsDragOrigem) return;

  // Só permite arrastar PARA aguardando (da esquerda)
  // Dentro das colunas de temperatura permite reordenar livremente
  var venda = _leadsDados.find(function(v) { return String(v.linha) === String(_leadsDragLinha); });
  if (!venda) return;

  if (destTemp === 'aguardando') {
    // Abre modal pedindo os campos
    _abrirModalMoveLeads(venda);
  } else if (_leadsDragOrigem !== 'aguardando') {
    // Move entre colunas de temperatura — só visual, sem salvar no backend
    _moverLeadVisual(venda, destTemp);
    venda.temperatura = destTemp;
    _atualizarContadoresLeads();
    mostrarToast('🔀 Lead movido para ' + (LEADS_TEMP_LABEL[destTemp] || {}).label, 'success');
  }
  // Não permite arrastar de Aguardando de volta
}

// ── MODAL AGUARDANDO ──────────────────────────────────────────
function _abrirModalMoveLeads(venda) {
  _leadsMovePendente = venda;
  document.getElementById('leadsMoviendoCliente').textContent = venda.cliente || 'Sem nome';
  // Limpa campos
  document.getElementById('leadsF_agenda').value   = '';
  document.getElementById('leadsF_turno').value    = '';
  document.getElementById('leadsF_contrato').value = venda.contrato || '';
  document.getElementById('leadsF_obs').value      = '';
  document.getElementById('modalLeadsMove').classList.add('ativo');
  setTimeout(function() { document.getElementById('leadsF_agenda').focus(); }, 100);
}

function _cancelarMoveLeads() {
  document.getElementById('modalLeadsMove').classList.remove('ativo');
  _leadsMovePendente = null;
}

function _confirmarMoveLeads() {
  if (!_leadsMovePendente) return;
  var venda   = _leadsMovePendente;
  var agenda  = document.getElementById('leadsF_agenda').value.trim();
  var turno   = document.getElementById('leadsF_turno').value.trim();
  var contrato= document.getElementById('leadsF_contrato').value.trim();
  var obs     = document.getElementById('leadsF_obs').value.trim();

  if (!agenda) {
    document.getElementById('leadsF_agenda').style.borderColor = 'var(--accent)';
    document.getElementById('leadsF_agenda').focus();
    mostrarToast('⚠️ Data de Agendamento é obrigatória.', 'warning');
    return;
  }
  if (!turno) {
    document.getElementById('leadsF_turno').style.borderColor = 'var(--accent)';
    document.getElementById('leadsF_turno').focus();
    mostrarToast('⚠��� Turno é obrigatório.', 'warning');
    return;
  }

  document.getElementById('modalLeadsMove').classList.remove('ativo');

  // Move visualmente já
  _moverLeadVisual(venda, 'aguardando');
  venda.temperatura = 'aguardando';
  venda.status      = '2- Aguardando Instalação';
  venda.agenda      = agenda;
  venda.turno       = turno;
  _atualizarContadoresLeads();

  var payload = {
    linha:    venda.linha,
    agenda:   agenda,
    turno:    turno,
    contrato: contrato,
    obs:      obs
  };

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.sucesso) {
        mostrarToast('✅ Lead movido para Ag. Instalação!', 'success');
      } else {
        mostrarToast('⚠️ Erro: ' + (res ? res.mensagem : 'tente novamente'), 'error');
        _renderizarLeads();
      }
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ Falha: ' + err.message, 'error');
      _renderizarLeads();
    })
    .moverLeadAguardando(payload);

  _leadsMovePendente = null;
}

// ── MOVE VISUAL ───────────────────────────────────────────────
function _moverLeadVisual(venda, novaTemp) {
  var cardEl = document.querySelector('.leads-card[data-linha="' + venda.linha + '"]');
  if (cardEl) cardEl.remove();

  var destCol = LEADS_COLUNAS.find(function(c) { return c.temp === novaTemp; });
  if (!destCol) return;
  var container = document.getElementById(destCol.cardsId);
  var empty = container.querySelector('.leads-empty');
  if (empty) empty.remove();

  var novoHTML = _criarLeadCard(Object.assign({}, venda, { temperatura: novaTemp }));
  var tmp = document.createElement('div');
  tmp.innerHTML = novoHTML;
  var novoCard = tmp.firstChild;
  novoCard.addEventListener('dragstart', _leadsDragStart);
  novoCard.addEventListener('dragend',   _leadsDragEnd);
  container.appendChild(novoCard);

  // Verifica se origem ficou vazia
  var origemCol = LEADS_COLUNAS.find(function(c) { return c.temp === venda.temperatura; });
  if (origemCol) {
    var origemContainer = document.getElementById(origemCol.cardsId);
    if (origemContainer && origemContainer.querySelectorAll('.leads-card').length === 0) {
      origemContainer.innerHTML = '<div class="leads-empty">Nenhum lead aqui.</div>';
    }
  }
}

function _atualizarContadoresLeads() {
  LEADS_COLUNAS.forEach(function(col) {
    var container = document.getElementById(col.cardsId);
    var cnt       = document.getElementById(col.countId);
    if (container && cnt) cnt.textContent = container.querySelectorAll('.leads-card').length;
  });
  var total = document.querySelectorAll('#pageLeads .leads-card').length;
  document.getElementById('leadsCount').textContent = total + ' lead' + (total !== 1 ? 's' : '');
}



'use strict';
// ══════════════════════════════════════════════════════════════
//  PAGAMENTOS PAP
// ══════════════════════════════════════════════════════════════

var _papDados  = [];   // todos os registros
var _papFiltro = '';   // vendedor selecionado no filtro

// ── CARREGAR ──────────────────────────────────────────────────
function carregarPAP() {
  document.getElementById('papTbody').innerHTML =
    '<tr><td colspan="8" class="pap-empty">⏳ Carregando pagamentos...</td></tr>';
  document.getElementById('papResumo').innerHTML =
    '<div style="padding:14px;color:var(--muted);font-size:12px;">⏳</div>';
  document.getElementById('papCount').textContent = '—';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || res.erro) {
        document.getElementById('papTbody').innerHTML =
          '<tr><td colspan="8" class="pap-empty" style="color:var(--accent);">❌ ' +
          esc((res && res.erro) || 'Erro ao carregar') + '</td></tr>';
        return;
      }
      _papDados  = res.dados || [];
      _papFiltro = '';
      _renderizarResumoPAP(res.resumo || [], res.totalValor || 0);
      _popularFiltroPAP(res.resumo || []);
      _filtrarPAP();
    })
    .withFailureHandler(function(err) {
      document.getElementById('papTbody').innerHTML =
        '<tr><td colspan="8" class="pap-empty" style="color:var(--accent);">❌ ' +
        esc(err.message) + '</td></tr>';
      mostrarToast('❌ PAP: ' + err.message, 'error');
    })
    .getPagamentosPAP();
}

// ── RESUMO ────────────────────────────────────────────────────
function _renderizarResumoPAP(resumo, totalValor) {
  var html =
    '<div class="pap-resumo-card total">' +
      '<div class="pap-resumo-label">Total Geral</div>' +
      '<div class="pap-resumo-valor">R$ ' + _fmtVal(totalValor) + '</div>' +
      '<div class="pap-resumo-sub">' + _papDados.length + ' pagamento' + (_papDados.length !== 1 ? 's' : '') + ' em aberto</div>' +
    '</div>';

  resumo.forEach(function(v) {
    html +=
      '<div class="pap-resumo-card" onclick="_selecionarVendedorPAP(\'' + esc(v.nome.replace(/'/g,"\\'")) + '\')" style="cursor:pointer;">' +
        '<div class="pap-resumo-label">' + esc(v.nome) + '</div>' +
        '<div class="pap-resumo-valor">R$ ' + _fmtVal(v.total) + '</div>' +
        '<div class="pap-resumo-sub">' + v.qtd + ' venda' + (v.qtd !== 1 ? 's' : '') +
          (v.chavePix ? ' · PIX: ' + esc(v.chavePix) : '') +
        '</div>' +
      '</div>';
  });

  document.getElementById('papResumo').innerHTML = html;
}

function _selecionarVendedorPAP(nome) {
  document.getElementById('papFiltroVendedor').value = nome;
  _filtrarPAP();
}

function _popularFiltroPAP(resumo) {
  var sel = document.getElementById('papFiltroVendedor');
  sel.innerHTML = '<option value="">Todos os vendedores</option>';
  resumo.forEach(function(v) {
    var opt = document.createElement('option');
    opt.value = v.nome; opt.textContent = v.nome + ' (' + v.qtd + ')';
    sel.appendChild(opt);
  });
}

// ── FILTRAR + RENDERIZAR TABELA ───────────────────────────────
function _filtrarPAP() {
  var filtro = document.getElementById('papFiltroVendedor').value;
  _papFiltro = filtro;
  var lista = filtro
    ? _papDados.filter(function(v) { return v.resp === filtro; })
    : _papDados;
  _renderizarTabelaPAP(lista);
}

function _renderizarTabelaPAP(lista) {
  var count = document.getElementById('papCount');
  count.textContent = lista.length + ' registro' + (lista.length !== 1 ? 's' : '');

  if (lista.length === 0) {
    document.getElementById('papTbody').innerHTML =
      '<tr><td colspan="8" class="pap-empty">✅ Nenhum pagamento em aberto.</td></tr>';
    return;
  }

  var html = lista.map(function(v) {
    return (
      '<tr id="papRow_' + v.linha + '">' +
        '<td class="pap-data">'     + esc(v.dataInstal || '—') + '</td>' +
        '<td><div class="pap-cliente">' + esc(v.cliente || '—') + '</div></td>' +
        '<td class="pap-vendedor">' + esc(v.resp || '—') + '</td>' +
        '<td class="pap-contrato">' + esc(v.contrato || '—') + '</td>' +
        '<td style="font-size:11px;">' +
          '<span style="font-weight:700;">' + esc(v.produto) + '</span>' +
          (v.plano ? '<br><span style="color:var(--muted);">' + esc(v.plano) + '</span>' : '') +
        '</td>' +
        '<td class="pap-valor">R$ ' + _fmtVal(v.comissao) + '</td>' +
        '<td class="pap-pix" title="' + esc(v.chavePix) + '">' + esc(v.chavePix || '—') + '</td>' +
        '<td>' +
          '<div class="pap-acoes">' +
            '<button class="pap-btn pap-btn-pago" id="papBtnPago_' + v.linha + '" onclick="_abrirModalPagoPAP(' + v.linha + ')">💸 Pagar e Notificar</button>' +

    );
  }).join('');

  document.getElementById('papTbody').innerHTML = html;

var _papPagosSessao = [];

function _registrarPagoSessao(v) {

function _enviarResumoPAP() {
  if (_papPagosSessao.length === 0) {
    mostrarToast('Nenhum pagamento realizado nesta sessão.', 'warning');
    return;
  }
  var btnResumo = document.getElementById('papBtnResumo');
  if (btnResumo) { btnResumo.disabled = true; btnResumo.textContent = '⏳ Enviando...'; }

  var total = 0;
  var linhas = _papPagosSessao.map(function(p, i) {
    total += p.comissao;
    return (i + 1) + '. ' + p.resp + ' — ' + p.cliente + ' — R$ ' + _fmtVal(p.comissao);
  });

  var msg =
    '📊 *Resumo de Pagamentos PAP*\n' +
    '━━━━━━━━━━━━━━━━━━\n' +
    linhas.join('\n') + '\n' +
    '━━━━━━━━━━━━━━━━━━\n' +
    '💰 *Total: R$ ' + _fmtVal(total) + '*\n' +
    '📝 Qtd: ' + _papPagosSessao.length + ' pagamento' + (_papPagosSessao.length > 1 ? 's' : '');

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.sucesso) {
        mostrarToast('📩 Resumo enviado com sucesso!', 'success');
        _papPagosSessao = [];
        if (btnResumo) { btnResumo.style.display = 'none'; btnResumo.disabled = false; btnResumo.textContent = '📩 Enviar Resumo'; }
      } else {
        mostrarToast('⚠️ ' + (res ? res.mensagem : 'Erro ao enviar resumo'), 'error');
        if (btnResumo) { btnResumo.disabled = false; btnResumo.textContent = '📩 Enviar Resumo'; }
      }
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ Falha: ' + err.message, 'error');
      if (btnResumo) { btnResumo.disabled = false; btnResumo.textContent = '📩 Enviar Resumo'; }
    })
    .enviarResumoPAPAdmin(msg);
}

var _papModalLinha = null;

function _abrirModalPagoPAP(linha) {
  var v = _papDados.find(function(x) { return x.linha === linha; });
  if (!v) return;
  _papModalLinha = linha;

  var msg = _montarMsgPAP(v);
  var semWhats = !v.whatsapp;

  document.getElementById('modalPAPTexto').innerHTML =
    'Confirmar pagamento de <strong>R$ ' + _fmtVal(v.comissao) + '</strong> para <strong>' + esc(v.resp) + '</strong>?';

  document.getElementById('modalPAPInfo').innerHTML =
    '<div style="white-space:pre-wrap;font-size:12px;line-height:1.6;">' + esc(msg).replace(/\n/g, '<br>') + '</div>' +
    (semWhats ? '<div style="margin-top:8px;color:var(--warning,#f5a623);font-weight:600;">⚠️ Vendedor sem WhatsApp — a mensagem não será enviada.</div>' :
    '<div style="margin-top:8px;color:var(--green);font-size:11px;">📲 Mensagem será enviada para o vendedor via BotConversa.</div>');

  document.getElementById('modalConfirmPAP').classList.add('ativo');
}

function _fecharModalPAP() {
  document.getElementById('modalConfirmPAP').classList.remove('ativo');
  _papModalLinha = null;
}

// ── CONFIRMAR PAGAMENTO + NOTIFICAÇÃO ─────────────────────────
function _confirmarPagoPAP() {
  var linha = _papModalLinha;
  if (!linha) return;
  var v = _papDados.find(function(x) { return x.linha === linha; });
  if (!v) return;

  // Fecha modal imediatamente (padrão optimistic)
  _fecharModalPAP();

  // Feedback visual no botão da tabela
  var btnEl = document.getElementById('papBtnPago_' + linha);
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = '⏳'; }

  var msg = _montarMsgPAP(v);

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.sucesso) {
        // Remove da lista local
        _papDados = _papDados.filter(function(x) { return x.linha !== linha; });
        // Risca a linha visualmente antes de remover
        var row = document.getElementById('papRow_' + linha);
        if (row) {
          row.classList.add('pago-ok');
          setTimeout(function() { _filtrarPAP(); }, 800);
        }
        // Atualiza resumo
        var totalAtual = _papDados.reduce(function(s, x) { return s + x.comissao; }, 0);
        var resumoAtualizado = {};
        _papDados.forEach(function(x) {
          if (!resumoAtualizado[x.resp]) resumoAtualizado[x.resp] = { nome: x.resp, total: 0, qtd: 0, chavePix: x.chavePix };
          resumoAtualizado[x.resp].total += x.comissao;
          resumoAtualizado[x.resp].qtd++;
        });
        var arr = Object.keys(resumoAtualizado).map(function(k) { return resumoAtualizado[k]; });
        arr.sort(function(a,b) { return b.total - a.total; });
        _renderizarResumoPAP(arr, totalAtual);
        _popularFiltroPAP(arr);

        // Acumula para o resumo da sessão
        _registrarPagoSessao(v);

        // Toast com detalhe da notificação
        if (res.notificacao) {
          mostrarToast('✅ Pago e vendedor notificado!', 'success');
        } else {
          mostrarToast('✅ ' + (res.mensagem || 'Pagamento registrado!'), 'success');
        }
      } else {
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = '💸 Pagar e Notificar'; }
        mostrarToast('⚠️ Erro: ' + (res ? res.mensagem : 'tente novamente'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      if (btnEl) { btnEl.disabled = false; btnEl.textContent = '💸 Pagar e Notificar'; }
      mostrarToast('❌ Falha: ' + err.message, 'error');
    })
    .marcarPagoENotificarPAP({ linha: linha, mensagem: msg, whatsapp: v.whatsapp || '' });
}

function _fmtVal(v) {
  return parseFloat(v || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

// ══════════════════════════════════════════════════════════════════════
//  WIZARD — Navegação do formulário de Novo Cadastro
// ══════════════════════════════════════════════════════════════════════

var _wizStep  = 0;
var _wizTotal = 4;

// Campos obrigatórios por step (id do campo → id do grupo para marcar erro)
var _wizValidacao = {
  0: [
    { campo: 'f_status',    grp: 'grp_status',    msg: 'Selecione um status.'    },
    { campo: 'f_canal',     grp: 'grp_canal',     msg: 'Selecione um canal.'     },
    { campo: 'f_preStatus', grp: 'grp_preStatus', msg: 'Selecione o pré-status.' }
  ],
  1: [
    { campo: 'f_cliente', grp: 'grp_cliente', msg: 'Nome é obrigatório.'        },
    { campo: 'f_cpf',     grp: 'grp_cpf',     msg: 'CPF / CNPJ é obrigatório.' },
    { campo: 'f_whats',   grp: 'grp_whats',   msg: 'WhatsApp é obrigatório.'   },
    { campo: 'f_resp',    grp: 'grp_resp',     msg: 'Responsável é obrigatório.'}
  ],
  2: [
    { campo: 'f_cep',    grp: 'grp_cep',    msg: 'CEP é obrigatório.'              },
    { campo: 'f_cidade', grp: 'grp_cidade', msg: 'Cidade é obrigatória.'           },
    { campo: 'f_bairro', grp: 'grp_bairro', msg: 'Bairro é obrigatório.'           },
    { campo: 'f_rua',    grp: 'grp_rua',    msg: 'Rua / Logradouro é obrigatório.' },
    { campo: 'f_num',    grp: 'grp_num',    msg: 'Número é obrigatório.'           },
    { campo: 'f_uf',     grp: 'grp_uf',     msg: 'UF é obrigatória.'              }
  ],
  3: [
    { campo: 'f_sistema', grp: 'grp_sistema', msg: 'Sistema é obrigatório.' }
  ]
};

// Navega direto para um step clicando no ícone da barra
function wizIr(destino) {
  // Só valida se for avançar
  if (destino > _wizStep) {
    for (var s = _wizStep; s < destino; s++) {
      if (!_wizValidarStep(s)) return;
    }
  }
  // Marca steps intermediários como done
  for (var i = 0; i < _wizTotal; i++) {
    var dot = document.getElementById('wizDot' + i);
    if (!dot) continue;
    dot.classList.remove('active', 'done');
    if (i < destino) dot.classList.add('done');
    else if (i === destino) dot.classList.add('active');
  }
  _wizStep = destino;
  _wizAtualizar();
}

function wizNav(dir) {
  // Valida antes de avançar
  if (dir > 0 && !_wizValidarStep(_wizStep)) return;

  var proximo = _wizStep + dir;
  if (proximo < 0 || proximo >= _wizTotal) return;

  // Marca step atual como done se avançando
  var dotAtual = document.getElementById('wizDot' + _wizStep);
  if (dotAtual) {
    dotAtual.classList.remove('active');
    if (dir > 0) dotAtual.classList.add('done');
  }

  _wizStep = proximo;
  _wizAtualizar();
}

function _wizValidarStep(step) {
  var regras = _wizValidacao[step] || [];
  var ok = true;
  regras.forEach(function(r) {
    var el  = document.getElementById(r.campo);
    var grp = document.getElementById(r.grp);
    var val = el ? el.value.trim() : '';
    if (!val) {
      ok = false;
      if (grp) grp.classList.add('has-error');
      // Remove o erro quando o campo for preenchido
      if (el) el.addEventListener('input', function() {
        if (this.value.trim()) grp && grp.classList.remove('has-error');
      }, { once: true });
    }
  });
  if (!ok) mostrarToast('⚠️ Preencha os campos obrigatórios antes de continuar.', 'warning');
  return ok;
}

// Campos obrigatórios/importantes para calcular progresso real
var _wizCamposProgresso = [
  'f_status','f_canal','f_preStatus',                      // step 0
  'f_cliente','f_cpf','f_whats','f_resp',                  // step 1
  'f_cep','f_cidade','f_bairro','f_rua','f_num','f_uf',    // step 2
  'f_sistema'                                              // step 3
];

function _calcularProgresso() {
  var total = _wizCamposProgresso.length;
  var preenchidos = 0;
  _wizCamposProgresso.forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.value && el.value.trim() !== '') preenchidos++;
  });
  return Math.round((preenchidos / total) * 100);
}

function _wizAtualizar() {
  // Painéis
  for (var i = 0; i < _wizTotal; i++) {
    var panel = document.getElementById('wizPanel' + i);
    if (panel) panel.classList.toggle('active', i === _wizStep);
    var dot   = document.getElementById('wizDot' + i);
    if (dot)  dot.classList.toggle('active', i === _wizStep);
  }

  // Barra de progresso por campos preenchidos
  var pct  = _calcularProgresso();
  var fill = document.getElementById('wizFill');
  if (fill) fill.style.width = pct + '%';

  // Mostrar percentual na barra
  var infoEl = document.getElementById('wizProgressPct');
  if (infoEl) infoEl.textContent = pct + '%';

  // Info de passo
  var info = document.getElementById('wizNavInfo');
  if (info) info.textContent = 'Passo ' + (_wizStep + 1) + ' de ' + _wizTotal;

  // Botões nav e salvar
  var btnBack = document.getElementById('wizBtnBack');
  var btnNext = document.getElementById('wizBtnNext');
  var btnSave = document.getElementById('wizBtnSave');
  if (btnBack) btnBack.style.visibility = _wizStep === 0 ? 'hidden' : 'visible';
  if (btnNext) btnNext.style.visibility = _wizStep === _wizTotal - 1 ? 'hidden' : 'visible';
  if (btnSave) btnSave.style.display    = _wizStep === _wizTotal - 1 ? '' : 'none';
}

// Mostra erro num step específico (chamado pelo salvar() em caso de falha)
function wizMostrarErroStep(stepIdx, mensagem) {
  // Navega até o step com erro
  _wizStep = stepIdx;
  _wizAtualizar();
  mostrarToast('❌ ' + mensagem, 'error');
}

// Reset do wizard ao limpar formulário
var _wizResetar = function() {
  _wizStep = 0;
  // Limpa estados dos dots
  for (var i = 0; i < _wizTotal; i++) {
    var dot = document.getElementById('wizDot' + i);
    if (dot) { dot.classList.remove('active', 'done'); }
  }
  var dot0 = document.getElementById('wizDot0');
  if (dot0) dot0.classList.add('active');
  _wizAtualizar();
};

// Inicializa quando a página do formulário é ativada (chamado pelo navegar())
function wizInit() {
  _wizStep = 0;
  for (var i = 0; i < _wizTotal; i++) {
    var dot = document.getElementById('wizDot' + i);
    if (dot) { dot.classList.remove('active','done'); if(i===0) dot.classList.add('active'); }
  }
  _wizAtualizar();
  // Adiciona listeners para atualizar barra ao preencher campos
  _wizCamposProgresso.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
      el.addEventListener('input',  _wizAtualizar);
      el.addEventListener('change', _wizAtualizar);
    }
  });
}

// ─── XSS ───────────────────────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str)));
  return d.innerHTML;
}

// Converte qualquer formato de data para DD/MM/AAAA
function _fmtData(val) {
  if (!val) return '';
  var s = String(val).trim();
  // Já está em DD/MM/AAAA
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  // Formato yyyy-MM-dd
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    var p = s.substring(0,10).split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }
  // Tenta via Date
  var d = new Date(s);
  if (!isNaN(d.getTime())) {
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' +
           d.getFullYear();
  }
  return s;
}

function _iniciais(nome) {
  var partes = String(nome || '').trim().split(/[\s.]+/).filter(Boolean);
  if (partes.length >= 2) return (partes[0][0] + partes[1][0]).toUpperCase();
  return partes[0] ? partes[0].slice(0, 2).toUpperCase() : '??';
}

function mostrarToast(msg, tipo) {
  tipo = tipo || 'success';
  var t = document.createElement('div');
  t.className = 'toast ' + tipo;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function () {
    t.style.opacity = '0';
    t.style.transform = 'translateX(110%)';
    t.style.transition = 'all 0.3s';
    setTimeout(function () { if (t.parentNode) t.remove(); }, 320);
  }, 3200);
}

  if (pctEl) pctEl.textContent = pct + '%';
