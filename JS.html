var _bcFluxosCache = null;   // cache local (session) da lista de fluxos
var _bcModalTipo   = '';     // 'cliente' ou 'resp'
var _bcModalIndex  = null;   // índice em _paginaAtual

// Abre o modal de seleção de fluxo
// tipo: 'cliente' | 'resp'   index: posição em _paginaAtual
// filtro (opcional): string para filtrar fluxos pelo nome (ex: '🟣PAP')
function abrirModalBotConversa(tipo, index, filtro) {
  _bcModalTipo  = tipo;
  _bcModalIndex = index;

  var v      = _paginaAtual[index];
  var titulo = document.getElementById('modalBCTitulo');
  var foot   = document.getElementById('modalBCFoot');
  var body   = document.getElementById('modalBCBody');

  titulo.textContent = tipo === 'cliente'
    ? '🤖 Fluxo → ' + esc(v.cliente || 'Cliente')
    : '📨 Fluxo → ' + esc(v.resp    || 'Responsável');

  foot.style.display = 'none';
  body.innerHTML = '<div class="ofertas-loading">⏳ Carregando fluxos...</div>';
  document.getElementById('modalBotConversa').classList.add('ativo');

  _bcCarregarFluxos(function(lista) {
    // Aplica filtro de pasta se informado
    var listFiltrada = filtro
      ? lista.filter(function(f) { return f.name.indexOf(filtro) !== -1; })
      : lista;

    if (!listFiltrada || !listFiltrada.length) {
      body.innerHTML = '<div class="ofertas-loading" style="color:var(--accent);">❌ Nenhum fluxo encontrado' +
        (filtro ? ' na pasta "' + esc(filtro) + '".' : '.') + '</div>';
      return;
    }
    var html = '<div style="padding:4px 0 8px;">' +
      '<label style="display:block;font-size:12px;color:var(--text2);margin-bottom:8px;">Selecione o fluxo a disparar:</label>' +
      '<select id="bcSelectFluxo" style="width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;color-scheme:dark;">';
    listFiltrada.forEach(function(f) {
      html += '<option value="' + f.id + '" style="background:var(--surface2);color:var(--text);">' + esc(f.name) + '</option>';
    });
    html += '</select></div>';
    body.innerHTML = html;
    foot.style.display = 'flex';
  });
}

// Carrega a lista de fluxos uma vez por sessão (cache em memória)
function _bcCarregarFluxos(callback) {
  if (_bcFluxosCache) { callback(_bcFluxosCache); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      if (res.erro || !res.lista) { callback(null); return; }
      _bcFluxosCache = res.lista;
      callback(_bcFluxosCache);
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ ' + (err && err.message ? err.message : 'Erro ao carregar fluxos'), 'error');
      callback(null);
    })
    .getBotConversaFlows();
}

function fecharModalBotConversa() {
  document.getElementById('modalBotConversa').classList.remove('ativo');
}

// MODAL ASSERTIVA — Consulta CPF
// ═══════════════════════════════════════════════════════════════════════════
function abrirModalConsultaCPF() {
  abrirModalAssertiva('');
}

function abrirModalAssertiva(cpfPreenchido) {
  var modal = document.getElementById('modalAssertiva');
  var body  = document.getElementById('modalAssertivaBody');
  var foot  = document.getElementById('modalAssertivaFoot');
  document.getElementById('modalAssertivaTitulo').textContent = '👤 Consultar CPF';

  body.innerHTML =
    '<div class="assertiva-input-row">' +
      '<input type="text" id="assertivaCpfInput" placeholder="Digite o CPF" maxlength="14" ' +
        'oninput="_maskCpfAssertiva(this)" onkeydown="if(event.key===\'Enter\')_executarConsultaAssertiva()">' +
      '<button onclick="_executarConsultaAssertiva()" id="btnAssertivaBuscar">Buscar</button>' +
    '</div>' +
    '<div id="assertivaResultado"></div>';
  foot.style.display = 'none';
  modal.classList.add('ativo');

  if (cpfPreenchido) {
    var inp = document.getElementById('assertivaCpfInput');
    inp.value = _formatarCpfAssertiva(cpfPreenchido.replace(/\D/g, ''));
    setTimeout(function() { _executarConsultaAssertiva(); }, 100);
  } else {
    setTimeout(function() { document.getElementById('assertivaCpfInput').focus(); }, 150);
  }
}

function fecharModalAssertiva() {
  document.getElementById('modalAssertiva').classList.remove('ativo');
}

function _maskCpfAssertiva(el) {
  var v = el.value.replace(/\D/g, '').substring(0, 11);
  el.value = _formatarCpfAssertiva(v);
}

function _formatarCpfAssertiva(v) {
  if (v.length > 9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, '$1.$2.$3-$4');
  if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
  if (v.length > 3) return v.replace(/(\d{3})(\d+)/, '$1.$2');
  return v;
}

function _executarConsultaAssertiva() {
  var inp = document.getElementById('assertivaCpfInput');
  var cpf = (inp ? inp.value : '').replace(/\D/g, '');
  if (cpf.length !== 11) { mostrarToast('Informe um CPF com 11 dígitos.', 'error'); return; }

  var btn = document.getElementById('btnAssertivaBuscar');
  var res = document.getElementById('assertivaResultado');
  btn.disabled = true; btn.textContent = '...';
  res.innerHTML = '<div class="assertiva-loading"><div class="assertiva-loading-spin"></div>Consultando Assertiva...</div>';

  google.script.run
    .withSuccessHandler(function(data) {
      btn.disabled = false; btn.textContent = 'Buscar';
      _renderResultadoAssertiva(data);
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; btn.textContent = 'Buscar';
      res.innerHTML = '<div class="assertiva-erro">❌ ' + esc(err.message || 'Erro desconhecido') + '</div>';
    })
    .consultarAssertivaCPF(cpf);
}

function _renderResultadoAssertiva(data) {
  var container = document.getElementById('assertivaResultado');
  var foot      = document.getElementById('modalAssertivaFoot');

  if (!data || data.erro) {
    container.innerHTML = '<div class="assertiva-erro">⚠ ' + esc(data ? data.mensagem : 'Sem resposta') + '</div>';
    foot.style.display = 'flex';
    return;
  }

  var d = data.dados || {};
  var html = '';

  // Card de identidade
  var sit = (d.situacaoCadastral || '').toLowerCase();
  var badgeClass = d.obitoProvavel ? 'obito' : (sit.indexOf('regular') !== -1 ? 'regular' : 'irregular');
  var badgeLabel = d.obitoProvavel ? '⚠ Óbito Provável' : (d.situacaoCadastral || '—');
  var iniciais = (d.nome || '?').trim().split(' ').map(function(p){ return p[0]; }).slice(0,2).join('');

  html += '<div class="assertiva-id-card">' +
    '<div class="assertiva-id-avatar">' + esc(iniciais) + '</div>' +
    '<div class="assertiva-id-info">' +
      '<div class="assertiva-id-nome">' + esc(d.nome || '—') + '</div>' +
      '<div class="assertiva-id-cpf">' + esc(_formatarCpfAssertiva(d.cpf || '')) +
        (d.dataNascimento ? ' · ' + esc(d.dataNascimento) : '') +
        (d.idade ? ' · ' + esc(String(d.idade)) + ' anos' : '') +
      '</div>' +
      '<span class="assertiva-status-badge ' + badgeClass + '">' + esc(badgeLabel) + '</span>' +
    '</div>' +
  '</div>';

  // Dados Pessoais
  html += '<div class="assertiva-secao">' +
    '<div class="assertiva-secao-titulo">Dados Pessoais</div>' +
    _campoAssertiva('Sexo', d.sexo) +
    _campoAssertiva('Nome da Mãe', d.nomeMae) +
  '</div>';

  // Telefones
  if (d.telefones && d.telefones.length) {
    html += '<div class="assertiva-secao">' +
      '<div class="assertiva-secao-titulo">Telefones (' + d.telefones.length + ')</div>';
    for (var t = 0; t < d.telefones.length && t < 10; t++) {
      var tel = d.telefones[t];
      var isCel = tel.tipo && tel.tipo.toLowerCase().indexOf('cel') !== -1;
      html += '<div class="assertiva-lista-item">' +
        '<span class="assertiva-lista-icon">' + (isCel ? '📱' : '📞') + '</span>' +
        '<div class="assertiva-lista-info">' +
          '<div class="assertiva-lista-principal">' + esc(tel.numero || '—') +
            (tel.tipo ? '<span class="assertiva-tag' + (isCel ? ' celular' : '') + '">' + esc(tel.tipo) + '</span>' : '') +
          '</div>' +
          (tel.operadora ? '<div class="assertiva-lista-detalhe">' + esc(tel.operadora) + '</div>' : '') +
        '</div>' +
      '</div>';
    }
    html += '</div>';
  }

  // Endereços
  if (d.enderecos && d.enderecos.length) {
    html += '<div class="assertiva-secao">' +
      '<div class="assertiva-secao-titulo">Endereços (' + d.enderecos.length + ')</div>';
    for (var e = 0; e < d.enderecos.length && e < 5; e++) {
      var end = d.enderecos[e];
      var rua = [end.logradouro, end.numero, end.complemento, end.bairro].filter(Boolean).join(', ');
      var cidade = [end.cidade, end.uf, end.cep].filter(Boolean).join(' — ');
      html += '<div class="assertiva-lista-item">' +
        '<span class="assertiva-lista-icon">📍</span>' +
        '<div class="assertiva-lista-info">' +
          '<div class="assertiva-lista-principal">' + esc(rua || '—') + '</div>' +
          (cidade ? '<div class="assertiva-lista-detalhe">' + esc(cidade) + '</div>' : '') +
        '</div>' +
      '</div>';
    }
    html += '</div>';
  }

  // Emails
  if (d.emails && d.emails.length) {
    html += '<div class="assertiva-secao">' +
      '<div class="assertiva-secao-titulo">E-mails (' + d.emails.length + ')</div>';
    for (var m = 0; m < d.emails.length && m < 5; m++) {
      html += '<div class="assertiva-lista-item">' +
        '<span class="assertiva-lista-icon">✉</span>' +
        '<div class="assertiva-lista-info">' +
          '<div class="assertiva-lista-principal">' + esc(d.emails[m]) + '</div>' +
        '</div>' +
      '</div>';
    }
    html += '</div>';
  }

  container.innerHTML = html;
  foot.style.display = 'flex';
}

function _campoAssertiva(label, valor) {
  if (!valor && valor !== 0) return '';
  return '<div class="assertiva-campo">' +
    '<span class="assertiva-campo-label">' + esc(label) + '</span>' +
    '<span class="assertiva-campo-valor">' + esc(String(valor)) + '</span>' +
  '</div>';
}

// ── CONSULTA ASSERTIVA (CPF / Telefone / Nome) ────────────────────────────

function abrirModalConsultaAssertiva() {
  document.getElementById('modalAssertivaTitulo').textContent = '🔍 Consultar Assertiva';
  document.getElementById('modalAssertivaFoot').style.display = 'none';
  _renderAbaAssertiva('telefone');
  document.getElementById('modalAssertiva').classList.add('ativo');
}

// mantém compatibilidade caso algum outro lugar ainda chame o nome antigo
function abrirModalConsultaTelefone() { abrirModalConsultaAssertiva(); }

function _renderAbaAssertiva(tipo) {
  var defs = {
    cpf:      { label: 'CPF',          icon: '🪪', placeholder: '000.000.000-00', maxlen: 14, inputType: 'text',  oninput: 'oninput="_maskCpfAssertiva(this)"' },
    telefone: { label: 'Telefone',     icon: '📞', placeholder: '(00) 00000-0000', maxlen: 15, inputType: 'tel',   oninput: 'oninput="_maskTelAssertiva(this)"' },
    nome:     { label: 'Nome Completo',icon: '🔤', placeholder: 'Nome completo da pessoa', maxlen: 100, inputType: 'text', oninput: '' }
  };

  var tabsHtml = '<div class="assertiva-tabs">';
  ['cpf','telefone','nome'].forEach(function(t) {
    var d = defs[t];
    tabsHtml += '<button class="assertiva-tab' + (t === tipo ? ' ativo' : '') + '" onclick="_renderAbaAssertiva(\'' + t + '\')">' +
      d.icon + ' ' + d.label + '</button>';
  });
  tabsHtml += '</div>';

  var cf = defs[tipo];
  var inputHtml =
    '<div class="assertiva-input-row">' +
      '<input type="' + cf.inputType + '" id="assertivaInput" placeholder="' + cf.placeholder + '" maxlength="' + cf.maxlen + '" ' +
        cf.oninput + ' onkeydown="if(event.key===\'Enter\')_executarConsultaAssertiva()">' +
      '<button onclick="_executarConsultaAssertiva()" id="btnAssertivaBuscar">Buscar</button>' +
    '</div>';

  var body = document.getElementById('modalAssertivaBody');
  body.innerHTML = tabsHtml + inputHtml + '<div id="assertivaResultado"></div>';
  body.dataset.tipo = tipo;

  setTimeout(function() {
    var inp = document.getElementById('assertivaInput');
    if (inp) inp.focus();
  }, 80);
}

function _maskCpfAssertiva(el) {
  var v = el.value.replace(/\D/g, '').substring(0, 11);
  if (v.length > 9)      el.value = v.replace(/(\d{3})(\d{3})(\d{3})(\d+)/, '$1.$2.$3-$4');
  else if (v.length > 6) el.value = v.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
  else if (v.length > 3) el.value = v.replace(/(\d{3})(\d+)/, '$1.$2');
  else                   el.value = v;
}

function _maskTelAssertiva(el) {
  var v = el.value.replace(/\D/g, '').substring(0, 11);
  if (v.length > 10)     el.value = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
  else if (v.length > 6) el.value = v.replace(/(\d{2})(\d{4,5})(\d*)/, '($1) $2-$3');
  else if (v.length > 2) el.value = v.replace(/(\d{2})(\d+)/, '($1) $2');
  else                   el.value = v;
}

function _executarConsultaAssertiva() {
  var inp  = document.getElementById('assertivaInput');
  var val  = (inp ? inp.value : '').trim();
  var tipo = (document.getElementById('modalAssertivaBody').dataset.tipo) || 'telefone';
  var btn  = document.getElementById('btnAssertivaBuscar');
  var res  = document.getElementById('assertivaResultado');

  var loading = '<div class="assertiva-loading"><div class="assertiva-loading-spin"></div>Consultando Assertiva...</div>';

  function onErr(err) {
    btn.disabled = false; btn.textContent = 'Buscar';
    res.innerHTML = '<div class="assertiva-erro">❌ ' + esc((err && err.message) || 'Erro desconhecido') + '</div>';
  }

  if (tipo === 'cpf') {
    var digitos = val.replace(/\D/g, '');
    if (digitos.length !== 11) { mostrarToast('Informe um CPF válido (11 dígitos).', 'error'); return; }
    btn.disabled = true; btn.textContent = '...';
    res.innerHTML = loading;
    google.script.run
      .withSuccessHandler(function(data) { btn.disabled = false; btn.textContent = 'Buscar'; _renderResultadoCPF(data); })
      .withFailureHandler(onErr)
      .consultarAssertivaCPF(digitos);

  } else if (tipo === 'telefone') {
    var tel = val.replace(/\D/g, '');
    if (tel.length < 10 || tel.length > 11) { mostrarToast('Informe um telefone com DDD (10 ou 11 dígitos).', 'error'); return; }
    btn.disabled = true; btn.textContent = '...';
    res.innerHTML = loading;
    google.script.run
      .withSuccessHandler(function(data) { btn.disabled = false; btn.textContent = 'Buscar'; _renderResultadoPessoas(data, 'telefone'); })
      .withFailureHandler(onErr)
      .consultarAssertivaTelefone(tel);

  } else {
    if (val.length < 5) { mostrarToast('Informe ao menos 5 letras do nome.', 'error'); return; }
    btn.disabled = true; btn.textContent = '...';
    res.innerHTML = loading;
    google.script.run
      .withSuccessHandler(function(data) { btn.disabled = false; btn.textContent = 'Buscar'; _renderResultadoPessoas(data, 'nome'); })
      .withFailureHandler(onErr)
      .consultarAssertivaNome(val);
  }
}

// Renderiza resultado da consulta por CPF (dados completos: 1 pessoa + telefones/endereços/emails)
function _renderResultadoCPF(data) {
  var container = document.getElementById('assertivaResultado');
  var foot      = document.getElementById('modalAssertivaFoot');

  if (!data || data.erro || !data.dados) {
    container.innerHTML = '<div class="assertiva-erro">⚠ ' + esc(data ? data.mensagem : 'Sem resposta') + '</div>';
    foot.style.display = 'flex'; return;
  }

  var d = data.dados;
  var iniciais = (d.nome || '?').trim().split(' ').map(function(p){ return p[0]; }).slice(0,2).join('');

  var statusClass = d.obitoProvavel ? 'obito' :
                    (d.situacaoCadastral && d.situacaoCadastral.toLowerCase().indexOf('regular') >= 0 ? 'regular' : 'irregular');
  var statusLabel = d.obitoProvavel ? '⚠ Óbito Provável' : (d.situacaoCadastral || '');

  var html =
    '<div class="assertiva-id-card">' +
      '<div class="assertiva-id-avatar">' + esc(iniciais) + '</div>' +
      '<div class="assertiva-id-info">' +
        '<div class="assertiva-id-nome">' + esc(d.nome || '—') + '</div>' +
        '<div class="assertiva-id-cpf">' + esc(_formatarCpfAssertiva(d.cpf || '')) +
          (d.dataNascimento ? ' · ' + esc(d.dataNascimento) : '') +
        '</div>' +
        (statusLabel ? '<span class="assertiva-status-badge ' + statusClass + '">' + esc(statusLabel) + '</span>' : '') +
      '</div>' +
    '</div>';

  var campos = '';
  if (d.nomeMae)       campos += _campoAssertiva('Nome da Mãe', d.nomeMae);
  if (d.sexo)          campos += _campoAssertiva('Sexo', d.sexo);
  if (d.idade)         campos += _campoAssertiva('Idade', d.idade + ' anos');
  if (campos) html += '<div class="assertiva-secao"><div class="assertiva-secao-titulo">Dados Pessoais</div>' + campos + '</div>';

  if (d.telefones && d.telefones.length) {
    var telHtml = '<div class="assertiva-secao"><div class="assertiva-secao-titulo">📞 Telefones</div>';
    d.telefones.forEach(function(t) {
      var isCel = (t.tipo || '').toLowerCase().indexOf('cel') >= 0;
      telHtml += '<div class="assertiva-lista-item">' +
        '<span class="assertiva-lista-icon">' + (isCel ? '📱' : '☎️') + '</span>' +
        '<div class="assertiva-lista-info">' +
          '<div class="assertiva-lista-principal">' + esc(t.numero || '') +
            (t.tipo ? '<span class="assertiva-tag' + (isCel ? ' celular' : '') + '">' + esc(t.tipo) + '</span>' : '') +
          '</div>' +
          (t.operadora ? '<div class="assertiva-lista-detalhe">' + esc(t.operadora) + '</div>' : '') +
        '</div></div>';
    });
    html += telHtml + '</div>';
  }

  if (d.enderecos && d.enderecos.length) {
    var endHtml = '<div class="assertiva-secao"><div class="assertiva-secao-titulo">📍 Endereços</div>';
    d.enderecos.forEach(function(e) {
      var linha1 = [e.logradouro, e.numero, e.complemento].filter(Boolean).join(', ');
      var linha2 = [e.bairro, e.cidade + (e.uf ? '/' + e.uf : ''), e.cep].filter(Boolean).join(' · ');
      endHtml += '<div class="assertiva-lista-item">' +
        '<span class="assertiva-lista-icon">🏠</span>' +
        '<div class="assertiva-lista-info">' +
          (linha1 ? '<div class="assertiva-lista-principal">' + esc(linha1) + '</div>' : '') +
          (linha2 ? '<div class="assertiva-lista-detalhe">' + esc(linha2) + '</div>' : '') +
        '</div></div>';
    });
    html += endHtml + '</div>';
  }

  if (d.emails && d.emails.length) {
    var emHtml = '<div class="assertiva-secao"><div class="assertiva-secao-titulo">✉️ E-mails</div>';
    d.emails.forEach(function(em) {
      emHtml += '<div class="assertiva-lista-item">' +
        '<span class="assertiva-lista-icon">✉️</span>' +
        '<div class="assertiva-lista-info"><div class="assertiva-lista-principal">' + esc(em) + '</div></div></div>';
    });
    html += emHtml + '</div>';
  }

  container.innerHTML = html;
  foot.style.display = 'flex';
}

// Renderiza lista de pessoas (resultado de busca por telefone ou nome)
function _renderResultadoPessoas(data, origem) {
  var container = document.getElementById('assertivaResultado');
  var foot      = document.getElementById('modalAssertivaFoot');

  if (!data || data.erro) {
    container.innerHTML = '<div class="assertiva-erro">⚠ ' + esc(data ? data.mensagem : 'Sem resposta') + '</div>';
    foot.style.display = 'flex'; return;
  }

  var pessoas = data.pessoas || [];
  if (!pessoas.length) {
    var label = origem === 'nome' ? 'este nome' : 'este telefone';
    container.innerHTML = '<div class="assertiva-erro">Nenhum resultado encontrado para ' + label + '.</div>';
    foot.style.display = 'flex'; return;
  }

  var html = '';
  pessoas.forEach(function(d) {
    var iniciais = (d.nome || '?').trim().split(' ').map(function(p){ return p[0]; }).slice(0,2).join('');
    html += '<div class="assertiva-id-card">' +
      '<div class="assertiva-id-avatar">' + esc(iniciais) + '</div>' +
      '<div class="assertiva-id-info">' +
        '<div class="assertiva-id-nome">' + esc(d.nome || '—') + '</div>' +
        '<div class="assertiva-id-cpf">' + esc(_formatarCpfAssertiva(d.cpf || '')) +
          (d.dataNascimento ? ' · ' + esc(d.dataNascimento) : '') +
        '</div>' +
      '</div>' +
    '</div>';
    var campos = '';
    if (d.nomeMae) campos += _campoAssertiva('Nome da Mãe', d.nomeMae);
    if (campos) html += '<div class="assertiva-secao"><div class="assertiva-secao-titulo">Dados Pessoais</div>' + campos + '</div>';
    if (d.cidade || d.uf) {
      html += '<div class="assertiva-secao"><div class="assertiva-secao-titulo">Localização</div>' +
        '<div class="assertiva-lista-item"><span class="assertiva-lista-icon">📍</span>' +
        '<div class="assertiva-lista-info"><div class="assertiva-lista-principal">' +
          esc([d.cidade, d.uf].filter(Boolean).join(' — ')) +
        '</div></div></div></div>';
    }
  });

  container.innerHTML = html;
  foot.style.display = 'flex';
}

// alias legado
function _renderResultadoTelefone(data) { _renderResultadoPessoas(data, 'telefone'); }

// Confirma e dispara o fluxo selecionado
function _bcConfirmar() {
  var sel = document.getElementById('bcSelectFluxo');
  if (!sel || !sel.value) return;
  var flowId = parseInt(sel.value);
  var btn    = document.getElementById('btnBCConfirmar');
  btn.disabled    = true;
  btn.textContent = '⏳ Enviando...';

  var v        = _paginaAtual[_bcModalIndex];
  var fnBack   = _bcModalTipo === 'cliente' ? 'dispararFluxoCliente' : 'dispararFluxoResponsavel';
  var payload  = _bcModalTipo === 'cliente'
    ? { linha: v.linha, flowId: flowId }
    : { nomeResp: v.resp, flowId: flowId };

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled    = false;
      btn.textContent = '▶ Disparar';
      if (res && res.sucesso) {
        mostrarToast('✅ ' + res.mensagem, 'success');
        fecharModalBotConversa();
      } else {
        mostrarToast('❌ ' + (res ? res.mensagem : 'Erro desconhecido'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled    = false;
      btn.textContent = '▶ Disparar';
      mostrarToast('❌ ' + (err && err.message ? err.message : 'Erro de comunicação'), 'error');
    })
    [fnBack](payload);
}

// ══════════════════════════════════════════════════════════════════════════
//  ANIMAÇÕES DE CELEBRAÇÃO
//  Atualizado em: 18/03/2026 | v2 — reescrito com CSS @keyframes para
//  garantir funcionamento em todos os contextos do GAS (sem depender de
//  requestAnimationFrame + loop JS, que pode ser afetado por throttling
//  ou sobreposição de CSS do container pai).
// ══════════════════════════════════════════════════════════════════════════

// Injeta os @keyframes uma única vez no <head>
function _dhpEnsureAnimCSS() {
  if (document.getElementById('_dhpAnimCSS')) return;
  var s = document.createElement('style');
  s.id = '_dhpAnimCSS';
  s.textContent =
    '@keyframes _dhpConfeteFall{' +
      'from{transform:translateY(0) rotate(0deg);opacity:1}' +
      '88%{opacity:1}' +
      'to{transform:translateY(110vh) rotate(var(--dhpRot,720deg));opacity:0}' +
    '}' +
    '@keyframes _dhpMoneyFall{' +
      'from{transform:translateY(0) rotate(0deg);opacity:1}' +
      '78%{opacity:1}' +
      'to{transform:translateY(110vh) rotate(var(--dhpRot,360deg));opacity:0}' +
    '}';
  (document.head || document.documentElement).appendChild(s);
}

function dispararConfete() {
  var cores = ['#26C9FF','#FF6B6B','#FFD93D','#6BCB77','#FF922B','#cc5de8','#f06595'];
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var notas = [523, 659, 784, 1047];
    notas.forEach(function(freq, idx) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + idx * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + idx * 0.12 + 0.3);
      osc.start(ctx.currentTime + idx * 0.12);
      osc.stop(ctx.currentTime + idx * 0.12 + 0.3);
    });
  } catch(e) {}
  var total = 150;
  for (var i = 0; i < total; i++) {
    (function(i) {
      setTimeout(function() {
        var papel = document.createElement('div');
        papel.style.cssText = [
          'position:fixed','top:-20px',
          'left:' + Math.random() * 100 + 'vw',
          'width:' + (Math.random() * 10 + 6) + 'px',
          'height:' + (Math.random() * 6 + 4) + 'px',
          'background:' + cores[Math.floor(Math.random() * cores.length)],
          'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px'),
          'opacity:1','z-index:99999','pointer-events:none',
          'transform:rotate(' + Math.random() * 360 + 'deg)',
          'transition:none'
        ].join(';');
        document.body.appendChild(papel);
        var duracao = Math.random() * 2000 + 2000;
        var xDesvio = (Math.random() - 0.5) * 200;
        var start = null;
        function animar(ts) {
          if (!start) start = ts;
          var prog = (ts - start) / duracao;
          if (prog >= 1) { papel.remove(); return; }
          papel.style.transform = 'translate(' + (xDesvio * Math.sin(prog * Math.PI * 3)) + 'px,' + (prog * window.innerHeight * 1.2) + 'px) rotate(' + (prog * 720) + 'deg)';
          papel.style.opacity = prog < 0.8 ? 1 : (1 - prog) / 0.2;
          requestAnimationFrame(animar);
        }
        requestAnimationFrame(animar);
      }, i * 15);
    })(i);
  }
}

function dispararChovaDinheiro() {
  var itens = ['💰','💵','💸','🤑','💴','💶'];
  // Som de "cha-ching": triângulo metálico seguido de fanfarra ascendente
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Ping inicial (caixa registradora)
    var pingFreqs = [2093, 2093];
    pingFreqs.forEach(function(freq, idx) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.35, ctx.currentTime + idx * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + idx * 0.08 + 0.18);
      osc.start(ctx.currentTime + idx * 0.08);
      osc.stop(ctx.currentTime + idx * 0.08 + 0.18);
    });
    // Fanfarra ascendente após o ping
    var fanfarra = [523, 659, 784, 988, 1319];
    fanfarra.forEach(function(freq, idx) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.22, ctx.currentTime + 0.22 + idx * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22 + idx * 0.1 + 0.28);
      osc.start(ctx.currentTime + 0.22 + idx * 0.1);
      osc.stop(ctx.currentTime + 0.22 + idx * 0.1 + 0.28);
    });
  } catch(e) {}

  var total = 60;
  for (var i = 0; i < total; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        var tam = Math.random() * 18 + 24;
        el.textContent = itens[Math.floor(Math.random() * itens.length)];
        el.style.cssText = [
          'position:fixed',
          'top:-50px',
          'left:' + Math.random() * 100 + 'vw',
          'font-size:' + tam + 'px',
          'line-height:1',
          'user-select:none',
          'opacity:1',
          'z-index:99999',
          'pointer-events:none',
          'transition:none'
        ].join(';');
        document.body.appendChild(el);
        var duracao = Math.random() * 2500 + 2800;
        var xDesvio = (Math.random() - 0.5) * 160;
        var start = null;
        function animar(ts) {
          if (!start) start = ts;
          var prog = (ts - start) / duracao;
          if (prog >= 1) { el.remove(); return; }
          // Sway mais suave (2 ciclos) e rotação lenta — dinheiro flutua, não gira rápido
          el.style.transform = 'translate(' + (xDesvio * Math.sin(prog * Math.PI * 2)) + 'px,' + (prog * window.innerHeight * 1.2) + 'px) rotate(' + (prog * 360) + 'deg)';
          el.style.opacity = prog < 0.75 ? 1 : (1 - prog) / 0.25;
          requestAnimationFrame(animar);
        }
        requestAnimationFrame(animar);
      }, i * 30);
    })(i);
  }
}

// ── BUSCA GLOBAL (topbar) ────────────────────────────────────────────────────
// Fecha dropdown ao clicar fora da search-wrap
document.addEventListener('click', function(e) {
  var inp  = document.getElementById('buscaGlobal');
  var drop = document.getElementById('buscaGlobalDropdown');
  if (!drop) return;
  if (inp && inp.closest('.topbar-search-wrap').contains(e.target)) return;
  drop.classList.remove('aberto');
  drop.innerHTML = '';
});

var _bgTimer = null; // debounce timer da busca global

function buscaGlobalInstantanea(valor) {
  var drop = document.getElementById('buscaGlobalDropdown');
  if (!drop) return;
  clearTimeout(_bgTimer);
  _bgTimer = setTimeout(function() { _execBuscaGlobal(valor, drop); }, 200);
}

function _execBuscaGlobal(valor, drop) {
  var q    = String(valor || '').trim();
  var qL   = q.toLowerCase();
  var qNum = q.replace(/\D/g, '');

  if (q.length < 2) {
    drop.classList.remove('aberto');
    drop.innerHTML = '';
    return;
  }

  // Cache já populado → filtra localmente (0 round-trip)
  if (_dadosListaCache && _dadosListaCache.length > 0) {
    var res = _dadosListaCache.filter(function(v) {
      return String(v.cliente  || '').toLowerCase().indexOf(qL) > -1 ||
             String(v.contrato || '').toLowerCase().indexOf(qL) > -1 ||
             (qNum.length >= 3 && String(v.cpf || '').replace(/\D/g,'').indexOf(qNum) > -1);
    });
    _renderBuscaGlobalDrop(drop, res.slice(0, 8), q);
    return;
  }

  // Cache ainda não disponível → avisa e aguarda prefetch (max 3s)
  drop.innerHTML = '<div class="busca-drop-empty">⏳ Carregando dados…</div>';
  drop.classList.add('aberto');
  var tries = 0;
  var poll = setInterval(function() {
    tries++;
    if (_dadosListaCache && _dadosListaCache.length > 0) {
      clearInterval(poll);
      var inpEl = document.getElementById('buscaGlobal');
      _execBuscaGlobal(inpEl ? inpEl.value : q, drop);
    } else if (tries >= 15) {
      clearInterval(poll);
      drop.innerHTML = '<div class="busca-drop-empty">Abra a Lista primeiro para usar a busca rápida.</div>';
    }
  }, 200);
}

function _renderBuscaGlobalDrop(drop, resultados, q) {
  if (!resultados.length) {
    drop.innerHTML = '<div class="busca-drop-empty">Nenhum resultado para "' + esc(q) + '"</div>';
    drop.classList.add('aberto');
    return;
  }
  var html = resultados.map(function(v) {
    var meta = [];
    if (v.contrato) meta.push('Contrato: ' + esc(v.contrato));
    if (v.cpf)      meta.push('CPF: '      + esc(v.cpf));
    if (v.resp)     meta.push(esc(v.resp));
    return '<div class="busca-drop-item" onclick="_bgAbrirVenda(' + v.linha + ')">' +
      '<div class="busca-drop-nome">' + esc(v.cliente || '—') + '</div>' +
      '<div class="busca-drop-meta">' +
        (v.status ? '<span style="color:var(--accent);font-weight:600;">' + esc(v.status) + '</span>' : '') +
        meta.map(function(m){ return '<span>' + m + '</span>'; }).join('') +
      '</div>' +
    '</div>';
  }).join('');
  drop.innerHTML = html;
  drop.classList.add('aberto');
}

function _bgAbrirVenda(linha) {
  var drop  = document.getElementById('buscaGlobalDropdown');
  var input = document.getElementById('buscaGlobal');
  if (drop)  { drop.classList.remove('aberto'); drop.innerHTML = ''; }
  if (input) input.value = '';
  _abrirVendaNoLista(linha);
}
