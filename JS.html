<script>

'use strict';

// Atualizado em: 16/03/2026 | Fix painel, logout, timer, turno, confetes, campos móvel, regra status3

function pifOnStatusChange(novoStatus) {
  var v = AppState.get('vendaSelecionada');
  if (!v) return;
  var statusAtual = v.status || '';

  // Status 2 — Aguardando Instalação
  if (novoStatus === '2- Aguardando Instalação' && statusAtual !== '2- Aguardando Instalação') {
    document.getElementById('pif-status').value = statusAtual;
    _abrirModalStatus2();
    return;
  }

  // Status 3 — Finalizada/Instalada (só permitido se vier de Aguardando Instalação)
  if (novoStatus === '3 - Finalizada/Instalada' && statusAtual !== '3 - Finalizada/Instalada') {
    if (statusAtual !== '2- Aguardando Instalação') {
      document.getElementById('pif-status').value = statusAtual;
      mostrarToast('⚠️ A venda precisa estar em Aguardando Instalação para ser finalizada.', 'warning');
      return;
    }
    document.getElementById('pif-status').value = statusAtual;
    _abrirModalStatus3();
    return;
  }

  // Pré-Status só faz sentido em Conferencia/Ativação
  var grpPreStatus = document.getElementById('pif-preStatus');
  if (grpPreStatus) {
    var ehConf = novoStatus === '1- Conferencia/Ativação';
    grpPreStatus.disabled = !ehConf;
    grpPreStatus.style.opacity = ehConf ? '' : '0.35';
    if (!ehConf) grpPreStatus.value = '';
  }
}

function pifValidarContrato(valor) {
  var sistema = document.getElementById('pif-sistema') ? document.getElementById('pif-sistema').value : '';
  var hint = document.getElementById('pif-contrato-hint');
  if (!hint) return;
  var err = _validarContratoFormato(valor, sistema);
  hint.textContent = err || '';
  hint.style.display = err ? '' : 'none';
}

function ms2ValidarContrato(valor) {
  var sistema = document.getElementById('ms2-sistema') ? document.getElementById('ms2-sistema').value : '';
  var hint = document.getElementById('ms2-err-contrato-fmt');
  if (!hint) return;
  var err = _validarContratoFormato(valor, sistema);
  hint.textContent = err || '';
  hint.style.display = err ? '' : 'none';
}

// Busca CEP no formulário inline
function pifBuscarCEP(cep) {
  var limpo = cep.replace(/\D/g, '');
  if (limpo.length !== 8) return;

  var hint = document.getElementById('pif-cepHint');
  hint.textContent = '⏳ Buscando...';
  hint.style.color = 'var(--muted)';

  fetch('https://brasilapi.com.br/api/cep/v1/' + limpo)
    .then(function(r) { if (!r.ok) throw new Error('err'); return r.json(); })
    .then(function(j) {
      if (!j.city) throw new Error('sem cidade');
      _pifPreencherEndereco({ logradouro: (j.street||'').toUpperCase(), bairro: (j.neighborhood||'').toUpperCase(), cidade: (j.city||'').toUpperCase(), uf: (j.state||'').toUpperCase() });
      _pifAoEnderecoOk(hint);
    })
    .catch(function() {
      fetch('https://viacep.com.br/ws/' + limpo + '/json/')
        .then(function(r) { return r.json(); })
        .then(function(j) {
          if (j.erro) throw new Error('inválido');
          _pifPreencherEndereco({ logradouro: (j.logradouro||'').toUpperCase(), bairro: (j.bairro||'').toUpperCase(), cidade: (j.localidade||'').toUpperCase(), uf: (j.uf||'').toUpperCase() });
          _pifAoEnderecoOk(hint);
        })
        .catch(function() {
          hint.textContent = '❌ CEP não encontrado.';
          hint.style.color = 'var(--accent)';
        });
    });
}

function _pifPreencherEndereco(d) {
  _pifSet('pif-rua',    d.logradouro || '');
  _pifSet('pif-bairro', d.bairro     || '');
  _pifSet('pif-cidade', d.cidade     || '');
  _pifSet('pif-uf',     d.uf         || '');
}

function _pifAoEnderecoOk(hint) {
  hint.textContent = '✅ Endereço preenchido';
  hint.style.color = 'var(--green)';
  var cidade = document.getElementById('pif-cidade').value;
  if (cidade) _pifCarregarSistemaSegmentacao(cidade);
  var produto = document.getElementById('pif-produto').value;
  if (produto) pifOnProdutoChange();
}

function _pifCarregarSistemaSegmentacao(cidade) {
  google.script.run
    .withSuccessHandler(function(s) {
      if (s) {
        document.getElementById('pif-sistema').value           = s;
        document.getElementById('pif-sistema-display').textContent = s;
        document.getElementById('pif-infoGeoWrap').style.display   = 'grid';
      }
    })
    .withFailureHandler(function() {})
    .getSistemaPorCidade(cidade);

  google.script.run
    .withSuccessHandler(function(s) {
      if (s) {
        document.getElementById('pif-segmentacao').value              = s;
        document.getElementById('pif-segmentacao-display').textContent = s;
        document.getElementById('pif-infoGeoWrap').style.display      = 'grid';
      }
    })
    .withFailureHandler(function() {})
    .getSegmentacaoPorCidade(cidade);
}

// Produto → carrega planos no inline form
function pifOnProdutoChange() {
  var cidade  = (document.getElementById('pif-cidade').value || '').trim();
  var produto = document.getElementById('pif-produto').value;
  var hint    = document.getElementById('pif-produtoHint');
  var selPlano = document.getElementById('pif-plano');

  selPlano.innerHTML = '<option value="">⏳ Carregando...</option>';
  selPlano.disabled  = true;
  document.getElementById('pif-valor').value = '';

  if (!produto || !cidade) {
    selPlano.innerHTML = '<option value="">— Preencha o CEP primeiro —</option>';
    selPlano.disabled = false;
    if (hint) { hint.textContent = '⚠️ Preencha o CEP antes.'; hint.style.color = 'var(--yellow)'; }
    return;
  }

  google.script.run
    .withSuccessHandler(function(d) {
      selPlano.disabled = false;
      if (!d || d.erro || !d.planos || d.planos.length === 0) {
        selPlano.innerHTML = '<option value="">— Nenhum plano —</option>';
        if (hint) { hint.textContent = '⚠️ Nenhum plano para esta cidade.'; hint.style.color = 'var(--yellow)'; }
        return;
      }
      _pifPreencherPlanos(d.planos);
      var qtd = d.planos.filter(function(p) { return p.indexOf('▶️') === -1; }).length;
      if (hint) { hint.textContent = '✅ ' + qtd + ' plano(s)'; hint.style.color = 'var(--green)'; }
    })
    .withFailureHandler(function() {
      selPlano.disabled = false;
      selPlano.innerHTML = '<option value="">— Erro —</option>';
    })
    .getPlanosPorCidadeProduto(cidade, produto);

  // Mostrar/ocultar seção Móvel
  var ehMovel = produto.toUpperCase().indexOf('MÓVEL') > -1 || produto.toUpperCase().indexOf('MOVEL') > -1;
  var secaoMovel = document.getElementById('pif-secao-movel');
  if (secaoMovel) secaoMovel.style.display = ehMovel ? '' : 'none';

  // Atualiza opções de status conforme o tipo
  _filtrarStatusPorProduto(produto);
}

function _validarContratoFormato(valor, sistema) {
  if (!valor) return null;
  var v = String(valor).trim();
  if (!/^\d+$/.test(v)) return 'ID inválido. Use apenas números.';
  var sis = (sistema || '').toUpperCase();
  var msgErro = 'ID inválido. Use:\n• NG: 9 dígitos começando com 202\n• Adapter: 7 dígitos começando com 3';
  if (sis.indexOf('NG') > -1)      return /^202\d{6}$/.test(v) ? null : msgErro;
  if (sis.indexOf('ADAPTER') > -1) return /^3\d{6}$/.test(v)   ? null : msgErro;
  return (/^202\d{6}$/.test(v) || /^3\d{6}$/.test(v)) ? null : msgErro;
}

function _filtrarStatusPorProduto(produto, statusAtual) {
  var sel = document.getElementById('pif-status');
  if (!sel) return;

  var p = (produto || '').toUpperCase();
  var ehMovel = p.indexOf('MÓVEL') > -1 || p.indexOf('MOVEL') > -1;
  var ehFibra = p.indexOf('FIBRA') > -1;

  if (!ehMovel && !ehFibra) return; // produto desconhecido — não mexe no select

  var opcoesMovel = [
    '1- Conferencia/Ativação',
    '2- Aguardando Entrega',
    '3- Aguardando Retirada',
    '4- Entregue',
    '5 - Finalizado',
    'Pendencia Vero',
    'Cancelado',
    'Cancelamento Técnico',
    'Cancelamento Comercial',
    'Churn',
    'Devolvido'
  ];
  var opcoesFibra = [
    '1- Conferencia/Ativação',
    '2- Aguardando Instalação',
    '3 - Finalizada/Instalada',
    'Pendencia Vero',
    'Cancelado',
    'Cancelamento Técnico',
    'Cancelamento Comercial',
    'Churn',
    'Devolvido'
  ];

  var lista   = ehMovel ? opcoesMovel : opcoesFibra;
  var atual   = statusAtual || sel.value;
  sel.innerHTML = '';
  lista.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    if (s === atual) opt.selected = true;
    sel.appendChild(opt);
  });
}

function _pifPreencherPlanos(planos) {
  var sel = document.getElementById('pif-plano');
  sel.innerHTML = '<option value="">— Selecione o plano —</option>';
  planos.forEach(function(item) {
    var opt = document.createElement('option');
    if (item.indexOf('▶️') === 0) { opt.disabled = true; opt.style.color = 'var(--muted)'; }
    opt.value = item; opt.textContent = item;
    sel.appendChild(opt);
  });
}

function pifOnPlanoChange() {
  var plano = document.getElementById('pif-plano').value;
  if (!plano || plano.indexOf('▶️') === 0) return;
  var partes = plano.split(' | ');
  if (partes.length >= 2) {
    document.getElementById('pif-valor').value = 'R$ ' + partes[partes.length - 1].trim();
  }
}

// Salva edição inline
// ─── PAINEL INLINE — TOGGLE EDIÇÃO ────────────────────────────────────────
var _pifModoEdicao = false;

function _pifSet(id, val) {
  var el = document.getElementById(id);
  if (!el) return;
  el.value = val || '';
}

function _pifSetSelect(id, val) {
  var el = document.getElementById(id);
  if (!el) return;
  for (var i = 0; i < el.options.length; i++) {
    if (el.options[i].value === val || el.options[i].text === val) {
      el.selectedIndex = i;
      return;
    }
  }
  // Valor não encontrado: seleciona primeira opção em branco
  el.selectedIndex = 0;
}

function painelToggleEdicao() {
  var v         = AppState.get('vendaSelecionada');
  var scroll    = document.getElementById('painelScroll');
  var form      = document.getElementById('painelInlineForm');
  var acoesNorm = document.getElementById('painelAcoesNormal');
  var acoesInl  = document.getElementById('painelAcoesInline');
  var btnEdit   = document.getElementById('pBtnEditar');

  if (!_pifModoEdicao) {
    // ── Entrar em modo edição ─────────────────────────────────────────────
    if (!v) { mostrarToast('Nenhuma venda selecionada.', 'warning'); return; }

    // Preencher campos com dados da venda atual
    _filtrarStatusPorProduto(v.produto || '', v.status || '');
    _pifSetSelect('pif-preStatus', v.preStatus || '');
    _pifSetSelect('pif-canal',     v.canal     || '');
    _pifSet('pif-cliente',    v.cliente    || '');
    _pifSet('pif-cpf',        v.cpf        || '');
    _pifSet('pif-whats',      v.whats      || '');
    _pifSet('pif-tel',        v.tel        || '');
    _pifSet('pif-contrato',   v.contrato   || '');
    _pifSet('pif-codCli',     v.codCli     || '');
    _pifSet('pif-nomeMae',    v.nomeMae    || '');
    _pifSet('pif-dtNasc',     v.dtNasc     || '');
    _pifSet('pif-rg',         v.rg         || '');
    _pifSet('pif-cep',        v.cep        || '');
    _pifSet('pif-rua',        v.rua        || '');
    _pifSet('pif-num',        v.num        || '');
    _pifSet('pif-complemento',v.complemento|| '');
    _pifSet('pif-bairro',     v.bairro     || '');
    _pifSet('pif-cidade',     v.cidade     || '');
    _pifSet('pif-uf',         v.uf         || '');
    _pifSet('pif-sistema',    v.sistema    || '');
    _pifSet('pif-segmentacao',v.segmentacao|| '');
    var sDisplay  = document.getElementById('pif-sistema-display');
    var sgDisplay = document.getElementById('pif-segmentacao-display');
    if (sDisplay)  sDisplay.textContent  = v.sistema     || '—';
    if (sgDisplay) sgDisplay.textContent = v.segmentacao || '—';

    // preStatus só editável no status 1- Conferencia/Ativação
    var elPre = document.getElementById('pif-preStatus');
    if (elPre) {
      var ehConf = (v.status || '') === '1- Conferencia/Ativação';
      elPre.disabled    = !ehConf;
      elPre.style.opacity = ehConf ? '' : '0.35';
    }
    _pifSet('pif-valor',      v.valor      || '');
    _pifSet('pif-venc',       v.venc       || '');
    _pifSet('pif-fat',        v.fat        || '');
    _pifSet('pif-observacao', v.observacao || '');

    // Preencher responsável — carrega lista completa do servidor
    var selResp = document.getElementById('pif-resp');
    if (selResp) {
      var respAtual = v.resp || '';
      // Exibe o responsável atual imediatamente como fallback
      selResp.innerHTML = '<option value="">⏳ Carregando...</option>';
      if (respAtual) {
        var optAtual = document.createElement('option');
        optAtual.value = respAtual; optAtual.textContent = respAtual;
        selResp.appendChild(optAtual);
        selResp.value = respAtual;
      }
      // Carrega lista completa e re-seleciona o responsável atual
      google.script.run
        .withSuccessHandler(function(res) {
          var sel = document.getElementById('pif-resp');
          if (!sel) return;
          sel.innerHTML = '<option value="">Selecione...</option>';
          if (res && !res.erro && res.lista && res.lista.length > 0) {
            res.lista.forEach(function(nome) {
              var opt = document.createElement('option');
              opt.value = nome; opt.textContent = nome;
              sel.appendChild(opt);
            });
          }
          // Re-seleciona o responsável da venda; se não estiver na lista, adiciona
          if (respAtual) {
            sel.value = respAtual;
            if (!sel.value) {
              var opt = document.createElement('option');
              opt.value = respAtual; opt.textContent = respAtual;
              sel.appendChild(opt);
              sel.value = respAtual;
            }
          }
        })
        .withFailureHandler(function() {
          var sel = document.getElementById('pif-resp');
          if (!sel) return;
          sel.innerHTML = '<option value="">Erro ao carregar</option>';
          if (respAtual) {
            var opt = document.createElement('option');
            opt.value = respAtual; opt.textContent = respAtual;
            sel.appendChild(opt);
            sel.value = respAtual;
          }
        })
        .getResponsaveis();
    }

    // Preencher produto e plano (produto primeiro pois dispara carregamento de planos)
    _pifSetSelect('pif-produto', v.produto || '');
    if (v.produto) {
      // Carregar planos e depois selecionar o plano atual
      var cidade = v.cidade || '';
      var prodHint = document.getElementById('pif-produtoHint');
      var selPlano = document.getElementById('pif-plano');
      if (cidade && selPlano) {
        selPlano.innerHTML = '<option value="">⏳ Carregando...</option>';
        google.script.run
          .withSuccessHandler(function(d) {
            if (d && d.planos && d.planos.length) {
              _pifPreencherPlanos(d.planos);
              // Selecionar plano após carregar
              setTimeout(function() { _pifSetSelect('pif-plano', v.plano || ''); }, 50);
            }
          })
          .withFailureHandler(function() {})
          .getPlanosPorCidadeProduto(cidade, v.produto);
      } else {
        _pifSet('pif-plano', v.plano || '');
      }
    }

    // Seção Datas (agendamento + turno)
    var _secaoDatas = document.getElementById('pif-secao-datas');
    if (_secaoDatas) _secaoDatas.style.display = v.agenda ? '' : 'none';
    _pifSet('pif-agenda', _agendaToInputDate(v.agenda || ''));
    _pifSetSelect('pif-turno', v.turno || '');

    // Seção Móvel
    var _ehMovel = (v.produto || '').toUpperCase().indexOf('MÓVEL') > -1 || (v.produto || '').toUpperCase().indexOf('MOVEL') > -1;
    var _secaoMovel = document.getElementById('pif-secao-movel');
    if (_secaoMovel) _secaoMovel.style.display = _ehMovel ? '' : 'none';
    _pifSet('pif-linhaMovel', v.linhaMovel || '');
    _pifSetSelect('pif-portabilidade', v.portabilidade || '');

    // Info geo
    var infoGeo = document.getElementById('pif-infoGeoWrap');
    if (infoGeo) infoGeo.style.display = (v.sistema || v.segmentacao) ? 'grid' : 'none';
    var sDisplay = document.getElementById('pif-sistema-display');
    var sgDisplay = document.getElementById('pif-segmentacao-display');
    if (sDisplay)  sDisplay.textContent  = v.sistema      || '—';
    if (sgDisplay) sgDisplay.textContent = v.segmentacao  || '—';

    // Alternar visibilidade
    if (scroll)    scroll.style.display = 'none';
    if (form)      form.classList.add('ativo');
    if (acoesNorm) acoesNorm.style.display = 'none';
    if (acoesInl)  acoesInl.classList.add('ativo');

    _pifModoEdicao = true;

  } else {
    // ── Sair do modo edição (Cancelar) ───────────────────────────────────
    if (scroll)    scroll.style.display = '';
    if (form)      form.classList.remove('ativo');
    if (acoesNorm) acoesNorm.style.display = '';
    if (acoesInl)  acoesInl.classList.remove('ativo');
    if (btnEdit)   btnEdit.textContent = '✏️ Editar';

    _pifModoEdicao = false;
  }
}

function pifSalvar() {
  var v = AppState.get('vendaSelecionada');
  if (!v || !v.linha) { mostrarToast('❌ Venda não identificada.', 'error'); return; }

  var dados = {
    linhaReferencia: String(v.linha), // garante string não-vazia para o salvarVenda identificar edição
    status:      document.getElementById('pif-status').value,
    preStatus:   document.getElementById('pif-preStatus').value,
    canal:       document.getElementById('pif-canal').value,
    resp:        document.getElementById('pif-resp').value,
    cliente:     document.getElementById('pif-cliente').value.trim(),
    cpf:         document.getElementById('pif-cpf').value.trim(),
    whats:       document.getElementById('pif-whats').value.trim(),
    cep:         document.getElementById('pif-cep').value.trim(),
    rua:         document.getElementById('pif-rua').value.trim(),
    num:         document.getElementById('pif-num').value.trim(),
    complemento: document.getElementById('pif-complemento').value.trim(),
    bairro:      document.getElementById('pif-bairro').value.trim(),
    cidade:      document.getElementById('pif-cidade').value.trim(),
    uf:          document.getElementById('pif-uf').value.trim(),
    sistema:     document.getElementById('pif-sistema').value.trim(),
    segmentacao: document.getElementById('pif-segmentacao').value.trim(),
    produto:     document.getElementById('pif-produto').value,
    plano:       document.getElementById('pif-plano').value,
    valor:       document.getElementById('pif-valor').value.trim(),
    observacao:    document.getElementById('pif-observacao').value.trim(),
    tel:           document.getElementById('pif-tel').value.trim(),
    contrato:      document.getElementById('pif-contrato').value.trim(),
    codCli:        document.getElementById('pif-codCli').value.trim(),
    nomeMae:       document.getElementById('pif-nomeMae').value.trim(),
    dtNasc:        document.getElementById('pif-dtNasc').value,
    rg:            document.getElementById('pif-rg').value.trim(),
    venc:          document.getElementById('pif-venc').value.trim(),
    fat:           document.getElementById('pif-fat').value.trim(),
    linhaMovel:    document.getElementById('pif-linhaMovel').value.trim(),
    portabilidade: document.getElementById('pif-portabilidade').value,
    // Campos não editados no inline — preserva os originais
    dataAtiv:      v.dataAtiv   || '',
    instal:        v.instal     || '',
    // Agenda: converte YYYY-MM-DD → DD/MM/YYYY para o backend
    agenda: (function() {
      var raw = document.getElementById('pif-agenda') ? document.getElementById('pif-agenda').value : '';
      if (!raw) return v.agenda || '';
      var p = raw.split('-');
      return p[2] + '/' + p[1] + '/' + p[0];
    })(),
    turno: document.getElementById('pif-turno') ? document.getElementById('pif-turno').value : (v.turno || ''),
    // Reagendamentos: incrementa se a data mudou
    reagendamentos: (function() {
      var raw = document.getElementById('pif-agenda') ? document.getElementById('pif-agenda').value : '';
      var novaData = raw ? (function(){ var p=raw.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; })() : '';
      var dataOriginal = v.agenda || '';
      return (novaData && novaData !== dataOriginal) ? (v.reagendamentos || 0) + 1 : (v.reagendamentos || 0);
    })(),
    statusPAP:     v.statusPAP  || ''
  };

  var _errPifContrato = _validarContratoFormato(dados.contrato, document.getElementById('pif-sistema').value);
  if (_errPifContrato) {
    mostrarToast(_errPifContrato, 'warning');
    var _elC = document.getElementById('pif-contrato');
    if (_elC) _elC.focus();
    return;
  }

  // Diagnóstico temporário
  mostrarToast('🔍 Salvando linha ' + String(v.linha) + ' — ' + dados.cliente, 'info');
  mostrarLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      mostrarLoading(false);
      if (!res || !res.sucesso) {
        mostrarToast('❌ ' + (res ? res.mensagem : 'Erro ao salvar.'), 'error');
        return;
      }
      _listaNeedsReload = true; // invalida cache — lista precisa de dado fresco
      mostrarToast('✅ ' + res.mensagem, 'success');

      // Se foi arquivada, fecha painel e recarrega lista
      if (dados.preStatus === 'ARQUIVAR VENDA') {
        _pifModoEdicao = false;
        AppState.set('vendaSelecionada', null);
        fecharPainel();
        carregarVendas(1, '');
        return;
      }

      if (dados.status === '2- Aguardando Instalação' && v.status !== '2- Aguardando Instalação') dispararConfete();
      if (dados.status === '3 - Finalizada/Instalada' && v.status !== '3 - Finalizada/Instalada') dispararChovaDinheiro();

    var opt = document.createElement('option');
    if (item.indexOf('▶️') === 0) { opt.disabled = true; opt.style.color = 'var(--muted)'; }
    opt.value = item; opt.textContent = item;
    sel.appendChild(opt);
  });

// Converte qualquer formato de data para DD/MM/AAAA
function _fmtData(val) {
  if (!val) return '';
  var s = String(val).trim();
  // Já está em DD/MM/AAAA
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  // Formato yyyy-MM-dd
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    var p = s.substring(0,10).split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }
  // Tenta via Date
  var d = new Date(s);
  if (!isNaN(d.getTime())) {
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' +
           d.getFullYear();
  }
  return s;
}

function _iniciais(nome) {
  var partes = String(nome || '').trim().split(/[\s.]+/).filter(Boolean);
  if (partes.length >= 2) return (partes[0][0] + partes[1][0]).toUpperCase();
  return partes[0] ? partes[0].slice(0, 2).toUpperCase() : '??';
}

    t.style.transform = 'translateX(110%)';
    t.style.transition = 'all 0.3s';
    setTimeout(function () { if (t.parentNode) t.remove(); }, 320);
  }, 3200);
}

function _sincronizarAoLogar(nomeUsuario) {
  // Entra no sistema IMEDIATAMENTE — sem tela de carregamento bloqueante
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('sistema').style.display = 'flex';
  document.getElementById('rodapeSistema').style.display = 'flex';
  mostrarToast('Bem-vindo, ' + nomeUsuario + '!', 'success');
  navegar('dash');
  setTimeout(_verificarTravaPosLogin, 1000);

  // Prefetch silencioso em background — popula _dadosListaCache sem bloquear
  // Quando o usuário navegar para a Lista, os dados já estão prontos (0ms)
  google.script.run
    .withSuccessHandler(function(res) {
      try {
        if (!res) return;
        if (res.contratos) _dadosSincronizados = res.contratos;
        if (res.vendas && res.vendas.dados && res.vendas.dados.length > 0) {
          _dadosListaCache    = res.vendas.dados;
          _dadosListaTotal    = res.vendas.dados.length;
          _dadosTotalServidor = res.vendas.totalGeral || res.vendas.dados.length;
        }
      } catch(e) {}
    })
    .withFailureHandler(function() { /* silencioso — sem impacto no usuário */ })
    .getSincronizacaoInicial();

  // Polling de alertas PAP — atualiza badge do menu a cada 60s
  _pollPendentes();
  setInterval(_pollPendentes, 60000);
}

function _pollPendentes() {
  google.script.run
    .withSuccessHandler(function(res) {
      try {
        var total = (res && res.total) ? res.total : 0;
        var badge = document.getElementById('badgeFilaPAP');
        if (!badge) return;
        if (total > 0) {
          badge.textContent = total;
          badge.classList.add('visivel', 'pulsar');
        } else {
          badge.classList.remove('visivel', 'pulsar');
        }
      } catch(e) {}
    })
    .withFailureHandler(function() { /* silencioso */ })
    .listarPendentes();
}

function fazerLogin() {
  var usuario  = document.getElementById('loginUsuario').value.trim();
  var senha    = document.getElementById('loginSenha').value;
  var errDiv   = document.getElementById('loginError');
  var btnLogin = document.getElementById('btnLogin');
  errDiv.style.display = 'none';
  if (!usuario || !senha) {
    errDiv.textContent = 'Preencha usuário e senha.';
    errDiv.style.display = 'block';
    return;
  }
  mostrarLoading(true);
  btnLogin.disabled = true;
  google.script.run
    .withSuccessHandler(function (res) {
      mostrarLoading(false);
      btnLogin.disabled = false;
      if (res.autorizado) {
        AppState.set('nomeUsuario', res.nome || usuario);
        document.getElementById('nomeUsuario').textContent = res.nome || usuario;

        // Avatar: foto do usuário ou iniciais como fallback
        var avatarEl = document.getElementById('userAvatar');
        if (avatarEl) {
          if (res.foto) {
            var img = document.createElement('img');
            img.src = res.foto;
            img.alt = res.nome || usuario;
            img.onerror = function() {
              // Se foto falhar, exibe iniciais
              avatarEl.innerHTML = '<span class="initials">' + _iniciais(res.nome || usuario) + '</span>';
            };
            avatarEl.innerHTML = '';
            avatarEl.appendChild(img);
          } else {
            avatarEl.innerHTML = '<span class="initials">' + _iniciais(res.nome || usuario) + '</span>';
          }
        }

        AppState.set('perfil', res.perfil || 'backoffice');
        _aplicarMenus(res.menus || []);
        _carregarResponsaveis();

        // ─── Salva sessão para auto-login no F5 (nunca armazena a senha) ──
        try {
          sessionStorage.setItem('crm_usuario', usuario);
          sessionStorage.setItem('crm_nome', res.nome || usuario);
        } catch(e) {}

        _sincronizarAoLogar(res.nome || usuario);

        // Detectar retorno do bookmarklet (?vh=ok) → ir direto para Configurações
        try {
          if (typeof VH_OK !== 'undefined' && VH_OK === 'true') {
            setTimeout(function() {
              navegar('config');
              mostrarToast('✅ VeroHub conectado com sucesso!', 'success');
            }, 800);
          }
        } catch(e) {}

      } else {
        errDiv.textContent = res.mensagem || 'Credenciais inválidas.';
        errDiv.style.display = 'block';
        document.getElementById('loginSenha').value = '';
        document.getElementById('loginSenha').focus();
      }
    })
    .withFailureHandler(function () {
      mostrarLoading(false);
      btnLogin.disabled = false;
      errDiv.textContent = 'Erro de conexão.';
      errDiv.style.display = 'block';
    })
    .validarLogin(usuario, senha);
}

function sair() {
  if (confirm('Deseja realmente sair?')) {
    try {
      sessionStorage.removeItem('crm_usuario');
      sessionStorage.removeItem('crm_nome');
    } catch(e) {}
    location.reload();
  }
}

  document.getElementById('modalSenha').style.display     = 'flex';
}

function fecharModalSenha() {
  document.getElementById('modalSenha').style.display = 'none';
}

function confirmarAlteracaoSenha() {
  var atual      = document.getElementById('senhaAtual').value;
  var nova       = document.getElementById('senhaNova').value;
  var confirmar  = document.getElementById('senhaConfirmar').value;
  var errDiv     = document.getElementById('modalSenhaErro');
  var okDiv      = document.getElementById('modalSenhaOk');
  var btn        = document.getElementById('btnAlterarSenha');

  errDiv.style.display = 'none';
  okDiv.style.display  = 'none';

  if (!atual || !nova || !confirmar) {
    errDiv.textContent = 'Preencha todos os campos.';
    errDiv.style.display = 'block';
    return;
  }
  if (nova.length < 6) {
    errDiv.textContent = 'A nova senha deve ter pelo menos 6 caracteres.';
    errDiv.style.display = 'block';
    return;
  }
  if (nova !== confirmar) {
    errDiv.textContent = 'A confirmação não coincide com a nova senha.';
    errDiv.style.display = 'block';
    return;
  }

  var usuario;
  try { usuario = sessionStorage.getItem('crm_usuario') || ''; } catch(e) { usuario = ''; }
  if (!usuario) {
    errDiv.textContent = 'Sessão expirada. Faça login novamente.';
    errDiv.style.display = 'block';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Alterando...';

  google.script.run
    .withSuccessHandler(function(res) {
      btn.disabled    = false;
      btn.textContent = 'Alterar senha';
      if (res && res.ok) {
        okDiv.textContent    = res.mensagem || 'Senha alterada com sucesso.';
        okDiv.style.display  = 'block';
        document.getElementById('senhaAtual').value     = '';
        document.getElementById('senhaNova').value      = '';
        document.getElementById('senhaConfirmar').value = '';
        setTimeout(fecharModalSenha, 2000);
      } else {
        errDiv.textContent   = (res && res.mensagem) ? res.mensagem : 'Erro ao alterar senha.';
        errDiv.style.display = 'block';
      }
    })
    .withFailureHandler(function() {
      btn.disabled    = false;
      btn.textContent = 'Alterar senha';
      errDiv.textContent   = 'Erro de comunicação. Tente novamente.';
      errDiv.style.display = 'block';
    })
    .alterarSenha(usuario, atual, nova);
}

// Salva Status Pagamento PAP direto do painel lateral
function _salvarStatusPAP(linha, selectEl) {
  var novoStatus = selectEl.value;
  var original   = selectEl.dataset.original || selectEl.value;
  selectEl.dataset.original = selectEl.value;
  selectEl.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      selectEl.disabled = false;
      if (res && res.sucesso) {
        // Atualiza dado em memória na lista de vendas
        var venda = AppState.get('vendaSelecionada');
        if (venda) venda.statusPAP = novoStatus;
        mostrarToast('✅ Status PAP atualizado: ' + (novoStatus || '—'), 'success');
        // Invalida cache para que Pagamentos PAP recarregue corretamente
      } else {
        selectEl.value    = original;
        selectEl.disabled = false;
        mostrarToast('⚠️ Erro: ' + (res ? res.mensagem : 'tente novamente'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      selectEl.value    = original;
      selectEl.disabled = false;
      mostrarToast('❌ Falha: ' + err.message, 'error');
    })
    .salvarStatusPAP(linha, novoStatus);
}


function _carregarResponsaveis() {
  google.script.run
    .withSuccessHandler(function(res) {
      var sel = document.getElementById('f_resp');
      if (!sel) return;
      var valorAtual = sel.value; // preserva valor se estiver editando
      sel.innerHTML = '<option value="">Selecione...</option>';
      if (res && !res.erro && res.lista) {
        res.lista.forEach(function(nome) {
          var opt = document.createElement('option');
          opt.value = nome;
          opt.textContent = nome;
          sel.appendChild(opt);
        });
      } else {
        // Fallback: campo livre se der erro
        sel.innerHTML = '<option value="">Não foi possível carregar</option>';
        Logger.log && Logger.log('Responsáveis: ' + (res ? res.mensagem : 'erro'));
      }
      if (valorAtual) sel.value = valorAtual;
    })
    .withFailureHandler(function() {
      var sel = document.getElementById('f_resp');
      if (sel) sel.innerHTML = '<option value="">Erro ao carregar</option>';
    })
    .getResponsaveis();
}

function _atualizarBloqueioStatusForm(modoEdicao) {
  var elStatus = document.getElementById('f_status');

  if (elStatus) {
    elStatus.disabled       = !modoEdicao;

function preencherFormulario(v) {
  CAMPOS_FORM.forEach(function (campo) {
    var el = document.getElementById('f_' + campo);
    if (!el) return;
    if (campo === 'resp') {
      var existe = Array.from(el.options).some(function(o) { return o.value === (v[campo] || ''); });
      if (!existe && v[campo]) {
        var opt = document.createElement('option');
        opt.value = v[campo]; opt.textContent = v[campo] + ' (atual)';
        el.appendChild(opt);
      }
      el.value = v[campo] || '';
    } else if (campo === 'venc') {
      // Normaliza com zero à esquerda (planilha pode retornar "1" em vez de "01")
      var vencVal = String(v[campo] || '').trim();
      if (vencVal && vencVal.length === 1) vencVal = '0' + vencVal;
      el.value = vencVal;
    } else {
      el.value = v[campo] || '';
    }
  });
  if (!v.turno) document.getElementById('f_turno').value = 'Manhã (08h às 12h)';

  // Recarrega planos se cidade e produto já estiverem preenchidos
  if (v.cidade && v.produto) {
    var selPlano = document.getElementById('f_plano');
    var planoSalvo = v.plano || '';
    if (selPlano) {
      selPlano.disabled = true;
      selPlano.innerHTML = '<option>⏳ Carregando...</option>';
    }
    google.script.run
      .withSuccessHandler(function(d) {
        if (!selPlano) return;
        selPlano.disabled = false;
        if (!d || d.erro || !d.planos || d.planos.length === 0) {
          // Sem planos — insere o valor salvo como opção manual
          selPlano.innerHTML = '<option value="">— Selecione o plano —</option>';
          if (planoSalvo) {
            var opt = document.createElement('option');
            opt.value = planoSalvo; opt.textContent = planoSalvo + ' (atual)';
            selPlano.appendChild(opt);
            selPlano.value = planoSalvo;
          }
          return;
        }
        selPlano.innerHTML = '<option value="">— Selecione o plano —</option>';
        d.planos.forEach(function(item) {
          var opt = document.createElement('option');
          if (item.indexOf('▶️') === 0) {
            opt.value = ''; opt.disabled = true; opt.textContent = item;
            opt.style.fontWeight = '700'; opt.style.color = '#a78bfa';
          } else {
            opt.value = item; opt.textContent = item;
          }
          selPlano.appendChild(opt);
        });
        // Reseleciona o plano salvo
        if (planoSalvo) {
          selPlano.value = planoSalvo;
          // Se não encontrou exato, adiciona como opção manual
          if (!selPlano.value) {
            var opt = document.createElement('option');
            opt.value = planoSalvo; opt.textContent = planoSalvo + ' (atual)';
            selPlano.appendChild(opt);
            selPlano.value = planoSalvo;
          }
        }
      })
      .withFailureHandler(function() {
        if (!selPlano) return;
        selPlano.disabled = false;
        selPlano.innerHTML = '<option value="">— Erro ao carregar —</option>';
        if (planoSalvo) {
          var opt = document.createElement('option');
          opt.value = planoSalvo; opt.textContent = planoSalvo + ' (atual)';
          selPlano.appendChild(opt);
          selPlano.value = planoSalvo;
        }
      })
      .getPlanosPorCidadeProduto(v.cidade, v.produto);
  }

  var _bs = document.getElementById('wizBtnSave'); if (_bs) _bs.textContent = '🔄 Atualizar';
  document.getElementById('formTitulo').textContent = 'Editar Cadastro';
  AppState.set('modoEdicao', true);
  _atualizarBloqueioStatusForm(true);
  var elStatus = document.getElementById('f_status');
  if (elStatus) {
    elStatus.setAttribute('data-status-anterior', elStatus.value || '1- Conferencia/Ativação');
    elStatus.removeEventListener('change', _onStatusChangeEdicao);
    elStatus.addEventListener('change', _onStatusChangeEdicao);
  }
  AppState.set('vendaSelecionada', v);
}

  { fld: 'fat',       id: 'f_fat',       lbl: 'Pagamento'               },
  { fld: 'agenda',    id: 'f_agenda',    lbl: 'Data Agendamento'        },
  { fld: 'turno',     id: 'f_turno',     lbl: 'Turno'                   },
  { fld: 'contrato',  id: 'f_contrato',  lbl: 'ID Contrato / ID Móvel'  }
];

function _validarCamposAguardandoInstalacao() {
  var faltando = [];
  var venda = AppState.get('vendaSelecionada') || {};
  _CAMPOS_AG_INST.forEach(function(c) {
    var el = document.getElementById(c.id);
    var valDom = el ? (el.value || '').trim() : '';
    // Fallback: se o campo estiver oculto/vazio no DOM, verifica no AppState
    var valState = String(venda[c.fld] || '').trim();
    if (!valDom && !valState) faltando.push(c.lbl);
  });
  return faltando;
}

function _onStatusChangeEdicao() {
  var elStatus = document.getElementById('f_status');
  var val = this.value;
  var vendaAtual = AppState.get('vendaSelecionada') || {};
  if (val === '2- Aguardando Instalação') {
    _fecharModalPendencias();
    _abrirModalPendencias(vendaAtual);
  } else if (val === '3 - Finalizada/Instalada') {
    var faltando = _validarCamposAguardandoInstalacao();
    if (faltando.length > 0) {
      if (elStatus) elStatus.value = '2- Aguardando Instalação';
      mostrarToast('⚠️ Preencha os campos de Aguardando Instalação antes de avançar.', 'warning');
      _fecharModalPendencias();
      _abrirModalPendencias(vendaAtual);
      return;
    }
    if (elStatus) elStatus.setAttribute('data-status-anterior', val);
    _fecharModalInstalacao();
    _abrirModalInstalacao();
  } else {
    if (elStatus) elStatus.setAttribute('data-status-anterior', val);
  }
}

function _fecharModalPendencias() { var m = document.getElementById('modalPendencias'); if (m) m.remove(); }

function _cancelarModalPendencias() {
  _fecharModalPendencias();
  var elStatus = document.getElementById('f_status');
  if (elStatus) {
    var anterior = elStatus.getAttribute('data-status-anterior') || '1- Conferencia/Ativação';
    elStatus.value = anterior;
  }
  navegar('lista');
}

function _confirmarModalPendencias() {
  var mapa = { mp_dataAtiv:'f_dataAtiv', mp_produto:'f_produto', mp_plano:'f_plano',
    mp_valor:'f_valor', mp_venc:'f_venc', mp_fat:'f_fat',
    mp_agenda:'f_agenda', mp_turno:'f_turno', mp_contrato:'f_contrato' };
  var ok = true;
  Object.keys(mapa).forEach(function(mpId) {
    var el = document.getElementById(mpId); var err = document.getElementById(mpId+'_err');
    if (!el) return;
    if (!el.value || !el.value.trim()) {
      ok = false; if (err) err.style.display = 'block'; el.style.borderColor = 'var(--accent)';
      el.addEventListener('input', function(){ if(this.value.trim()){ this.style.borderColor=''; if(err) err.style.display='none'; } }, { once: true });
    } else { if (err) err.style.display='none'; el.style.borderColor=''; }
  });
  if (!ok) { mostrarToast('⚠️ Preencha todos os campos obrigatórios.', 'warning'); return; }
  Object.keys(mapa).forEach(function(mpId) {
    var src = document.getElementById(mpId); var dest = document.getElementById(mapa[mpId]);
    if (src && dest && src.value) dest.value = src.value;
  });
  _fecharModalPendencias();
  // Salva imediatamente após preencher os campos
  mostrarToast('✅ Campos preenchidos! Salvando...', 'success');
  setTimeout(function() { salvar(); }, 300);
}

function _mpOnProdutoChange(planoAtual) {
  var selProduto = document.getElementById('mp_produto');
  var selPlano   = document.getElementById('mp_plano');
  var hint       = document.getElementById('mp_produto_hint');
  if (!selProduto || !selPlano) return;
  var produto = selProduto.value;
  var cidade  = (document.getElementById('f_cidade') || {}).value || '';
  selPlano.innerHTML = '<option value="">— Escolha o Produto primeiro —</option>';
  if (hint) { hint.style.display='none'; hint.textContent=''; }
  if (!produto) return;
  if (!cidade) { if (hint) { hint.textContent='⚠️ Cidade não encontrada.'; hint.style.color='var(--yellow)'; hint.style.display='block'; } return; }
  if (hint) { hint.textContent='⏳ Carregando planos para '+produto+' em '+cidade+'...'; hint.style.color='var(--muted)'; hint.style.display='block'; }
  selPlano.disabled=true; selPlano.innerHTML='<option>⏳ Carregando...</option>';
  google.script.run
    .withSuccessHandler(function(d) {
      selPlano.disabled=false;
      if (!d || d.erro || !d.planos || d.planos.length===0) {
        selPlano.innerHTML='<option value="">— Nenhum plano encontrado —</option>';
        if (hint) { hint.textContent='⚠️ Nenhum plano para '+produto+' em '+cidade; hint.style.color='var(--yellow)'; hint.style.display='block'; } return;
      }
      selPlano.innerHTML='<option value="">— Selecione o plano —</option>';
      d.planos.forEach(function(item) {
        var opt=document.createElement('option');
        if (item.indexOf('▶️')===0) { opt.value=''; opt.disabled=true; opt.textContent=item; opt.style.fontWeight='700'; opt.style.color='#a78bfa'; }
        else { opt.value=item; opt.textContent=item; }
        selPlano.appendChild(opt);
      });
      if (planoAtual) selPlano.value=planoAtual;
      var reais=d.planos.filter(function(p){ return p.indexOf('▶️')!==0; });
      if (reais.length===1) { selPlano.value=reais[0]; _mpOnPlanoChange(); }
      var qtd=reais.length;
      if (hint) { hint.textContent='✅ '+qtd+' plano'+(qtd!==1?'s':'')+' em '+d.cidade; hint.style.color='var(--green)'; hint.style.display='block'; }
    })
    .withFailureHandler(function(err) {
      selPlano.disabled=false; selPlano.innerHTML='<option value="">— Erro ao carregar —</option>';
      if (hint) { hint.textContent='❌ '+(err&&err.message?err.message:'Erro'); hint.style.color='var(--accent)'; hint.style.display='block'; }
    })
    .getPlanosPorCidadeProduto(cidade, produto);
}

function _mpOnPlanoChange() {
  var selPlano=document.getElementById('mp_plano'); var inpValor=document.getElementById('mp_valor');
  if (!selPlano||!inpValor) return;
  var texto=selPlano.value; if (!texto) return;
  var partes=texto.split('|');
  if (partes.length>=2) { var num=parseFloat(partes[partes.length-1].trim().replace(',','.')); if (!isNaN(num)) inpValor.value='R$ '+num.toFixed(2).replace('.',','); }
}

function coletarDados() {
  var dados = { linhaReferencia: document.getElementById('f_linha').value };
  CAMPOS_FORM.forEach(function (campo) {
    if (campo === 'linha') return;
    var el = document.getElementById('f_' + campo);
    dados[campo] = el ? el.value.trim() : '';
  });
  if (dados.uf) dados.uf = dados.uf.toUpperCase();
  // PAP sempre Em Aberto quando não definido
  if (!dados.statusPAP) dados.statusPAP = 'Em Aberto';
  return dados;
}

function validarFormulario(dados) {
  var ok = true;
  var camposBase = ['cliente','status','preStatus','cpf','canal','whats','resp',
                    'cep','cidade','bairro','rua','num','uf','sistema','statusPAP'];
  camposBase.forEach(function (f) { clearFieldError(f); });
  if (!dados.cliente)   { setFieldError('cliente',   'Nome é obrigatório.');           ok = false; }
  if (!dados.status)    { setFieldError('status',    'Selecione um status.');           ok = false; }
  if (!dados.preStatus) { setFieldError('preStatus', 'Selecione o pré-status.');       ok = false; }
  if (!dados.canal)     { setFieldError('canal',     'Selecione um canal.');            ok = false; }
  if (!dados.whats)     { setFieldError('whats',     'WhatsApp é obrigatório.');        ok = false; }
  if (!dados.resp)      { setFieldError('resp',      'Responsável é obrigatório.');     ok = false; }
  if (!dados.cep)       { setFieldError('cep',       'CEP é obrigatório.');             ok = false; }
  if (!dados.cidade)    { setFieldError('cidade',    'Cidade é obrigatória.');          ok = false; }
  if (!dados.bairro)    { setFieldError('bairro',    'Bairro é obrigatório.');          ok = false; }
  if (!dados.rua)       { setFieldError('rua',       'Rua é obrigatória.');             ok = false; }
  if (!dados.num)       { setFieldError('num',       'Número é obrigatório.');          ok = false; }
  if (!dados.uf)        { setFieldError('uf',        'UF é obrigatória.');              ok = false; }
  if (!dados.sistema)   { setFieldError('sistema',   'Sistema é obrigatório.');         ok = false; }
  if (!dados.cpf) {
    setFieldError('cpf', 'CPF / CNPJ é obrigatório.'); ok = false;
  } else {
    var l = dados.cpf.replace(/\D/g, '');
    if (l.length !== 11 && l.length !== 14) { setFieldError('cpf', 'CPF 11 dígitos ou CNPJ 14.'); ok = false; }
  }
  if (dados.status === '2- Aguardando Instalação' || dados.status === '3 - Finalizada/Instalada') {
    var faltandoAg = _validarCamposAguardandoInstalacao();
    if (faltandoAg.length > 0) {
      ok = false;
      mostrarToast('⚠️ Campos obrigatórios vazios: ' + faltandoAg.join(', '), 'warning');
      _CAMPOS_AG_INST.forEach(function(c) {
        var el = document.getElementById(c.id);
        if (!el || !el.value || !el.value.trim()) setFieldError(c.fld, c.lbl + ' é obrigatório.');
      });
    }
  }
  if (dados.status === '3 - Finalizada/Instalada') {
    clearFieldError('instal');
    if (!dados.instal) { setFieldError('instal', 'Data de Instalação é obrigatória para este status.'); ok = false; }
  }
  var _errWizContrato = _validarContratoFormato(dados.contrato, dados.sistema);
  if (_errWizContrato) { mostrarToast(_errWizContrato, 'warning'); ok = false; }
  return ok;
}

function salvar() {
  var dados = coletarDados();
  if (!validarFormulario(dados)) return;
  var btnSave = document.getElementById('wizBtnSave');
  mostrarLoading(true);
  if (btnSave) { btnSave.disabled = true; btnSave.textContent = '⏳ Salvando...'; }
  google.script.run
    .withSuccessHandler(function (res) {
      mostrarLoading(false);
      if (btnSave) { btnSave.disabled = false; btnSave.textContent = '💾 Salvar'; }
      mostrarToast(res.mensagem, res.sucesso ? 'success' : 'error');
      if (res.sucesso) {
        if (dados.status === '2- Aguardando Instalação') dispararConfete();
        if (dados.status === '3 - Finalizada/Instalada') dispararChovaDinheiro();
        AppState.set('modoEdicao', false);
        limparFormulario();
        if (res.linha) {
          setTimeout(function() { _abrirVendaNoLista(res.linha); }, 400);
        } else {
          setTimeout(function() { navegar('lista'); }, 400);
        }
      } else {
        // Se erro de validação, volta ao step com problema
        if (res.mensagem && res.mensagem.indexOf('status') > -1) wizMostrarErroStep(0, res.mensagem);
        else if (res.mensagem && res.mensagem.indexOf('nome') > -1) wizMostrarErroStep(1, res.mensagem);
      }
    })
    .withFailureHandler(function (erro) {
      mostrarLoading(false);
      if (btnSave) { btnSave.disabled = false; btnSave.textContent = '💾 Salvar'; }
      mostrarToast('Erro: ' + erro.message, 'error');
    })
    .salvarVenda(dados);
}

// ─── LISTA ─────────────────────────────────────────────────────────────────
function _coletarOpcoesFiltro() {
  try {
    var elStatus    = document.getElementById('filtroStatus');
    var elPreStatus = document.getElementById('filtroPreVenda');
    var elProduto   = document.getElementById('filtroProduto');
    var elVeroHub   = document.getElementById('filtroVeroHub');
    var status    = elStatus    ? (elStatus.value    || '') : '';
    var preStatus = elPreStatus ? (elPreStatus.value || '') : '';
    var produto   = elProduto   ? (elProduto.value   || '') : '';
    var verohub   = elVeroHub   ? (elVeroHub.checked || false) : false;
    ['filtroStatus','filtroPreVenda','filtroProduto'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.toggle('ativo', !!el.value);
    });
    var toggleLabel = document.getElementById('filtroVeroHub');
    if (toggleLabel && toggleLabel.closest) toggleLabel.closest('label') && toggleLabel.closest('label').classList.toggle('ativo', verohub);
    return { status: status, preStatus: preStatus, produto: produto, verohub: verohub };
  } catch(e) {
    return {};
  }
}

function buscaListaInstantanea(valor) {
  // Chamada pelo oninput do campoBusca — instantâneo se cache disponível
  AppState.set('filtroAtual', (valor || '').trim());
  AppState.set('paginaAtual', 1);
  if (_dadosListaCache && _dadosListaCache.length > 0) {
    var opcoes = _coletarOpcoesFiltro();
    var dadosFiltrados = _filtrarLocalmente(_dadosListaCache, valor, opcoes);
    var total = dadosFiltrados.length;
    _renderizarLista({ dados: dadosFiltrados.slice(0, CONFIG_JS.MAX_RESULTS), total: total, pagina: 1, temMais: CONFIG_JS.MAX_RESULTS < total });
    return;
  }
  carregarVendas(1, (valor || '').trim());
}

function recarregarLista() {
  // Limpa o cache local e busca dados frescos da planilha (bypass cache servidor)
  _dadosListaCache    = null;
  _dadosListaTotal    = 0;
  _dadosTotalServidor = 0;
  // Limpa filtros ativos
  var selects = ['filtroStatus', 'filtroPreVenda', 'filtroProduto'];
  selects.forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; });
  var busca = document.getElementById('campoBusca'); if (busca) busca.value = '';
  AppState.set('filtroAtual', '');
  AppState.set('paginaAtual', 1);
  // Mostra spinner
  document.getElementById('listaVendas').innerHTML =
    '<div class="empty"><div class="empty-icon" style="font-size:20px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>' +
    '<p style="margin-top:10px;font-size:12px;">Buscando novos registros...</p></div>';
  // Limpa cache do servidor ANTES de recarregar
  google.script.run
    .withSuccessHandler(function() { carregarVendas(1, ''); })
    .withFailureHandler(function()  { carregarVendas(1, ''); })
    .limparCacheCompleto();
}

function aplicarFiltros() {
  var termo = document.getElementById('campoBusca') ? document.getElementById('campoBusca').value.trim() : '';
  AppState.set('filtroAtual', termo);
  AppState.set('paginaAtual', 1);
  if (_dadosListaCache && _dadosListaCache.length > 0) {
    var opcoes = _coletarOpcoesFiltro();
    var dadosFiltrados = _filtrarLocalmente(_dadosListaCache, termo, opcoes);
    var total = dadosFiltrados.length;
    _renderizarLista({ dados: dadosFiltrados.slice(0, CONFIG_JS.MAX_RESULTS), total: total, pagina: 1, temMais: CONFIG_JS.MAX_RESULTS < total });
    return;
  }
  carregarVendas(1, termo);
}

function limparFiltros() {
  var ids = ['filtroStatus','filtroPreVenda','filtroProduto'];
  ids.forEach(function(id){ var el = document.getElementById(id); if(el){ el.value=''; el.classList.remove('ativo'); }});
  var cb = document.getElementById('filtroVeroHub'); if(cb) cb.checked = false;
  var tgl = cb ? cb.closest('label') : null; if(tgl) tgl.classList.remove('ativo');
  document.getElementById('campoBusca').value = '';
  AppState.set('filtroAtual', '');
  carregarVendas(1, '');
}






function carregarVendas(pagina, filtro) {
  pagina = (pagina !== undefined) ? pagina : AppState.get('paginaAtual');
  filtro = (filtro !== undefined) ? filtro : AppState.get('filtroAtual');
  AppState.set('paginaAtual', pagina);
  AppState.set('filtroAtual', filtro);

  document.getElementById('listaVendas').innerHTML =
    '<div class="empty"><div class="empty-icon" style="font-size:20px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>' +
    '<p style="margin-top:10px;font-size:12px;">Carregando vendas...</p></div>';

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res) {
        document.getElementById('listaVendas').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro</h3><p>Resposta vazia do servidor.</p></div>';
        return;
      }
      if (res.erro) {
        document.getElementById('listaVendas').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p style="font-family:monospace;font-size:11px;color:#ff4570">' + esc(res.erro) + '</p></div>';
        return;
      }
      _renderizarLista(res);
    })
    .withFailureHandler(function (erro) {
      var msg = erro && erro.message ? erro.message : String(erro);
      document.getElementById('listaVendas').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div>' +
        '<h3>Erro ao carregar</h3><p style="font-family:monospace;font-size:11px;color:#ff4570">' + esc(msg) + '</p></div>';
    })
    .getVendasPaginadas(pagina, filtro, JSON.stringify(_coletarOpcoesFiltro()));
}


function _renderizarLista(res) {
  // Guarda dados da página para o painel lateral
  _paginaAtual = res.dados || [];

  var container = document.getElementById('listaVendas');

  // Atualiza contador
  document.getElementById('totalRegistros').textContent =
    res.total + ' registro' + (res.total !== 1 ? 's' : '');

  // Sem dados
  if (!_paginaAtual.length) {
    container.innerHTML =
      '<div class="empty"><div class="empty-icon">🔍</div>' +
      '<h3>Nenhuma venda encontrada</h3><p>Tente outro filtro.</p></div>';
    document.getElementById('paginacao').style.display = 'none';
    fecharPainel();
    return;
  }

  // Renderiza itens
  var html = '';
  for (var i = 0; i < _paginaAtual.length; i++) {
    html += _criarItemVenda(_paginaAtual[i], i);
  }
  container.innerHTML = html;

  // Paginação
  var temPag = res.total > CONFIG_JS.MAX_RESULTS || res.pagina > 1;
  document.getElementById('paginacao').style.display  = temPag ? 'flex' : 'none';
  document.getElementById('infoPagina').textContent   = 'Pág. ' + res.pagina;
  document.getElementById('btnAnterior').disabled     = res.pagina === 1;
  document.getElementById('btnProximo').disabled      = !res.temMais;
}

// ─── VEROHUB ───────────────────────────────────────────────────────────────
function _veroHubVencido(verohub) {
  if (!verohub) return false;
  var s = String(verohub).trim();
  var d;
  if (s.indexOf('/') > -1) {
    var p = s.split('/');
    d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  } else {
    d = new Date(s);
  }
  if (isNaN(d.getTime())) return false;
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  return d < hoje;
}

function _veroHubToInputDate(verohub) {
  if (!verohub) return '';
  var s = String(verohub).trim();
  if (s.indexOf('/') > -1) {
    var p = s.split('/');
    return p[2] + '-' + ('0'+p[1]).slice(-2) + '-' + ('0'+p[0]).slice(-2);
  }
  return s.substring(0,10);
}

function _veroHubHtml(v, index) {
  var vencido   = _veroHubVencido(v.verohub);
  var semData   = !v.verohub;
  var inputDate = _veroHubToInputDate(v.verohub);
  // Pisca se vencido OU se sem data
  var piscar = vencido || semData;
  var tit = vencido ? 'Analise vencida! Reblindar no VeroHub.' : (semData ? 'Sem data — preencha a blindagem' : 'Blindagem OK');
  var dot = piscar ? '<span class="verohub-dot"></span>' : '';
  var ok  = (!semData && !vencido) ? '<span class="verohub-ok">✓</span>' : '';
  return '<div class="verohub-wrap" onclick="event.stopPropagation()">' +
    dot +
    '<span class="verohub-label">VeroHub:</span>' +
    '<input type="date" class="verohub-input" value="' + inputDate + '" title="' + tit + '" onchange="_salvarVeroHub(' + v.linha + ',this,' + index + ')">' +
    ok +
  '</div>';
}

function _salvarVeroHub(linha, inputEl, index) {
  var val = inputEl.value;
  var dataSalvar = '';
  if (val) {
    var p = val.split('-');
    dataSalvar = p[2] + '/' + p[1] + '/' + p[0];
  }
  inputEl.style.opacity = '.5';
  google.script.run
    .withSuccessHandler(function(res) {
      inputEl.style.opacity = '1';
      var ok = !res || res.sucesso !== false;
      if (ok) {
        // Atualiza dado em memória
        if (_paginaAtual[index]) _paginaAtual[index].verohub = dataSalvar;
        // Atualiza bolinha em tempo real — sem recarregar
        var wrap = inputEl.closest('.verohub-wrap');
        if (wrap) {
          var dot = wrap.querySelector('.verohub-dot');
          var vencido = dataSalvar ? _veroHubVencido(dataSalvar) : true; // sem data = pisca
          if (vencido || !dataSalvar) {
            if (!dot) {
              dot = document.createElement('span');
              dot.className = 'verohub-dot';
              wrap.insertBefore(dot, wrap.firstChild);
            }
          } else {
            if (dot) dot.remove();
          }
          // Atualiza ok
          var okEl = wrap.querySelector('.verohub-ok');
          if (!dataSalvar || vencido) {
            if (okEl) okEl.remove();
          } else {
            if (!okEl) {
              okEl = document.createElement('span');
              okEl.className = 'verohub-ok';
              okEl.textContent = '✓';
              wrap.appendChild(okEl);
            }
          }
        }
        mostrarToast(dataSalvar ? '✅ VeroHub: ' + dataSalvar : 'VeroHub removido', 'success');
      } else {
        mostrarToast('Erro ao salvar VeroHub: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
      }
    })
    .withFailureHandler(function(e) {
      inputEl.style.opacity = '1';
      mostrarToast('Erro: ' + (e && e.message ? e.message : 'desconhecido'), 'error');
    })
    .salvarVeroHub(linha, dataSalvar);
}

function _agendaToInputDate(agenda) {
  if (!agenda) return '';

    return p[2] + '-' + ('0'+p[1]).slice(-2) + '-' + ('0'+p[0]).slice(-2);

  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);

}

function _salvarAgendamento(linha, inputEl, index) {
  var val = inputEl.value;
  var dataSalvar = '';
  if (val) {
    var p = val.split('-');
    dataSalvar = p[2] + '/' + p[1] + '/' + p[0];
  }
  inputEl.style.opacity = '.5';
  google.script.run
    .withSuccessHandler(function(res) {
      inputEl.style.opacity = '1';
      var ok = !res || res.sucesso !== false;
      if (ok) {
        if (_paginaAtual[index]) _paginaAtual[index].agenda = dataSalvar;
        var reag = (res && typeof res.reagendamentos === 'number') ? res.reagendamentos : 0;
        var msgReag = reag > 0 ? ' (🔄 ' + reag + 'x reagendado)' : '';
        mostrarToast(dataSalvar ? '✅ Agendamento: ' + dataSalvar + msgReag : 'Agendamento removido', 'success');

          vSel.agenda = dataSalvar;
          if (reag > 0) vSel.reagendamentos = reag;
          AppState.set('vendaSelecionada', vSel);
          var pEl = document.getElementById('painel-agenda-input');
          if (pEl) pEl.value = _agendaToInputDate(dataSalvar);
          // Atualiza badge reagendamento no painel
          var badgeContainer = pEl ? pEl.parentElement : null;
          if (badgeContainer) {
            var oldBadge = badgeContainer.querySelector('.painel-reag-badge');
            if (oldBadge) oldBadge.remove();
            if (reag > 0) {
              var badge = document.createElement('span');
              badge.className = 'painel-reag-badge';
              badge.title = 'Reagendado ' + reag + ' vez(es)';
              badge.textContent = '🔄 ' + reag;
              badgeContainer.appendChild(badge);
            }
          }
        }
      } else {
        mostrarToast('Erro ao salvar agendamento: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
      }
    })
    .withFailureHandler(function(e) {
      inputEl.style.opacity = '1';
      mostrarToast('Erro: ' + (e && e.message ? e.message : 'desconhecido'), 'error');
    })
    .salvarAgendamento(linha, dataSalvar);
}

function _conectarVeroHub() {
  // Obter URL do DharmaPro para montar o bookmarklet
  google.script.run
    .withSuccessHandler(function(url) {
      _mostrarInstrucoesBookmarklet(url);
    })
    .withFailureHandler(function() {
      _mostrarInstrucoesBookmarklet('');
    })
    .getScriptUrl();
}

function _mostrarInstrucoesBookmarklet(dasUrl) {
  var wrap = document.getElementById('cfg-token-input-wrap');
  var bkWrap = document.getElementById('cfg-bookmarklet-wrap');

  // Montar o código do bookmarklet
  // Quando clicado no VeroHub, pega o token e abre o DharmaPro com ?vhtoken=...
  var bkCode = [
    '(function(){',
      // Sempre buscar via XHR síncrono — mais confiável que getElementById
      'var token="";',
      'try{',
        'var x=new XMLHttpRequest();',
        'x.open("GET","/sales/new",false);',
        'x.withCredentials=true;',
        'x.send();',
        'var m=x.responseText.match(/id="csrf_token"[^>]*value="([^"]+)"/);',
        'if(m&&m[1])token=m[1];',
      '}catch(e){}',
      // Fallback: tentar getElementById
      'if(!token){var el=document.getElementById("csrf_token");if(el&&el.value)token=el.value;}',
      'if(token&&token.length>10){',
        'window.open("' + dasUrl + '?vhtoken="+encodeURIComponent(token),"_blank");',
      '}else{',
        'alert("Token nao encontrado. Verifique se esta logado no VeroHub.");',
      '}',
    '})()'
  ].join('');

  var bkHref = 'javascript:' + bkCode;

  if (bkWrap) {
    bkWrap.innerHTML =
      '<div style="background:rgba(34,217,138,0.06);border:1px solid rgba(34,217,138,0.2);border-radius:8px;padding:16px;margin-bottom:14px;">' +
        '<div style="font-size:11px;font-weight:700;color:#22d98a;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">📌 Configure uma vez, use sempre</div>' +
        '<ol style="font-size:12px;color:var(--muted);line-height:2;padding-left:18px;font-family:monospace;">' +
          '<li>Arraste o botão abaixo para a barra de favoritos do Chrome</li>' +
          '<li>Quando precisar conectar, abra o VeroHub</li>' +
          '<li>Clique no favorito <strong style="color:var(--text)">🟠 DharmaPro</strong></li>' +
          '<li>O DharmaPro abre e conecta automaticamente!</li>' +
        '</ol>' +
        '<div style="margin-top:14px;text-align:center;">' +
          '<a href="' + bkHref.replace(/"/g, '&quot;') + '" ' +
            'onclick="event.preventDefault();mostrarToast(\"Arraste este botão para os favoritos!\",\"\");" ' +
            'style="display:inline-block;padding:10px 20px;background:var(--accent);color:#fff;' +
            'border-radius:8px;font-family:sans-serif;font-size:13px;font-weight:700;' +
            'text-decoration:none;cursor:grab;" ' +
            'title="Arraste para a barra de favoritos">🟠 DharmaPro — Conectar VeroHub</a>' +
        '</div>' +
        '<div style="font-size:10px;color:var(--muted);margin-top:10px;text-align:center;font-family:monospace;">Arraste o botão acima para os favoritos do Chrome</div>' +
      '</div>';
    bkWrap.style.display = 'block';
  }
}


function _mostrarCampoToken() {
  var wrap = document.getElementById('cfg-token-wrap');
  if (wrap) wrap.style.display = 'block';
  var inp = document.getElementById('cfg-token-campo');
  if (inp) { inp.value = ''; inp.focus(); }
  mostrarToast('🔑 Cole o token copiado no campo abaixo.', '');
}

function _salvarTokenCampo() {
  var inp = document.getElementById('cfg-token-campo');
  var token = inp ? inp.value.trim() : '';
  if (!token || token.length < 10) {
    mostrarToast('⚠️ Token inválido. Copie novamente.', 'warning');
    return;
  }
  var btn = document.querySelector('#cfg-token-wrap button');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Salvando...'; }
  _salvarTokenVeroHub(token, btn);
}


function _salvarTokenVeroHub(token, btn) {
  mostrarToast('🟠 Salvando token...', '');
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled = false; btn.textContent = '🔑 Reconectar VeroHub'; }
      if (res && res.sucesso) {
        mostrarToast('✅ VeroHub conectado com sucesso!', 'success');
        _carregarStatusVeroHub();
      } else {
        mostrarToast('❌ Erro ao salvar: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
      }
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = '🔑 Reconectar VeroHub'; }
      mostrarToast('❌ Erro: ' + (e && e.message ? e.message : ''), 'error');
    })
    .salvarTokenVeroHub(token);
}

function _veroHubPedidoVelho(dtHora) {
  if (!dtHora) return false;
  try {
    var p = dtHora.split(' '), d = p[0].split('/'), t = (p[1]||'00:00').split(':');
    var dt = new Date(parseInt(d[2]), parseInt(d[1])-1, parseInt(d[0]), parseInt(t[0]), parseInt(t[1]));
    return (Date.now() - dt.getTime()) > 86400000;
  } catch(e) { return false; }
}

var _vhModalIndex = null;

function _novoPedidoVeroHub(index) {
  var v = _paginaAtual[index];
  if (!v) return;

  if (v.verohubPedido) {
    if (!confirm('Pedido #' + v.verohubPedido + ' já existe. Recriar?')) return;
    v.verohubPedido = ''; v.verohubPedidoDt = '';
  }

  var nome  = String(v.cliente || '').trim();
  var phone = String(v.whats || v.tel || '').replace(/\D/g, '');
  if (!nome || !phone) {
    mostrarToast('⚠️ Cliente sem nome ou telefone.', 'warning'); return;
  }

  // Guarda o index e abre o modal
  _vhModalIndex = index;

  // Preenche info do cliente no topo do modal
  var info = document.getElementById('mvh-cliente-info');
  if (info) {
    info.textContent = nome + ' · ' + phone +
      (v.cpf ? ' · CPF: ' + v.cpf : '') +
      (v.plano ? ' · ' + v.plano : '');
  }

  // Limpa campos e erros
  ['mvh-email','mvh-birthday','mvh-mother','mvh-rg','mvh-plano-busca'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('mvh-erro'); }
  });
  ['mvh-gender','mvh-due-date'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('mvh-erro'); }
  });
  var erroEl = document.getElementById('mvh-erro');
  if (erroEl) erroEl.style.display = 'none';

  var btn = document.getElementById('mvh-btn-confirmar');
  if (btn) { btn.disabled = false; btn.textContent = '🟠 Criar Pedido'; }

  document.getElementById('modalVeroHub').classList.add('ativo');
}

function _fecharModalVeroHub() {
  document.getElementById('modalVeroHub').classList.remove('ativo');
  _vhModalIndex = null;
}

function _confirmarModalVeroHub() {
  var index = _vhModalIndex;
  if (index === null) return;
  var v = _paginaAtual[index];
  if (!v) return;

  // Validação
  var email      = (document.getElementById('mvh-email').value       || '').trim();
  var birthday   = (document.getElementById('mvh-birthday').value    || '').trim();
  var gender     = (document.getElementById('mvh-gender').value      || '').trim();
  var mother     = (document.getElementById('mvh-mother').value      || '').trim();
  var rg         = (document.getElementById('mvh-rg').value          || '').trim();
  var dueDate    = (document.getElementById('mvh-due-date').value    || '').trim();
  var planoBusca = (document.getElementById('mvh-plano-busca').value || '').trim();

  var erros = [];
  var campos = {
    'mvh-email':       { val: (email && email.indexOf('@') !== -1 ? email : ''), msg: 'Informe o e-mail completo do cliente (com @).' },
    'mvh-birthday':    { val: birthday,   msg: 'Informe a data de nascimento.' },
    'mvh-gender':      { val: gender,     msg: 'Selecione o gênero.' },
    'mvh-mother':      { val: mother,     msg: 'Informe o nome da mãe.' },
    'mvh-rg':          { val: rg,         msg: 'Informe o RG.' },
    'mvh-due-date':    { val: dueDate,    msg: 'Selecione o vencimento.' },
    'mvh-plano-busca': { val: planoBusca, msg: 'Digite o nome ou parte do plano VeroHub.' }
  };

  Object.keys(campos).forEach(function(id) {
    var el = document.getElementById(id);
    if (!campos[id].val) {
      erros.push(campos[id].msg);
      if (el) el.classList.add('mvh-erro');
    } else {
      if (el) el.classList.remove('mvh-erro');
    }
  });

  if (erros.length) {
    var erroEl = document.getElementById('mvh-erro');
    erroEl.textContent = erros[0];
    erroEl.style.display = 'block';
    return;
  }

  // Trava botão e busca registro completo (endereço não está em _paginaAtual por performance)
  var btn = document.getElementById('mvh-btn-confirmar');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Buscando dados...'; }

  google.script.run
    .withSuccessHandler(function(vFull) {
      if (!vFull) {
        if (btn) { btn.disabled = false; btn.textContent = '🟠 Criar Pedido'; }
        mostrarToast('❌ Não foi possível carregar os dados do cliente.', 'error');
        return;
      }

      _fecharModalVeroHub();

      // Piscar na lista
      var wrap = document.getElementById('vhub-wrap-' + index);
      if (wrap) wrap.style.opacity = '.5';

      // Ouvir resposta da extensão
      var _handler = function(e) {
        if (!e.data) return;
        // Erro enviado pela extensão (ex: e-mail recusado pelo VeroHub)
        if (e.data.type === 'dhp_pedido_erro' && String(e.data.linha) === String(v.linha)) {
          window.removeEventListener('message', _handler);
          clearTimeout(_timeout);
          if (wrap) wrap.style.opacity = '1';
          var msgErro = e.data.titulo || 'Erro no VeroHub';
          if (e.data.detalhe) msgErro += ': ' + e.data.detalhe;
          mostrarToast('⚠️ ' + msgErro + ' — refaça o pedido.', 'error');
          return;
        }
        if (e.data.type !== 'dhp_pedido_criado') return;
        if (String(e.data.linha) !== String(v.linha)) return;
        window.removeEventListener('message', _handler);
        clearTimeout(_timeout);
        var novoId = e.data.id;
        if (!novoId) {
          if (wrap) wrap.style.opacity = '1';
          mostrarToast('❌ Erro ao criar pedido.', 'error');
          return;
        }
        var _n = new Date();
        var _dt = ('0'+_n.getDate()).slice(-2)+'/'+('0'+(_n.getMonth()+1)).slice(-2)+'/'+_n.getFullYear()+' '+('0'+_n.getHours()).slice(-2)+':'+('0'+_n.getMinutes()).slice(-2);
        google.script.run
          .withSuccessHandler(function(res) {
            if (wrap) wrap.style.opacity = '1';
            if (!res || !res.sucesso) {
              mostrarToast('❌ Erro ao salvar: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
              return;
            }
            v.verohubPedido   = String(novoId);
            v.verohubPedidoDt = _dt;
            var w = document.getElementById('vhub-wrap-' + index);
            if (w) {
              var novo = document.createElement('div');
              novo.innerHTML = _veroHubPedidoHtml(v, index);
              w.parentNode.replaceChild(novo.firstChild, w);
            }
            mostrarToast('✅ Pedido #' + novoId + ' criado!', 'success');
          })
          .withFailureHandler(function(err) {
            if (wrap) wrap.style.opacity = '1';
            mostrarToast('❌ Erro: ' + (err && err.message ? err.message : ''), 'error');
          })
          .salvarPedidoVeroHub(v.linha, String(novoId), _dt);
      };
      window.addEventListener('message', _handler);
      var _timeout = setTimeout(function() {
        window.removeEventListener('message', _handler);
        if (wrap) wrap.style.opacity = '1';
        mostrarToast('⏱️ Tempo esgotado. Extensão instalada?', 'warning');
      }, 120000);

      // Monta os params com dados completos vindos do backend (vFull tem endereço)
      var nome  = String(vFull.cliente || '').trim();
      var phone = String(vFull.whats || vFull.tel || '').replace(/\D/g, '');
      var cep   = String(vFull.cep || '').replace(/\D/g, '');

      var params =
        'dhp_nome='         + encodeURIComponent(nome)                              +
        '&dhp_fone='        + encodeURIComponent(phone)                             +
        '&dhp_email='       + encodeURIComponent(email)                             +
        '&dhp_cpf='         + encodeURIComponent((vFull.cpf||'').replace(/\D/g,'')) +
        '&dhp_rg='          + encodeURIComponent(rg)                                +
        '&dhp_nasc='        + encodeURIComponent(birthday)                          +
        '&dhp_mae='         + encodeURIComponent(mother)                            +
        '&dhp_genero='      + encodeURIComponent(gender)                            +
        '&dhp_cep='         + encodeURIComponent(cep)                               +
        '&dhp_rua='         + encodeURIComponent(vFull.rua         || '')           +
        '&dhp_num='         + encodeURIComponent(vFull.num         || '')           +
        '&dhp_compl='       + encodeURIComponent(vFull.complemento || '')           +
        '&dhp_bairro='      + encodeURIComponent(vFull.bairro      || '')           +
        '&dhp_cidade='      + encodeURIComponent(vFull.cidade      || '')           +
        '&dhp_uf='          + encodeURIComponent(vFull.uf          || '')           +
        '&dhp_plano_busca=' + encodeURIComponent(planoBusca)                        +
        '&dhp_venc='        + encodeURIComponent(dueDate)                           +
        '&dhp_linha='       + encodeURIComponent(vFull.linha       || '');

      window.open('https://hub.veronet.com.br/sales/new?' + params, '_blank');
      mostrarToast('🟠 Criando pedido...', '');
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.textContent = '🟠 Criar Pedido'; }
      mostrarToast('❌ Erro ao buscar dados: ' + (err && err.message ? err.message : ''), 'error');
    })
    .getVendaPorLinha(v.linha);
}

  document.getElementById('mviab-numero').value = '';
  document.getElementById('mviab-complemento').value = '';
  document.getElementById('mviab-result').style.display = 'none';
  document.getElementById('mviab-erro').style.display = 'none';
  var btn = document.getElementById('mviab-btn-consultar');
  if (btn) { btn.disabled = false; btn.textContent = '🔍 Consultar'; }
  m.classList.add('ativo');

}

function _fecharModalViabilidade() {
  var m = document.getElementById('modalViabilidadeVero');
  if (m) m.classList.remove('ativo');
}

function _consultarViabilidade() {
  var cep    = (document.getElementById('mviab-cep').value || '').replace(/\D/g, '');
  var numero = (document.getElementById('mviab-numero').value || '').trim();
  var erroEl = document.getElementById('mviab-erro');
  var resEl  = document.getElementById('mviab-result');
  var btn    = document.getElementById('mviab-btn-consultar');

  erroEl.style.display = 'none';
  resEl.style.display  = 'none';

  if (cep.length !== 8) {
    erroEl.textContent = 'Informe um CEP válido com 8 dígitos.';
    erroEl.style.display = 'block';
    return;
  }
  if (!numero) {
    erroEl.textContent = 'Informe o número do endereço.';
    erroEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Aguardando VeroHub...';

  // Abre janela VeroHub com params de viabilidade — o bookmarklet faz o fetch
  // com a sessão ativa e devolve o resultado via postMessage
  var popup = window.open(
    'https://hub.veronet.com.br/sales/new?dhp_viab_cep=' + cep + '&dhp_viab_num=' + encodeURIComponent(numero),
    'dhp_viab_check',
    'width=900,height=650'
  );

  // Instrução no modal enquanto aguarda
  erroEl.textContent = '🟠 Na janela do VeroHub, clique no favorito DharmaPro para consultar.';
  erroEl.style.display = 'block';

  var _handler = function(e) {
    if (!e.data || e.data.type !== 'dhp_viab_result') return;
    window.removeEventListener('message', _handler);
    clearTimeout(_timeout);

    btn.disabled = false;
    btn.textContent = '🔍 Consultar';
    erroEl.style.display = 'none';

    if (e.data.erro) {
      erroEl.textContent = 'Erro: ' + e.data.erro;
      erroEl.style.display = 'block';
      return;
    }

    var aprovada = e.data.viabilidade === 'Aprovada';
    resEl.className = 'mviab-result ' + (aprovada ? 'aprovada' : 'reprovada');
    document.getElementById('mviab-status').className = 'mviab-status ' + (aprovada ? 'aprovada' : 'reprovada');
    document.getElementById('mviab-status').textContent = (aprovada ? '✅ ' : '❌ ') + e.data.viabilidade;
    document.getElementById('mviab-network').textContent = e.data.network ? 'Network: ' + e.data.network : '';
    resEl.style.display = 'block';
  };

  window.addEventListener('message', _handler);

  var _timeout = setTimeout(function() {
    window.removeEventListener('message', _handler);
    btn.disabled = false;
    btn.textContent = '🔍 Consultar';
    erroEl.textContent = '⏱️ Tempo esgotado. Clicou no favorito 🟠 DharmaPro na janela do VeroHub?';
    erroEl.style.display = 'block';
  }, 120000);
}

function _consultarViabilidadeVenda(index) {
  var v = _paginaAtual[index];
  if (!v || !v.cep || !v.num) return;
  var cep = String(v.cep).replace(/\D/g, '');
  var num = String(v.num).trim();
  if (cep.length !== 8 || !num) { mostrarToast('CEP ou número inválido na venda.', 'error'); return; }

  var btn = document.getElementById('viab-btn-' + index);
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }

    'https://hub.veronet.com.br/sales/new?dhp_viab_cep=' + cep + '&dhp_viab_num=' + encodeURIComponent(num),
    'dhp_viab_check',
    'width=900,height=650'
  );

  var _handler = function(e) {
    if (!e.data || e.data.type !== 'dhp_viab_result') return;
    window.removeEventListener('message', _handler);
    clearTimeout(_timeout);

    if (btn) { btn.disabled = false; btn.textContent = '🔍'; }

    if (e.data.erro) {
      mostrarToast('❌ ' + e.data.erro, 'error');
      return;

    var textoViab = e.data.viabilidade + (e.data.network ? ' | ' + e.data.network : '');

    window.removeEventListener('message', _handler);

    mostrarToast('⏱️ Tempo esgotado. A janela VeroHub respondeu?', 'warning');
  }, 120000);

var _ngDadosTemp = null;

function _consultarNGVenda(index) {
  var v = _paginaAtual[index];
  if (!v || !v.cpf) { mostrarToast('Venda sem CPF.', 'error'); return; }

  _ngDadosTemp = { index: index, linha: v.linha };

  var modal = document.getElementById('modalNG');
