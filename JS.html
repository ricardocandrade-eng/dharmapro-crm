<script>

// ─── DADOS DA PÁGINA ATUAL (substituiu _dadosRenderizados) ─────────────────

// ─── CAMPOS DO FORMULÁRIO ──────────────────────────────────────────────────

// ─── XSS ───────────────────────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str)));
  return d.innerHTML;
}

// Converte qualquer formato de data para DD/MM/AAAA
function _fmtData(val) {
  if (!val) return '';
  var s = String(val).trim();
  // Já está em DD/MM/AAAA
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  // Formato yyyy-MM-dd
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    var p = s.substring(0,10).split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }
  // Tenta via Date
  var d = new Date(s);
  if (!isNaN(d.getTime())) {
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' +
           d.getFullYear();
  }
  return s;
}

// ─── UI ────────────────────────────────────────────────────────────────────
function mostrarLoading(v) {
  document.getElementById('loading').classList.toggle('ativo', v);
}

function _iniciais(nome) {
  var partes = String(nome || '').trim().split(/[\s.]+/).filter(Boolean);
  if (partes.length >= 2) return (partes[0][0] + partes[1][0]).toUpperCase();
  return partes[0] ? partes[0].slice(0, 2).toUpperCase() : '??';
}

function mostrarToast(msg, tipo) {
  tipo = tipo || 'success';
  var t = document.createElement('div');
  t.className = 'toast ' + tipo;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function () {
    t.style.opacity = '0';
    t.style.transform = 'translateX(110%)';
    t.style.transition = 'all 0.3s';
    setTimeout(function () { if (t.parentNode) t.remove(); }, 320);
  }, 3200);
}

function setFieldError(id, msg) {
  var g = document.getElementById('grp_' + id);
  if (!g) return;
  g.classList.add('error');
  var e = g.querySelector('.err-msg');
  if (e && msg) e.textContent = msg;
}
function clearFieldError(id) {
  var g = document.getElementById('grp_' + id);
  if (g) g.classList.remove('error');
}

// ─── SINCRONIZAÇÃO AO LOGAR ────────────────────────────────────────────────
var _syncTimer = null;

function _syncProgresso(pct, etapa) {
  var bar  = document.getElementById('syncBar');
  var pctEl= document.getElementById('syncPct');
  var etEl = document.getElementById('syncEtapa');
  if (bar)  bar.style.width  = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (etEl && etapa) etEl.textContent = etapa;
}

function _sincronizarAoLogar(nomeUsuario) {
  var syncEl = document.getElementById('syncContainer');
  if (syncEl) syncEl.style.display = 'flex';

  // Progresso simulado — avança até 85% enquanto aguarda o backend
  var pct = 0;
  var etapas = [
    { ate: 15, msg: 'Conectando ao servidor...' },
    { ate: 35, msg: 'Lendo planilha...' },
    { ate: 60, msg: 'Processando registros...' },
    { ate: 80, msg: 'Preparando dados...' },
    { ate: 85, msg: 'Quase lá...' }
  ];
  var etapaIdx = 0;
  _syncProgresso(0, 'Iniciando...');

  _syncTimer = setInterval(function() {
    var limite = etapas[etapaIdx] ? etapas[etapaIdx].ate : 85;
    if (pct < limite) {
      pct += 1;
      var msg = etapas[etapaIdx] ? etapas[etapaIdx].msg : 'Quase lá...';
      _syncProgresso(pct, msg);
    } else if (etapaIdx < etapas.length - 1) {
      etapaIdx++;
    }
  }, 150); // avança 1% a cada 150ms → ~13s para chegar em 85%

  google.script.run
    .withSuccessHandler(function(res) {
      try {
        clearInterval(_syncTimer);
        _syncProgresso(100, 'Concluído!');
        if (res) {
          if (res.contratos) _dadosSincronizados = res.contratos;
          if (res.vendas && !res.vendas.erro) AppState.set('_vendasPreCarregadas', res.vendas);
        }
      } catch(e) {}
      setTimeout(function() {
        try {
          if (syncEl) syncEl.style.display = 'none';
          document.getElementById('loginContainer').style.display = 'none';
          document.getElementById('sistema').style.display = 'flex';
          document.getElementById('rodapeSistema').style.display = 'flex';
          mostrarToast('Bem-vindo, ' + nomeUsuario + '!', 'success');
          navegar('dash');
        } catch(e) { location.reload(); }
      }, 400);
    })
    .withFailureHandler(function() {
      clearInterval(_syncTimer);
      _syncProgresso(100, 'Entrando sem sync...');
      setTimeout(function() {
        if (syncEl) syncEl.style.display = 'none';
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('sistema').style.display = 'flex';
        document.getElementById('rodapeSistema').style.display = 'flex';
        mostrarToast('Bem-vindo, ' + nomeUsuario + '!');
        navegar('dash');
      }, 400);
    })
    .getSincronizacaoInicial();
}

// ─── AUTH ──────────────────────────────────────────────────────────────────
function fazerLogin() {
  var usuario  = document.getElementById('loginUsuario').value.trim();
  var senha    = document.getElementById('loginSenha').value;
  var errDiv   = document.getElementById('loginError');
  var btnLogin = document.getElementById('btnLogin');
  errDiv.style.display = 'none';
  if (!usuario || !senha) {
    errDiv.textContent = 'Preencha usuário e senha.';
    errDiv.style.display = 'block';
    return;
  }
  mostrarLoading(true);
  btnLogin.disabled = true;
  google.script.run
    .withSuccessHandler(function (res) {
      mostrarLoading(false);
      btnLogin.disabled = false;
      if (res.autorizado) {
        AppState.set('nomeUsuario', res.nome || usuario);
        document.getElementById('nomeUsuario').textContent = res.nome || usuario;

        // Avatar: foto do usuário ou iniciais como fallback
        var avatarEl = document.getElementById('userAvatar');
        if (avatarEl) {
          if (res.foto) {
            var img = document.createElement('img');
            img.src = res.foto;
            img.alt = res.nome || usuario;
            img.onerror = function() {
              // Se foto falhar, exibe iniciais
              avatarEl.innerHTML = '<span class="initials">' + _iniciais(res.nome || usuario) + '</span>';
            };
            avatarEl.innerHTML = '';
            avatarEl.appendChild(img);
          } else {
            avatarEl.innerHTML = '<span class="initials">' + _iniciais(res.nome || usuario) + '</span>';
          }
        }

        AppState.set('perfil', res.perfil || 'backoffice');
        _aplicarMenus(res.menus || []);
        _carregarResponsaveis();
        _sincronizarAoLogar(res.nome || usuario);

      } else {
        errDiv.textContent = res.mensagem || 'Credenciais inválidas.';
        errDiv.style.display = 'block';
        document.getElementById('loginSenha').value = '';
        document.getElementById('loginSenha').focus();
      }
    })
    .withFailureHandler(function () {
      mostrarLoading(false);
      btnLogin.disabled = false;
      errDiv.textContent = 'Erro de conexão.';
      errDiv.style.display = 'block';
    })
    .validarLogin(usuario, senha);
}

function sair() {
  if (confirm('Deseja realmente sair?')) location.reload();
}

// ─── CONTROLE DE MENUS POR PERFIL ──────────────────────────────────────────
var _menusPermitidos = ['dash','formulario','lista','funil','leads','pap','docs','cruzamento']; // default: tudo

var _menuMap = {
  'dash':        'menuDash',
  'formulario':  'menuNovo',
  'lista':       'menuLista',
  'funil':       'menuFunil',
  'leads':       'menuLeads',
  'pap':         'menuPAP',
  'docs':        'menuDocs',
  'cruzamento':  'menuCruzamento'
};

function _aplicarMenus(menus) {
  _menusPermitidos = menus && menus.length ? menus : Object.keys(_menuMap);
  Object.keys(_menuMap).forEach(function(pagina) {
    var el = document.getElementById(_menuMap[pagina]);
    if (!el) return;
    el.style.display = _menusPermitidos.indexOf(pagina) > -1 ? '' : 'none';
  });
}

function _podeAcessar(pagina) {
  return _menusPermitidos.indexOf(pagina) > -1;
}

// ─── NAVEGAÇÃO ─────────────────────────────────────────────────────────────
function navegar(pagina) {
  // Bloqueia acesso a páginas não permitidas para o perfil
  if (!_podeAcessar(pagina)) {
    mostrarToast('⛔ Você não tem permissão para acessar esta página.', 'error');
    return;
  }
  document.querySelectorAll('.nav-item').forEach(function (m) { m.classList.remove('ativo'); });
  document.querySelectorAll('.page').forEach(function (p) { p.classList.remove('ativa'); });

  if (pagina === 'dash') {
    document.getElementById('menuDash').classList.add('ativo');
    document.getElementById('pageDash').classList.add('ativa');
    document.getElementById('breadcrumbTexto').textContent = 'Dashboard';
    var container = document.getElementById('dashContainer');
    if (!container.getAttribute('data-loaded')) {
      container.setAttribute('data-loaded', '1');
      google.script.run
        .withSuccessHandler(function(html) {
          if (!html) {
            container.innerHTML = '<div style="padding:60px;text-align:center;color:#ff4570;font-family:monospace">Erro: HTML vazio</div>';
            return;
          }
          // Dashboard.html já vem sem html/head/body e com CSS escopado em #dashContainer
          container.innerHTML = html;
          // Executa o script inline do dashboard
          container.querySelectorAll('script').forEach(function(s) {
            var ns = document.createElement('script');
            ns.textContent = s.textContent;
            document.body.appendChild(ns);
          });
        })
        .withFailureHandler(function(err) {
          container.innerHTML = '<div style="padding:60px;text-align:center;color:#ff4570;font-family:monospace">Erro: ' + err.message + '</div>';
        })
        .getDashboardHtml();
    }

  } else if (pagina === 'formulario') {
    document.getElementById('menuNovo').classList.add('ativo');
    document.getElementById('pageFormulario').classList.add('ativa');
    if (typeof wizInit === 'function') wizInit();
    var ed = AppState.get('modoEdicao');
    document.getElementById('breadcrumbTexto').textContent = ed ? 'Editando Venda' : 'Nova Venda';
    document.getElementById('formTitulo').textContent      = ed ? 'Editar Cadastro' : 'Novo Cadastro';
    document.getElementById('formSubtitulo').textContent   = ed ? 'Atualize os dados e salve' : 'Preencha os dados do cliente e do plano';
    if (!ed) limparFormulario();

  } else if (pagina === 'lista') {
    document.getElementById('menuLista').classList.add('ativo');
    document.getElementById('pageLista').classList.add('ativa');
    document.getElementById('breadcrumbTexto').textContent = 'Lista de Vendas';
    var preCarregadas = AppState.get('_vendasPreCarregadas');
    if (preCarregadas) {
      AppState.set('_vendasPreCarregadas', null);
      _renderizarLista(preCarregadas);
    } else {
      carregarVendas(1, '');
    }

  } else if (pagina === 'funil') {
    document.getElementById('menuFunil').classList.add('ativo');
    document.getElementById('pageFunil').classList.add('ativa');
    document.getElementById('breadcrumbTexto').textContent = 'Funil de Instalações';
    carregarFunil();

  } else if (pagina === 'leads') {
    document.getElementById('menuLeads').classList.add('ativo');
    document.getElementById('pageLeads').classList.add('ativa');
    document.getElementById('breadcrumbTexto').textContent = 'Tratamento de Leads';
    carregarLeads();

  } else if (pagina === 'pap') {
    document.getElementById('menuPAP').classList.add('ativo');
    document.getElementById('pagePAP').classList.add('ativa');
    document.getElementById('breadcrumbTexto').textContent = 'Pagamentos PAP';
    carregarPAP();

  } else if (pagina === 'cruzamento') {
    document.getElementById('menuCruzamento').classList.add('ativo');
    document.getElementById('pageCruzamento').classList.add('ativa');
    document.getElementById('breadcrumbTexto').textContent = 'Cruzamento Vero';

  } else if (pagina === 'docs') {
    document.getElementById('menuDocs').classList.add('ativo');
    document.getElementById('pageDocs').classList.add('ativa');
    document.getElementById('breadcrumbTexto').textContent = 'Documentos';
    var dc = document.getElementById('docsContainer');
    if (!dc.getAttribute('data-loaded')) {
      dc.setAttribute('data-loaded', '1');
      google.script.run
        .withSuccessHandler(function(html) {
          dc.innerHTML = html;
          dc.querySelectorAll('script').forEach(function(s) {
            var ns = document.createElement('script');
            ns.textContent = s.textContent;
            document.body.appendChild(ns);
          });
        })
        .withFailureHandler(function(e) {
          dc.innerHTML = '<div style="padding:40px;text-align:center;color:#e63e6d;font-family:monospace">Erro: ' + e.message + '</div>';
        })
        .getDocsHtml();
    }
  }
}

// Salva Status Pagamento PAP direto do painel lateral
function _salvarStatusPAP(linha, selectEl) {
  var novoStatus = selectEl.value;
  var original   = selectEl.dataset.original || selectEl.value;
  selectEl.dataset.original = selectEl.value;
  selectEl.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      selectEl.disabled = false;
      if (res && res.sucesso) {
        // Atualiza dado em memória na lista de vendas
        var venda = AppState.get('vendaSelecionada');
        if (venda) venda.statusPAP = novoStatus;
        mostrarToast('✅ Status PAP atualizado: ' + (novoStatus || '—'), 'success');
        // Invalida cache para que Pagamentos PAP recarregue corretamente
      } else {
        selectEl.value    = original;
        selectEl.disabled = false;
        mostrarToast('⚠️ Erro: ' + (res ? res.mensagem : 'tente novamente'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      selectEl.value    = original;
      selectEl.disabled = false;
      mostrarToast('❌ Falha: ' + err.message, 'error');
    })
    .salvarStatusPAP(linha, novoStatus);
}


function _carregarResponsaveis() {
  google.script.run
    .withSuccessHandler(function(res) {
      var sel = document.getElementById('f_resp');
      if (!sel) return;
      var valorAtual = sel.value; // preserva valor se estiver editando
      sel.innerHTML = '<option value="">Selecione...</option>';
      if (res && !res.erro && res.lista) {
        res.lista.forEach(function(nome) {
          var opt = document.createElement('option');
          opt.value = nome;
          opt.textContent = nome;
          sel.appendChild(opt);
        });
      } else {
        // Fallback: campo livre se der erro
        sel.innerHTML = '<option value="">Não foi possível carregar</option>';
        Logger.log && Logger.log('Responsáveis: ' + (res ? res.mensagem : 'erro'));
      }
      if (valorAtual) sel.value = valorAtual;
    })
    .withFailureHandler(function() {
      var sel = document.getElementById('f_resp');
      if (sel) sel.innerHTML = '<option value="">Erro ao carregar</option>';
    })
    .getResponsaveis();
}

// ─── FORMULÁRIO ────────────────────────────────────────────────────────────
function limparFormulario() {
  document.getElementById('formVendas').reset();
  document.getElementById('f_linha').value = '';
  document.getElementById('cepHint').textContent = '';
  AppState.set('modoEdicao', false);
  CAMPOS_FORM.forEach(function (c) { clearFieldError(c); });
  if (typeof _wizResetar === 'function') _wizResetar();
}

function preencherFormulario(v) {
  CAMPOS_FORM.forEach(function (campo) {
    var el = document.getElementById('f_' + campo);
    if (!el) return;
    if (campo === 'resp') {
      // Se o valor não existe como opção, adiciona temporariamente
      var existe = Array.from(el.options).some(function(o) { return o.value === (v[campo] || ''); });
      if (!existe && v[campo]) {
        var opt = document.createElement('option');
        opt.value = v[campo]; opt.textContent = v[campo] + ' (atual)';
        el.appendChild(opt);
      }
      el.value = v[campo] || '';
    } else {
      el.value = v[campo] || '';
    }
  });
  if (!v.turno) document.getElementById('f_turno').value = 'Manhã (08h às 12h)';
  var _bs = document.getElementById('wizBtnSave'); if (_bs) _bs.textContent = '🔄 Atualizar';
  document.getElementById('formTitulo').textContent = 'Editar Cadastro';
  AppState.set('modoEdicao', true);
}

function coletarDados() {
  var dados = { linhaReferencia: document.getElementById('f_linha').value };
  CAMPOS_FORM.forEach(function (campo) {
    if (campo === 'linha') return;
    var el = document.getElementById('f_' + campo);
    dados[campo] = el ? el.value.trim() : '';
  });
  if (dados.uf) dados.uf = dados.uf.toUpperCase();
  // PAP sempre Em Aberto quando não definido
  if (!dados.statusPAP) dados.statusPAP = 'Em Aberto';
  return dados;
}

function validarFormulario(dados) {
  var ok = true;
  ['cliente','status','cpf'].forEach(function (f) { clearFieldError(f); });
  if (!dados.cliente) { setFieldError('cliente', 'Nome é obrigatório.'); ok = false; }
  if (!dados.status)  { setFieldError('status',  'Selecione um status.'); ok = false; }
  if (dados.cpf) {
    var l = dados.cpf.replace(/\D/g, '');
    if (l.length !== 11 && l.length !== 14) { setFieldError('cpf', 'CPF 11 dígitos ou CNPJ 14.'); ok = false; }
  }
  return ok;
}

function salvar() {
  var dados = coletarDados();
  if (!validarFormulario(dados)) return;
  var btnSave = document.getElementById('wizBtnSave');
  mostrarLoading(true);
  if (btnSave) { btnSave.disabled = true; btnSave.textContent = '⏳ Salvando...'; }
  google.script.run
    .withSuccessHandler(function (res) {
      mostrarLoading(false);
      if (btnSave) { btnSave.disabled = false; btnSave.textContent = '💾 Salvar'; }
      mostrarToast(res.mensagem, res.sucesso ? 'success' : 'error');
      if (res.sucesso) {
        limparFormulario();
        if (AppState.get('modoEdicao')) setTimeout(function () { navegar('lista'); }, 800);
        AppState.set('modoEdicao', false);
      } else {
        // Se erro de validação, volta ao step com problema
        if (res.mensagem && res.mensagem.indexOf('status') > -1) wizMostrarErroStep(0, res.mensagem);
        else if (res.mensagem && res.mensagem.indexOf('nome') > -1) wizMostrarErroStep(1, res.mensagem);
      }
    })
    .withFailureHandler(function (erro) {
      mostrarLoading(false);
      if (btnSave) { btnSave.disabled = false; btnSave.textContent = '💾 Salvar'; }
      mostrarToast('Erro: ' + erro.message, 'error');
    })
    .salvarVenda(dados);
}

// ─── LISTA ─────────────────────────────────────────────────────────────────
function _coletarOpcoesFiltro() {
  try {
    var elStatus   = document.getElementById('filtroStatus');
    var elPreVenda = document.getElementById('filtroPreVenda');
    var elProduto  = document.getElementById('filtroProduto');
    var elVeroHub  = document.getElementById('filtroVeroHub');
    var status   = elStatus   ? (elStatus.value   || '') : '';
    var preVenda = elPreVenda ? (elPreVenda.value  || '') : '';
    var produto  = elProduto  ? (elProduto.value   || '') : '';
    var verohub  = elVeroHub  ? (elVeroHub.checked || false) : false;
    ['filtroStatus','filtroPreVenda','filtroProduto'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.toggle('ativo', !!el.value);
    });
    var toggleLabel = document.getElementById('filtroVeroHub');
    if (toggleLabel && toggleLabel.closest) toggleLabel.closest('label') && toggleLabel.closest('label').classList.toggle('ativo', verohub);
    return { status: status, preVenda: preVenda, produto: produto, verohub: verohub };
  } catch(e) {
    return {};
  }
}

function aplicarFiltros() {
  var termo = document.getElementById('campoBusca') ? document.getElementById('campoBusca').value.trim() : '';
  AppState.set('filtroAtual', termo);
  carregarVendas(1, termo);
}

function limparFiltros() {
  var ids = ['filtroStatus','filtroPreVenda','filtroProduto'];
  ids.forEach(function(id){ var el = document.getElementById(id); if(el){ el.value=''; el.classList.remove('ativo'); }});
  var cb = document.getElementById('filtroVeroHub'); if(cb) cb.checked = false;
  var tgl = cb ? cb.closest('label') : null; if(tgl) tgl.classList.remove('ativo');
  document.getElementById('campoBusca').value = '';
  AppState.set('filtroAtual', '');
  carregarVendas(1, '');
}






function carregarVendas(pagina, filtro) {
  pagina = (pagina !== undefined) ? pagina : AppState.get('paginaAtual');
  filtro = (filtro !== undefined) ? filtro : AppState.get('filtroAtual');
  AppState.set('paginaAtual', pagina);
  AppState.set('filtroAtual', filtro);

  document.getElementById('listaVendas').innerHTML =
    '<div class="empty"><div class="empty-icon" style="font-size:20px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>' +
    '<p style="margin-top:10px;font-size:12px;">Carregando vendas...</p></div>';

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res) {
        document.getElementById('listaVendas').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro</h3><p>Resposta vazia do servidor.</p></div>';
        return;
      }
      if (res.erro) {
        document.getElementById('listaVendas').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p style="font-family:monospace;font-size:11px;color:#ff4570">' + esc(res.erro) + '</p></div>';
        return;
      }
      _renderizarLista(res);
    })
    .withFailureHandler(function (erro) {
      var msg = erro && erro.message ? erro.message : String(erro);
      document.getElementById('listaVendas').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div>' +
        '<h3>Erro ao carregar</h3><p style="font-family:monospace;font-size:11px;color:#ff4570">' + esc(msg) + '</p></div>';
    })
    .getVendasPaginadas(pagina, filtro, JSON.stringify(_coletarOpcoesFiltro()));
}


function _renderizarLista(res) {
  // Guarda dados da página para o painel lateral
  _paginaAtual = res.dados || [];

  var container = document.getElementById('listaVendas');

  // Atualiza contador
  document.getElementById('totalRegistros').textContent =
    res.total + ' registro' + (res.total !== 1 ? 's' : '');

  // Sem dados
  if (!_paginaAtual.length) {
    container.innerHTML =
      '<div class="empty"><div class="empty-icon">🔍</div>' +
      '<h3>Nenhuma venda encontrada</h3><p>Tente outro filtro.</p></div>';
    document.getElementById('paginacao').style.display = 'none';
    fecharPainel();
    return;
  }

  // Renderiza itens
  var html = '';
  for (var i = 0; i < _paginaAtual.length; i++) {
    html += _criarItemVenda(_paginaAtual[i], i);
  }
  container.innerHTML = html;

  // Paginação
  var temPag = res.total > CONFIG_JS.MAX_RESULTS || res.pagina > 1;
  document.getElementById('paginacao').style.display  = temPag ? 'flex' : 'none';
  document.getElementById('infoPagina').textContent   = 'Pág. ' + res.pagina;
  document.getElementById('btnAnterior').disabled     = res.pagina === 1;
  document.getElementById('btnProximo').disabled      = !res.temMais;
}

// ─── VEROHUB ───────────────────────────────────────────────────────────────
function _veroHubVencido(verohub) {
  if (!verohub) return false;
  var s = String(verohub).trim();
  var d;
  if (s.indexOf('/') > -1) {
    var p = s.split('/');
    d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  } else {
    d = new Date(s);
  }
  if (isNaN(d.getTime())) return false;
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  return d < hoje;
}

function _veroHubToInputDate(verohub) {
  if (!verohub) return '';
  var s = String(verohub).trim();
  if (s.indexOf('/') > -1) {
    var p = s.split('/');
    return p[2] + '-' + ('0'+p[1]).slice(-2) + '-' + ('0'+p[0]).slice(-2);
  }
  return s.substring(0,10);
}

function _veroHubHtml(v, index) {
  var vencido   = _veroHubVencido(v.verohub);
  var semData   = !v.verohub;
  var inputDate = _veroHubToInputDate(v.verohub);
  // Pisca se vencido OU se sem data
  var piscar = vencido || semData;
  var tit = vencido ? 'Analise vencida! Reblindar no VeroHub.' : (semData ? 'Sem data — preencha a blindagem' : 'Blindagem OK');
  var dot = piscar ? '<span class="verohub-dot"></span>' : '';
  var ok  = (!semData && !vencido) ? '<span class="verohub-ok">✓</span>' : '';
  return '<div class="verohub-wrap" onclick="event.stopPropagation()">' +
    dot +
    '<span class="verohub-label">VeroHub:</span>' +
    '<input type="date" class="verohub-input" value="' + inputDate + '" title="' + tit + '" onchange="_salvarVeroHub(' + v.linha + ',this,' + index + ')">' +
    ok +
  '</div>';
}

function _salvarVeroHub(linha, inputEl, index) {
  var val = inputEl.value;
  var dataSalvar = '';
  if (val) {
    var p = val.split('-');
    dataSalvar = p[2] + '/' + p[1] + '/' + p[0];
  }
  inputEl.style.opacity = '.5';
  google.script.run
    .withSuccessHandler(function(res) {
      inputEl.style.opacity = '1';
      var ok = !res || res.sucesso !== false;
      if (ok) {
        // Atualiza dado em memória
        if (_paginaAtual[index]) _paginaAtual[index].verohub = dataSalvar;
        // Atualiza bolinha em tempo real — sem recarregar
        var wrap = inputEl.closest('.verohub-wrap');
        if (wrap) {
          var dot = wrap.querySelector('.verohub-dot');
          var vencido = dataSalvar ? _veroHubVencido(dataSalvar) : true; // sem data = pisca
          if (vencido || !dataSalvar) {
            if (!dot) {
              dot = document.createElement('span');
              dot.className = 'verohub-dot';
              wrap.insertBefore(dot, wrap.firstChild);
            }
          } else {
            if (dot) dot.remove();
          }
          // Atualiza ok
          var okEl = wrap.querySelector('.verohub-ok');
          if (!dataSalvar || vencido) {
            if (okEl) okEl.remove();
          } else {
            if (!okEl) {
              okEl = document.createElement('span');
              okEl.className = 'verohub-ok';
              okEl.textContent = '✓';
              wrap.appendChild(okEl);
            }
          }
        }
        mostrarToast(dataSalvar ? '✅ VeroHub: ' + dataSalvar : 'VeroHub removido', 'success');
      } else {
        mostrarToast('Erro ao salvar VeroHub: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
      }
    })
    .withFailureHandler(function(e) {
      inputEl.style.opacity = '1';
      mostrarToast('Erro: ' + (e && e.message ? e.message : 'desconhecido'), 'error');
    })
    .salvarVeroHub(linha, dataSalvar);
}

function _secaoPainel(titulo, linhas) {
  var rows = '';
  for (var i = 0; i < linhas.length; i++) {
    var lbl = linhas[i][0];
    var val = linhas[i][1];
    if (!val || String(val).trim() === '') continue;
    rows += '<div class="painel-linha">' +
      '<span class="painel-lbl">' + esc(lbl) + '</span>' +
      '<span class="painel-val">' + esc(val) + '</span>' +
    '</div>';
  }
  if (!rows) return '';
  return '<div class="painel-secao">' +
    '<div class="painel-secao-titulo">' + titulo + '</div>' +
    rows +
  '</div>';
}

function _linhaPainelHtml(lbl, htmlVal) {
  return '<div class="painel-linha">' +
    '<span class="painel-lbl">' + esc(lbl) + '</span>' +

function _copiarTextoVenda(v) {
  var texto =
    '📄 Contrato: '     + (v.contrato  || '-') + '\n' +
    '🙍 Cliente: '      + (v.cliente   || '-') + '\n' +
    '📱 WhatsApp: '     + (v.whats     || '-') + '\n' +
    '🆔 CPF: '          + (v.cpf       || '-') + '\n' +
    '📌 Status: '       + (v.status    || '-') + '\n' +
    '👨‍💼 Responsável: ' + (v.resp      || '-') + '   |   🏷️ Canal: ' + (v.canal || '-') + '\n' +
    '🏙️ Cidade: '       + (v.cidade    || '-') + (v.uf ? ' / ' + v.uf : '') + '\n' +
    '⚡ Ativação: '     + (_fmtData(v.dataAtiv)  || '-') + '\n' +
    '📅 Agendamento: '  + (_fmtData(v.agenda)    || '-') + '\n' +
    '✅ Instalação: '   + (_fmtData(v.instal)    || '-') + '\n' +
    '📦 Produto: '      + (v.produto   || '-') + '\n' +
    '🗂 Plano: '        + (v.plano     || '-') + '\n' +
    '💰 Valor: '        + (v.valor     || '-');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto)
      .then(function () { mostrarToast('✅ Resumo copiado!', 'success'); })
      .catch(function () { _copiarFallback(texto); });
  } else {
    _copiarFallback(texto);
  }
}

function _copiarFallback(texto) {
  var ta = document.createElement('textarea');
  ta.value = texto;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    mostrarToast('✅ Resumo copiado!', 'success');
  } catch (e) {
    mostrarToast('Não foi possível copiar.', 'error');
  }
  document.body.removeChild(ta);
}
