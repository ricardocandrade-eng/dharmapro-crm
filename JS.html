}

function _sincronizarAoLogar(nomeUsuario) {
  // Entra no sistema IMEDIATAMENTE — sem tela de carregamento bloqueante
  document.getElementById('loginContainer').style.display = 'none';
  document.getElementById('sistema').style.display = 'flex';
  document.getElementById('rodapeSistema').style.display = 'flex';
  mostrarToast('Bem-vindo, ' + nomeUsuario + '!', 'success');
  navegar('dash');
  setTimeout(_verificarTravaPosLogin, 1000);

  // Prefetch silencioso em background — popula _dadosListaCache sem bloquear
  // Quando o usuário navegar para a Lista, os dados já estão prontos (0ms)
  google.script.run
    .withSuccessHandler(function(res) {
      try {
        if (!res) return;
        if (res.contratos) _dadosSincronizados = res.contratos;
        if (res.vendas && res.vendas.dados && res.vendas.dados.length > 0) {
          _dadosListaCache    = res.vendas.dados;
          _dadosListaTotal    = res.vendas.dados.length;
          _dadosTotalServidor = res.vendas.totalGeral || res.vendas.dados.length;
        }
      } catch(e) {}
    })
    .withFailureHandler(function() { /* silencioso — sem impacto no usuário */ })
    .getSincronizacaoInicial();

  // Polling de alertas PAP — atualiza badge do menu a cada 60s
  _pollPendentes();
  setInterval(_pollPendentes, 60000);
}

function _pollPendentes() {
  google.script.run
    .withSuccessHandler(function(res) {
      try {
        var total = (res && res.total) ? res.total : 0;
        var badge = document.getElementById('badgeFilaPAP');
        if (!badge) return;
        if (total > 0) {
          badge.textContent = total;
          badge.classList.add('visivel', 'pulsar');
        } else {
          badge.classList.remove('visivel', 'pulsar');
        }
      } catch(e) {}
    })
    .withFailureHandler(function() { /* silencioso */ })
    .listarPendentes();
}

// ─── AUTH ──────────────────────────────────────────────────────────────────
function fazerLogin() {
  var usuario  = document.getElementById('loginUsuario').value.trim();
  var senha    = document.getElementById('loginSenha').value;
  var errDiv   = document.getElementById('loginError');
  var btnLogin = document.getElementById('btnLogin');
  errDiv.style.display = 'none';
  if (!usuario || !senha) {
    errDiv.textContent = 'Preencha usuário e senha.';
    errDiv.style.display = 'block';
    return;
  }
  mostrarLoading(true);
  btnLogin.disabled = true;
  google.script.run
    .withSuccessHandler(function (res) {
      mostrarLoading(false);
      btnLogin.disabled = false;
      if (res.autorizado) {
        AppState.set('nomeUsuario', res.nome || usuario);
        document.getElementById('nomeUsuario').textContent = res.nome || usuario;

        // Avatar: foto do usuário ou iniciais como fallback
        var avatarEl = document.getElementById('userAvatar');
        if (avatarEl) {
          if (res.foto) {
            var img = document.createElement('img');
            img.src = res.foto;
            img.alt = res.nome || usuario;
            img.onerror = function() {
              // Se foto falhar, exibe iniciais
              avatarEl.innerHTML = '<span class="initials">' + _iniciais(res.nome || usuario) + '</span>';
            };
            avatarEl.innerHTML = '';
            avatarEl.appendChild(img);
          } else {
            avatarEl.innerHTML = '<span class="initials">' + _iniciais(res.nome || usuario) + '</span>';
          }
        }

        AppState.set('perfil', res.perfil || 'backoffice');
        _aplicarMenus(res.menus || []);
        _carregarResponsaveis();

        // ─── Salva sessão para auto-login no F5 (nunca armazena a senha) ──
        try {
          sessionStorage.setItem('crm_usuario', usuario);
          sessionStorage.setItem('crm_nome', res.nome || usuario);
        } catch(e) {}

        _iniciarTimerInatividade();
        _sincronizarAoLogar(res.nome || usuario);

        // Detectar retorno do bookmarklet (?vh=ok) → ir direto para Configurações
        try {
          if (typeof VH_OK !== 'undefined' && VH_OK === 'true') {
            setTimeout(function() {
              navegar('config');
              mostrarToast('✅ VeroHub conectado com sucesso!', 'success');
            }, 800);
          }
        } catch(e) {}

      } else {
        errDiv.textContent = res.mensagem || 'Credenciais inválidas.';
        errDiv.style.display = 'block';
        document.getElementById('loginSenha').value = '';
        document.getElementById('loginSenha').focus();
      }
    })
    .withFailureHandler(function () {
      mostrarLoading(false);
      btnLogin.disabled = false;
      errDiv.textContent = 'Erro de conexão.';
      errDiv.style.display = 'block';
    })
    .validarLogin(usuario, senha);
}

function sair() {
  var nome = AppState.get('nome') || sessionStorage.getItem('crm_nome') || '';
  var pn = nome ? nome.split(' ')[0] : '';
  var msgs = ['Até logo' + (pn?', '+pn:'') + '! 👋', 'Boa jornada' + (pn?', '+pn:'') + '! 🌟',
              'Até a próxima' + (pn?', '+pn:'') + '! 🚀', 'Tchau' + (pn?', '+pn:'') + '! 😊'];

  if (confirm(msg + '\n\nDeseja realmente sair do DharmaPro?')) {

}

// ── TIMER DE INATIVIDADE (1 hora) ─────────────────────────────
var _inativTimer = null;
function _iniciarTimerInatividade() {
  _resetarTimerInatividade();
  ['mousemove','keydown','click','scroll','touchstart'].forEach(function(ev) {
    document.addEventListener(ev, _resetarTimerInatividade, { passive: true });
  });
}
function _resetarTimerInatividade() {
  clearTimeout(_inativTimer);
  _inativTimer = setTimeout(function() {
    try { sessionStorage.removeItem('crm_usuario'); sessionStorage.removeItem('crm_nome'); } catch(e) {}
    // Exibe tela de login diretamente — evita tela branca causada por location.reload() no iframe GAS
    var elSistema   = document.getElementById('sistema');
    var elRodape    = document.getElementById('rodapeSistema');
    var elLogin     = document.getElementById('loginContainer');
    var elErro      = document.getElementById('loginError');
    var elSenha     = document.getElementById('loginSenha');
    var elUsuario   = document.getElementById('loginUsuario');
    if (elSistema) elSistema.style.display   = 'none';
    if (elRodape)  elRodape.style.display    = 'none';
    if (elLogin)   elLogin.style.display     = 'flex';
    if (elSenha)   elSenha.value             = '';
    if (elErro)  { elErro.textContent = '⏰ Sessão expirada por inatividade. Faça login novamente.'; elErro.style.display = 'block'; }
    if (elUsuario) elUsuario.focus();
  }, 60 * 60 * 1000);
}

// Salva Status Pagamento PAP direto do painel lateral
function _salvarStatusPAP(linha, selectEl) {
  var novoStatus = selectEl.value;
  var original   = selectEl.dataset.original || selectEl.value;
  selectEl.dataset.original = selectEl.value;
  selectEl.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      selectEl.disabled = false;
      if (res && res.sucesso) {
        // Atualiza dado em memória na lista de vendas
        var venda = AppState.get('vendaSelecionada');
        if (venda) venda.statusPAP = novoStatus;
        mostrarToast('✅ Status PAP atualizado: ' + (novoStatus || '—'), 'success');
        // Invalida cache para que Pagamentos PAP recarregue corretamente
      } else {
        selectEl.value    = original;
        selectEl.disabled = false;
        mostrarToast('⚠️ Erro: ' + (res ? res.mensagem : 'tente novamente'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      selectEl.value    = original;
      selectEl.disabled = false;
      mostrarToast('❌ Falha: ' + err.message, 'error');
    })
    .salvarStatusPAP(linha, novoStatus);
}


function _carregarResponsaveis() {
  google.script.run
    .withSuccessHandler(function(res) {
      var sel = document.getElementById('f_resp');
      if (!sel) return;
      var valorAtual = sel.value; // preserva valor se estiver editando
      sel.innerHTML = '<option value="">Selecione...</option>';
      if (res && !res.erro && res.lista) {
        res.lista.forEach(function(nome) {
          var opt = document.createElement('option');
          opt.value = nome;
          opt.textContent = nome;
          sel.appendChild(opt);
        });
      } else {
        // Fallback: campo livre se der erro
        sel.innerHTML = '<option value="">Não foi possível carregar</option>';
        Logger.log && Logger.log('Responsáveis: ' + (res ? res.mensagem : 'erro'));
      }
      if (valorAtual) sel.value = valorAtual;
    })
    .withFailureHandler(function() {
      var sel = document.getElementById('f_resp');
      if (sel) sel.innerHTML = '<option value="">Erro ao carregar</option>';
    })
    .getResponsaveis();
}

function preencherFormulario(v) {
  CAMPOS_FORM.forEach(function (campo) {
    var el = document.getElementById('f_' + campo);
    if (!el) return;
    if (campo === 'resp') {
      var existe = Array.from(el.options).some(function(o) { return o.value === (v[campo] || ''); });
      if (!existe && v[campo]) {
        var opt = document.createElement('option');
        opt.value = v[campo]; opt.textContent = v[campo] + ' (atual)';
        el.appendChild(opt);
      }
      el.value = v[campo] || '';
    } else if (campo === 'venc') {
      // Normaliza com zero à esquerda (planilha pode retornar "1" em vez de "01")
      var vencVal = String(v[campo] || '').trim();
      if (vencVal && vencVal.length === 1) vencVal = '0' + vencVal;
      el.value = vencVal;
    } else {
      el.value = v[campo] || '';
    }
  });
  if (!v.turno) document.getElementById('f_turno').value = 'Manhã (08h às 12h)';

  // Recarrega planos se cidade e produto já estiverem preenchidos
  if (v.cidade && v.produto) {
    var selPlano = document.getElementById('f_plano');
    var planoSalvo = v.plano || '';
    if (selPlano) {
      selPlano.disabled = true;
      selPlano.innerHTML = '<option>⏳ Carregando...</option>';
    }
    google.script.run
      .withSuccessHandler(function(d) {
        if (!selPlano) return;
        selPlano.disabled = false;
        if (!d || d.erro || !d.planos || d.planos.length === 0) {
          // Sem planos — insere o valor salvo como opção manual
          selPlano.innerHTML = '<option value="">— Selecione o plano —</option>';
          if (planoSalvo) {
            var opt = document.createElement('option');
            opt.value = planoSalvo; opt.textContent = planoSalvo + ' (atual)';
            selPlano.appendChild(opt);
            selPlano.value = planoSalvo;
          }
          return;
        }
        selPlano.innerHTML = '<option value="">— Selecione o plano —</option>';
        d.planos.forEach(function(item) {
          var opt = document.createElement('option');
          if (item.indexOf('▶️') === 0) {
            opt.value = ''; opt.disabled = true; opt.textContent = item;
            opt.style.fontWeight = '700'; opt.style.color = '#a78bfa';
          } else {
            opt.value = item; opt.textContent = item;
          }
          selPlano.appendChild(opt);
        });
        // Reseleciona o plano salvo
        if (planoSalvo) {
          selPlano.value = planoSalvo;
          // Se não encontrou exato, adiciona como opção manual
          if (!selPlano.value) {
            var opt = document.createElement('option');
            opt.value = planoSalvo; opt.textContent = planoSalvo + ' (atual)';
            selPlano.appendChild(opt);
            selPlano.value = planoSalvo;
          }
        }
      })
      .withFailureHandler(function() {
        if (!selPlano) return;
        selPlano.disabled = false;
        selPlano.innerHTML = '<option value="">— Erro ao carregar —</option>';
        if (planoSalvo) {
          var opt = document.createElement('option');
          opt.value = planoSalvo; opt.textContent = planoSalvo + ' (atual)';
          selPlano.appendChild(opt);
          selPlano.value = planoSalvo;
        }
      })
      .getPlanosPorCidadeProduto(v.cidade, v.produto);
  }

  var _bs = document.getElementById('wizBtnSave'); if (_bs) _bs.textContent = '🔄 Atualizar';
  document.getElementById('formTitulo').textContent = 'Editar Cadastro';
  AppState.set('modoEdicao', true);
  _atualizarBloqueioStatusForm(true);
  var elStatus = document.getElementById('f_status');
  if (elStatus) {
    elStatus.setAttribute('data-status-anterior', elStatus.value || '1- Conferencia/Ativação');
    elStatus.removeEventListener('change', _onStatusChangeEdicao);
    elStatus.addEventListener('change', _onStatusChangeEdicao);
  }
  AppState.set('vendaSelecionada', v);
}

// ─── CAMPOS OBRIGATÓRIOS — Aguardando Instalação ───────────────────────────
var _CAMPOS_AG_INST = [
  { fld: 'dataAtiv',  id: 'f_dataAtiv',  lbl: 'Data Ativação'          },
  { fld: 'produto',   id: 'f_produto',   lbl: 'Produto'                 },
  { fld: 'plano',     id: 'f_plano',     lbl: 'Plano'                   },
  { fld: 'valor',     id: 'f_valor',     lbl: 'Valor'                   },
  { fld: 'venc',      id: 'f_venc',      lbl: 'Vencimento'              },
  { fld: 'fat',       id: 'f_fat',       lbl: 'Pagamento'               },
  { fld: 'agenda',    id: 'f_agenda',    lbl: 'Data Agendamento'        },
  { fld: 'turno',     id: 'f_turno',     lbl: 'Turno'                   },
  { fld: 'contrato',  id: 'f_contrato',  lbl: 'ID Contrato / ID Móvel'  }
];

function _validarCamposAguardandoInstalacao() {
  var faltando = [];
  var venda = AppState.get('vendaSelecionada') || {};
  _CAMPOS_AG_INST.forEach(function(c) {
    var el = document.getElementById(c.id);
    var valDom = el ? (el.value || '').trim() : '';
    // Fallback: se o campo estiver oculto/vazio no DOM, verifica no AppState
    var valState = String(venda[c.fld] || '').trim();
    if (!valDom && !valState) faltando.push(c.lbl);
  });
  return faltando;
}

function _onStatusChangeEdicao() {
  var elStatus = document.getElementById('f_status');
  var val = this.value;
  var vendaAtual = AppState.get('vendaSelecionada') || {};
  if (val === '2- Aguardando Instalação') {
    _fecharModalPendencias();
    _abrirModalPendencias(vendaAtual);
  } else if (val === '3 - Finalizada/Instalada') {
    var faltando = _validarCamposAguardandoInstalacao();
    if (faltando.length > 0) {
      if (elStatus) elStatus.value = '2- Aguardando Instalação';
      mostrarToast('⚠️ Preencha os campos de Aguardando Instalação antes de avançar.', 'warning');
      _fecharModalPendencias();
      _abrirModalPendencias(vendaAtual);
      return;
    }
    if (elStatus) elStatus.setAttribute('data-status-anterior', val);
    _fecharModalInstalacao();
    _abrirModalInstalacao();
  } else {
    if (elStatus) elStatus.setAttribute('data-status-anterior', val);
  }
}

    _fldHtml('mp_venc','Vencimento', _sel('mp_venc',['01','05','08','10','12','15','20','25'],v.venc)) +
    _fldHtml('mp_fat','Pagamento', _sel('mp_fat',['Boleto Bancário','Cartão de Crédito','Pix Automático','Débito em Conta'],v.fat)) +
    _fldHtml('mp_agenda','Data Agendamento', _inp('mp_agenda','date',v.agenda)) +
    _fldHtml('mp_turno','Turno', _sel('mp_turno',['Manhã (08h às 12h)','Tarde (13h às 17h)'],v.turno)) +
    _fldHtml('mp_contrato','ID Contrato / ID Móvel', _inp('mp_contrato','text',v.contrato,'Gerado no sistema'));
  var overlay = document.createElement('div');

function _fecharModalPendencias() { var m = document.getElementById('modalPendencias'); if (m) m.remove(); }

function _cancelarModalPendencias() {
  _fecharModalPendencias();
  var elStatus = document.getElementById('f_status');
  if (elStatus) {
    var anterior = elStatus.getAttribute('data-status-anterior') || '1- Conferencia/Ativação';
    elStatus.value = anterior;
  }
  navegar('lista');
}

function _confirmarModalPendencias() {
  var mapa = { mp_dataAtiv:'f_dataAtiv', mp_produto:'f_produto', mp_plano:'f_plano',
    mp_valor:'f_valor', mp_venc:'f_venc', mp_fat:'f_fat',
    mp_agenda:'f_agenda', mp_turno:'f_turno', mp_contrato:'f_contrato' };
  var ok = true;
  Object.keys(mapa).forEach(function(mpId) {
    var el = document.getElementById(mpId); var err = document.getElementById(mpId+'_err');
    if (!el) return;
    if (!el.value || !el.value.trim()) {
      ok = false; if (err) err.style.display = 'block'; el.style.borderColor = 'var(--accent)';
      el.addEventListener('input', function(){ if(this.value.trim()){ this.style.borderColor=''; if(err) err.style.display='none'; } }, { once: true });
    } else { if (err) err.style.display='none'; el.style.borderColor=''; }
  });
  if (!ok) { mostrarToast('⚠️ Preencha todos os campos obrigatórios.', 'warning'); return; }
  Object.keys(mapa).forEach(function(mpId) {
    var src = document.getElementById(mpId); var dest = document.getElementById(mapa[mpId]);
    if (src && dest && src.value) dest.value = src.value;
  });
  _fecharModalPendencias();
  // Salva imediatamente após preencher os campos
  mostrarToast('✅ Campos preenchidos! Salvando...', 'success');
  setTimeout(function() { salvar(); }, 300);
}

function _mpOnProdutoChange(planoAtual) {
  var selProduto = document.getElementById('mp_produto');
  var selPlano   = document.getElementById('mp_plano');
  var hint       = document.getElementById('mp_produto_hint');
  if (!selProduto || !selPlano) return;
  var produto = selProduto.value;
  var cidade  = (document.getElementById('f_cidade') || {}).value || '';
  selPlano.innerHTML = '<option value="">— Escolha o Produto primeiro —</option>';
  if (hint) { hint.style.display='none'; hint.textContent=''; }
  if (!produto) return;
  if (!cidade) { if (hint) { hint.textContent='⚠️ Cidade não encontrada.'; hint.style.color='var(--yellow)'; hint.style.display='block'; } return; }
  if (hint) { hint.textContent='⏳ Carregando planos para '+produto+' em '+cidade+'...'; hint.style.color='var(--muted)'; hint.style.display='block'; }
  selPlano.disabled=true; selPlano.innerHTML='<option>⏳ Carregando...</option>';
  google.script.run
    .withSuccessHandler(function(d) {
      selPlano.disabled=false;
      if (!d || d.erro || !d.planos || d.planos.length===0) {
        selPlano.innerHTML='<option value="">— Nenhum plano encontrado —</option>';
        if (hint) { hint.textContent='⚠️ Nenhum plano para '+produto+' em '+cidade; hint.style.color='var(--yellow)'; hint.style.display='block'; } return;
      }
      selPlano.innerHTML='<option value="">— Selecione o plano —</option>';
      d.planos.forEach(function(item) {
        var opt=document.createElement('option');
        if (item.indexOf('▶️')===0) { opt.value=''; opt.disabled=true; opt.textContent=item; opt.style.fontWeight='700'; opt.style.color='#a78bfa'; }
        else { opt.value=item; opt.textContent=item; }
        selPlano.appendChild(opt);
      });
      if (planoAtual) selPlano.value=planoAtual;
      var reais=d.planos.filter(function(p){ return p.indexOf('▶️')!==0; });
      if (reais.length===1) { selPlano.value=reais[0]; _mpOnPlanoChange(); }
      var qtd=reais.length;
      if (hint) { hint.textContent='✅ '+qtd+' plano'+(qtd!==1?'s':'')+' em '+d.cidade; hint.style.color='var(--green)'; hint.style.display='block'; }
    })
    .withFailureHandler(function(err) {
      selPlano.disabled=false; selPlano.innerHTML='<option value="">— Erro ao carregar —</option>';
      if (hint) { hint.textContent='❌ '+(err&&err.message?err.message:'Erro'); hint.style.color='var(--accent)'; hint.style.display='block'; }
    })
    .getPlanosPorCidadeProduto(cidade, produto);
}

function _mpOnPlanoChange() {
  var selPlano=document.getElementById('mp_plano'); var inpValor=document.getElementById('mp_valor');
  if (!selPlano||!inpValor) return;
  var texto=selPlano.value; if (!texto) return;
  var partes=texto.split('|');
  if (partes.length>=2) { var num=parseFloat(partes[partes.length-1].trim().replace(',','.')); if (!isNaN(num)) inpValor.value='R$ '+num.toFixed(2).replace('.',','); }
}

function coletarDados() {
  var dados = { linhaReferencia: document.getElementById('f_linha').value };
  CAMPOS_FORM.forEach(function (campo) {
    if (campo === 'linha') return;
    var el = document.getElementById('f_' + campo);
    dados[campo] = el ? el.value.trim() : '';
  });
  if (dados.uf) dados.uf = dados.uf.toUpperCase();
  // PAP sempre Em Aberto quando não definido
  if (!dados.statusPAP) dados.statusPAP = 'Em Aberto';
  return dados;
}

function validarFormulario(dados) {
  var ok = true;
  var camposBase = ['cliente','status','preStatus','cpf','canal','whats','resp',
                    'cep','cidade','bairro','rua','num','uf','sistema','statusPAP'];
  camposBase.forEach(function (f) { clearFieldError(f); });
  if (!dados.cliente)   { setFieldError('cliente',   'Nome é obrigatório.');           ok = false; }
  if (!dados.status)    { setFieldError('status',    'Selecione um status.');           ok = false; }
  if (!dados.preStatus) { setFieldError('preStatus', 'Selecione o pré-status.');       ok = false; }
  if (!dados.canal)     { setFieldError('canal',     'Selecione um canal.');            ok = false; }
  if (!dados.whats)     { setFieldError('whats',     'WhatsApp é obrigatório.');        ok = false; }
  if (!dados.resp)      { setFieldError('resp',      'Responsável é obrigatório.');     ok = false; }
  if (!dados.cep)       { setFieldError('cep',       'CEP é obrigatório.');             ok = false; }
  if (!dados.cidade)    { setFieldError('cidade',    'Cidade é obrigatória.');          ok = false; }
  if (!dados.bairro)    { setFieldError('bairro',    'Bairro é obrigatório.');          ok = false; }
  if (!dados.rua)       { setFieldError('rua',       'Rua é obrigatória.');             ok = false; }
  if (!dados.num)       { setFieldError('num',       'Número é obrigatório.');          ok = false; }
  if (!dados.uf)        { setFieldError('uf',        'UF é obrigatória.');              ok = false; }
  if (!dados.sistema)   { setFieldError('sistema',   'Sistema é obrigatório.');         ok = false; }
  if (!dados.cpf) {
    setFieldError('cpf', 'CPF / CNPJ é obrigatório.'); ok = false;
  } else {
    var l = dados.cpf.replace(/\D/g, '');
    if (l.length !== 11 && l.length !== 14) { setFieldError('cpf', 'CPF 11 dígitos ou CNPJ 14.'); ok = false; }
  }
  if (dados.status === '2- Aguardando Instalação' || dados.status === '3 - Finalizada/Instalada') {
    var faltandoAg = _validarCamposAguardandoInstalacao();
    if (faltandoAg.length > 0) {
      ok = false;
      mostrarToast('⚠️ Campos obrigatórios vazios: ' + faltandoAg.join(', '), 'warning');
      _CAMPOS_AG_INST.forEach(function(c) {
        var el = document.getElementById(c.id);
        if (!el || !el.value || !el.value.trim()) setFieldError(c.fld, c.lbl + ' é obrigatório.');
      });
    }
  }
  if (dados.status === '3 - Finalizada/Instalada') {
    clearFieldError('instal');
    if (!dados.instal) { setFieldError('instal', 'Data de Instalação é obrigatória para este status.'); ok = false; }
  }
  var _errWizContrato = _validarContratoFormato(dados.contrato, dados.sistema);
  if (_errWizContrato) { mostrarToast(_errWizContrato, 'warning'); ok = false; }
  return ok;
}

function salvar() {
  var dados = coletarDados();
  if (!validarFormulario(dados)) return;
  var btnSave = document.getElementById('wizBtnSave');
  mostrarLoading(true);
  if (btnSave) { btnSave.disabled = true; btnSave.textContent = '⏳ Salvando...'; }
  google.script.run
    .withSuccessHandler(function (res) {
      mostrarLoading(false);
      if (btnSave) { btnSave.disabled = false; btnSave.textContent = '💾 Salvar'; }
      mostrarToast(res.mensagem, res.sucesso ? 'success' : 'error');
      if (res.sucesso) {
        _listaNeedsReload = true; // invalida cache — nova/editada venda precisa aparecer na lista
        if (dados.status === '2- Aguardando Instalação') dispararConfete();
        if (dados.status === '3 - Finalizada/Instalada') dispararChovaDinheiro();
        AppState.set('modoEdicao', false);
        limparFormulario();
        if (res.linha) {
          setTimeout(function() { _abrirVendaNoLista(res.linha); }, 400);
        } else {
          setTimeout(function() { navegar('lista'); }, 400);
        }
      } else {
        // Se erro de validação, volta ao step com problema
        if (res.mensagem && res.mensagem.indexOf('status') > -1) wizMostrarErroStep(0, res.mensagem);
        else if (res.mensagem && res.mensagem.indexOf('nome') > -1) wizMostrarErroStep(1, res.mensagem);
      }
    })
    .withFailureHandler(function (erro) {
      mostrarLoading(false);
      if (btnSave) { btnSave.disabled = false; btnSave.textContent = '💾 Salvar'; }
      mostrarToast('Erro: ' + erro.message, 'error');
    })
    .salvarVenda(dados);
}

// ─── LISTA ─────────────────────────────────────────────────────────────────
function _coletarOpcoesFiltro() {
  try {
    var elStatus    = document.getElementById('filtroStatus');
    var elPreStatus = document.getElementById('filtroPreVenda');
    var elProduto   = document.getElementById('filtroProduto');
    var elVeroHub   = document.getElementById('filtroVeroHub');
    var status    = elStatus    ? (elStatus.value    || '') : '';
    var preStatus = elPreStatus ? (elPreStatus.value || '') : '';
    var produto   = elProduto   ? (elProduto.value   || '') : '';
    var verohub   = elVeroHub   ? (elVeroHub.checked || false) : false;
    ['filtroStatus','filtroPreVenda','filtroProduto'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.toggle('ativo', !!el.value);
    });
    var toggleLabel = document.getElementById('filtroVeroHub');
    if (toggleLabel && toggleLabel.closest) toggleLabel.closest('label') && toggleLabel.closest('label').classList.toggle('ativo', verohub);
    return { status: status, preStatus: preStatus, produto: produto, verohub: verohub };
  } catch(e) {
    return {};
  }
}

function buscaListaInstantanea(valor) {
  // Chamada pelo oninput do campoBusca — instantâneo se cache disponível
  AppState.set('filtroAtual', (valor || '').trim());
  AppState.set('paginaAtual', 1);
  if (_dadosListaCache && _dadosListaCache.length > 0) {
    var opcoes = _coletarOpcoesFiltro();
    var dadosFiltrados = _filtrarLocalmente(_dadosListaCache, valor, opcoes);
    var total = dadosFiltrados.length;
    _renderizarLista({ dados: dadosFiltrados.slice(0, CONFIG_JS.MAX_RESULTS), total: total, pagina: 1, temMais: CONFIG_JS.MAX_RESULTS < total });
    return;
  }
  carregarVendas(1, (valor || '').trim());
}

// ─── CACHE LOCAL DE LISTA (paginação sem round-trip ao servidor) ────────────
var _dadosListaCache    = null;
var _dadosListaTotal    = 0;
var _dadosTotalServidor = 0;   // total de registros no servidor (inclui os ainda não carregados)
var _listaNeedsReload   = false; // setado após salvar — força recarga do servidor na próxima carregarVendas

// ── Filtra _dadosListaCache localmente (sem chamada ao servidor) ──────────
function _filtrarLocalmente(dados, filtro, opcoes) {
  filtro = String(filtro || '').trim().toLowerCase();
  var filtroNum = filtro.replace(/\D/g, '');
  var temFiltroTexto  = filtro.length > 0;
  var temFiltroOpcoes = !!(opcoes.status || opcoes.preStatus || opcoes.produto || opcoes.verohub);

  if (!temFiltroTexto && !temFiltroOpcoes) return dados; // sem filtros → retorna tudo

  // Normaliza string: remove acentos, uppercase, trim — "EM NEGOCIAÇÃO" === "EM NEGOCIACAO"
  var _n = function(s) { return String(s||'').trim().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); };

  return dados.filter(function(v) {
    // Filtros de dropdown — normaliza acentos, espaços e maiúsculas/minúsculas
    if (opcoes.status    && _n(v.status)    !== _n(opcoes.status))    return false;
    if (opcoes.preStatus && _n(v.preStatus) !== _n(opcoes.preStatus)) return false;
    if (opcoes.produto   && _n(v.produto)   !== _n(opcoes.produto))   return false;
    if (opcoes.verohub   && !v.verohub)                               return false;

    // Filtro de texto livre (mesmos campos que o backend busca)
    if (temFiltroTexto) {
      var clienteL  = String(v.cliente  || '').toLowerCase();
      var contratoL = String(v.contrato || '').toLowerCase();
      var statusL   = String(v.status   || '').toLowerCase();
      var respL     = String(v.resp     || '').toLowerCase();
      var cpfNum    = String(v.cpf      || '').replace(/\D/g, '');
      var match = clienteL.indexOf(filtro)  > -1 ||
                  contratoL.indexOf(filtro) > -1 ||
                  statusL.indexOf(filtro)   > -1 ||
                  respL.indexOf(filtro)     > -1 ||
                  (filtroNum.length >= 3 && cpfNum.indexOf(filtroNum) > -1);
      if (!match) return false;
    }
    return true;
  });
}

function carregarVendas(pagina, filtro) {
  pagina = (pagina !== undefined) ? pagina : AppState.get('paginaAtual');
  filtro = (filtro !== undefined) ? filtro : AppState.get('filtroAtual');
  AppState.set('paginaAtual', pagina);
  AppState.set('filtroAtual', filtro);

  // Após um save, invalida o cache local para garantir dado fresco do servidor
  if (_listaNeedsReload) { _listaNeedsReload = false; _dadosListaCache = null; _dadosListaTotal = 0; _dadosTotalServidor = 0; }

  var opcoes = _coletarOpcoesFiltro();

  // ── FILTRO LOCAL: se o cache já está populado, filtra no browser (0 round-trip) ──
  if (_dadosListaCache && _dadosListaCache.length > 0) {
    var dadosFiltrados = _filtrarLocalmente(_dadosListaCache, filtro, opcoes);
    var totalFiltrado  = dadosFiltrados.length;
    var ini = (pagina - 1) * CONFIG_JS.MAX_RESULTS;
    var fim = ini + CONFIG_JS.MAX_RESULTS;

    // Verifica se o usuário quer uma página além do que está no cache (sem filtro ativo)
    var temFiltro = !!(filtro || opcoes.status || opcoes.preStatus || opcoes.produto || opcoes.verohub);
    if (!temFiltro && ini >= _dadosListaCache.length && _dadosTotalServidor > _dadosListaCache.length) {
      _carregarMaisDoServidor(pagina);
      return;
    }

    // Calcula temMais: próxima página no cache OU servidor tem mais registros além do cache
    var temMaisLocal    = fim < totalFiltrado;
    var temMaisServidor = !temFiltro && _dadosTotalServidor > _dadosListaCache.length;
    var temMais = temMaisLocal || (temMaisServidor && fim >= totalFiltrado);

    // Quando não há filtro, exibe o total real do servidor (mais preciso)
    var totalExibir = (!temFiltro && _dadosTotalServidor > 0) ? _dadosTotalServidor : totalFiltrado;

    _renderizarLista({
      dados:   dadosFiltrados.slice(ini, fim),
      total:   totalExibir,
      pagina:  pagina,
      temMais: temMais
    });
    return;
  }

  // ── CACHE VAZIO: vai ao servidor (primeiros 500 registros, os mais recentes) ──
  document.getElementById('listaVendas').innerHTML =
    '<div class="empty"><div class="empty-icon" style="font-size:20px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>' +
    '<p style="margin-top:10px;font-size:12px;">Carregando vendas...</p></div>';

  google.script.run
    .withSuccessHandler(function (res) {
      if (!res) {
        document.getElementById('listaVendas').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro</h3><p>Resposta vazia do servidor.</p></div>';
        return;
      }
      if (res.erro) {
        document.getElementById('listaVendas').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p style="font-family:monospace;font-size:11px;color:#ff4570">' + esc(res.erro) + '</p></div>';
        return;
      }
      // Popula cache local com os 500 registros mais recentes
      if (res.dados && res.dados.length > 0) {
        _dadosListaCache    = res.dados;
        _dadosListaTotal    = res.dados.length;
        _dadosTotalServidor = res.totalGeral || res.dados.length;
      }
      // Aplica filtros localmente (usuário pode já ter digitado algo enquanto carregava)
      var opcoesFiltro   = _coletarOpcoesFiltro();
      var filtroAtual    = AppState.get('filtroAtual') || '';
      var dadosFiltrados = _filtrarLocalmente(_dadosListaCache || [], filtroAtual, opcoesFiltro);
      var totalFiltrado  = dadosFiltrados.length;
      var ini = (pagina - 1) * CONFIG_JS.MAX_RESULTS;
      var fim = ini + CONFIG_JS.MAX_RESULTS;
      var temFiltroAtual = !!(filtroAtual || opcoesFiltro.status || opcoesFiltro.preStatus || opcoesFiltro.produto || opcoesFiltro.verohub);
      var temMaisLocal    = fim < totalFiltrado;
      var temMaisServidor = !temFiltroAtual && _dadosTotalServidor > (_dadosListaCache ? _dadosListaCache.length : 0);
      var totalExibir = (!temFiltroAtual && _dadosTotalServidor > 0) ? _dadosTotalServidor : totalFiltrado;
      _renderizarLista({
        dados:   dadosFiltrados.slice(ini, fim),
        total:   totalExibir,
        pagina:  pagina,
        temMais: temMaisLocal || (temMaisServidor && fim >= totalFiltrado)
      });
    })
    .withFailureHandler(function (erro) {
      var msg = erro && erro.message ? erro.message : String(erro);
      document.getElementById('listaVendas').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div>' +
        '<h3>Erro ao carregar</h3><p style="font-family:monospace;font-size:11px;color:#ff4570">' + esc(msg) + '</p></div>';
    })
    .getVendasPaginadas(1, '', JSON.stringify({ limite: 500, offset: 0 }));
}

// ── Busca mais registros do servidor e adiciona ao cache local ──────────────
function _carregarMaisDoServidor(pagina) {
  var offset = _dadosListaCache ? _dadosListaCache.length : 0;
  document.getElementById('listaVendas').innerHTML =
    '<div class="empty"><div class="empty-icon" style="font-size:20px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>' +
    '<p style="margin-top:10px;font-size:12px;">Buscando mais registros...</p></div>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.dados && res.dados.length > 0) {
        _dadosListaCache    = (_dadosListaCache || []).concat(res.dados);
        _dadosListaTotal    = _dadosListaCache.length;
        _dadosTotalServidor = res.totalGeral || _dadosTotalServidor;
      }
      carregarVendas(pagina, AppState.get('filtroAtual') || '');
    })
    .withFailureHandler(function() {
      // Em caso de erro, renderiza com o que há no cache
      carregarVendas(pagina, AppState.get('filtroAtual') || '');
    })
    .getVendasPaginadas(1, '', JSON.stringify({ limite: 500, offset: offset }));
}


function _renderizarLista(res) {
  // Guarda dados da página para o painel lateral
  _paginaAtual = res.dados || [];

  var container = document.getElementById('listaVendas');

  // Atualiza contador
  document.getElementById('totalRegistros').textContent =
    res.total + ' registro' + (res.total !== 1 ? 's' : '');

  // Sem dados
  if (!_paginaAtual.length) {
    container.innerHTML =
      '<div class="empty"><div class="empty-icon">🔍</div>' +
      '<h3>Nenhuma venda encontrada</h3><p>Tente outro filtro.</p></div>';
    document.getElementById('paginacao').style.display = 'none';
    fecharPainel();
    return;
  }

  // Renderiza itens
  var html = '';
  for (var i = 0; i < _paginaAtual.length; i++) {
    html += _criarItemVenda(_paginaAtual[i], i);
  }
  container.innerHTML = html;

  // Paginação
  var temPag = res.total > CONFIG_JS.MAX_RESULTS || res.pagina > 1;
  document.getElementById('paginacao').style.display  = temPag ? 'flex' : 'none';
  document.getElementById('infoPagina').textContent   = 'Pág. ' + res.pagina;
  document.getElementById('btnAnterior').disabled     = res.pagina === 1;
  document.getElementById('btnProximo').disabled      = !res.temMais;
}

// ─── VEROHUB ───────────────────────────────────────────────────────────────
function _veroHubVencido(verohub) {
  if (!verohub) return false;
  var s = String(verohub).trim();
  var d;
  if (s.indexOf('/') > -1) {
    var p = s.split('/');
    d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  } else {
    d = new Date(s);
  }
  if (isNaN(d.getTime())) return false;
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  return d < hoje;
}

function _veroHubToInputDate(verohub) {
  if (!verohub) return '';
  var s = String(verohub).trim();
  if (s.indexOf('/') > -1) {
    var p = s.split('/');
    return p[2] + '-' + ('0'+p[1]).slice(-2) + '-' + ('0'+p[0]).slice(-2);
  }
  return s.substring(0,10);
}

function _veroHubHtml(v, index) {
  var vencido   = _veroHubVencido(v.verohub);
  var semData   = !v.verohub;
  var inputDate = _veroHubToInputDate(v.verohub);
  // Pisca se vencido OU se sem data
  var piscar = vencido || semData;
  var tit = vencido ? 'Analise vencida! Reblindar no VeroHub.' : (semData ? 'Sem data — preencha a blindagem' : 'Blindagem OK');
  var dot = piscar ? '<span class="verohub-dot"></span>' : '';
  var ok  = (!semData && !vencido) ? '<span class="verohub-ok">✓</span>' : '';
  return '<div class="verohub-wrap" onclick="event.stopPropagation()">' +
    dot +
    '<span class="verohub-label">VeroHub:</span>' +
    '<input type="date" class="verohub-input" value="' + inputDate + '" title="' + tit + '" onchange="_salvarVeroHub(' + v.linha + ',this,' + index + ')">' +
    ok +
  '</div>';
}

function _salvarVeroHub(linha, inputEl, index) {
  var val = inputEl.value;
  var dataSalvar = '';
  if (val) {
    var p = val.split('-');
    dataSalvar = p[2] + '/' + p[1] + '/' + p[0];
  }
  inputEl.style.opacity = '.5';
  google.script.run
    .withSuccessHandler(function(res) {
      inputEl.style.opacity = '1';
      var ok = !res || res.sucesso !== false;
      if (ok) {
        // Atualiza dado em memória
        if (_paginaAtual[index]) _paginaAtual[index].verohub = dataSalvar;
        // Atualiza bolinha em tempo real — sem recarregar
        var wrap = inputEl.closest('.verohub-wrap');
        if (wrap) {
          var dot = wrap.querySelector('.verohub-dot');
          var vencido = dataSalvar ? _veroHubVencido(dataSalvar) : true; // sem data = pisca
          if (vencido || !dataSalvar) {
            if (!dot) {
              dot = document.createElement('span');
              dot.className = 'verohub-dot';
              wrap.insertBefore(dot, wrap.firstChild);
            }
          } else {
            if (dot) dot.remove();
          }
          // Atualiza ok
          var okEl = wrap.querySelector('.verohub-ok');
          if (!dataSalvar || vencido) {
            if (okEl) okEl.remove();
          } else {
            if (!okEl) {
              okEl = document.createElement('span');
              okEl.className = 'verohub-ok';
              okEl.textContent = '✓';
              wrap.appendChild(okEl);
            }
          }
        }
        mostrarToast(dataSalvar ? '✅ VeroHub: ' + dataSalvar : 'VeroHub removido', 'success');
      } else {
        mostrarToast('Erro ao salvar VeroHub: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
      }
    })
    .withFailureHandler(function(e) {
      inputEl.style.opacity = '1';
      mostrarToast('Erro: ' + (e && e.message ? e.message : 'desconhecido'), 'error');
    })
    .salvarVeroHub(linha, dataSalvar);
}

            if (!dot) { dot = document.createElement('span'); dot.className = 'verohub-dot'; wrap.insertBefore(dot, wrap.firstChild); }

          }
          var horaEl = wrap.querySelector('.vhub-edit-hora');
          if (horaEl && res.horaEdit) {
            horaEl.textContent = res.horaEdit;
          }
        }
        mostrarToast(dataSalvar ? '✅ VeroHub: ' + dataSalvar : 'Data removida', 'success');
      } else {
        mostrarToast('Erro ao salvar: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
      }
    })
    .withFailureHandler(function(e) {
      inputEl.style.opacity = '1';
      mostrarToast('Erro: ' + (e && e.message ? e.message : 'desconhecido'), 'error');
    })
    .salvarVeroHubPedidoManual(linha, dataSalvar);
}

function _mostrarInstrucoesBookmarklet(dasUrl) {
  var wrap = document.getElementById('cfg-token-input-wrap');
  var bkWrap = document.getElementById('cfg-bookmarklet-wrap');

  // Montar o código do bookmarklet
  // Quando clicado no VeroHub, pega o token e abre o DharmaPro com ?vhtoken=...
  var bkCode = [
    '(function(){',
      // Sempre buscar via XHR síncrono — mais confiável que getElementById
      'var token="";',
      'try{',
        'var x=new XMLHttpRequest();',
        'x.open("GET","/sales/new",false);',
        'x.withCredentials=true;',
        'x.send();',
        'var m=x.responseText.match(/id="csrf_token"[^>]*value="([^"]+)"/);',
        'if(m&&m[1])token=m[1];',
      '}catch(e){}',
      // Fallback: tentar getElementById
      'if(!token){var el=document.getElementById("csrf_token");if(el&&el.value)token=el.value;}',
      'if(token&&token.length>10){',
        'window.open("' + dasUrl + '?vhtoken="+encodeURIComponent(token),"_blank");',
      '}else{',
        'alert("Token nao encontrado. Verifique se esta logado no VeroHub.");',
      '}',
    '})()'
  ].join('');

  var bkHref = 'javascript:' + bkCode;

  if (bkWrap) {
    bkWrap.innerHTML =
      '<div style="background:rgba(34,217,138,0.06);border:1px solid rgba(34,217,138,0.2);border-radius:8px;padding:16px;margin-bottom:14px;">' +
        '<div style="font-size:11px;font-weight:700;color:#22d98a;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">📌 Configure uma vez, use sempre</div>' +
        '<ol style="font-size:12px;color:var(--muted);line-height:2;padding-left:18px;font-family:monospace;">' +
          '<li>Arraste o botão abaixo para a barra de favoritos do Chrome</li>' +
          '<li>Quando precisar conectar, abra o VeroHub</li>' +
          '<li>Clique no favorito <strong style="color:var(--text)">🟠 DharmaPro</strong></li>' +
          '<li>O DharmaPro abre e conecta automaticamente!</li>' +
        '</ol>' +
        '<div style="margin-top:14px;text-align:center;">' +
          '<a href="' + bkHref.replace(/"/g, '&quot;') + '" ' +
            'onclick="event.preventDefault();mostrarToast(\"Arraste este botão para os favoritos!\",\"\");" ' +
            'style="display:inline-block;padding:10px 20px;background:var(--accent);color:#fff;' +

function _veroHubPedidoVelho(dtHora) {
  if (!dtHora) return false;
  try {
    var p = dtHora.split(' '), d = p[0].split('/'), t = (p[1]||'00:00').split(':');
    var dt = new Date(parseInt(d[2]), parseInt(d[1])-1, parseInt(d[0]), parseInt(t[0]), parseInt(t[1]));
    return (Date.now() - dt.getTime()) > 86400000;
  } catch(e) { return false; }
}

function _veroHubPedidoHtml(v, index) {
  var temPedido = !!v.verohubPedido;
  var vencido   = _veroHubVencido(v.verohub);
  var semData   = !v.verohub;
  var piscar    = vencido || semData;

  var inputDate = _veroHubToInputDate(v.verohub);

  return '<div class="vi-row-vhub-pedido-wrap" id="vhub-wrap-' + index + '" ' +
    'onclick="event.stopPropagation()" ' +
    'title="Data do pedido no VeroHub">' +
    (piscar ? '<span class="verohub-dot"></span>' : '') +
    '<span class="verohub-label">VEROHUB</span>' +
    '<input type="date" class="agenda-input" value="' + inputDate + '" ' +
    'title="Data VeroHub (col AP)" ' +
    'onchange="_salvarVeroHubPedidoManual(' + v.linha + ',this,' + index + ')">' +
    '<span class="vhub-edit-hora"></span>' +
    (temPedido
      ? '<a class="vhub-ped-num" href="https://hub.veronet.com.br/sales/' + esc(v.verohubPedido) +
          '" target="_blank" onclick="event.stopPropagation()">#' + esc(v.verohubPedido) + '</a>'
      : '') +
  '</div>';
}

var _vhModalIndex = null;

function _novoPedidoVeroHub(index) {
  var v = _paginaAtual[index];
  if (!v) return;

  if (v.verohubPedido) {
    if (!confirm('Pedido #' + v.verohubPedido + ' já existe. Recriar?')) return;
    v.verohubPedido = ''; v.verohubPedidoDt = '';
  }

  var nome  = String(v.cliente || '').trim();
  var phone = String(v.whats || v.tel || '').replace(/\D/g, '');
  if (!nome || !phone) {
    mostrarToast('⚠️ Cliente sem nome ou telefone.', 'warning'); return;
  }

  // Guarda o index e abre o modal
  _vhModalIndex = index;

  // Preenche info do cliente no topo do modal
  var info = document.getElementById('mvh-cliente-info');
  if (info) {
    info.textContent = nome + ' · ' + phone +
      (v.cpf ? ' · CPF: ' + v.cpf : '') +
      (v.plano ? ' · ' + v.plano : '');
  }

  // Limpa campos e erros
  ['mvh-email','mvh-birthday','mvh-mother','mvh-rg','mvh-plano-busca'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('mvh-erro'); }
  });
  ['mvh-gender','mvh-due-date'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.value = ''; el.classList.remove('mvh-erro'); }
  });
  var erroEl = document.getElementById('mvh-erro');
  if (erroEl) erroEl.style.display = 'none';

  var btn = document.getElementById('mvh-btn-confirmar');
  if (btn) { btn.disabled = false; btn.textContent = '🟠 Criar Pedido'; }

  document.getElementById('modalVeroHub').classList.add('ativo');
}

function _fecharModalVeroHub() {
  document.getElementById('modalVeroHub').classList.remove('ativo');
  _vhModalIndex = null;
}

function _confirmarModalVeroHub() {
  var index = _vhModalIndex;
  if (index === null) return;
  var v = _paginaAtual[index];
  if (!v) return;

  // Validação
  var email      = (document.getElementById('mvh-email').value       || '').trim();
  var birthday   = (document.getElementById('mvh-birthday').value    || '').trim();
  var gender     = (document.getElementById('mvh-gender').value      || '').trim();
  var mother     = (document.getElementById('mvh-mother').value      || '').trim();
  var rg         = (document.getElementById('mvh-rg').value          || '').trim();
  var dueDate    = (document.getElementById('mvh-due-date').value    || '').trim();
  var planoBusca = (document.getElementById('mvh-plano-busca').value || '').trim();

  var erros = [];
  var campos = {
    'mvh-email':       { val: (email && email.indexOf('@') !== -1 ? email : ''), msg: 'Informe o e-mail completo do cliente (com @).' },
    'mvh-birthday':    { val: birthday,   msg: 'Informe a data de nascimento.' },
    'mvh-gender':      { val: gender,     msg: 'Selecione o gênero.' },
    'mvh-mother':      { val: mother,     msg: 'Informe o nome da mãe.' },
    'mvh-rg':          { val: rg,         msg: 'Informe o RG.' },
    'mvh-due-date':    { val: dueDate,    msg: 'Selecione o vencimento.' },
    'mvh-plano-busca': { val: planoBusca, msg: 'Digite o nome ou parte do plano VeroHub.' }
  };

  Object.keys(campos).forEach(function(id) {
    var el = document.getElementById(id);
    if (!campos[id].val) {
      erros.push(campos[id].msg);
      if (el) el.classList.add('mvh-erro');
    } else {
      if (el) el.classList.remove('mvh-erro');
    }
  });

  if (erros.length) {
    var erroEl = document.getElementById('mvh-erro');
    erroEl.textContent = erros[0];
    erroEl.style.display = 'block';
    return;
  }

  // Trava botão e busca registro completo (endereço não está em _paginaAtual por performance)
  var btn = document.getElementById('mvh-btn-confirmar');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Buscando dados...'; }

  google.script.run
    .withSuccessHandler(function(vFull) {
      if (!vFull) {
        if (btn) { btn.disabled = false; btn.textContent = '🟠 Criar Pedido'; }
        mostrarToast('❌ Não foi possível carregar os dados do cliente.', 'error');
        return;
      }

      _fecharModalVeroHub();

      // Piscar na lista
      var wrap = document.getElementById('vhub-wrap-' + index);
      if (wrap) wrap.style.opacity = '.5';

      // Ouvir resposta da extensão
      var _handler = function(e) {
        if (!e.data) return;
        // Erro enviado pela extensão (ex: e-mail recusado pelo VeroHub)
        if (e.data.type === 'dhp_pedido_erro' && String(e.data.linha) === String(v.linha)) {
          window.removeEventListener('message', _handler);
          clearTimeout(_timeout);
          if (wrap) wrap.style.opacity = '1';
          var msgErro = e.data.titulo || 'Erro no VeroHub';
          if (e.data.detalhe) msgErro += ': ' + e.data.detalhe;
          mostrarToast('⚠️ ' + msgErro + ' — refaça o pedido.', 'error');
          return;
        }
        if (e.data.type !== 'dhp_pedido_criado') return;
        if (String(e.data.linha) !== String(v.linha)) return;
        window.removeEventListener('message', _handler);
        clearTimeout(_timeout);
        var novoId = e.data.id;
        if (!novoId) {
          if (wrap) wrap.style.opacity = '1';
          mostrarToast('❌ Erro ao criar pedido.', 'error');
          return;
        }
        var _n = new Date();
        var _dt = ('0'+_n.getDate()).slice(-2)+'/'+('0'+(_n.getMonth()+1)).slice(-2)+'/'+_n.getFullYear()+' '+('0'+_n.getHours()).slice(-2)+':'+('0'+_n.getMinutes()).slice(-2);
        google.script.run
          .withSuccessHandler(function(res) {
            if (wrap) wrap.style.opacity = '1';
            if (!res || !res.sucesso) {
              mostrarToast('❌ Erro ao salvar: ' + (res && res.mensagem ? res.mensagem : ''), 'error');
              return;
            }
            v.verohubPedido   = String(novoId);
            v.verohubPedidoDt = _dt;
            var w = document.getElementById('vhub-wrap-' + index);
            if (w) {
              var novo = document.createElement('div');
              novo.innerHTML = _veroHubPedidoHtml(v, index);
              w.parentNode.replaceChild(novo.firstChild, w);
            }
            mostrarToast('✅ Pedido #' + novoId + ' criado!', 'success');
          })
          .withFailureHandler(function(err) {
            if (wrap) wrap.style.opacity = '1';
            mostrarToast('❌ Erro: ' + (err && err.message ? err.message : ''), 'error');
          })
          .salvarPedidoVeroHub(v.linha, String(novoId), _dt);
      };
      window.addEventListener('message', _handler);
      var _timeout = setTimeout(function() {
        window.removeEventListener('message', _handler);
        if (wrap) wrap.style.opacity = '1';
        mostrarToast('⏱️ Tempo esgotado. Extensão instalada?', 'warning');
      }, 120000);

      // Monta os params com dados completos vindos do backend (vFull tem endereço)
      var nome  = String(vFull.cliente || '').trim();
      var phone = String(vFull.whats || vFull.tel || '').replace(/\D/g, '');
      var cep   = String(vFull.cep || '').replace(/\D/g, '');

      var params =
        'dhp_nome='         + encodeURIComponent(nome)                              +
        '&dhp_fone='        + encodeURIComponent(phone)                             +
        '&dhp_email='       + encodeURIComponent(email)                             +
        '&dhp_cpf='         + encodeURIComponent((vFull.cpf||'').replace(/\D/g,'')) +
        '&dhp_rg='          + encodeURIComponent(rg)                                +
        '&dhp_nasc='        + encodeURIComponent(birthday)                          +
        '&dhp_mae='         + encodeURIComponent(mother)                            +
        '&dhp_genero='      + encodeURIComponent(gender)                            +
        '&dhp_cep='         + encodeURIComponent(cep)                               +
        '&dhp_rua='         + encodeURIComponent(vFull.rua         || '')           +
        '&dhp_num='         + encodeURIComponent(vFull.num         || '')           +
        '&dhp_compl='       + encodeURIComponent(vFull.complemento || '')           +
        '&dhp_bairro='      + encodeURIComponent(vFull.bairro      || '')           +
        '&dhp_cidade='      + encodeURIComponent(vFull.cidade      || '')           +
        '&dhp_uf='          + encodeURIComponent(vFull.uf          || '')           +
        '&dhp_plano_busca=' + encodeURIComponent(planoBusca)                        +
        '&dhp_venc='        + encodeURIComponent(dueDate)                           +
        '&dhp_linha='       + encodeURIComponent(vFull.linha       || '');

      window.open('https://hub.veronet.com.br/sales/new?' + params, '_blank');
      mostrarToast('🟠 Criando pedido...', '');
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.textContent = '🟠 Criar Pedido'; }
      mostrarToast('❌ Erro ao buscar dados: ' + (err && err.message ? err.message : ''), 'error');
    })
    .getVendaPorLinha(v.linha);
}

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.status === 'pendente') {
        _exibirCardAprovacao(res);
      } else {
        var card = document.getElementById('dhp-sup-card');
        if (card) card.remove();
      }
    })
    .withFailureHandler(function() {})
    .getStatusDesbloqueio();
}

function _exibirCardAprovacao(data) {
  if (document.getElementById('dhp-sup-card')) return;
  var solicitante = data.solicitante || 'Backoffice';
  var ts   = data.ts ? new Date(data.ts) : new Date();
  var hora = ts.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  var card = document.createElement('div');
  card.id = 'dhp-sup-card';
  card.style.cssText = [
    'position:fixed','bottom:24px','right:24px','z-index:99998',
    'background:var(--surface)','border:1px solid rgba(230,62,109,.4)',
    'border-radius:14px','padding:18px 20px',
    'width:calc(100% - 48px)','max-width:320px',
    'box-shadow:0 8px 32px rgba(0,0,0,.5)',
    'font-family:Sora,sans-serif',
    'animation:dhp-card-in .3s cubic-bezier(0.34,1.56,0.64,1)'
  ].join(';');
  card.innerHTML =
    '<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;">🔓 Pedido de Desbloqueio</div>' +
    '<div style="font-size:12px;color:var(--text);margin-bottom:2px;"><b>' + esc(solicitante) + '</b> solicitou desbloqueio</div>' +
    '<div style="font-size:11px;color:var(--muted);margin-bottom:14px;font-family:DM Mono,monospace;">às ' + esc(hora) + '</div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button onclick="_aprovarDesbloqueio()" style="flex:1;padding:9px;background:var(--green);border:none;border-radius:8px;color:#0d0f14;font-size:12px;font-weight:700;cursor:pointer;font-family:Sora,sans-serif;">✅ Aprovar</button>' +
      '<button onclick="_ignorarDesbloqueio()" style="flex:1;padding:9px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:Sora,sans-serif;">Ignorar</button>' +
    '</div>';
  document.body.appendChild(card);
}

function _aprovarDesbloqueio() {
  var card = document.getElementById('dhp-sup-card');
  if (card) card.querySelectorAll('button').forEach(function(b) { b.disabled = true; });
  google.script.run
    .withSuccessHandler(function() {
      var c = document.getElementById('dhp-sup-card');
      if (c) c.remove();
      mostrarToast('✅ Desbloqueio aprovado!', 'success');
    })
    .withFailureHandler(function() {
      mostrarToast('❌ Erro ao aprovar. Tente novamente.', 'error');
      var c = document.getElementById('dhp-sup-card');
      if (c) c.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
    })
    .aprovarDesbloqueioBO();
}

function _ignorarDesbloqueio() {
  var card = document.getElementById('dhp-sup-card');
  if (card) card.remove();
}




// ─── CRIAR ITEM DA LISTA ───────────────────────────────────────────────────
function _criarItemVenda(v, index) {
  var cores      = STATUS_CORES[v.status] || { bg: 'transparent', text: '#D90000', border: '#D90000' };
  var topColor   = cores.border || cores.text || '#555';
  var badgeStyle = 'background:' + cores.bg + ';color:' + cores.text + ';border:1.5px solid ' + (cores.border || cores.text) + ';';

  // Classe da caixa produto (largura fixa)
  var prodMap = { 'Fibra Alone': 'vi-prod-fa', 'Fibra Combo': 'vi-prod-fc', 'Móvel Combo': 'vi-prod-mc', 'Móvel Alone': 'vi-prod-ma' };
  var prodCls = prodMap[v.produto] || 'vi-prod-xx';

  // Plano + valor inline
  var planoVal = [v.plano, v.valor].filter(Boolean).join(' · ');

  // Responsável: avatar com iniciais colorido
  var respHtml = '';
  if (v.resp) {
    var ini = _iniciais(v.resp);
    var respColors = ['rgba(34,217,138,.15)/var(--green)', 'rgba(167,139,250,.15)/var(--purple)',
                      'rgba(79,158,255,.15)/var(--blue)',  'rgba(247,162,59,.15)/var(--yellow)'];
    var rc = respColors[(ini.charCodeAt(0) || 0) % respColors.length].split('/');
    respHtml = '<div class="vi-av" style="background:' + rc[0] + ';color:' + rc[1] + '">' + esc(ini) + '</div>' +
               '<span class="vi-resp-nm">' + esc(v.resp) + '</span>' +
               '<button class="btn-popup" title="Disparar fluxo para o Responsável" style="font-size:11px;padding:1px 4px;" onclick="event.stopPropagation();abrirModalBotConversa(\'resp\',' + index + ',\'🟣PAP\')">📨</button>';
  }
  if (v.canal) {
    respHtml += '<span class="vi-canal-sm">' + esc(v.canal) + '</span>';
  }

  // Linha de datas: Ativ. / Pré-Status / Ag. / Inst.
  var datasHtml = '';
  var dataAtivFormatada = _fmtData(v.dataAtiv);
  var ehDataReal = /^\d{2}\/\d{2}\/\d{4}$/.test(dataAtivFormatada);
  if (ehDataReal) {
    datasHtml += '<span class="vi-ditem"><span class="vi-dlbl">Ativ.</span><span class="vi-dval ok">' + esc(dataAtivFormatada.substring(0,5)) + '</span></span>';
  }

  if (v.agenda) {
    var agCls = v.instal ? ' ok' : ' pend';
    var _tAbrev = v.turno ? (v.turno.toUpperCase().indexOf('TARDE') > -1 ? ' T' : ' M') : '';
    datasHtml += '<span class="vi-ditem"><span class="vi-dlbl">Ag.</span><span class="vi-dval' + agCls + '">' + esc(_fmtData(v.agenda).substring(0,5)) + _tAbrev + '</span></span>';
  }
  if (v.instal) {
    datasHtml += '<span class="vi-ditem"><span class="vi-dlbl">Inst.</span><span class="vi-dval ok">' + esc(_fmtData(v.instal).substring(0,5)) + '</span></span>';
  }

  return '<div class="venda-item" id="item_' + index + '" onclick="selecionarVenda(' + index + ',this)" style="border-top:2px solid ' + topColor + '">' +
    '<div class="vi-body">' +

      // ZONA 1 — nome + status
      '<div class="vi-top">' +
        '<div class="vi-nome-bloco">' +
          '<span class="vi-nome" style="color:' + cores.text + ' !important;">' + esc(v.cliente || 'Sem nome') + '</span>' +
          '<div class="vi-ids">' +
            (v.cpf      ? '<span class="vi-id">'                                          + esc(v.cpf)      + '</span>' : '') +
            (v.contrato ? '<span class="vi-id-sep">·</span><span class="vi-id">OS '       + esc(v.contrato) + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">' +
          '<div style="display:flex;align-items:center;gap:6px;">' +
            (v.preStatus && v.status === '1- Conferencia/Ativação' ? '<span class="vi-prestatus-badge">' + esc(v.preStatus) + '</span>' : '') +
            '<span class="vi-status" style="' + badgeStyle + '">' + esc(v.status || '—') + '</span>' +
          '</div>' +
          (respHtml ? '<div class="vi-row-resp" style="justify-content:flex-end">' + respHtml + '</div>' : '') +
        '</div>' +
      '</div>' +

      '<div class="vi-divider"></div>' +

      // ZONA 2 — rodapé
      '<div class="vi-bot">' +

        // Esquerda: produto + plano/valor + etiquetas BotConversa
        '<div class="vi-bot-left">' +
          (v.produto ? '<span class="vi-produto ' + prodCls + '">' + esc(v.produto) + '</span>' : '') +
          (planoVal  ? '<span class="vi-plano-val">' + esc(planoVal) + '</span>' : '') +
          (v.bcTags || v.bcStatus ? '<span class="vi-bc-tags">' +
            (v.bcStatus ? '<span class="vi-bc-status vi-bc-status--' + (v.bcStatus === 'Aberto' ? 'aberto' : 'ok') + '">' + esc(v.bcStatus) + '</span>' : '') +
            (v.bcTags   ? esc(v.bcTags) : '') +
          '</span>' : '') +
        '</div>' +

        '<div class="vi-vsep"></div>' +

        // Direita: vhub (só conf) / viabilidade / datas
        '<div class="vi-bot-right">' +
          (v.status === '1- Conferencia/Ativação' ? _veroHubPedidoHtml(v, index) : '') +
          (v.viabilidade ? '<div id="viab-badge-' + index + '" class="vi-viab-badge vi-viab-' + (v.viabilidade.indexOf('Aprovada') !== -1 ? 'ok' : 'nok') + '">' + esc(v.viabilidade) + '</div>' : '<div id="viab-badge-' + index + '"></div>') +
          (datasHtml ? '<div class="vi-row-dates">'  + datasHtml + '</div>' : '') +
        '</div>' +

        // Botões
        '<div class="vi-actions">' +
          (v.cpf ? '<button class="btn-popup" title="Consultar CPF Assertiva" onclick="event.stopPropagation();abrirModalAssertiva(\'' + esc(v.cpf.replace(/\D/g,'')) + '\')">👤</button>' : '') +
          '<button class="btn-popup" title="Copiar resumo" onclick="event.stopPropagation();copiarVenda(' + index + ')">📋</button>' +
          '<button class="btn-popup" title="Disparar fluxo BotConversa para o Cliente" onclick="event.stopPropagation();abrirModalBotConversa(\'cliente\',' + index + ')">🤖</button>' +
          (v.cep && v.num ? '<button class="btn-popup" id="viab-btn-' + index + '" title="Consultar viabilidade" onclick="event.stopPropagation();_consultarViabilidadeVenda(' + index + ')">🔍</button>' : '') +
          (v.cpf && (v.sistema || '').toUpperCase() === 'NG' ? '<button class="btn-popup" title="Consultar NG" style="color:#17a2b8;" onclick="event.stopPropagation();_consultarNGVenda(' + index + ')">NG</button>' : '') +
          (v.cpf && (v.sistema || '').toUpperCase() !== 'NG' ? '<button class="btn-popup" title="Consultar Adapter" style="color:#17a2b8;" onclick="event.stopPropagation();_consultarAdapterVenda(' + index + ')">AD</button>' : '') +
          '<span class="venda-arrow">›</span>' +
        '</div>' +

      '</div>' +
    '</div>' +
  '</div>';
}

function selecionarVenda(index, el) {
  document.querySelectorAll('.venda-item').forEach(function (i) { i.classList.remove('selecionado'); });

  var v = _paginaAtual[index];

  var _form      = document.getElementById('painelInlineForm');
  var _acoesNorm = document.getElementById('painelAcoesNormal');
  var _acoesInl  = document.getElementById('painelAcoesInline');

  if (_form)      _form.classList.remove('ativo');

function _secaoPainel(titulo, linhas) {
  var rows = '';
  for (var i = 0; i < linhas.length; i++) {
    var lbl = linhas[i][0];
    var val = linhas[i][1];
    if (!val || String(val).trim() === '') continue;
    rows += '<div class="painel-linha">' +
      '<span class="painel-lbl">' + esc(lbl) + '</span>' +
      '<span class="painel-val">' + esc(val) + '</span>' +
    '</div>';
  }
  if (!rows) return '';
  return '<div class="painel-secao">' +
    '<div class="painel-secao-titulo">' + titulo + '</div>' +
    rows +
  '</div>';
}

function _linhaPainelHtml(lbl, htmlVal) {
  return '<div class="painel-linha">' +
    '<span class="painel-lbl">' + esc(lbl) + '</span>' +
    '<span class="painel-val">' + htmlVal + '</span>' +
  '</div>';
}

// Seção com grid 2 colunas — pares de campos lado a lado; cada item: [lbl, val, full?]
// full=true força a linha a ocupar as 2 colunas
function _secaoGrid2(titulo, itens) {
  var rows = '';
  for (var i = 0; i < itens.length; i++) {
    var lbl  = itens[i][0];
    var val  = String(itens[i][1] != null && itens[i][1] !== '' ? itens[i][1] : '—');
    var full = itens[i][2] || false;
    var cls  = full ? 'painel-linha-full' : 'painel-linha';
    rows += '<div class="' + cls + '">' +
      '<span class="painel-lbl">' + esc(lbl) + '</span>' +
      '<span class="painel-val">' + esc(val) + '</span>' +
    '</div>';
  }
  return '<div class="painel-secao">' +
    '<div class="painel-secao-titulo">' + titulo + '</div>' +
    '<div class="painel-grid-2">' + rows + '</div>' +
  '</div>';
}

function fecharPainel() {
  var listaCol = document.getElementById('listaCol');
  if (listaCol) listaCol.classList.remove('painel-aberto');
  document.getElementById('painelVazio').style.display = 'flex';
  document.getElementById('painelConteudo').classList.remove('ativo');
  AppState.set('vendaSelecionada', null);
  document.querySelectorAll('.venda-item').forEach(function (i) { i.classList.remove('selecionado'); });
}

// ESC fecha painel
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var p = document.getElementById('painelConteudo');
    if (p && p.classList.contains('ativo')) fecharPainel();
  }
});
// Clique fora do painelDetalhes fecha painel
// Usa flag para ignorar o clique que acabou de ABRIR o painel
var _painelAbertoPorClique = false;
document.addEventListener('click', function(e) {
  if (_painelAbertoPorClique) { _painelAbertoPorClique = false; return; }
  var pCont = document.getElementById('painelConteudo');
  if (!pCont || !pCont.classList.contains('ativo')) return;
  var painelDet = document.getElementById('painelDetalhes');
  if (painelDet && painelDet.contains(e.target)) return;
  var pageLista = document.getElementById('pageLista');
  if (pageLista && pageLista.contains(e.target)) fecharPainel();
});

// Abre uma venda na Lista pelo número da linha
function _abrirVendaNoLista(linha) {
  mostrarLoading(true);
  google.script.run
    .withSuccessHandler(function(v) {
      mostrarLoading(false);
      if (!v) { mostrarToast('Venda não encontrada.', 'error'); return; }
      navegar('lista');
      setTimeout(function() {
        AppState.set('vendaSelecionada', v);
        mostrarPainel(v);
      }, 300);
    })
    .withFailureHandler(function(e) {
      mostrarLoading(false);
      mostrarToast('Erro: ' + e.message, 'error');
    })
    .getVendaPorLinha(linha);
}

    '📱 WhatsApp: '     + (v.whats     || '-') + '\n' +

    '📌 Status: '       + (v.status    || '-') + '\n' +
    '👨‍💼 Responsável: ' + (v.resp      || '-') + '   |   🏷️ Canal: ' + (v.canal || '-') + '\n' +
    '🏙️ Cidade: '       + (v.cidade    || '-') + (v.uf ? ' / ' + v.uf : '') + '\n' +
    '⚡ Ativação: '     + (_fmtData(v.dataAtiv)  || '-') + '\n' +
    '📅 Agendamento: '  + (_fmtData(v.agenda)    || '-') + '\n' +
    '✅ Instalação: '   + (_fmtData(v.instal)    || '-') + '\n' +
    '📦 Produto: '      + (v.produto   || '-') + '\n' +
    '🗂 Plano: '        + (v.plano     || '-') + '\n' +
    '💰 Valor: '        + (v.valor     || '-');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto)
      .then(function () { mostrarToast('✅ Resumo copiado!', 'success'); })
      .catch(function () { _copiarFallback(texto); });
  } else {
    _copiarFallback(texto);
  }
}

function _copiarFallback(texto) {
  var ta = document.createElement('textarea');
  ta.value = texto;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    mostrarToast('✅ Resumo copiado!', 'success');
  } catch (e) {
    mostrarToast('Não foi possível copiar.', 'error');
  }
  document.body.removeChild(ta);
}

// ─── CEP ───────────────────────────────────────────────────────────────────
function _atualizarLinkMaps() {
  var rua    = (document.getElementById('f_rua')    || {}).value || '';
  var num    = (document.getElementById('f_num')    || {}).value || '';
  var cidade = (document.getElementById('f_cidade') || {}).value || '';
  var uf     = (document.getElementById('f_uf')     || {}).value || '';
  var wrap   = document.getElementById('mapsLinkWrap');
  var anchor = document.getElementById('mapsLinkAnchor');
  var texto  = document.getElementById('mapsLinkTexto');
  if (!wrap) return;
  if (!rua || !cidade) { wrap.style.display = 'none'; return; }
  var endereco = [rua.trim(), num.trim(), cidade.trim(), uf.trim()].filter(Boolean).join(', ');
  var url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(endereco);
  anchor.href = url;
  texto.textContent = endereco;
  wrap.style.display = 'block';
}

function buscarCEP(cep) {
  var limpo = cep.replace(/\D/g, '');
  if (limpo.length !== 8) return;

  var hint = document.getElementById('cepHint');
  hint.textContent = '⏳ Buscando endereço...';
  hint.style.color = 'var(--muted)';

  // CEP via browser (fetch direto — não depende de autorização do backend)
  fetch('https://brasilapi.com.br/api/cep/v1/' + limpo)
    .then(function(r) {
      if (!r.ok) throw new Error('BrasilAPI HTTP ' + r.status);
      return r.json();
    })
    .then(function(j) {
      if (!j.city) throw new Error('CEP sem cidade na BrasilAPI');
      _preencherEndereco({
        logradouro: (j.street        || '').toUpperCase(),
        bairro:     (j.neighborhood  || '').toUpperCase(),
        cidade:     (j.city          || '').toUpperCase(),
        uf:         (j.state         || '').toUpperCase()
      });
      _aoEnderecoPreenchido(hint);
    })
    .catch(function() {
      // Fallback: ViaCEP
      fetch('https://viacep.com.br/ws/' + limpo + '/json/')
        .then(function(r) { return r.json(); })
        .then(function(j) {
          if (j.erro) throw new Error('CEP inválido');
          _preencherEndereco({
            logradouro: (j.logradouro || '').toUpperCase(),
            bairro:     (j.bairro     || '').toUpperCase(),
            cidade:     (j.localidade || '').toUpperCase(),
            uf:         (j.uf         || '').toUpperCase()
          });
          _aoEnderecoPreenchido(hint);
        })
        .catch(function() {
          hint.textContent = '❌ CEP não encontrado.';
          hint.style.color = 'var(--accent)';
        });
    });
}

// Chamado após endereço preenchido com sucesso
function _aoEnderecoPreenchido(hint) {
  hint.textContent = '✅ Endereço preenchido · Selecione o Produto para ver os planos';
  hint.style.color = 'var(--green)';
  document.getElementById('f_num').focus();
  // Se produto já estava selecionado (ex: edição), carrega planos imediatamente
  var produto = document.getElementById('f_produto').value;
  if (produto) onProdutoChange();
}

// Disparado ao selecionar/trocar o Produto
// Usa a cidade já preenchida pelo CEP — não precisa mais de UrlFetchApp
function onProdutoChange() {
  var cidade  = (document.getElementById('f_cidade').value || '').trim();
  var produto = document.getElementById('f_produto').value;
  var hint    = document.getElementById('produtoHint');

  // Limpa planos anteriores
  _preencherPlanos([]);

  if (!produto) return;

  if (!cidade) {
    hint.textContent   = '⚠️ Preencha o CEP primeiro para ver os planos.';
    hint.style.color   = 'var(--yellow)';
    hint.style.display = 'block';
    setTimeout(function() { hint.style.display = 'none'; }, 3000);
    return;
  }

  hint.textContent   = '⏳ Carregando planos para ' + produto + '...';
  hint.style.color   = 'var(--muted)';
  hint.style.display = 'block';

  var selPlano = document.getElementById('f_plano');
  selPlano.disabled  = true;
  selPlano.innerHTML = '<option>⏳ Carregando...</option>';

  // Passa cidade (já preenchida pelo browser) + produto — sem UrlFetchApp
  google.script.run
    .withSuccessHandler(function(d) {
      selPlano.disabled = false;
      if (d.erro) {
        hint.textContent = '⚠️ ' + d.mensagem;
        hint.style.color = 'var(--yellow)';
        _preencherPlanos([]);
        return;
      }
      if (d.planos && d.planos.length > 0) {
        _preencherPlanos(d.planos);
        var qtd = _contarPlanos(d.planos);
        hint.textContent = '✅ ' + qtd + ' plano' + (qtd !== 1 ? 's' : '') + ' disponível' + (qtd !== 1 ? 'is' : '') + ' em ' + d.cidade;
        hint.style.color = 'var(--green)';
        mostrarToast('📦 ' + qtd + ' planos carregados para ' + d.cidade, 'info');
      } else {
        _preencherPlanos([]);
        hint.textContent = '⚠️ Nenhum plano encontrado para ' + produto + ' em ' + cidade + (d.mensagem ? ' (' + d.mensagem + ')' : '');
        hint.style.color = 'var(--yellow)';
      }
    })
    .withFailureHandler(function(err) {
      selPlano.disabled = false;
      _preencherPlanos([]);
      hint.textContent = '❌ Erro: ' + (err && err.message ? err.message : 'tente novamente');
      hint.style.color = 'var(--accent)';
    })
    .getPlanosPorCidadeProduto(cidade, produto);
}

// ─── Helpers CEP/Planos ────────────────────────────────────────────────────

function _preencherEndereco(d) {
  document.getElementById('f_rua').value    = d.logradouro || '';
  document.getElementById('f_bairro').value = d.bairro     || '';
  document.getElementById('f_cidade').value = d.cidade     || '';
  document.getElementById('f_uf').value     = d.uf         || '';
  _atualizarLinkMaps();
  if (d.sistema) {
    document.getElementById('f_sistema').value = d.sistema;
  } else if (d.cidade) {
    // Busca sistema na aba CIDADES via backend (leitura leve, sem UrlFetchApp)
    google.script.run
      .withSuccessHandler(function(s) {
        if (s) document.getElementById('f_sistema').value = s;
      })
      .getSistemaPorCidade(d.cidade);
  }
}

function _preencherPlanos(planos, produto) {
  var sel = document.getElementById('f_plano');
  sel.innerHTML = '';

  if (!planos || planos.length === 0) {
    sel.innerHTML = '<option value="">— Nenhum plano encontrado para esta cidade —</option>';
    return;
  }

  // Primeiro option vazio de instrução
  var optDefault = document.createElement('option');
  optDefault.value = '';
  optDefault.textContent = '— Selecione o plano —';
  sel.appendChild(optDefault);

  planos.forEach(function (item) {
    var opt = document.createElement('option');
    if (item.indexOf('▶️') === 0) {
      // Linha de cabeçalho de categoria — desabilitada, estilizada
      opt.value    = '';
      opt.disabled = true;
      opt.textContent = item;
      opt.style.fontWeight = '700';
      opt.style.color      = '#a78bfa';
    } else {
      opt.value       = item;
      opt.textContent = item;
    }
    sel.appendChild(opt);
  });

  // Se só há 1 plano real, seleciona automaticamente e extrai o valor
  var reais = planos.filter(function (p) { return p.indexOf('▶️') !== 0; });
  if (reais.length === 1) {
    sel.value = reais[0];
    _extrairValorPlano(reais[0]);
  }
}

// Quando o usuário escolhe um plano, extrai e preenche o campo Valor
function _extrairValorPlano(texto) {
  if (!texto) return;
  var partes = texto.split('|');
  if (partes.length >= 2) {
    var val = partes[partes.length - 1].trim().replace(',', '.');
    var num = parseFloat(val);
    if (!isNaN(num)) {
      document.getElementById('f_valor').value = 'R$ ' + num.toFixed(2).replace('.', ',');
      document.getElementById('f_plano').setAttribute('data-valor', num.toFixed(2));
    }
  }
}

function _contarPlanos(planos) {
  if (!planos) return 0;
  return planos.filter(function (p) { return p.indexOf('▶️') !== 0; }).length;
}

// Listener: ao escolher plano, extrai o valor automaticamente
document.addEventListener('DOMContentLoaded', function () {
  var selPlano = document.getElementById('f_plano');
  if (selPlano) {
    selPlano.addEventListener('change', function () {
      _extrairValorPlano(this.value);
    });
  }
});

  btn.textContent = '✅ Criar Venda Móvel';

  var sel = document.getElementById('mmc-plano');
  sel.innerHTML = '<option value="">— carregando... —</option>';
  sel.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      sel.innerHTML = '<option value="">— Selecione o plano —</option>';
      if (!res.erro && res.planos && res.planos.length) {
        // Filtra apenas planos da categoria MÓVEL COMBO (exclui MÓVEL ALONE)
        var inCombo = false;
        res.planos.forEach(function(p) {
          var isHeader = p.indexOf('▶') > -1;
          if (isHeader) {
            inCombo = p.toUpperCase().indexOf('COMBO') > -1;
            return;
          }
          if (!inCombo) return;
          var opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          sel.appendChild(opt);
        });
      }
      sel.disabled = false;
    })
    .withFailureHandler(function() {
      sel.innerHTML = '<option value="">— erro ao carregar —</option>';
      sel.disabled = false;
    })
    .getPlanosPorCidadeProduto(dados.cidade || '', 'Móvel Combo');

  document.getElementById('modalMovelCombo').style.display = 'flex';
}

function _confirmarMovelCombo() {
  var plano         = document.getElementById('mmc-plano').value.trim();
  var contrato      = document.getElementById('mmc-contrato').value.trim();
  var portabilidade = document.getElementById('mmc-portabilidade').value.trim();
  var linha         = document.getElementById('mmc-linha').value.trim();
  var erro          = document.getElementById('mmc-erro');

  if (!plano)         { erro.textContent = 'Selecione o plano.';              erro.style.display = 'block'; return; }
  // if (!contrato)   { erro.textContent = 'Preencha o ID Contrato Móvel.';   erro.style.display = 'block'; return; }
  if (!portabilidade) { erro.textContent = 'Selecione a portabilidade.';      erro.style.display = 'block'; return; }
  erro.style.display = 'none';

  var btn = document.getElementById('mmc-btn-confirmar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  // Extrai valor do plano: formato "Nome do Plano | R$ XX,XX"
  var partes = plano.split(' | ');
  var valor  = partes.length > 1 ? partes[partes.length - 1].replace('R$ ', '').trim() : '';

  var dadosMovel = Object.assign({}, _mmcDadosFibra, {
    produto:         'Móvel Combo',
    plano:           plano,
    valor:           valor,
    contrato:        contrato,
    portabilidade:   portabilidade,
    linhaMovel:      linha,
    linhaReferencia: undefined
  });
  delete dadosMovel.linhaReferencia;

  google.script.run
    .withSuccessHandler(function() {
      document.getElementById('modalMovelCombo').style.display = 'none';
      mostrarToast('✅ Fibra Combo + Móvel Combo cadastrados!', 'success');
      setTimeout(function() { navegar('lista'); }, 700);
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = '✅ Criar Venda Móvel';
      erro.textContent = 'Erro ao salvar: ' + (err && err.message ? err.message : 'tente novamente');
      erro.style.display = 'block';
    })
    .salvarVenda(dadosMovel);
}

function _cancelarMovelCombo() {
  document.getElementById('modalMovelCombo').style.display = 'none';
  mostrarToast('✅ Fibra Combo salva. Móvel Combo não cadastrado.', 'info');
  setTimeout(function() { navegar('lista'); }, 600);
}
