<script>
'use strict';
// ══════════════════════════════════════════════════════════════════════════
//  INDICAÇÕES — Lead Indicação
//  Atualizado em: 12/03/2026 15:45 | Criação inicial
// ══════════════════════════════════════════���═══════════════════════════════

var _indDados  = [];   // todos os registros (ordem inversa)
var _indFiltro = '';   // status pagamento selecionado

// ── CARREGAR ──────────────────────────────────────────────────────────────
function carregarIndicacoes() {
  document.getElementById('indTbody').innerHTML =
    '<tr><td colspan="8" class="ind-empty">⏳ Carregando indicações...</td></tr>';
  document.getElementById('indResumo').innerHTML =
    '<div style="padding:10px;color:var(--muted);font-size:12px;">⏳</div>';
  document.getElementById('indCount').textContent = '—';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || res.erro) {
        document.getElementById('indTbody').innerHTML =
          '<tr><td colspan="8" class="ind-empty" style="color:var(--accent);">❌ ' +
          esc((res && res.erro) || 'Erro ao carregar') + '</td></tr>';
        return;
      }
      _indDados  = res.dados || [];
      _indFiltro = '';
      _renderizarResumoInd();
      _filtrarIndicacoes();
    })
    .withFailureHandler(function(err) {
      document.getElementById('indTbody').innerHTML =
        '<tr><td colspan="8" class="ind-empty" style="color:var(--accent);">❌ ' +
        esc(err.message) + '</td></tr>';
      mostrarToast('❌ Indicações: ' + err.message, 'error');
    })
    .getIndicacoes();
}

// ── RESUMO — calculado direto dos dados ──────────────────────────────────
function _renderizarResumoInd() {
  var total       = _indDados.length;
  var pendentes   = _indDados.filter(function(v) { return (v.statusPgto||'') === 'Pendente'; }).length;
  var pagos       = _indDados.filter(function(v) { return (v.statusPgto||'') === 'Finalizado/Pago'; }).length;
  var cancelados  = _indDados.filter(function(v) { return (v.statusPgto||'') === 'Cancelado'; }).length;
  var vazios      = _indDados.filter(function(v) { return !(v.statusPgto||'').trim(); }).length;

  var html =
    '<div style="flex:1;"></div>' +
    '<div class="ind-resumo-card total" onclick="_selecionarFiltroInd(\'\')" style="cursor:pointer;">' +
      '<div class="ind-resumo-label">Total</div>' +
      '<div class="ind-resumo-valor">' + total + '</div>' +
      '<div class="ind-resumo-sub">indicações</div>' +
    '</div>' +
    '<div class="ind-resumo-card" onclick="_selecionarFiltroInd(\'Finalizado/Pago\')" style="cursor:pointer;">' +
      '<div class="ind-resumo-label">Finalizado/Pago</div>' +
      '<div class="ind-resumo-valor" style="color:var(--green);">' + pagos + '</div>' +
      '<div class="ind-resumo-sub">liquidados</div>' +
    '</div>' +
    '<div class="ind-resumo-card" onclick="_selecionarFiltroInd(\'Pendente\')" style="cursor:pointer;">' +
      '<div class="ind-resumo-label">Pendente</div>' +
      '<div class="ind-resumo-valor" style="color:var(--accent);">' + pendentes + '</div>' +
      '<div class="ind-resumo-sub">aguardando pgto</div>' +
    '</div>';

  document.getElementById('indResumo').innerHTML = html;
}

function _selecionarFiltroInd(status) {
  document.getElementById('indFiltroStatus').value = status;
  _filtrarIndicacoes();
}

// ── FILTRAR + RENDERIZAR TABELA ───────────────────────────────────────────
function _filtrarIndicacoes() {
  var filtro = document.getElementById('indFiltroStatus').value;
  _indFiltro = filtro;
  var lista = filtro
    ? _indDados.filter(function(v) { return (v.statusPgto||'') === filtro; })
    : _indDados;
  _renderizarTabelaInd(lista);
}

function _renderizarTabelaInd(lista) {
  var count = document.getElementById('indCount');
  count.textContent = lista.length + ' registro' + (lista.length !== 1 ? 's' : '');

  if (lista.length === 0) {
    document.getElementById('indTbody').innerHTML =
      '<tr><td colspan="9" class="ind-empty">Nenhuma indicação encontrada.</td></tr>';
    return;
  }

  var html = lista.map(function(v, idx) {
    var badgeCls = v.statusPgto === 'Finalizado/Pago' ? 'pago'
                 : v.statusPgto === 'Cancelado' ? 'cancelado'
                 : v.statusPgto === 'Pendente' ? 'pendente' : 'default';

    return (
      '<tr id="indRow_' + v.linha + '">' +
        '<td class="ind-data">' + esc(v.data || '—') + '</td>' +
        '<td>' +
          '<div class="ind-nome">' + esc(v.nomeIndicado || '—') + '</div>' +
          (v.telIndicado ? '<div class="ind-tel">' + esc(v.telIndicado) + '</div>' : '') +
        '</td>' +
        '<td>' +
          '<div class="ind-nome">' + esc(v.nomeIndicador || '—') + '</div>' +
          (v.telIndicador ? '<div class="ind-tel">' + esc(v.telIndicador) + '</div>' : '') +
        '</td>' +
        '<td>' +
          (v.statusAtend ? '<span class="ind-badge default">' + esc(v.statusAtend) + '</span>' : '<span style="color:var(--muted)">—</span>') +
        '</td>' +
        '<td class="ind-data">' + esc(v.contrato || '—') + '</td>' +
        '<td>' +
          (v.statusPgto
            ? '<select class="ind-status-sel ind-status-sel--' + badgeCls + '" onchange="_atualizarStatusPgto(' + v.linha + ', this)">' +
                '<option value="Pendente"'       + (v.statusPgto === 'Pendente'       ? ' selected' : '') + '>🟡 Pendente</option>' +
                '<option value="Finalizado/Pago"'+ (v.statusPgto === 'Finalizado/Pago'? ' selected' : '') + '>✅ Finalizado/Pago</option>' +
                '<option value="Cancelado"'      + (v.statusPgto === 'Cancelado'      ? ' selected' : '') + '>❌ Cancelado</option>' +
              '</select>'
            : '<select class="ind-status-sel ind-status-sel--default" disabled><option>—</option></select>'
          ) +
        '</td>' +
        '<td>' +
          '<input type="date" class="ind-data-input" ' +
            'value="' + _dataPgtoParaInput(v.dataPgto) + '" ' +
            'onchange="_atualizarDataPgto(' + v.linha + ', this)" ' +
            'title="Data do pagamento">' +
        '</td>' +
        '<td>' +
          '<div class="ind-pix" title="' + esc(v.tipoPix ? v.tipoPix + ': ' + v.chavePix : v.chavePix) + '">' +
            (v.tipoPix ? '<span style="font-size:9px;color:var(--muted);">' + esc(v.tipoPix) + '</span><br>' : '') +
            esc(v.chavePix || '—') +
          '</div>' +
        '</td>' +
        '<td>' +
          '<button class="ind-btn-zap" onclick="_copiarMsgIndicacao(' + idx + ')" title="Copiar mensagem para WhatsApp">🟢 Mensagem</button>' +
        '</td>' +
      '</tr>'
    );
  }).join('');

  document.getElementById('indTbody').innerHTML = html;
}

// ── ATUALIZAR STATUS PAGAMENTO NA PLANILHA ────────────────────────────────
// Converte dd/MM/yyyy → yyyy-MM-dd para o input type=date
function _dataPgtoParaInput(dataBR) {
  if (!dataBR || dataBR === '—') return '';
  var p = dataBR.split('/');
  if (p.length === 3) return p[2] + '-' + p[1] + '-' + p[0];
  return '';
}

function _atualizarStatusPgto(linha, selectEl) {
  var novoStatus = selectEl.value;
  var cls = novoStatus === 'Pendente' ? 'pendente'
          : novoStatus === 'Finalizado/Pago' ? 'pago'
          : novoStatus === 'Cancelado' ? 'cancelado' : 'default';

  // Atualiza classe visual imediatamente
  selectEl.className = 'ind-status-sel ind-status-sel--' + cls;

  // Atualiza dado local
  var reg = _indDados.find(function(v) { return v.linha === linha; });
  if (reg) reg.statusPgto = novoStatus;

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.sucesso) {
        mostrarToast('✅ Status atualizado!', 'success');
        _renderizarResumoInd(); // atualiza KPIs
      } else {
        mostrarToast('❌ Erro ao salvar.', 'error');
      }
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ ' + err.message, 'error');
    })
    .atualizarStatusPgtoInd(linha, novoStatus);
}

// ── ATUALIZAR DATA PAGAMENTO NA PLANILHA ─────────────────────────────────
function _atualizarDataPgto(linha, inputEl) {
  var valorISO = inputEl.value; // yyyy-MM-dd
  // Converte para dd/MM/yyyy antes de gravar
  var valorBR = '';
  if (valorISO) {
    var p = valorISO.split('-');
    if (p.length === 3) valorBR = p[2] + '/' + p[1] + '/' + p[0];
  }

  // Atualiza dado local
  var reg = _indDados.find(function(v) { return v.linha === linha; });
  if (reg) reg.dataPgto = valorBR;

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.sucesso) {
        mostrarToast('✅ Data de pagamento salva!', 'success');
      } else {
        mostrarToast('❌ Erro ao salvar data.', 'error');
      }
    })
    .withFailureHandler(function(err) {
      mostrarToast('❌ ' + err.message, 'error');
    })
    .atualizarDataPgtoInd(linha, valorBR);
}

// ── COPIAR MSG WHATSAPP ───────────────────────────────────────────────────
function _copiarMsgIndicacao(idx) {
  // Usa a lista filtrada atual
  var filtro = _indFiltro;
  var lista  = filtro
    ? _indDados.filter(function(v) { return (v.statusPgto || '') === filtro; })
    : _indDados;
  var v = lista[idx];
  if (!v || !v.nomeIndicado) {
    mostrarToast('⚠️ Registro sem nome indicado.', 'error');
    return;
  }

  var msg =
    '💰 *Você acaba de receber um Pix!*\n' +
    '🗓️ Quanto mais você indica, mais você ganha!\n' +
    '🚀 Bora pra mais!\n\n' +
    '== O QUE ESTÁ SENDO PAGO ==\n' +
    'Cliente: ' + v.nomeIndicado + '\n' +
    'Valor: R$ 80,00';

  var btn = document.querySelectorAll('.ind-btn-zap')[idx];

  if (navigator.clipboard) {
    navigator.clipboard.writeText(msg).then(function() {
      if (btn) { btn.textContent = '✅ Copiado!'; setTimeout(function() { btn.innerHTML = '🟢 WhatsApp'; }, 2200); }
      mostrarToast('📋 Mensagem copiada!', 'success');
    }).catch(function() { _copiarFallbackInd(msg, btn); });
  } else {
    _copiarFallbackInd(msg, btn);
  }
}

function _copiarFallbackInd(msg, btn) {
  var ta = document.createElement('textarea');
  ta.value = msg; ta.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  if (btn) { btn.textContent = '✅ Copiado!'; setTimeout(function() { btn.innerHTML = '🟢 WhatsApp'; }, 2200); }
  mostrarToast('📋 Mensagem copiada!', 'success');
}

// ── MODAL NOVA INDICAÇÃO ──────────────────────────────────────────────────
function _abrirModalIndicacao() {
  // Preenche data atual por padrão
  var hoje = new Date();
  var dd = String(hoje.getDate()).padStart(2,'0');
  var mm = String(hoje.getMonth()+1).padStart(2,'0');
  var yyyy = hoje.getFullYear();
  document.getElementById('indF_data').value = yyyy + '-' + mm + '-' + dd;

  // Limpa campos
  ['indF_nomeIndicado','indF_telIndicado','indF_nomeIndicador',
   'indF_telIndicador','indF_chavePix'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  ['indF_tipoChavePix','indF_statusAtend','indF_statusPgto'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });

  var btn = document.getElementById('indBtnSalvar');
  if (btn) { btn.disabled = false; btn.textContent = '✅ Salvar Indicação'; }

  document.getElementById('modalNovaIndicacao').classList.add('aberto');
}

function _fecharModalIndicacao() {
  document.getElementById('modalNovaIndicacao').classList.remove('aberto');
}

// Fecha modal ao clicar fora — usa delegação no document para evitar erro de DOM
document.addEventListener('click', function(e) {
  var modal = document.getElementById('modalNovaIndicacao');
  if (modal && e.target === modal) _fecharModalIndicacao();
});

// ── SALVAR INDICAÇÃO ──────────────────────────────────────────────────────
function _salvarIndicacao() {
  var nomeIndicado  = document.getElementById('indF_nomeIndicado').value.trim();
  var telIndicado   = document.getElementById('indF_telIndicado').value.trim();
  var nomeIndicador = document.getElementById('indF_nomeIndicador').value.trim();

  if (!nomeIndicado) {
    mostrarToast('⚠️ Informe o nome do indicado.', 'error');
    document.getElementById('indF_nomeIndicado').focus();
    return;
  }
  if (!nomeIndicador) {
    mostrarToast('⚠️ Informe o nome do indicador.', 'error');
    document.getElementById('indF_nomeIndicador').focus();
    return;
  }

  var dados = {
    data:          document.getElementById('indF_data').value,
    nomeIndicado:  nomeIndicado,
    telIndicado:   telIndicado,
    nomeIndicador: nomeIndicador,
    telIndicador:  document.getElementById('indF_telIndicador').value.trim(),
    tipoChavePix:  document.getElementById('indF_tipoChavePix').value,
    chavePix:      document.getElementById('indF_chavePix').value.trim(),
    statusAtend:   document.getElementById('indF_statusAtend').value,
    statusPgto:    document.getElementById('indF_statusPgto').value
  };

  var btn = document.getElementById('indBtnSalvar');
  btn.disabled = true;
  btn.textContent = '⏳ Salvando...';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.sucesso) {
        _fecharModalIndicacao();
        mostrarToast('✅ Indicação salva com sucesso!', 'success');
        carregarIndicacoes();
      } else {
        btn.disabled = false;
        btn.textContent = '✅ Salvar Indicação';
        mostrarToast('❌ Erro: ' + (res ? res.mensagem : 'tente novamente'), 'error');
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = '✅ Salvar Indicação';
      mostrarToast('❌ Falha ao salvar: ' + err.message, 'error');
    })
    .salvarIndicacao(dados);
}
</script>
